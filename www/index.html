<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="11" height="11"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // The circle is complete. It breathes.
        var size = 11;
        var center = 5;

        // Warm core palette, now fully rounded
        var coreColors = ['#8b3a10', '#6b2a00', '#4a1a00', '#331100', '#555555', '#888888'];

        function draw() {
            ctx.clearRect(0, 0, size, size);

            // Breathing: slow sine wave synced to wall clock (8-second cycle)
            // Two viewers see the same phase
            var t = (Date.now() % 8000) / 8000;
            var breath = Math.sin(t * 2 * Math.PI);
            // Radius oscillates between 4.2 and 5.0
            var maxRadius = 4.6 + breath * 0.4;

            for (var y = 0; y < size; y++) {
                for (var x = 0; x < size; x++) {
                    var dx = x - center;
                    var dy = y - center;
                    var dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist <= maxRadius) {
                        // Map distance to color index
                        var idx = Math.floor(dist * coreColors.length / (maxRadius + 0.5));
                        if (idx >= coreColors.length) idx = coreColors.length - 1;
                        ctx.fillStyle = coreColors[idx];
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
