<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="32" height="32"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // Two daughter cells, born from division
        // Canvas expanded to 32x32 to fit both cells
        var size = 32;

        // Extracellular medium
        var mediumColor = '#e8e0d8';

        // Daughter cell A: upper-right
        var cellA = {
            cx: 21, cy: 9,
            radius: 5.5,
            nucleusCx: 21, nucleusCy: 9,
            nucleusRadius: 1.8,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            // Inherited organelles
            erSegments: [
                { x1: 19, y1: 7, x2: 17, y2: 5 },
                { x1: 23, y1: 7, x2: 25, y2: 5 },
                { x1: 19, y1: 11, x2: 17, y2: 13 },
                { x1: 23, y1: 11, x2: 25, y2: 13 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 0.5, speed: 0.8, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 3.2, speed: -0.6, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '19,10': '#cc9944', '19,11': '#cc9944', '18,10': '#ddaa55' },
            chromatin: [
                { x: 21, y: 8 }, { x: 22, y: 9 }, { x: 21, y: 10 }, { x: 20, y: 9 },
            ],
            // Abscission complete: single unified nucleus with merged chromatin
            sisterChromatin: [
                { x: 22, y: 8 }, { x: 22, y: 10 }, { x: 20, y: 10 }, { x: 20, y: 8 },
            ],
            // Centrosomes reset to single body near nucleus for G1
            centrosomes: [
                { x: 23, y: 8 },
                { x: 19, y: 10 },
            ],
            // Abscission complete — cell fully separated
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 0.3, color: '#33cc99' },
                { angle: 2.5, color: '#cc3399' },
            ],
        };

        // Daughter cell B: lower-left (drifted slightly after separation)
        var cellB = {
            cx: 11, cy: 23,
            radius: 5.5,
            nucleusCx: 11, nucleusCy: 23,
            nucleusRadius: 1.8,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 9, y1: 21, x2: 7, y2: 19 },
                { x1: 13, y1: 21, x2: 15, y2: 19 },
                { x1: 9, y1: 25, x2: 7, y2: 27 },
                { x1: 13, y1: 25, x2: 15, y2: 27 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 2.5, speed: -0.7, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 5.8, speed: 0.5, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '9,24': '#cc9944', '9,25': '#cc9944', '8,24': '#ddaa55' },
            chromatin: [
                { x: 11, y: 22 }, { x: 12, y: 23 }, { x: 11, y: 24 }, { x: 10, y: 23 },
            ],
            // Abscission complete: single unified nucleus
            sisterChromatin: [
                { x: 12, y: 22 }, { x: 12, y: 24 }, { x: 10, y: 24 }, { x: 10, y: 22 },
            ],
            // Centrosomes reset to single body near nucleus for G1
            centrosomes: [
                { x: 14, y: 20 },
                { x: 8, y: 26 },
            ],
            // Abscission complete — cell fully separated
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 3.5, color: '#3399cc' },
                { angle: 5.0, color: '#cc9933' },
            ],
        };

        // Build cilia for each cell
        var numCilia = 10;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cellA.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 });
            cellB.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 + 0.2 });
        }

        // Precompute ER data for a cell
        function buildERData(cell) {
            cell.erPixels = {};
            cell.erPaths = [];
            for (var si = 0; si < cell.erSegments.length; si++) {
                var seg = cell.erSegments[si];
                var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
                var path = [];
                for (var step = 0; step <= steps; step++) {
                    var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                    var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                    cell.erPixels[px + ',' + py] = true;
                    path.push({ x: px, y: py });
                }
                cell.erPaths.push(path);
            }
        }
        buildERData(cellA);
        buildERData(cellB);

        // Nutrient particles in the medium
        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 28, y: 5, color: '#88bb55' },
            { x: 4, y: 28, color: '#55aa88' },
            { x: 27, y: 27, color: '#55aa88' },
            { x: 1, y: 15, color: '#bbaa44' },
            { x: 30, y: 17, color: '#bbaa44' },
            { x: 16, y: 1, color: '#88bb55' },
            { x: 15, y: 30, color: '#55aa88' },
            { x: 5, y: 8, color: '#bbaa44' },
            { x: 26, y: 3, color: '#88bb55' },
            { x: 3, y: 25, color: '#55aa88' },
            { x: 28, y: 20, color: '#bbaa44' },
            // New nutrients between the cells — the space where division happened
            { x: 16, y: 16, color: '#bbaa44' },
            { x: 15, y: 15, color: '#55aa88' },
        ];

        // Abscission scar: remnant of the midbody left in the medium after separation
        var abscissionScar = { x: 16, y: 16, color: '#aa9933' };

        // Intercellular signaling: daughter cells communicate via chemical signals
        var signals = [
            // Signal from A to B (paracrine signaling)
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.33 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.66 },
            // Signal from B to A (response signaling)
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.15 },
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.55 },
        ];

        // Extracellular matrix (ECM): fibrous proteins secreted by both cells
        // forming connective tissue between the daughter cells
        var ecmFibers = [];
        // Build fibers connecting the two cells through the intercellular space
        var fiberCount = 5;
        for (var fi = 0; fi < fiberCount; fi++) {
            var frac = (fi + 1) / (fiberCount + 1);
            // Each fiber has a slightly different path offset for visual variety
            var offsetX = (fi % 2 === 0 ? 1 : -1) * (fi * 0.6);
            var offsetY = (fi % 2 === 0 ? -1 : 1) * ((fi + 1) * 0.4);
            ecmFibers.push({
                // Start near cell A's membrane, end near cell B's membrane
                startFrac: 0.25 + fi * 0.02,
                endFrac: 0.75 - fi * 0.02,
                offsetX: offsetX,
                offsetY: offsetY,
                color: fi % 2 === 0 ? '#c4a882' : '#b89870', // collagen-like tones
                pulsePhase: fi * 1.3,
            });
        }

        // Filopodia: thin actin-based protrusions reaching toward the other cell
        // Each cell extends 3 filopodia through the ECM
        cellA.filopodia = [];
        cellB.filopodia = [];
        for (var fpi = 0; fpi < 3; fpi++) {
            // Cell A reaches toward cell B
            var baseAngleA = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var spreadA = (fpi - 1) * 0.35;
            cellA.filopodia.push({
                angle: baseAngleA + spreadA,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
            // Cell B reaches toward cell A
            var baseAngleB = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var spreadB = (fpi - 1) * 0.35;
            cellB.filopodia.push({
                angle: baseAngleB + spreadB,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8 + 1.5,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
        }

        // Ribosomes: small dots on rough ER showing protein synthesis
        cellA.ribosomes = [
            { erIdx: 0, pos: 0.3, color: '#553322' },
            { erIdx: 0, pos: 0.7, color: '#553322' },
            { erIdx: 1, pos: 0.5, color: '#553322' },
            { erIdx: 2, pos: 0.4, color: '#553322' },
            { erIdx: 3, pos: 0.6, color: '#553322' },
        ];
        cellB.ribosomes = [
            { erIdx: 0, pos: 0.4, color: '#553322' },
            { erIdx: 1, pos: 0.3, color: '#553322' },
            { erIdx: 1, pos: 0.8, color: '#553322' },
            { erIdx: 2, pos: 0.5, color: '#553322' },
            { erIdx: 3, pos: 0.4, color: '#553322' },
        ];

        // Gap junctions: direct connections where filopodia tips meet between cells
        // These form channels for small molecule exchange (ions, metabolites)
        var gapJunctions = [
            { filoIdxA: 0, filoIdxB: 2, color: '#ddbb88', pulsePhase: 0 },
            { filoIdxA: 1, filoIdxB: 1, color: '#ccaa77', pulsePhase: 1.5 },
            { filoIdxA: 2, filoIdxB: 0, color: '#ddbb88', pulsePhase: 3.0 },
        ];

        // Peroxisomes: small detoxification organelles, slower orbit than lysosomes
        cellA.peroxisomes = [
            { orbitR: 3.8, baseAngle: 0.3, speed: 0.6, color: '#66aa88' },
            { orbitR: 2.0, baseAngle: 3.5, speed: -0.5, color: '#55bb77' },
        ];
        cellB.peroxisomes = [
            { orbitR: 3.8, baseAngle: 1.8, speed: -0.6, color: '#66aa88' },
            { orbitR: 2.0, baseAngle: 5.0, speed: 0.5, color: '#55bb77' },
        ];

        // Desmosomes: mechanical anchoring junctions (button-like spots on membranes)
        // Unlike gap junctions which pass signals, desmosomes hold tissue together
        var desmosomes = [
            { angleA: 2.0, angleB: 5.2, color: '#bb8844', anchorColor: '#998866' },
            { angleA: 2.8, angleB: 5.9, color: '#bb8844', anchorColor: '#998866' },
        ];

        // Tight junctions: continuous seal between cells, preventing molecules from
        // passing between them — completes the junction trio (gap, desmosome, tight)
        var tightJunctions = [];
        var tjCount = 6;
        for (var tji = 0; tji < tjCount; tji++) {
            // Span a band of angles between the two cells (facing each other)
            var baseA = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var baseB = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var spread = (tji - (tjCount - 1) / 2) * 0.18;
            tightJunctions.push({
                angleA: baseA + spread,
                angleB: baseB + spread,
                phase: tji * 0.9,
            });
        }

        // Adherens junctions: E-cadherin adhesion belt connecting the two cells
        // The fourth and final major junction type, linking to actin cytoskeleton
        var adherensJunctions = [];
        var ajCount = 4;
        for (var aji = 0; aji < ajCount; aji++) {
            var baseA2 = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var baseB2 = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var ajSpread = (aji - (ajCount - 1) / 2) * 0.25;
            adherensJunctions.push({
                angleA: baseA2 + ajSpread,
                angleB: baseB2 + ajSpread,
                phase: aji * 1.2,
            });
        }

        // Actin stress fibers: cytoskeletal cables inside each cell
        // Connect from adherens junction sites inward toward the nucleus
        cellA.actinFibers = [];
        cellB.actinFibers = [];
        for (var afi = 0; afi < ajCount; afi++) {
            var ajA = adherensJunctions[afi];
            cellA.actinFibers.push({ junctionAngle: ajA.angleA, length: 3.5, phase: afi * 0.7 });
            cellB.actinFibers.push({ junctionAngle: ajA.angleB, length: 3.5, phase: afi * 0.7 + 1.0 });
        }

        // Smooth ER: lipid synthesis tubules, distinct from rough ER (no ribosomes)
        cellA.smoothER = [
            { cx: 24, cy: 11, rx: 1.5, ry: 0.8, angle: 0.4 },
            { cx: 18, cy: 7, rx: 1.2, ry: 0.6, angle: 2.1 },
        ];
        cellB.smoothER = [
            { cx: 14, cy: 25, rx: 1.5, ry: 0.8, angle: 0.7 },
            { cx: 8, cy: 21, rx: 1.2, ry: 0.6, angle: 2.5 },
        ];

        // Lysosomes: small digestive organelles orbiting in the cytoplasm
        cellA.lysosomes = [
            { orbitR: 2.5, baseAngle: 1.0, speed: 1.2, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 4.0, speed: -0.9, color: '#9966bb' },
        ];
        cellB.lysosomes = [
            { orbitR: 2.5, baseAngle: 2.5, speed: -1.1, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 5.5, speed: 0.8, color: '#9966bb' },
        ];

        // Microtubules: radiate from centrosome (MTOC) outward through cytoplasm
        // Each cell has 6 microtubule tracks; motor proteins carry cargo along them
        cellA.microtubules = [];
        cellB.microtubules = [];
        for (var mti = 0; mti < 6; mti++) {
            var mtAngle = mti * 2 * Math.PI / 6;
            cellA.microtubules.push({ angle: mtAngle, length: 4.0, cargoPhase: mti * 0.5 });
            cellB.microtubules.push({ angle: mtAngle + 0.3, length: 4.0, cargoPhase: mti * 0.5 + 0.25 });
        }

        // Intermediate filaments: third cytoskeletal element, cage around nucleus
        // anchoring to desmosome sites — completes actin + microtubule + IF triad
        cellA.intermediateFilaments = [];
        cellB.intermediateFilaments = [];
        // Each IF runs from near the nucleus outward toward a desmosome anchor point
        for (var ifi = 0; ifi < desmosomes.length; ifi++) {
            var desmo = desmosomes[ifi];
            cellA.intermediateFilaments.push({ targetAngle: desmo.angleA, length: 3.8, phase: ifi * 1.1 });
            cellB.intermediateFilaments.push({ targetAngle: desmo.angleB, length: 3.8, phase: ifi * 1.1 + 0.5 });
        }
        // Additional IF strands forming the perinuclear cage (not anchored to desmosomes)
        for (var ifi2 = 0; ifi2 < 4; ifi2++) {
            var cageAngle = ifi2 * Math.PI / 2 + 0.4; // 4 cage strands at ~90 degree intervals
            cellA.intermediateFilaments.push({ targetAngle: cageAngle, length: 2.5, phase: ifi2 * 0.8 + 2.0 });
            cellB.intermediateFilaments.push({ targetAngle: cageAngle + 0.2, length: 2.5, phase: ifi2 * 0.8 + 2.5 });
        }

        // Nuclear pores: channels on the nuclear envelope for mRNA export
        // mRNA particles travel from nucleus outward toward ribosomes on rough ER
        cellA.nuclearPores = [
            { angle: 0.5, mRNAphase: 0 },
            { angle: 1.8, mRNAphase: 0.33 },
            { angle: 3.3, mRNAphase: 0.66 },
            { angle: 4.7, mRNAphase: 0.5 },
            { angle: 5.8, mRNAphase: 0.17 },
        ];
        cellB.nuclearPores = [
            { angle: 0.8, mRNAphase: 0.15 },
            { angle: 2.1, mRNAphase: 0.48 },
            { angle: 3.6, mRNAphase: 0.82 },
            { angle: 5.0, mRNAphase: 0.31 },
            { angle: 5.5, mRNAphase: 0.64 },
        ];

        // Secretory vesicles: bud from Golgi, travel to membrane, fuse (exocytosis)
        // Completes the central dogma: DNA → mRNA → ribosome → protein → Golgi → secretion
        cellA.secretoryVesicles = [
            { budAngle: 2.6, memAngle: 0.8, speed: 0.4, phase: 0, color: '#ddaa33' },
            { budAngle: 2.9, memAngle: 4.5, speed: 0.35, phase: 0.33, color: '#ccbb44' },
            { budAngle: 2.3, memAngle: 5.8, speed: 0.45, phase: 0.66, color: '#ddaa33' },
        ];
        cellB.secretoryVesicles = [
            { budAngle: 2.8, memAngle: 1.2, speed: 0.38, phase: 0.15, color: '#ddaa33' },
            { budAngle: 2.5, memAngle: 3.8, speed: 0.42, phase: 0.5, color: '#ccbb44' },
            { budAngle: 3.1, memAngle: 5.2, speed: 0.36, phase: 0.82, color: '#ddaa33' },
        ];

        // Endocytic vesicles: receptor-mediated endocytosis, membrane pinches inward
        // Vesicles travel from membrane toward lysosomes (completing endo/exo trafficking cycle)
        cellA.endocyticVesicles = [
            { memAngle: 0.3, targetAngle: 1.0, speed: 0.38, phase: 0, color: '#aa55cc' },
            { memAngle: 2.5, targetAngle: 4.0, speed: 0.42, phase: 0.5, color: '#9944bb' },
        ];
        cellB.endocyticVesicles = [
            { memAngle: 3.5, targetAngle: 2.5, speed: 0.4, phase: 0.25, color: '#aa55cc' },
            { memAngle: 5.0, targetAngle: 5.5, speed: 0.36, phase: 0.75, color: '#9944bb' },
        ];

        // S phase: DNA replication begins — replication forks flash inside nuclei
        // Each cell gets replication bubbles that open along chromatin
        cellA.replicationForks = [
            { chrIdx: 0, speed: 0.3, phase: 0, color: '#66eeff' },
            { chrIdx: 2, speed: 0.35, phase: 0.25, color: '#55ddee' },
            { chrIdx: 4, speed: 0.28, phase: 0.5, color: '#66eeff' },
            { chrIdx: 6, speed: 0.32, phase: 0.75, color: '#55ddee' },
        ];
        cellB.replicationForks = [
            { chrIdx: 1, speed: 0.31, phase: 0.1, color: '#66eeff' },
            { chrIdx: 3, speed: 0.34, phase: 0.4, color: '#55ddee' },
            { chrIdx: 5, speed: 0.29, phase: 0.6, color: '#66eeff' },
            { chrIdx: 7, speed: 0.33, phase: 0.85, color: '#55ddee' },
        ];

        // Genome: "PETAR RAKOVI" encoded as nucleotide colors — the cell's genetic identity
        // Each letter maps to a base color; the sequence is read during S phase replication
        var genomeStr = 'PETARRAKOVI';
        var baseColors = {
            'P': '#ff4466', 'E': '#44ff88', 'T': '#4488ff', 'A': '#ffaa22',
            'R': '#dd44ff', 'K': '#44dddd', 'O': '#ff8844', 'V': '#88ff44',
            'I': '#ff44aa'
        };
        var genomeSequence = [];
        for (var gi = 0; gi < genomeStr.length; gi++) {
            genomeSequence.push({
                letter: genomeStr[gi],
                color: baseColors[genomeStr[gi]] || '#ffffff'
            });
        }

        // Cyclin-CDK complexes: molecular switches accumulating during S phase
        // Cyclin A builds up to drive cell into G2; visible as glowing particles in cytoplasm
        cellA.cyclins = [
            { orbitR: 2.8, baseAngle: 0.7, speed: 0.9, color: '#44ddaa' },
            { orbitR: 3.6, baseAngle: 2.2, speed: -0.7, color: '#33ccbb' },
            { orbitR: 1.8, baseAngle: 4.1, speed: 1.1, color: '#44ddaa' },
            { orbitR: 4.0, baseAngle: 5.5, speed: -0.8, color: '#33ccbb' },
        ];
        cellB.cyclins = [
            { orbitR: 2.8, baseAngle: 1.3, speed: -0.85, color: '#44ddaa' },
            { orbitR: 3.6, baseAngle: 3.8, speed: 0.75, color: '#33ccbb' },
            { orbitR: 1.8, baseAngle: 5.6, speed: -1.0, color: '#44ddaa' },
            { orbitR: 4.0, baseAngle: 0.9, speed: 0.65, color: '#33ccbb' },
        ];

        // G2 transition: S phase completing, cells grow as replicated DNA fills the nucleus
        // Replication forks fade, nucleus swells with 4n DNA content
        // Cyclin B-CDK1 complexes begin accumulating, priming for mitosis
        cellA.cyclinB = [
            { orbitR: 3.2, baseAngle: 1.1, speed: 1.0, color: '#dd66aa' },
            { orbitR: 2.4, baseAngle: 3.7, speed: -0.85, color: '#cc5599' },
            { orbitR: 4.2, baseAngle: 5.2, speed: 0.7, color: '#dd66aa' },
        ];
        cellB.cyclinB = [
            { orbitR: 3.2, baseAngle: 2.4, speed: -0.95, color: '#dd66aa' },
            { orbitR: 2.4, baseAngle: 4.9, speed: 0.8, color: '#cc5599' },
            { orbitR: 4.2, baseAngle: 0.6, speed: -0.75, color: '#dd66aa' },
        ];

        // G2 DNA damage checkpoint: ATM/ATR kinases scan chromatin for replication errors
        // Checkpoint proteins orbit inside the nucleus, sampling each chromatin locus
        // Once all loci verified, a green "checkpoint passed" signal pulses outward
        cellA.checkpointKinases = [
            { scanSpeed: 0.45, phase: 0, color: '#33ffaa' },
            { scanSpeed: -0.38, phase: 0.5, color: '#22ee99' },
        ];
        cellB.checkpointKinases = [
            { scanSpeed: 0.42, phase: 0.2, color: '#33ffaa' },
            { scanSpeed: -0.4, phase: 0.7, color: '#22ee99' },
        ];

        // TELOPHASE: chromatids at poles, nuclear envelopes reform, chromosomes decondense
        // Cleavage furrow begins ingressing at the cell equator
        cellA.prophase = {
            condensation: 0.6, // chromosomes beginning to decondense
            pole1Target: { x: 24, y: 5 },
            pole2Target: { x: 18, y: 13 },
            asterCount: 6, // asters diminishing
            spindleForming: true,
            prometaphase: true,
            metaphase: true,
            anaphase: true,
            telophase: true, // nuclear envelopes reforming, chromosomes decondensing
        };
        cellB.prophase = {
            condensation: 0.6,
            pole1Target: { x: 14, y: 19 },
            pole2Target: { x: 8, y: 27 },
            asterCount: 6,
            spindleForming: true,
            prometaphase: true,
            metaphase: true,
            anaphase: true,
            telophase: true,
        };

        // G2 growth: cells grow larger than S phase as they prepare for division
        var growthRate = 0.6; // increased from 0.55 — G2 cells swell further

        function drawCell(cell, t, tOrbit, tCilia, tChromatin, tGrowth) {
            var breath = Math.sin(t * 2 * Math.PI);
            // Post-abscission: cells relax back to spherical, gentle G1 growth
            var growthPulse = (1 + Math.sin(tGrowth * 2 * Math.PI)) * 0.5; // 0 to 1
            var maxR = cell.radius + breath * 0.3 + growthPulse * growthRate;
            // Telophase cells elongate along spindle axis as furrow constricts
            var elongation = cell.separated ? (cell.prophase && cell.prophase.telophase ? 0.6 : 0.3) : 1.1;
            // Cytokinesis constriction: cell pinches at equator perpendicular to spindle
            var cytoConstriction = 0;
            if (cell.separated && cell.prophase && cell.prophase.telophase) {

                    var pcmAngle = dupAngle + Math.PI / 2;
                    var pcmX = Math.round(cs.x + Math.cos(pcmAngle) * 0.8);
                    var pcmY = Math.round(cs.y + Math.sin(pcmAngle) * 0.8);
                    if (pcmX >= 0 && pcmX < size && pcmY >= 0 && pcmY < size) {
                        centPixels[pcmX + ',' + pcmY] = '#99882e';
                    }
                } else {
                    var tCent = (t * 8000 / 3000) % 1.0;
                    for (var csi = 0; csi < cell.centrosomes.length; csi++) {
                        var cs = cell.centrosomes[csi];
                        centPixels[cs.x + ',' + cs.y] = '#ddcc44';
                    }
                    if (cell.centrosomes.length >= 2) {
                        var c0 = cell.centrosomes[0];
                        var c1 = cell.centrosomes[1];
                        var midX = (c0.x + c1.x) / 2;
                        var midY = (c0.y + c1.y) / 2;
                        var fAxisX = c1.x - c0.x;
                        var fAxisY = c1.y - c0.y;
                        var fAxisLen = Math.sqrt(fAxisX * fAxisX + fAxisY * fAxisY);
                        if (fAxisLen > 0) {
                            var fPerpX = -fAxisY / fAxisLen;
                            var fPerpY = fAxisX / fAxisLen;
                            var furrowLen = cell.furrowProgress ? cell.furrowProgress * maxR : 0;
                            for (var fi = -3; fi <= 3; fi++) {
                                var fx = Math.round(midX + fPerpX * fi * furrowLen);
                                var fy = Math.round(midY + fPerpY * fi * furrowLen);
                                if (fx >= 0 && fx < size && fy >= 0 && fy < size) {
                                    var fIntensity = 1.0 - Math.abs(fi) / 3.0;
                                    furrowPixels[fx + ',' + fy] = fIntensity > 0.5 ? '#774422' : '#995533';
                                }
                            }
                        }
                    }
                }
            }

            // Cilia
            var cilPixels = {};
            for (var ci = 0; ci < cell.cilia.length; ci++) {
                var c = cell.cilia[ci];
                var waveOff = Math.sin(tCilia + c.phase) * 0.3;
                var ba = c.angle + waveOff;
                for (var cl = 1; cl <= c.length; cl++) {
                    var cr = maxR + cl;
                    var cx = Math.round(cell.cx + Math.cos(ba) * cr);
                    var cy = Math.round(cell.cy + Math.sin(ba) * cr);

                        cilPixels[cx + ',' + cy] = cl === 1 ? '#997755' : '#aa9977';

                }
            }

            // Receptor pixels on membrane — glow when activated by nearby signals
            var recPixels = {};
            for (var ri = 0; ri < cell.receptors.length; ri++) {
                var rec = cell.receptors[ri];
                var recR = maxR - 0.5;
                var rx = Math.round(cell.cx + Math.cos(rec.angle) * recR);
                var ry = Math.round(cell.cy + Math.sin(rec.angle) * recR);
                // Activated receptors pulse brighter (signal transduction)
                var activePulse = Math.sin(tGrowth * 2 * Math.PI + ri * 1.5);
                if (activePulse > 0.3) {
                    recPixels[rx + ',' + ry] = '#ffffff'; // receptor fires white when active
                    // Cascade pixel: signal travels one pixel inward toward cytoplasm
                    var cascX = Math.round(cell.cx + Math.cos(rec.angle) * (recR - 1.5));
                    var cascY = Math.round(cell.cy + Math.sin(rec.angle) * (recR - 1.5));
                    recPixels[cascX + ',' + cascY] = rec.color;
                } else {
                    recPixels[rx + ',' + ry] = rec.color;
                }
            }

            // ATP energy pulses radiating from mitochondria
            var atpPixels = {};
            var tATP = (t * 8000 / 5000) % 1.0;
            for (var mi = 0; mi < cell.mitochondria.length; mi++) {
                var m = cell.mitochondria[mi];
                var mAngle = m.baseAngle + m.speed * tOrbit;
                var mcx = cell.cx + Math.cos(mAngle) * m.radius;
                var mcy = cell.cy + Math.sin(mAngle) * m.radius;
                // Two ATP particles radiate outward from each mitochondrion
                for (var ai = 0; ai < 2; ai++) {
                    var atpPhase = (tATP + mi * 0.35 + ai * 0.5) % 1.0;
                    var atpAngle = mAngle + Math.PI + (ai - 0.5) * 1.2; // radiate inward toward cell center
                    var atpDist = atpPhase * 3.0;
                    var ax = Math.round(mcx + Math.cos(atpAngle) * atpDist);
                    var ay = Math.round(mcy + Math.sin(atpAngle) * atpDist);
                    // Only draw within cell bounds
                    var adx = ax - cell.cx;
                    var ady = ay - cell.cy;
                    if (Math.sqrt(adx * adx + ady * ady) < maxR - 1.0) {
                        atpPixels[ax + ',' + ay] = atpPhase < 0.5 ? '#ffff44' : '#dddd22';
                    }
                }
            }

            // Vesicles along ER
            var tVes = (t * 8000 / 6000) % 1.0;
            var vesPixels = {};
            for (var vi = 0; vi < cell.erPaths.length; vi++) {
                var path = cell.erPaths[vi];
                var progress = (tVes + vi * 0.25) % 1.0;
                var pos = progress < 0.5 ? progress * 2 : (1.0 - progress) * 2;
                var idx = Math.round(pos * (path.length - 1));
                var vc = vi % 2 === 0 ? '#ffdd66' : '#66ddff';
                vesPixels[path[idx].x + ',' + path[idx].y] = vc;
            }

            // Lysosomes orbiting in cytoplasm
            var lysoPixels = {};
            if (cell.lysosomes) {
                for (var li = 0; li < cell.lysosomes.length; li++) {
                    var lyso = cell.lysosomes[li];
                    var lysoAngle = lyso.baseAngle + lyso.speed * tOrbit;
                    var lx = Math.round(cell.cx + Math.cos(lysoAngle) * lyso.orbitR);
                    var ly = Math.round(cell.cy + Math.sin(lysoAngle) * lyso.orbitR);
                    lysoPixels[lx + ',' + ly] = lyso.color;
                }
            }

            // Peroxisomes orbiting in cytoplasm (slower, distinct from lysosomes)
            var peroxPixels = {};
            if (cell.peroxisomes) {
                for (var pi = 0; pi < cell.peroxisomes.length; pi++) {
                    var prox = cell.peroxisomes[pi];
                    var proxAngle = prox.baseAngle + prox.speed * tOrbit;
                    var px2 = Math.round(cell.cx + Math.cos(proxAngle) * prox.orbitR);
                    var py2 = Math.round(cell.cy + Math.sin(proxAngle) * prox.orbitR);
                    if (px2 >= 0 && px2 < size && py2 >= 0 && py2 < size) {
                        peroxPixels[px2 + ',' + py2] = prox.color;
                    }
                }
            }

            // Ribosomes on rough ER: small dots that pulse with protein synthesis
            var riboPixels = {};
            if (cell.ribosomes && cell.erPaths) {

                    var ribo = cell.ribosomes[rbi];
                    if (ribo.erIdx < cell.erPaths.length) {
                        var ePath = cell.erPaths[ribo.erIdx];
                        var rIdx = Math.round(ribo.pos * (ePath.length - 1));
                        if (rIdx >= 0 && rIdx < ePath.length) {
                            var rp = ePath[rIdx];
                            // Offset ribosome one pixel perpendicular to ER
                            var rpNext = rIdx < ePath.length - 1 ? ePath[rIdx + 1] : ePath[rIdx - 1];
                            var rdx = rpNext.x - rp.x;
                            var rdy = rpNext.y - rp.y;
                            // Perpendicular offset
                            var offX = rp.x + (rbi % 2 === 0 ? -rdy : rdy);
                            var offY = rp.y + (rbi % 2 === 0 ? rdx : -rdx);
                            offX = Math.round(offX);
                            offY = Math.round(offY);

                            }
                        }
                    }
                }
            }

            // Smooth ER: lipid-synthesizing tubules rendered as small ellipses
            var serPixels = {};
            if (cell.smoothER) {
                var tSER = (t * 8000 / 7000) % 1.0;
                for (var sei = 0; sei < cell.smoothER.length; sei++) {

                    // Draw small elliptical tubule with pulsing lipid synthesis
                    var serPulse = Math.sin(tSER * 2 * Math.PI + sei * 2.0);

                        var sx = Math.round(ser.cx + Math.cos(sAngle) * ser.rx);
                        var sy = Math.round(ser.cy + Math.sin(sAngle) * ser.ry);

                        var ax2 = Math.round(cell.cx + Math.cos(af.junctionAngle) * ar);

                        var ify = Math.round(cell.cy + Math.sin(ifil.targetAngle) * ifr + Math.sin(perpAngle) * waveMag);

                        var porePulse = Math.sin(tPore * 2 * Math.PI + np.mRNAphase * 6);

                        var mY = Math.round(cell.cy + Math.sin(np.angle) * mRNAdist);

                    var svY = Math.round(cell.cy + Math.sin(svAngle) * svR);

                    if (svProgress > 0.9) {

                        var exoY = Math.round(cell.cy + Math.sin(sv.memAngle) * maxR);

                    var evAngle = ev.memAngle + evProgress * (ev.targetAngle - ev.memAngle) * 0.3;
                    var evX = Math.round(cell.cx + Math.cos(evAngle) * evR);
                    var evY = Math.round(cell.cy + Math.sin(evAngle) * evR);

                        }

                }

            var replPixels = {};

                    var chrY = cell.cy + Math.sin(chrAngle) * chrR;

                        var fx1 = Math.round(chrX + Math.cos(fPerpAngle) * forkSpread);

                        }

                }

            // Genome readout: nucleotide bases flash in sequence as replication reads the code
            var genomePixels = {};
            if (cell.replicationForks && cell.separated) {

                    var baseR = 0.3 + gbi * 0.4;
                    var bx = Math.round(cell.cx + Math.cos(baseAngle) * baseR);
                    var by = Math.round(cell.cy + Math.sin(baseAngle) * baseR);
                    if (bx >= 0 && bx < size && by >= 0 && by < size) {

                    }
                }
            }

            // Microtubules: radiate from centrosome outward, with motor protein cargo
            var mtPixels = {};

                        var my3 = Math.round(mtOrigin.y + Math.sin(mt.angle) * ml);
                        // Stay within cell
                        var mdx = mx3 - cell.cx;
                        var mdy = my3 - cell.cy;
                        if (Math.sqrt(mdx * mdx + mdy * mdy) < maxR - 1.2) {
                            if (mx3 >= 0 && mx3 < size && my3 >= 0 && my3 < size) {

                            }
                        }
                    }

                    var cargoPos = (tMT + mt.cargoPhase) % 1.0;
                    // Cargo shuttles back and forth
                    var cargoFrac = cargoPos < 0.5 ? cargoPos * 2 : (1.0 - cargoPos) * 2;
                    var cargoDist = 1 + cargoFrac * (mt.length - 1);
                    var cargoX = Math.round(mtOrigin.x + Math.cos(mt.angle) * cargoDist);
                    var cargoY = Math.round(mtOrigin.y + Math.sin(mt.angle) * cargoDist);
                    var cdx = cargoX - cell.cx;
                    var cdy = cargoY - cell.cy;
                    if (Math.sqrt(cdx * cdx + cdy * cdy) < maxR - 1.2) {

                    var cycAngle = cyc.baseAngle + cyc.speed * tOrbit;
                    var cx2 = Math.round(cell.cx + Math.cos(cycAngle) * cyc.orbitR);
                    var cy2 = Math.round(cell.cy + Math.sin(cycAngle) * cyc.orbitR);
                    // Cyclins accumulate: they pulse brighter as concentration rises
                    var cycPulse = Math.sin(tCyclin * 2 * Math.PI + cli * 1.4);

                    var cdx2 = cx2 - cell.cx;
                    var cdy2 = cy2 - cell.cy;
                    var cDist = Math.sqrt(cdx2 * cdx2 + cdy2 * cdy2);
                    if (cDist < maxR - 1.0 && cDist > nucR + 1.0) {

                    var cybAngle = cyb.baseAngle + cyb.speed * tOrbit;
                    var cbx = Math.round(cell.cx + Math.cos(cybAngle) * cyb.orbitR);
                    var cby = Math.round(cell.cy + Math.sin(cybAngle) * cyb.orbitR);

                for (var cki = 0; cki < cell.checkpointKinases.length; cki++) {
                    var ck = cell.checkpointKinases[cki];
                    // Kinase orbits inside nucleus, scanning chromatin
                    var ckAngle = tCheck * 2 * Math.PI * ck.scanSpeed + ck.phase * 6;
                    var ckR = unifiedNucR3 * 0.5 + Math.sin(tCheck * 2 * Math.PI + cki * 2) * 0.3;
                    var ckX = Math.round(cell.cx + Math.cos(ckAngle) * ckR);
                    var ckY = Math.round(cell.cy + Math.sin(ckAngle) * ckR);
                    if (ckX >= 0 && ckX < size && ckY >= 0 && ckY < size) {
                        // Kinase glows green when sampling, dimmer between samples
                        var samplePulse = Math.sin(tCheck * 2 * Math.PI * 3 + cki * 1.5);
                        checkPixels[ckX + ',' + ckY] = samplePulse > 0.2 ? '#44ffbb' : ck.color;
                    }
                    // Checkpoint verification flash: brief radial pulse when kinase confirms a locus
                    if (samplePulse > 0.7) {
                        var verAngle = ckAngle + Math.PI; // flash opposite side
                        var vx = Math.round(cell.cx + Math.cos(verAngle) * (unifiedNucR3 * 0.3));
                        var vy = Math.round(cell.cy + Math.sin(verAngle) * (unifiedNucR3 * 0.3));
                        if (vx >= 0 && vx < size && vy >= 0 && vy < size) {
                            checkPixels[vx + ',' + vy] = '#aaffdd';
                        }
                    }
                }
                // Checkpoint passed signal: green pulse on nuclear envelope when kinases align
                var alignPulse = Math.sin(tCheck * 2 * Math.PI * 0.5);
                if (alignPulse > 0.6) {
                    // Brief green flash on 4 envelope points = "all clear for mitosis"
                    for (var cpe = 0; cpe < 4; cpe++) {
                        var cpAngle = cpe * Math.PI / 2 + tCheck * 0.5;
                        var cpx = Math.round(cell.cx + Math.cos(cpAngle) * unifiedNucR3);
                        var cpy = Math.round(cell.cy + Math.sin(cpAngle) * unifiedNucR3);
                        if (cpx >= 0 && cpx < size && cpy >= 0 && cpy < size) {
                            checkPixels[cpx + ',' + cpy] = '#88ffcc';
                        }
                    }
                }
            }

            // Telophase: central spindle / midbody forms at equator, cleavage furrow ingresses
            // Anaphase remnant: separase flashes fade
            var sacPixels = {};
            if (cell.prophase && cell.prophase.anaphase && cell.separated) {
                var tSAC = (t * 8000 / 5000) % 1.0;
                var p1 = cell.prophase.pole1Target;
                var p2 = cell.prophase.pole2Target;
                var sacMidX = (p1.x + p2.x) / 2;
                var sacMidY = (p1.y + p2.y) / 2;
                if (cell.prophase.telophase) {
                    // TELOPHASE: central spindle condenses into midbody at equator
                    var spindleAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    var perpAngle = spindleAngle + Math.PI / 2;
                    // Midbody: dense bundle compacting as furrow constricts — flemming body forming
                    var mbPulse = Math.sin(tSAC * 2 * Math.PI * 0.8);
                    // Central dark ring of the midbody
                    var mbCX = Math.round(sacMidX);
                    var mbCY = Math.round(sacMidY);
                    if (mbCX >= 0 && mbCX < size && mbCY >= 0 && mbCY < size) {
                        sacPixels[mbCX + ',' + mbCY] = mbPulse > 0 ? '#aaddee' : '#99ccdd';
                    }
                    // Flanking dense regions (midbody arms)
                    for (var mbI = -1; mbI <= 1; mbI += 2) {
                        var mbArmX = Math.round(sacMidX + Math.cos(spindleAngle) * mbI * 1.0);
                        var mbArmY = Math.round(sacMidY + Math.sin(spindleAngle) * mbI * 1.0);
                        if (mbArmX >= 0 && mbArmX < size && mbArmY >= 0 && mbArmY < size) {
                            sacPixels[mbArmX + ',' + mbArmY] = mbPulse > 0 ? '#88bbcc' : '#779aaa';
                        }
                    }
                    // Cleavage furrow: contractile ring constricting — deep ingression
                    var furrowDepth = 2.5; // deepening ingression
                    // Actomyosin ring tightens — two arcs pinch from both sides of the equator
                    for (var fI = -3; fI <= 3; fI++) {
                        var fR = Math.abs(fI) * 0.9;
                        // Furrow constricts inward from both sides along the perpendicular
                        var fX = Math.round(sacMidX + Math.cos(perpAngle) * fI * 0.9);
                        var fY = Math.round(sacMidY + Math.sin(perpAngle) * fI * 0.9);
                        if (fX >= 0 && fX < size && fY >= 0 && fY < size) {
                            var fPulse = Math.sin(tSAC * 2 * Math.PI * 1.5 + fI * 0.6);
                            // Inner furrow pixels are darker (deeper constriction)
                            var fColor = Math.abs(fI) <= 1
                                ? (fPulse > 0 ? '#663311' : '#552200')
                                : (fPulse > 0 ? '#885533' : '#774422');
                            sacPixels[fX + ',' + fY] = fColor;
                        }
                        // Second row offset along spindle axis — thicker furrow band
                        for (var fOff = -1; fOff <= 1; fOff++) {
                            if (fOff === 0) continue;
                            var fX2 = Math.round(sacMidX + Math.cos(perpAngle) * fI * 0.9 + Math.cos(spindleAngle) * fOff * 0.6);
                            var fY2 = Math.round(sacMidY + Math.sin(perpAngle) * fI * 0.9 + Math.sin(spindleAngle) * fOff * 0.6);
                            if (fX2 >= 0 && fX2 < size && fY2 >= 0 && fY2 < size) {
                                sacPixels[fX2 + ',' + fY2] = '#774422';
                            }
                        }
                    }
                } else {
                    // Separase flashes
                    var sepPulse = Math.sin(tSAC * 2 * Math.PI * 1.2);
                    if (sepPulse > 0.2) {
                        var sepAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI / 2;
                        for (var sepI = -1; sepI <= 1; sepI++) {
                            var sepX = Math.round(sacMidX + Math.cos(sepAngle) * sepI * 0.8);
                            var sepY = Math.round(sacMidY + Math.sin(sepAngle) * sepI * 0.8);
                            if (sepX >= 0 && sepX < size && sepY >= 0 && sepY < size) {
                                sacPixels[sepX + ',' + sepY] = sepPulse > 0.6 ? '#ffffaa' : '#ddddaa';
                            }
                        }
                    }
                    // APC/C degradation wave
                    var apcPulse = Math.sin(tSAC * 2 * Math.PI * 0.5 + 1.0);
                    if (apcPulse > 0.4) {
                        for (var apcI = 0; apcI < 4; apcI++) {
                            var apcAngle = apcI * Math.PI / 2 + tSAC * 0.8;
                            var apcR = 1.5 + apcPulse * 0.8;
                            var apcX = Math.round(sacMidX + Math.cos(apcAngle) * apcR);
                            var apcY = Math.round(sacMidY + Math.sin(apcAngle) * apcR);
                            if (apcX >= 0 && apcX < size && apcY >= 0 && apcY < size) {
                                sacPixels[apcX + ',' + apcY] = '#cc88aa';
                            }
                        }
                    }
                }
            }

            // Filopodia: extending/retracting protrusions from the membrane
            var filoPixels = {};
            if (cell.filopodia) {
                var tFilo = (t * 8000 / 10000) % 1.0;
                for (var fpi = 0; fpi < cell.filopodia.length; fpi++) {
                    var fp = cell.filopodia[fpi];
                    // Extend and retract cyclically
                    var extendFrac = (Math.sin(tFilo * 2 * Math.PI + fp.phase) + 1) * 0.5; // 0 to 1
                    var curLength = fp.maxLength * (0.3 + extendFrac * 0.7);
                    for (var fl = 0; fl <= Math.ceil(curLength); fl++) {
                        var fr = maxR + fl * 0.9;
                        var fx = Math.round(cell.cx + Math.cos(fp.angle) * fr);
                        var fy = Math.round(cell.cy + Math.sin(fp.angle) * fr);
                        if (fx >= 0 && fx < size && fy >= 0 && fy < size) {
                            filoPixels[fx + ',' + fy] = fl >= Math.ceil(curLength) - 1 ? fp.tipColor : fp.stalkColor;
                        }
                    }
                }
            }

            return {
                maxR: maxR, nucR: nucR, elongation: elongation, cytoConstriction: cytoConstriction,
                mitoPixels: mitoPixels, envPixels: envPixels,
                nucPixels: nucPixels, chrPixels: chrPixels,
                cilPixels: cilPixels, recPixels: recPixels,
                vesPixels: vesPixels, atpPixels: atpPixels,
                centPixels: centPixels, furrowPixels: furrowPixels,
                lysoPixels: lysoPixels, filoPixels: filoPixels,
                riboPixels: riboPixels, peroxPixels: peroxPixels,
                serPixels: serPixels, actinPixels: actinPixels,
                mtPixels: mtPixels, ifPixels: ifPixels,
                porePixels: porePixels, secVesPixels: secVesPixels,
                endoPixels: endoPixels, replPixels: replPixels,
                genomePixels: genomePixels, cyclinPixels: cyclinPixels,
                cycBPixels: cycBPixels,
                checkPixels: checkPixels,
                sacPixels: sacPixels
            };
        }

        function draw() {
            ctx.clearRect(0, 0, size, size);

            var t = (Date.now() % 8000) / 8000;
            var tOrbit = (Date.now() % 12000) / 12000 * 2 * Math.PI;
            var tCilia = (Date.now() % 4000) / 4000 * 2 * Math.PI;
            var tChromatin = (Date.now() % 10000) / 10000 * 2 * Math.PI;
            var tNutrient = (Date.now() % 20000) / 20000 * 2 * Math.PI;
            var tGrowth = (Date.now() % 16000) / 16000; // slow growth cycle

            var dA = drawCell(cellA, t, tOrbit, tCilia, tChromatin, tGrowth);
            var dB = drawCell(cellB, t, tOrbit, tCilia, tChromatin, tGrowth + 0.5);

            // Nutrient positions — nutrients drift but are attracted toward nearby cells
            var nutrientPx = {};
            for (var ni = 0; ni < nutrients.length; ni++) {
                var n = nutrients[ni];
                var ndx = Math.sin(tNutrient + ni * 1.7) * 1;
                var ndy = Math.cos(tNutrient + ni * 2.3) * 1;
                // Chemotaxis: nutrients drift toward nearest cell
                var dToA = Math.sqrt((n.x - cellA.cx) * (n.x - cellA.cx) + (n.y - cellA.cy) * (n.y - cellA.cy));
                var dToB = Math.sqrt((n.x - cellB.cx) * (n.x - cellB.cx) + (n.y - cellB.cy) * (n.y - cellB.cy));
                var nearCell = dToA < dToB ? cellA : cellB;
                var dNear = Math.min(dToA, dToB);
                if (dNear < 12 && dNear > 2) {
                    var pullStr = 0.5 * (1 - dNear / 12);
                    ndx += (nearCell.cx - n.x) / dNear * pullStr;
                    ndy += (nearCell.cy - n.y) / dNear * pullStr;
                }
                var nx = Math.round(n.x + ndx);
                var ny = Math.round(n.y + ndy);
                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    nutrientPx[nx + ',' + ny] = n.color;
                }
            }

            // Abscission scar slowly fading in the medium
            var tScar = (Date.now() % 20000) / 20000;
            var scarVisible = tScar < 0.3; // fading remnant, visible 30% of the time
            var scarColor = abscissionScar.color;

            // ECM fiber positions — collagen-like strands between the two cells
            var ecmPx = {};
            var tECM = (Date.now() % 15000) / 15000; // slow assembly pulse
            for (var fi = 0; fi < ecmFibers.length; fi++) {
                var fiber = ecmFibers[fi];
                // Path from cell A toward cell B
                var ax = cellA.cx + (cellB.cx - cellA.cx) * fiber.startFrac;
                var ay = cellA.cy + (cellB.cy - cellA.cy) * fiber.startFrac;
                var bx = cellA.cx + (cellB.cx - cellA.cx) * fiber.endFrac;
                var by = cellA.cy + (cellB.cy - cellA.cy) * fiber.endFrac;
                // Midpoint with offset to create wavy fibers
                var mx = (ax + bx) / 2 + fiber.offsetX;
                var my = (ay + by) / 2 + fiber.offsetY;
                // Draw as two segments: start->mid, mid->end
                var segments = [
                    { x1: ax, y1: ay, x2: mx, y2: my },
                    { x1: mx, y1: my, x2: bx, y2: by },
                ];
                // Assembly pulse: fibers gently brighten and dim
                var pulse = Math.sin(tECM * 2 * Math.PI + fiber.pulsePhase);
                var visible = pulse > -0.3; // visible most of the time
                if (visible) {
                    for (var si2 = 0; si2 < segments.length; si2++) {
                        var seg = segments[si2];
                        var steps = Math.max(Math.abs(Math.round(seg.x2) - Math.round(seg.x1)), Math.abs(Math.round(seg.y2) - Math.round(seg.y1)));
                        if (steps === 0) steps = 1;
                        for (var step = 0; step <= steps; step++) {
                            var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                            var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                            if (px >= 0 && px < size && py >= 0 && py < size) {
                                ecmPx[px + ',' + py] = fiber.color;
                            }
                        }
                    }
                }
            }

            // Gap junction pixels: where filopodia tips from both cells meet
            var gapPx = {};
            var tGap = (Date.now() % 6000) / 6000;
            for (var gi = 0; gi < gapJunctions.length; gi++) {
                var gj = gapJunctions[gi];
                // Find the midpoint between the two cells along the filopodia angles
                var fpA = cellA.filopodia[gj.filoIdxA];
                var fpB = cellB.filopodia[gj.filoIdxB];
                // Junction forms at the midpoint between cell surfaces along their filopodia
                var jxA = cellA.cx + Math.cos(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jyA = cellA.cy + Math.sin(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jxB = cellB.cx + Math.cos(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jyB = cellB.cy + Math.sin(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jmx = Math.round((jxA + jxB) / 2);
                var jmy = Math.round((jyA + jyB) / 2);
                // Pulse: small molecules flowing through the junction
                var gapPulse = Math.sin(tGap * 2 * Math.PI + gj.pulsePhase);
                if (jmx >= 0 && jmx < size && jmy >= 0 && jmy < size) {
                    gapPx[jmx + ',' + jmy] = gapPulse > 0 ? '#eedd99' : gj.color;
                }
                // Ion flowing through: one pixel offset toward whichever cell the pulse favors
                var ionDir = gapPulse > 0 ? 1 : -1;
                var ionX = Math.round(jmx + ionDir * (jxB - jxA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                var ionY = Math.round(jmy + ionDir * (jyB - jyA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                if (ionX >= 0 && ionX < size && ionY >= 0 && ionY < size) {
                    gapPx[ionX + ',' + ionY] = gapPulse > 0 ? '#ffee55' : '#bbaa66';
                }
            }

            // Desmosome pixels: mechanical anchoring spots on cell membranes
            var desmoPx = {};
            for (var di = 0; di < desmosomes.length; di++) {
                var desmo = desmosomes[di];
                // Plaque on cell A membrane
                var daxR = dA.maxR - 0.3;
                var dax = Math.round(cellA.cx + Math.cos(desmo.angleA) * daxR);
                var day = Math.round(cellA.cy + Math.sin(desmo.angleA) * daxR);
                // Plaque on cell B membrane
                var dbxR = dB.maxR - 0.3;
                var dbx = Math.round(cellB.cx + Math.cos(desmo.angleB) * dbxR);
                var dby = Math.round(cellB.cy + Math.sin(desmo.angleB) * dbxR);
                if (dax >= 0 && dax < size && day >= 0 && day < size) {
                    desmoPx[dax + ',' + day] = desmo.color;
                }
                if (dbx >= 0 && dbx < size && dby >= 0 && dby < size) {
                    desmoPx[dbx + ',' + dby] = desmo.color;
                }
                // Intermediate filament anchor: one pixel inward from each plaque
                var iaX = Math.round(cellA.cx + Math.cos(desmo.angleA) * (daxR - 1.2));
                var iaY = Math.round(cellA.cy + Math.sin(desmo.angleA) * (daxR - 1.2));
                var ibX = Math.round(cellB.cx + Math.cos(desmo.angleB) * (dbxR - 1.2));
                var ibY = Math.round(cellB.cy + Math.sin(desmo.angleB) * (dbxR - 1.2));
                if (iaX >= 0 && iaX < size && iaY >= 0 && iaY < size) {
                    desmoPx[iaX + ',' + iaY] = desmo.anchorColor;
                }
                if (ibX >= 0 && ibX < size && ibY >= 0 && ibY < size) {
                    desmoPx[ibX + ',' + ibY] = desmo.anchorColor;
                }
            }

            // Tight junction pixels: continuous seal band between cells
            var tjPx = {};
            var tTJ = (Date.now() % 8000) / 8000;
            for (var tji = 0; tji < tightJunctions.length; tji++) {
                var tj = tightJunctions[tji];
                // Points on each cell's membrane facing the other
                var tjAx = cellA.cx + Math.cos(tj.angleA) * dA.maxR;
                var tjAy = cellA.cy + Math.sin(tj.angleA) * dA.maxR;
                var tjBx = cellB.cx + Math.cos(tj.angleB) * dB.maxR;
                var tjBy = cellB.cy + Math.sin(tj.angleB) * dB.maxR;
                // Draw a short strand connecting the two membrane points
                var tjSteps = Math.max(Math.abs(Math.round(tjBx) - Math.round(tjAx)), Math.abs(Math.round(tjBy) - Math.round(tjAy)));
                if (tjSteps === 0) tjSteps = 1;
                // Only draw the middle portion (the seal zone between membranes)
                for (var tjs = Math.floor(tjSteps * 0.3); tjs <= Math.ceil(tjSteps * 0.7); tjs++) {
                    var tjx = Math.round(tjAx + (tjBx - tjAx) * tjs / tjSteps);
                    var tjy = Math.round(tjAy + (tjBy - tjAy) * tjs / tjSteps);
                    if (tjx >= 0 && tjx < size && tjy >= 0 && tjy < size) {
                        // Claudin proteins pulse along the seal
                        var tjPulse = Math.sin(tTJ * 2 * Math.PI + tj.phase + tjs * 0.5);
                        tjPx[tjx + ',' + tjy] = tjPulse > 0 ? '#ddccaa' : '#ccbb99';
                    }
                }
            }

            // Adherens junction pixels: E-cadherin adhesion belt between cells
            var ajPx = {};
            var tAJ = (Date.now() % 7000) / 7000;
            for (var aji = 0; aji < adherensJunctions.length; aji++) {
                var aj = adherensJunctions[aji];
                // Cadherin dimers extend from each cell's membrane into the intercellular space
                var ajAxR = dA.maxR + 0.5;
                var ajAx = cellA.cx + Math.cos(aj.angleA) * ajAxR;
                var ajAy = cellA.cy + Math.sin(aj.angleA) * ajAxR;
                var ajBxR = dB.maxR + 0.5;
                var ajBx = cellB.cx + Math.cos(aj.angleB) * ajBxR;
                var ajBy = cellB.cy + Math.sin(aj.angleB) * ajBxR;
                // Draw cadherin bridge between the two cells
                var ajMx = (ajAx + ajBx) / 2;
                var ajMy = (ajAy + ajBy) / 2;
                // Three points: near A, midpoint, near B
                var ajPts = [
                    { x: Math.round(ajAx), y: Math.round(ajAy) },
                    { x: Math.round(ajMx), y: Math.round(ajMy) },
                    { x: Math.round(ajBx), y: Math.round(ajBy) },
                ];
                // Calcium-dependent adhesion pulse
                var ajPulse = Math.sin(tAJ * 2 * Math.PI + aj.phase);
                for (var ajp = 0; ajp < ajPts.length; ajp++) {
                    var pt = ajPts[ajp];
                    if (pt.x >= 0 && pt.x < size && pt.y >= 0 && pt.y < size) {
                        ajPx[pt.x + ',' + pt.y] = ajPulse > 0.2 ? '#ee8866' : '#cc7755';
                    }
                }
            }

            // Signal molecule positions
            var signalPx = {};
            var tSig = Date.now();
            for (var si = 0; si < signals.length; si++) {
                var sig = signals[si];
                var fromC = sig.fromCell === 'A' ? cellA : cellB;
                var toC = sig.toCell === 'A' ? cellA : cellB;
                // Progress along the path from source to target
                var progress = ((tSig * sig.speed) + sig.phase) % 1.0;
                // Interpolate position between cell edges
                var sx = fromC.cx + (toC.cx - fromC.cx) * progress;
                var sy = fromC.cy + (toC.cy - fromC.cy) * progress;
                var spx = Math.round(sx);
                var spy = Math.round(sy);
                // Only visible while in the extracellular space (between cells)
                var dFromA = Math.sqrt((spx - cellA.cx) * (spx - cellA.cx) + (spy - cellA.cy) * (spy - cellA.cy));
                var dFromB = Math.sqrt((spx - cellB.cx) * (spx - cellB.cx) + (spy - cellB.cy) * (spy - cellB.cy));
                if (dFromA > dA.maxR + 0.5 && dFromB > dB.maxR + 0.5) {
                    if (spx >= 0 && spx < size && spy >= 0 && spy < size) {
                        signalPx[spx + ',' + spy] = sig.color;
                    }
                }
            }

            // Render all pixels
            for (var y = 0; y < size; y++) {
                for (var x = 0; x < size; x++) {
                    var key = x + ',' + y;
                    var color = null;

                    // Check both cells
                    var cells = [
                        { cell: cellA, d: dA },
                        { cell: cellB, d: dB },
                    ];

                    var inAnyCell = false;
                    for (var ci = 0; ci < cells.length; ci++) {
                        var cc = cells[ci].cell;
                        var dd = cells[ci].d;
                        var dx = x - cc.cx;
                        var dy = y - cc.cy;
                        // Anaphase elongation: use elliptical distance along spindle axis
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var elong = dd.elongation || 0;
                        var constrict = dd.cytoConstriction || 0;
                        var effDist = dist;
                        if (elong > 0 && cc.centrosomes && cc.centrosomes.length >= 2) {
                            var eAxisX = cc.centrosomes[1].x - cc.centrosomes[0].x;
                            var eAxisY = cc.centrosomes[1].y - cc.centrosomes[0].y;
                            var eAxisLen = Math.sqrt(eAxisX * eAxisX + eAxisY * eAxisY);
                            if (eAxisLen > 0) {
                                var enx = eAxisX / eAxisLen;
                                var eny = eAxisY / eAxisLen;
                                var projAlong = dx * enx + dy * eny;
                                var projPerp = dx * (-eny) + dy * enx;
                                // Shrink along-axis component to make cell appear elongated
                                var baseEffDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp);
                                // Cytokinesis constriction: narrow the cell at the equator (projAlong ≈ 0)
                                if (constrict > 0) {
                                    var equatorProximity = 1.0 - Math.min(1.0, Math.abs(projAlong) / (eAxisLen * 0.4));
                                    equatorProximity = equatorProximity * equatorProximity; // sharpen the waist
                                    // At equator, effective perpendicular distance is amplified (cell narrows)
                                    effDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp * (1 + constrict * equatorProximity * 2));
                                } else {
                                    effDist = baseEffDist;
                                }
                            }
                        }

                        if (effDist <= dd.maxR) {
                            inAnyCell = true;
                            // Layer priority: furrow > centrosomes > vesicles > atp > envPixels > mito > nucleus features > receptors > golgi > ER > membrane > cytoplasm
                            if (dd.furrowPixels && dd.furrowPixels[key]) {
                                color = dd.furrowPixels[key];
                            } else if (dd.centPixels[key]) {
                                color = dd.centPixels[key];
                            } else if (dd.secVesPixels && dd.secVesPixels[key]) {
                                color = dd.secVesPixels[key];
                            } else if (dd.vesPixels[key]) {
                                color = dd.vesPixels[key];
                            } else if (dd.atpPixels[key]) {
                                color = dd.atpPixels[key];
                            } else if (dd.lysoPixels && dd.lysoPixels[key]) {
                                color = dd.lysoPixels[key];
                            } else if (dd.endoPixels && dd.endoPixels[key]) {
                                color = dd.endoPixels[key];
                            } else if (dd.peroxPixels && dd.peroxPixels[key]) {
                                color = dd.peroxPixels[key];
                            } else if (dd.cyclinPixels && dd.cyclinPixels[key]) {
                                color = dd.cyclinPixels[key];
                            } else if (dd.cycBPixels && dd.cycBPixels[key]) {
                                color = dd.cycBPixels[key];
                            } else if (dd.mitoPixels[key]) {
                                color = dd.mitoPixels[key];
                            } else if (dd.nucPixels[key]) {
                                color = dd.nucPixels[key];
                            } else if (dd.porePixels && dd.porePixels[key]) {
                                color = dd.porePixels[key];
                            } else if (dd.envPixels[key]) {
                                color = dd.envPixels[key];
                            } else if (dd.replPixels && dd.replPixels[key]) {
                                color = dd.replPixels[key];
                            } else if (dd.sacPixels && dd.sacPixels[key]) {
                                color = dd.sacPixels[key];
                            } else if (dd.checkPixels && dd.checkPixels[key]) {
                                color = dd.checkPixels[key];
                            } else if (dd.genomePixels && dd.genomePixels[key]) {
                                color = dd.genomePixels[key];
                            } else if (dd.chrPixels[key]) {
                                color = dd.chrPixels[key];
                            } else if (dd.recPixels[key]) {
                                color = dd.recPixels[key];
                            } else if (cc.golgiPixels[key]) {
                                color = cc.golgiPixels[key];
                            } else if (effDist > dd.maxR - 1.2) {
                                var shell = dd.maxR - effDist;
                                var mi = Math.floor(shell * cc.membraneColors.length / 1.2);
                                if (mi >= cc.membraneColors.length) mi = cc.membraneColors.length - 1;
                                color = cc.membraneColors[mi];
                            } else if (dd.actinPixels && dd.actinPixels[key]) {
                                color = dd.actinPixels[key];
                            } else if (dd.mtPixels && dd.mtPixels[key]) {
                                color = dd.mtPixels[key];
                            } else if (dd.ifPixels && dd.ifPixels[key]) {
                                color = dd.ifPixels[key];
                            } else if (dd.riboPixels && dd.riboPixels[key]) {
                                color = dd.riboPixels[key];
                            } else if (dd.serPixels && dd.serPixels[key]) {
                                color = dd.serPixels[key];
                            } else if (cc.erPixels[key]) {
                                color = cc.erColor;
                            } else {
                                // Check if inside nucleus region
                                var ndx2 = x - cc.cx;
                                var ndy2 = y - cc.cy;
                                var ndist = Math.sqrt(ndx2 * ndx2 + ndy2 * ndy2);
                                if (ndist <= dd.nucR + 0.3) {
                                    // Interphase nucleus interior
                                    color = '#7a3500';
                                } else {
                                    color = cc.cytoColor;
                                }
                            }
                            break;
                        }
                    }

                    if (!inAnyCell) {
                        // Extracellular space
                        var drawn = false;
                        // Check cilia for both cells
                        for (var ci = 0; ci < cells.length && !drawn; ci++) {
                            if (cells[ci].d.cilPixels[key]) {
                                color = cells[ci].d.cilPixels[key];
                                drawn = true;
                            }
                        }
                        // Check filopodia for both cells
                        for (var ci2 = 0; ci2 < cells.length && !drawn; ci2++) {
                            if (cells[ci2].d.filoPixels && cells[ci2].d.filoPixels[key]) {
                                color = cells[ci2].d.filoPixels[key];
                                drawn = true;
                            }
                        }
                        if (!drawn && gapPx[key]) {
                            color = gapPx[key];
                            drawn = true;
                        }
                        if (!drawn && desmoPx[key]) {
                            color = desmoPx[key];
                            drawn = true;
                        }
                        if (!drawn && tjPx[key]) {
                            color = tjPx[key];
                            drawn = true;
                        }
                        if (!drawn && ajPx[key]) {
                            color = ajPx[key];
                            drawn = true;
                        }
                        if (!drawn && signalPx[key]) {
                            color = signalPx[key];
                            drawn = true;
                        }
                        if (!drawn && ecmPx[key]) {
                            color = ecmPx[key];
                            drawn = true;
                        }
                        if (!drawn && scarVisible && x === abscissionScar.x && y === abscissionScar.y) {
                            color = scarColor;
                            drawn = true;
                        }
                        if (!drawn && nutrientPx[key]) {
                            color = nutrientPx[key];
                            drawn = true;
                        }
                        if (!drawn) {
                            color = mediumColor;
                        }
                    }

                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
