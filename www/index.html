<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="32" height="32"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // Two daughter cells, born from division
        // Canvas expanded to 32x32 to fit both cells
        var size = 32;

        // Extracellular medium
        var mediumColor = '#e8e0d8';

        // Daughter cell A: upper-right
        var cellA = {
            cx: 21, cy: 9,
            radius: 5.5,
            nucleusCx: 21, nucleusCy: 9,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            // Inherited organelles
            erSegments: [
                { x1: 19, y1: 7, x2: 17, y2: 5 },
                { x1: 23, y1: 7, x2: 25, y2: 5 },
                { x1: 19, y1: 11, x2: 17, y2: 13 },
                { x1: 23, y1: 11, x2: 25, y2: 13 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 0.5, speed: 0.8, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 3.2, speed: -0.6, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '19,10': '#cc9944', '19,11': '#cc9944', '18,10': '#ddaa55' },
            chromatin: [
                { x: 21, y: 8 }, { x: 22, y: 9 }, { x: 21, y: 10 }, { x: 20, y: 9 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 22, y: 8 }, { x: 22, y: 10 }, { x: 20, y: 10 }, { x: 20, y: 8 },
            ],
            // Centrosomes: single unduplicated centrosome at G1 (will duplicate in S phase)
            centrosomes: [
                { x: 23, y: 8 },
                { x: 23, y: 9 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 0.3, color: '#33cc99' },
                { angle: 2.5, color: '#cc3399' },
            ],
        };

        // Daughter cell B: lower-left (drifted slightly after separation)
        var cellB = {
            cx: 11, cy: 23,
            radius: 5.5,
            nucleusCx: 11, nucleusCy: 23,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 9, y1: 21, x2: 7, y2: 19 },
                { x1: 13, y1: 21, x2: 15, y2: 19 },
                { x1: 9, y1: 25, x2: 7, y2: 27 },
                { x1: 13, y1: 25, x2: 15, y2: 27 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 2.5, speed: -0.7, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 5.8, speed: 0.5, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '9,24': '#cc9944', '9,25': '#cc9944', '8,24': '#ddaa55' },
            chromatin: [
                { x: 11, y: 22 }, { x: 12, y: 23 }, { x: 11, y: 24 }, { x: 10, y: 23 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 12, y: 22 }, { x: 12, y: 24 }, { x: 10, y: 24 }, { x: 10, y: 22 },
            ],
            // Centrosomes: single unduplicated centrosome at G1
            centrosomes: [
                { x: 13, y: 22 },
                { x: 13, y: 23 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 3.5, color: '#3399cc' },
                { angle: 5.0, color: '#cc9933' },
            ],
        };

        // Build cilia for each cell
        var numCilia = 10;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cellA.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 });
            cellB.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 + 0.2 });
        }

        // --- HELPERS ---
        function inB(x, y) { return x >= 0 && x < size && y >= 0 && y < size; }
        // Generic orbiter renderer: particles orbiting cell center
        function renderOrbiters(cell, items, tOrbit, t, period, opts) {
            var px = {};
            if (!items || !cell.separated) return px;
            var tp = (t * 8000 / period) % 1.0;
            var pr = opts.pulseRate || 1, ps = opts.phaseSpread || 1.4, th = opts.threshold || 0.2;
            var minR = opts.minR || 0, mxR = opts.maxR || 999;
            for (var i = 0; i < items.length; i++) {
                var it = items[i];
                var a = it.baseAngle + it.speed * tOrbit;
                var r = it.orbitR;
                if (opts.nuclear !== undefined && it.nuclear !== undefined) {
                    // nuclear vs cytoplasmic routing
                    r = it.orbitR;
                }
                var x = Math.round(cell.cx + Math.cos(a) * r);
                var y = Math.round(cell.cy + Math.sin(a) * r);
                var dx = x - cell.cx, dy = y - cell.cy, d = Math.sqrt(dx*dx+dy*dy);
                var p = Math.sin(tp * 2 * Math.PI * pr + i * ps);
                var inRange = (it.nuclear !== undefined) ?
                    (it.nuclear ? d <= (opts.nucR || 2) + 0.5 : d < mxR && d > (opts.nucR || 2) + 0.8) :
                    (d >= minR && d <= mxR);
                if (inRange && inB(x, y)) {
                    var hi = (it.nuclear && opts.nucHi) ? (p > (opts.nucTh||0.1) ? opts.nucHi : (opts.nucLo||it.color)) : null;
                    px[x+','+y] = hi || (p > th ? (opts.hiColor || it.color) : it.color);
                }
                if (opts.spark && p > 0.6 && inB(x,y)) {
                    var sa = a + 0.8, sr = r + 0.6;
                    var sx = Math.round(cell.cx + Math.cos(sa) * sr);
                    var sy = Math.round(cell.cy + Math.sin(sa) * sr);
                    var sd = Math.sqrt((sx-cell.cx)*(sx-cell.cx)+(sy-cell.cy)*(sy-cell.cy));
                    if (sd < mxR && inB(sx, sy)) px[sx+','+sy] = opts.sparkColor || opts.hiColor;
                }
                // Ripple trail for phosphatases
                if (opts.ripple && p > 0.5) {
                    var ra = a + 0.4, rr = r - 0.5;
                    var rx = Math.round(cell.cx + Math.cos(ra) * rr);
                    var ry = Math.round(cell.cy + Math.sin(ra) * rr);
                    if (Math.sqrt((rx-cell.cx)*(rx-cell.cx)+(ry-cell.cy)*(ry-cell.cy)) < mxR && inB(rx,ry)) {
                        px[rx+','+ry] = opts.rippleColor || opts.hiColor;
                    }
                }
            }
            return px;
        }

        // Precompute ER data for a cell
        function buildERData(cell) {
            cell.erPixels = {};
            cell.erPaths = [];
            for (var si = 0; si < cell.erSegments.length; si++) {
                var seg = cell.erSegments[si];
                var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
                var path = [];
                for (var step = 0; step <= steps; step++) {
                    var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                    var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                    cell.erPixels[px + ',' + py] = true;
                    path.push({ x: px, y: py });
                }
                cell.erPaths.push(path);
            }
        }
        buildERData(cellA);
        buildERData(cellB);

        // Nutrient particles in the medium
        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 28, y: 5, color: '#88bb55' },
            { x: 4, y: 28, color: '#55aa88' },
            { x: 27, y: 27, color: '#55aa88' },
            { x: 1, y: 15, color: '#bbaa44' },
            { x: 30, y: 17, color: '#bbaa44' },
            { x: 16, y: 1, color: '#88bb55' },
            { x: 15, y: 30, color: '#55aa88' },
            { x: 5, y: 8, color: '#bbaa44' },
            { x: 26, y: 3, color: '#88bb55' },
            { x: 3, y: 25, color: '#55aa88' },
            { x: 28, y: 20, color: '#bbaa44' },
            // New nutrients between the cells — the space where division happened
            { x: 16, y: 16, color: '#bbaa44' },
            { x: 15, y: 15, color: '#55aa88' },
        ];

        // Abscission scar: fading remnant — phagocytes clearing debris
        var abscissionScar = { x: 16, y: 16, color: '#887733' };

        // Midbody remnants (Flemming bodies): nearly degraded by autophagy
        // Dimmer, breaking down into recyclable components
        // Includes old remnants from first division + fresh remnants from second division
        var midbodyRemnants = [
            { x: 23, y: 5, color: '#556677', glowColor: '#667788' },
            { x: 8, y: 27, color: '#556677', glowColor: '#667788' },
            // Fresh Flemming bodies from cell A's division (midpoint of pole1 & pole2)
            { x: 21, y: 9, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
            // Fresh Flemming body from cell B's division
            { x: 11, y: 23, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
        ];

        // Post-mitotic nuclear reassembly: granddaughter nuclei rebuild nuclear architecture
        // Nuclear envelopes sealed, nucleoli reassemble from rDNA, Cajal bodies form
        var granddaughterNuclei = [
            { x: 18, y: 6, parent: 'A', reactivation: 0.3, nucleolusSize: 0.4, cajalAngle: 0.8 },
            { x: 24, y: 12, parent: 'A', reactivation: 0.25, nucleolusSize: 0.35, cajalAngle: 2.5 },
            { x: 8, y: 20, parent: 'B', reactivation: 0.35, nucleolusSize: 0.45, cajalAngle: 4.2 },
            { x: 14, y: 26, parent: 'B', reactivation: 0.2, nucleolusSize: 0.3, cajalAngle: 5.8 },
        ];

        // Granddaughter cell bodies: thin cytoplasmic shells forming around each nucleus
        // Post-division cells establish their own membranes and minimal cytoplasm
        for (var gbi = 0; gbi < granddaughterNuclei.length; gbi++) {
            var gn = granddaughterNuclei[gbi];
            gn.bodyRadius = 2.2 + gn.nucleolusSize * 0.8; // small cell body forming
            gn.membraneColor = '#555555';
            gn.cytoColor = '#6b2a00';
            // Nuclear speckles: SC35/SRSF2 splicing factor storage domains
            // Irregular interchromatin granule clusters — hallmark of mature interphase nuclei
            gn.speckles = [
                { angle: gn.cajalAngle + 2.1, dist: 0.6, color: '#88ddaa' },
                { angle: gn.cajalAngle + 4.3, dist: 0.5, color: '#77cc99' },
            ];
            // Small mitochondrion inherited during division
            gn.mitoAngle = gbi * 1.57 + 0.4;
            gn.mitoSpeed = (gbi % 2 === 0 ? 0.6 : -0.5);
            // Rough ER stubs: first cisternae budding from nuclear envelope
            // Each granddaughter grows 2 short ER segments radiating outward
            gn.erStubs = [
                { angle: gn.cajalAngle + 1.0, length: 1.5 },
                { angle: gn.cajalAngle + 3.5, length: 1.2 },
            ];
            // Golgi ministacks: small trans-Golgi cisternae assembling near ER exit sites
            gn.golgiAngle = gn.cajalAngle + 2.3;
            gn.golgiDist = gn.bodyRadius * 0.55;
            // Free ribosomes (polyribosomes): clusters in cytoplasm for cap-dependent translation
            // 3 polyribosome clusters per granddaughter, positioned between ER and membrane
            gn.freeRibosomes = [
                { angle: gn.cajalAngle + 0.5, dist: gn.bodyRadius * 0.45, phase: gbi * 0.7 },
                { angle: gn.cajalAngle + 2.0, dist: gn.bodyRadius * 0.55, phase: gbi * 0.7 + 1.2 },
                { angle: gn.cajalAngle + 4.5, dist: gn.bodyRadius * 0.40, phase: gbi * 0.7 + 2.4 },
            ];
            // Peroxisome: single small organelle budding from ER, catalase/oxidase activity
            gn.peroxAngle = gn.cajalAngle + 3.0;
            gn.peroxDist = gn.bodyRadius * 0.50;
            gn.peroxSpeed = (gbi % 2 === 0 ? 0.4 : -0.35);
            // Lysosome: acidic digestive organelle, degrades endocytosed material
            gn.lysoAngle = gn.cajalAngle + 4.8;
            gn.lysoDist = gn.bodyRadius * 0.48;
            gn.lysoSpeed = (gbi % 2 === 0 ? -0.3 : 0.35);
            // Centrosome: single centriole pair establishing MTOC for cytoskeletal organization
            gn.centrosomeAngle = gn.cajalAngle + 5.5;
            gn.centrosomeDist = 1.0 + gn.nucleolusSize * 0.3;
        }

        // Calcium waves: tissue-level signaling between granddaughter nuclei
        // IP3-mediated Ca2+ release propagates sequentially through the four-cell cluster
        var calciumWaves = [];
        for (var cwi = 0; cwi < granddaughterNuclei.length; cwi++) {
            var nextIdx = (cwi + 1) % granddaughterNuclei.length;
            calciumWaves.push({
                from: granddaughterNuclei[cwi],
                to: granddaughterNuclei[nextIdx],
                phase: cwi * 0.25, // staggered propagation
                color: '#ffee77', dimColor: '#ddcc55',
            });
        }

        // Kum-song (금성 — golden star): a luminous beacon in the extracellular medium
        // A radiant golden particle that traces a slow orbit between the two daughter cells
        // like Venus crossing the sky — the brightest point in the tissue's firmament
        var kumSong = {
            cx: 16, cy: 16, // center of orbit (midpoint between cells)
            orbitR: 6.5,
            speed: 0.15,
            coreColor: '#ffd700',
            haloColor: '#ffec80',
            dimColor: '#cc9900',
        };

        // Growth factors: autocrine/paracrine signaling
        cellA.growthFactors = [
            { secretAngle: 0.8, targetAngle: 2.5, speed: 0.3, phase: 0, color: '#55ff99' },
            { secretAngle: 4.2, targetAngle: 0.3, speed: 0.25, phase: 0.5, color: '#55ff99' },
        ];
        cellB.growthFactors = [
            { secretAngle: 3.8, targetAngle: 5.0, speed: 0.28, phase: 0.2, color: '#55ff99' },
            { secretAngle: 1.2, targetAngle: 3.5, speed: 0.32, phase: 0.7, color: '#55ff99' },
        ];

        // Intercellular signaling: daughter cells communicate via chemical signals
        var signals = [
            // Signal from A to B (paracrine signaling)
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.33 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.66 },
            // Signal from B to A (response signaling)
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.15 },
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.55 },
        ];

        // ECM fibers: connective tissue between cells
        var ecmFibers = [];
        // Build fibers connecting the two cells through the intercellular space
        var fiberCount = 5;
        for (var fi = 0; fi < fiberCount; fi++) {
            var frac = (fi + 1) / (fiberCount + 1);
            // Each fiber has a slightly different path offset for visual variety
            var offsetX = (fi % 2 === 0 ? 1 : -1) * (fi * 0.6);
            var offsetY = (fi % 2 === 0 ? -1 : 1) * ((fi + 1) * 0.4);
            ecmFibers.push({
                // Start near cell A's membrane, end near cell B's membrane
                startFrac: 0.25 + fi * 0.02,
                endFrac: 0.75 - fi * 0.02,
                offsetX: offsetX,
                offsetY: offsetY,
                color: fi % 2 === 0 ? '#c4a882' : '#b89870', // collagen-like tones
                pulsePhase: fi * 1.3,
            });
        }

        // Filopodia: actin protrusions reaching toward other cell
        cellA.filopodia = [];
        cellB.filopodia = [];
        for (var fpi = 0; fpi < 3; fpi++) {
            // Cell A reaches toward cell B
            var baseAngleA = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var spreadA = (fpi - 1) * 0.35;
            cellA.filopodia.push({
                angle: baseAngleA + spreadA,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
            // Cell B reaches toward cell A
            var baseAngleB = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var spreadB = (fpi - 1) * 0.35;
            cellB.filopodia.push({
                angle: baseAngleB + spreadB,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8 + 1.5,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
        }

        // Ribosomes on rough ER
        cellA.ribosomes = [
            { erIdx: 0, pos: 0.3, color: '#553322' },
            { erIdx: 0, pos: 0.7, color: '#553322' },
            { erIdx: 1, pos: 0.5, color: '#553322' },
            { erIdx: 2, pos: 0.4, color: '#553322' },
            { erIdx: 3, pos: 0.6, color: '#553322' },
        ];
        cellB.ribosomes = [
            { erIdx: 0, pos: 0.4, color: '#553322' },
            { erIdx: 1, pos: 0.3, color: '#553322' },
            { erIdx: 1, pos: 0.8, color: '#553322' },
            { erIdx: 2, pos: 0.5, color: '#553322' },
            { erIdx: 3, pos: 0.4, color: '#553322' },
        ];

        // Gap junctions: small molecule exchange channels
        var gapJunctions = [
            { filoIdxA: 0, filoIdxB: 2, color: '#ddbb88', pulsePhase: 0 },
            { filoIdxA: 1, filoIdxB: 1, color: '#ccaa77', pulsePhase: 1.5 },
            { filoIdxA: 2, filoIdxB: 0, color: '#ddbb88', pulsePhase: 3.0 },
        ];

        // Peroxisomes
        cellA.peroxisomes = [
            { orbitR: 3.8, baseAngle: 0.3, speed: 0.6, color: '#66aa88' },
            { orbitR: 2.0, baseAngle: 3.5, speed: -0.5, color: '#55bb77' },
        ];
        cellB.peroxisomes = [
            { orbitR: 3.8, baseAngle: 1.8, speed: -0.6, color: '#66aa88' },
            { orbitR: 2.0, baseAngle: 5.0, speed: 0.5, color: '#55bb77' },
        ];

        // Desmosomes: mechanical anchoring junctions
        var desmosomes = [
            { angleA: 2.0, angleB: 5.2, color: '#bb8844', anchorColor: '#998866' },
            { angleA: 2.8, angleB: 5.9, color: '#bb8844', anchorColor: '#998866' },
        ];

        // Tight junctions: seal between cells
        var tightJunctions = [];
        var tjCount = 6;
        for (var tji = 0; tji < tjCount; tji++) {
            // Span a band of angles between the two cells (facing each other)
            var baseA = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var baseB = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var spread = (tji - (tjCount - 1) / 2) * 0.18;
            tightJunctions.push({
                angleA: baseA + spread,
                angleB: baseB + spread,
                phase: tji * 0.9,
            });
        }

        // Adherens junctions: E-cadherin adhesion belt connecting the two cells
        // The fourth and final major junction type, linking to actin cytoskeleton
        var adherensJunctions = [];
        var ajCount = 4;
        for (var aji = 0; aji < ajCount; aji++) {
            var baseA2 = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var baseB2 = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var ajSpread = (aji - (ajCount - 1) / 2) * 0.25;
            adherensJunctions.push({
                angleA: baseA2 + ajSpread,
                angleB: baseB2 + ajSpread,
                phase: aji * 1.2,
            });
        }

        // Actin stress fibers: cytoskeletal cables inside each cell
        // Connect from adherens junction sites inward toward the nucleus
        cellA.actinFibers = [];
        cellB.actinFibers = [];
        for (var afi = 0; afi < ajCount; afi++) {
            var ajA = adherensJunctions[afi];
            cellA.actinFibers.push({ junctionAngle: ajA.angleA, length: 3.5, phase: afi * 0.7 });
            cellB.actinFibers.push({ junctionAngle: ajA.angleB, length: 3.5, phase: afi * 0.7 + 1.0 });
        }

        // Smooth ER: lipid synthesis tubules, distinct from rough ER (no ribosomes)
        cellA.smoothER = [
            { cx: 24, cy: 11, rx: 1.5, ry: 0.8, angle: 0.4 },
            { cx: 18, cy: 7, rx: 1.2, ry: 0.6, angle: 2.1 },
        ];
        cellB.smoothER = [
            { cx: 14, cy: 25, rx: 1.5, ry: 0.8, angle: 0.7 },
            { cx: 8, cy: 21, rx: 1.2, ry: 0.6, angle: 2.5 },
        ];

        // Lysosomes: small digestive organelles orbiting in the cytoplasm
        cellA.lysosomes = [
            { orbitR: 2.5, baseAngle: 1.0, speed: 1.2, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 4.0, speed: -0.9, color: '#9966bb' },
        ];
        cellB.lysosomes = [
            { orbitR: 2.5, baseAngle: 2.5, speed: -1.1, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 5.5, speed: 0.8, color: '#9966bb' },
        ];

        // Microtubules: radiate from centrosome (MTOC) outward through cytoplasm
        // Each cell has 6 microtubule tracks; motor proteins carry cargo along them
        cellA.microtubules = [];
        cellB.microtubules = [];
        for (var mti = 0; mti < 6; mti++) {
            var mtAngle = mti * 2 * Math.PI / 6;
            cellA.microtubules.push({ angle: mtAngle, length: 4.0, cargoPhase: mti * 0.5 });
            cellB.microtubules.push({ angle: mtAngle + 0.3, length: 4.0, cargoPhase: mti * 0.5 + 0.25 });
        }

        // Intermediate filaments: third cytoskeletal element, cage around nucleus
        // anchoring to desmosome sites — completes actin + microtubule + IF triad
        cellA.intermediateFilaments = [];
        cellB.intermediateFilaments = [];
        // Each IF runs from near the nucleus outward toward a desmosome anchor point
        for (var ifi = 0; ifi < desmosomes.length; ifi++) {
            var desmo = desmosomes[ifi];
            cellA.intermediateFilaments.push({ targetAngle: desmo.angleA, length: 3.8, phase: ifi * 1.1 });
            cellB.intermediateFilaments.push({ targetAngle: desmo.angleB, length: 3.8, phase: ifi * 1.1 + 0.5 });
        }
        // Additional IF strands forming the perinuclear cage (not anchored to desmosomes)
        for (var ifi2 = 0; ifi2 < 4; ifi2++) {
            var cageAngle = ifi2 * Math.PI / 2 + 0.4; // 4 cage strands at ~90 degree intervals
            cellA.intermediateFilaments.push({ targetAngle: cageAngle, length: 2.5, phase: ifi2 * 0.8 + 2.0 });
            cellB.intermediateFilaments.push({ targetAngle: cageAngle + 0.2, length: 2.5, phase: ifi2 * 0.8 + 2.5 });
        }

        // Nuclear pores: channels on the nuclear envelope for mRNA export
        // mRNA particles travel from nucleus outward toward ribosomes on rough ER
        cellA.nuclearPores = [
            { angle: 0.5, mRNAphase: 0 },

                            for (var esI = 0; esI < 5; esI++) {
                                var esAngle = tSAC * 2 * Math.PI * 1.2 + esI * 2 * Math.PI / 5;
                                var esR = 1.2 - esI * 0.15; // spiral inward
                                var esX = Math.round(sacMidX + Math.cos(esAngle) * esR * Math.cos(spindleAngle) - Math.sin(esAngle) * esR * Math.sin(spindleAngle) * 0.5);
                                var esY = Math.round(sacMidY + Math.cos(esAngle) * esR * Math.sin(spindleAngle) + Math.sin(esAngle) * esR * Math.cos(spindleAngle) * 0.5);
                                if (esX >= 0 && esX < size && esY >= 0 && esY < size) {
                                    var esPulse = Math.sin(tSAC * 2 * Math.PI * 3 + esI * 1.2);
                                    sacPixels[esX + ',' + esY] = esPulse > 0 ? '#cc88ff' : '#aa66dd';
                                }
                            }
                        }
                    }
                    // Cleavage furrow: fully closed after abscission, constricting before
                    var furrowDepth = cell.prophase.furrowInitiation || 0.2;
                    var furrowSpan = cell.prophase.abscission ? 2 : (furrowDepth > 0.3 ? 3 : 2);
                    for (var fI = -furrowSpan; fI <= furrowSpan; fI++) {
                        var fX = Math.round(sacMidX + Math.cos(perpAngle) * fI * 0.6);
                        var fY = Math.round(sacMidY + Math.sin(perpAngle) * fI * 0.6);
                        if (fX >= 0 && fX < size && fY >= 0 && fY < size) {
                            var fPulse = Math.sin(tSAC * 2 * Math.PI * 1.5 + fI * 0.6);
                            if (cell.prophase.abscission) {
                                // Post-abscission: furrow resolved into sealed membranes
                                if (Math.abs(fI) <= 1) {
                                    sacPixels[fX + ',' + fY] = fPulse > 0 ? '#663311' : '#552200';
                                }
                            } else {
                                var fColor = Math.abs(fI) <= 1
                                    ? (fPulse > 0 ? '#552200' : '#441100')
                                    : (fPulse > 0 ? '#774422' : '#663311');
                                sacPixels[fX + ',' + fY] = fColor;
                            }
                        }
                    }
                } else if (cell.prophase.lateAnaphase) {
                    // LATE ANAPHASE: central spindle midzone assembles between separating masses
                    // Centralspindlin (MKLP1 + CYK-4) + PRC1 bundles antiparallel MTs
                    var spindleAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    var perpAngle = spindleAngle + Math.PI / 2;
                    // Midzone: bundle of overlapping MTs at the cell equator
                    for (var mzI = -1; mzI <= 1; mzI++) {
                        var mzPerpOff = mzI * 0.7;
                        for (var mzL = -1; mzL <= 1; mzL++) {
                            var mzX = Math.round(sacMidX + Math.cos(spindleAngle) * mzL * 0.6 + Math.cos(perpAngle) * mzPerpOff);
                            var mzY = Math.round(sacMidY + Math.sin(spindleAngle) * mzL * 0.6 + Math.sin(perpAngle) * mzPerpOff);
                            if (mzX >= 0 && mzX < size && mzY >= 0 && mzY < size) {
                                var mzPulse = Math.sin(tSAC * 2 * Math.PI * 1.5 + mzI * 1.2 + mzL * 0.8);
                                // PRC1 bundles glow green-blue; centralspindlin pulses
                                sacPixels[mzX + ',' + mzY] = mzPulse > 0 ? '#66ccbb' : '#55aa99';
                            }
                        }
                    }
                    // Aurora B kinase: relocated from kinetochores to midzone
                    var abMzPulse = Math.sin(tSAC * 2 * Math.PI * 2.5);
                    if (abMzPulse > -0.3) {
                        var abMzX = Math.round(sacMidX);
                        var abMzY = Math.round(sacMidY);
                        if (abMzX >= 0 && abMzX < size && abMzY >= 0 && abMzY < size) {
                            sacPixels[abMzX + ',' + abMzY] = abMzPulse > 0.5 ? '#ff66ff' : '#dd55dd'; // Aurora B magenta
                        }
                    }
                    // APC/C: continues degrading cyclin B — dim ring expanding outward
                    var apcPulse = Math.sin(tSAC * 2 * Math.PI * 0.5 + 1.0);
                    if (apcPulse > 0.3) {
                        for (var apcI = 0; apcI < 3; apcI++) {
                            var apcAngle = apcI * 2 * Math.PI / 3 + tSAC * 0.6;
                            var apcR = 2.0 + apcPulse * 0.5;
                            var apcX = Math.round(sacMidX + Math.cos(apcAngle) * apcR);
                            var apcY = Math.round(sacMidY + Math.sin(apcAngle) * apcR);
                            if (apcX >= 0 && apcX < size && apcY >= 0 && apcY < size) {
                                sacPixels[apcX + ',' + apcY] = '#bb7799'; // dimmer APC/C
                            }
                        }
                    }
                } else {
                    // Early anaphase: separase flashes (kept for backward compat)
                    var sepPulse = Math.sin(tSAC * 2 * Math.PI * 1.2);
                    if (sepPulse > 0.2) {
                        var sepAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI / 2;
                        for (var sepI = -1; sepI <= 1; sepI++) {
                            var sepX = Math.round(sacMidX + Math.cos(sepAngle) * sepI * 0.8);
                            var sepY = Math.round(sacMidY + Math.sin(sepAngle) * sepI * 0.8);
                            if (sepX >= 0 && sepX < size && sepY >= 0 && sepY < size) {
                                sacPixels[sepX + ',' + sepY] = sepPulse > 0.6 ? '#ffffaa' : '#ddddaa';
                            }
                        }
                    }
                    // APC/C degradation wave
                    var apcPulse = Math.sin(tSAC * 2 * Math.PI * 0.5 + 1.0);
                    if (apcPulse > 0.4) {
                        for (var apcI = 0; apcI < 4; apcI++) {
                            var apcAngle = apcI * Math.PI / 2 + tSAC * 0.8;
                            var apcR = 1.5 + apcPulse * 0.8;
                            var apcX = Math.round(sacMidX + Math.cos(apcAngle) * apcR);
                            var apcY = Math.round(sacMidY + Math.sin(apcAngle) * apcR);
                            if (apcX >= 0 && apcX < size && apcY >= 0 && apcY < size) {
                                sacPixels[apcX + ',' + apcY] = '#cc88aa';
                            }
                        }
                    }
                }
            }

            // Filopodia: extending/retracting protrusions from the membrane
            var filoPixels = {};
            if (cell.filopodia) {
                var tFilo = (t * 8000 / 10000) % 1.0;
                for (var fpi = 0; fpi < cell.filopodia.length; fpi++) {
                    var fp = cell.filopodia[fpi];
                    // Extend and retract cyclically
                    var extendFrac = (Math.sin(tFilo * 2 * Math.PI + fp.phase) + 1) * 0.5; // 0 to 1
                    var curLength = fp.maxLength * (0.3 + extendFrac * 0.7);
                    for (var fl = 0; fl <= Math.ceil(curLength); fl++) {
                        var fr = maxR + fl * 0.9;
                        var fx = Math.round(cell.cx + Math.cos(fp.angle) * fr);
                        var fy = Math.round(cell.cy + Math.sin(fp.angle) * fr);
                        if (fx >= 0 && fx < size && fy >= 0 && fy < size) {
                            filoPixels[fx + ',' + fy] = fl >= Math.ceil(curLength) - 1 ? fp.tipColor : fp.stalkColor;
                        }
                    }
                }
            }

            return {
                maxR: maxR, nucR: nucR, elongation: elongation, cytoConstriction: cytoConstriction,
                mitoPixels: mitoPixels, envPixels: envPixels,
                nucPixels: nucPixels, chrPixels: chrPixels, condensinPixels: condensinPixels,
                cilPixels: cilPixels, recPixels: recPixels,
                vesPixels: vesPixels, atpPixels: atpPixels,
                centPixels: centPixels, furrowPixels: furrowPixels,
                lysoPixels: lysoPixels, filoPixels: filoPixels,
                riboPixels: riboPixels, peroxPixels: peroxPixels,
                serPixels: serPixels, actinPixels: actinPixels,
                mtPixels: mtPixels, ifPixels: ifPixels,
                porePixels: porePixels, secVesPixels: secVesPixels,
                endoPixels: endoPixels, cyclinPixels: cyclinPixels,
                checkPixels: checkPixels,
                sacPixels: sacPixels,
                cycAPixels: cycAPixels,
                cdc25Pixels: cdc25Pixels,
                cycDPixels: cycDPixels,
                phosphPixels: phosphPixels,
                gfPixels: gfPixels,
                cohesinPixels: cohesinPixels,
                topoPixels: topoPixels,
                cycBPixels: cycBPixels,
                plk1Pixels: plk1Pixels,
                auroraAPixels: auroraAPixels
            };
        }

        function draw() {
            ctx.clearRect(0, 0, size, size);

            var t = (Date.now() % 8000) / 8000;
            var tOrbit = (Date.now() % 12000) / 12000 * 2 * Math.PI;
            var tCilia = (Date.now() % 4000) / 4000 * 2 * Math.PI;
            var tChromatin = (Date.now() % 10000) / 10000 * 2 * Math.PI;
            var tNutrient = (Date.now() % 20000) / 20000 * 2 * Math.PI;
            var tGrowth = (Date.now() % 16000) / 16000; // slow growth cycle

            var dA = drawCell(cellA, t, tOrbit, tCilia, tChromatin, tGrowth);
            var dB = drawCell(cellB, t, tOrbit, tCilia, tChromatin, tGrowth + 0.5);

            // Nutrient positions — nutrients drift but are attracted toward nearby cells
            var nutrientPx = {};
            for (var ni = 0; ni < nutrients.length; ni++) {
                var n = nutrients[ni];
                var ndx = Math.sin(tNutrient + ni * 1.7) * 1;
                var ndy = Math.cos(tNutrient + ni * 2.3) * 1;
                // Chemotaxis: nutrients drift toward nearest cell
                var dToA = Math.sqrt((n.x - cellA.cx) * (n.x - cellA.cx) + (n.y - cellA.cy) * (n.y - cellA.cy));
                var dToB = Math.sqrt((n.x - cellB.cx) * (n.x - cellB.cx) + (n.y - cellB.cy) * (n.y - cellB.cy));
                var nearCell = dToA < dToB ? cellA : cellB;
                var dNear = Math.min(dToA, dToB);
                if (dNear < 12 && dNear > 2) {
                    var pullStr = 0.5 * (1 - dNear / 12);
                    ndx += (nearCell.cx - n.x) / dNear * pullStr;
                    ndy += (nearCell.cy - n.y) / dNear * pullStr;
                }
                var nx = Math.round(n.x + ndx);
                var ny = Math.round(n.y + ndy);
                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    nutrientPx[nx + ',' + ny] = n.color;
                }
            }

            // Kum-song (금성 — golden star): luminous beacon orbiting between cells
            var kumSongPx = {};
            var tKS = (Date.now() % 25000) / 25000;
            var ksAngle = tKS * 2 * Math.PI * kumSong.speed * 25; // slow orbit
            var ksCoreX = Math.round(kumSong.cx + Math.cos(ksAngle) * kumSong.orbitR);
            var ksCoreY = Math.round(kumSong.cy + Math.sin(ksAngle) * kumSong.orbitR);
            if (ksCoreX >= 0 && ksCoreX < size && ksCoreY >= 0 && ksCoreY < size) {
                // Bright golden core
                kumSongPx[ksCoreX + ',' + ksCoreY] = kumSong.coreColor;
                // Four-point halo: cardinal directions shimmer
                var ksHaloPulse = Math.sin(tKS * 2 * Math.PI * 8);
                var ksHaloColor = ksHaloPulse > 0 ? kumSong.haloColor : kumSong.dimColor;
                var ksCardinals = [[1,0],[-1,0],[0,1],[0,-1]];
                for (var kci = 0; kci < 4; kci++) {
                    var khx = ksCoreX + ksCardinals[kci][0];
                    var khy = ksCoreY + ksCardinals[kci][1];
                    if (khx >= 0 && khx < size && khy >= 0 && khy < size) {
                        // Only draw halo pixels that are outside both cells
                        var khDistA = Math.sqrt((khx - cellA.cx) * (khx - cellA.cx) + (khy - cellA.cy) * (khy - cellA.cy));
                        var khDistB = Math.sqrt((khx - cellB.cx) * (khx - cellB.cx) + (khy - cellB.cy) * (khy - cellB.cy));
                        if (khDistA > dA.maxR + 1 && khDistB > dB.maxR + 1) {
                            kumSongPx[khx + ',' + khy] = ksHaloColor;
                        }
                    }
                }
            }

            // Abscission scar slowly fading in the medium
            var tScar = (Date.now() % 20000) / 20000;
            var scarVisible = tScar < 0.3; // fading remnant, visible 30% of the time
            var scarColor = abscissionScar.color;

            // ECM fiber positions — collagen-like strands between the two cells
            var ecmPx = {};
            var tECM = (Date.now() % 15000) / 15000; // slow assembly pulse
            for (var fi = 0; fi < ecmFibers.length; fi++) {
                var fiber = ecmFibers[fi];
                // Path from cell A toward cell B
                var ax = cellA.cx + (cellB.cx - cellA.cx) * fiber.startFrac;
                var ay = cellA.cy + (cellB.cy - cellA.cy) * fiber.startFrac;
                var bx = cellA.cx + (cellB.cx - cellA.cx) * fiber.endFrac;
                var by = cellA.cy + (cellB.cy - cellA.cy) * fiber.endFrac;
                // Midpoint with offset to create wavy fibers
                var mx = (ax + bx) / 2 + fiber.offsetX;
                var my = (ay + by) / 2 + fiber.offsetY;
                // Draw as two segments: start->mid, mid->end
                var segments = [
                    { x1: ax, y1: ay, x2: mx, y2: my },
                    { x1: mx, y1: my, x2: bx, y2: by },
                ];
                // Assembly pulse: fibers gently brighten and dim
                var pulse = Math.sin(tECM * 2 * Math.PI + fiber.pulsePhase);
                var visible = pulse > -0.3; // visible most of the time
                if (visible) {
                    for (var si2 = 0; si2 < segments.length; si2++) {
                        var seg = segments[si2];
                        var steps = Math.max(Math.abs(Math.round(seg.x2) - Math.round(seg.x1)), Math.abs(Math.round(seg.y2) - Math.round(seg.y1)));
                        if (steps === 0) steps = 1;
                        for (var step = 0; step <= steps; step++) {
                            var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                            var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                            if (px >= 0 && px < size && py >= 0 && py < size) {
                                ecmPx[px + ',' + py] = fiber.color;
                            }
                        }
                    }
                }
            }

            // Gap junction pixels: where filopodia tips from both cells meet
            var gapPx = {};
            var tGap = (Date.now() % 6000) / 6000;
            for (var gi = 0; gi < gapJunctions.length; gi++) {
                var gj = gapJunctions[gi];
                // Find the midpoint between the two cells along the filopodia angles
                var fpA = cellA.filopodia[gj.filoIdxA];
                var fpB = cellB.filopodia[gj.filoIdxB];
                // Junction forms at the midpoint between cell surfaces along their filopodia
                var jxA = cellA.cx + Math.cos(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jyA = cellA.cy + Math.sin(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jxB = cellB.cx + Math.cos(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jyB = cellB.cy + Math.sin(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jmx = Math.round((jxA + jxB) / 2);
                var jmy = Math.round((jyA + jyB) / 2);
                // Pulse: small molecules flowing through the junction
                var gapPulse = Math.sin(tGap * 2 * Math.PI + gj.pulsePhase);
                if (jmx >= 0 && jmx < size && jmy >= 0 && jmy < size) {
                    gapPx[jmx + ',' + jmy] = gapPulse > 0 ? '#eedd99' : gj.color;
                }
                // Ion flowing through: one pixel offset toward whichever cell the pulse favors
                var ionDir = gapPulse > 0 ? 1 : -1;
                var ionX = Math.round(jmx + ionDir * (jxB - jxA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                var ionY = Math.round(jmy + ionDir * (jyB - jyA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                if (ionX >= 0 && ionX < size && ionY >= 0 && ionY < size) {
                    gapPx[ionX + ',' + ionY] = gapPulse > 0 ? '#ffee55' : '#bbaa66';
                }
            }

            // Desmosome pixels: mechanical anchoring spots on cell membranes
            var desmoPx = {};
            for (var di = 0; di < desmosomes.length; di++) {
                var desmo = desmosomes[di];
                // Plaque on cell A membrane
                var daxR = dA.maxR - 0.3;
                var dax = Math.round(cellA.cx + Math.cos(desmo.angleA) * daxR);
                var day = Math.round(cellA.cy + Math.sin(desmo.angleA) * daxR);
                // Plaque on cell B membrane
                var dbxR = dB.maxR - 0.3;
                var dbx = Math.round(cellB.cx + Math.cos(desmo.angleB) * dbxR);
                var dby = Math.round(cellB.cy + Math.sin(desmo.angleB) * dbxR);
                if (dax >= 0 && dax < size && day >= 0 && day < size) {
                    desmoPx[dax + ',' + day] = desmo.color;
                }
                if (dbx >= 0 && dbx < size && dby >= 0 && dby < size) {
                    desmoPx[dbx + ',' + dby] = desmo.color;
                }
                // Intermediate filament anchor: one pixel inward from each plaque
                var iaX = Math.round(cellA.cx + Math.cos(desmo.angleA) * (daxR - 1.2));
                var iaY = Math.round(cellA.cy + Math.sin(desmo.angleA) * (daxR - 1.2));
                var ibX = Math.round(cellB.cx + Math.cos(desmo.angleB) * (dbxR - 1.2));
                var ibY = Math.round(cellB.cy + Math.sin(desmo.angleB) * (dbxR - 1.2));
                if (iaX >= 0 && iaX < size && iaY >= 0 && iaY < size) {
                    desmoPx[iaX + ',' + iaY] = desmo.anchorColor;
                }
                if (ibX >= 0 && ibX < size && ibY >= 0 && ibY < size) {
                    desmoPx[ibX + ',' + ibY] = desmo.anchorColor;
                }
            }

            // Tight junction pixels: continuous seal band between cells
            var tjPx = {};
            var tTJ = (Date.now() % 8000) / 8000;
            for (var tji = 0; tji < tightJunctions.length; tji++) {
                var tj = tightJunctions[tji];
                // Points on each cell's membrane facing the other
                var tjAx = cellA.cx + Math.cos(tj.angleA) * dA.maxR;
                var tjAy = cellA.cy + Math.sin(tj.angleA) * dA.maxR;
                var tjBx = cellB.cx + Math.cos(tj.angleB) * dB.maxR;
                var tjBy = cellB.cy + Math.sin(tj.angleB) * dB.maxR;
                // Draw a short strand connecting the two membrane points
                var tjSteps = Math.max(Math.abs(Math.round(tjBx) - Math.round(tjAx)), Math.abs(Math.round(tjBy) - Math.round(tjAy)));
                if (tjSteps === 0) tjSteps = 1;
                // Only draw the middle portion (the seal zone between membranes)
                for (var tjs = Math.floor(tjSteps * 0.3); tjs <= Math.ceil(tjSteps * 0.7); tjs++) {
                    var tjx = Math.round(tjAx + (tjBx - tjAx) * tjs / tjSteps);
                    var tjy = Math.round(tjAy + (tjBy - tjAy) * tjs / tjSteps);
                    if (tjx >= 0 && tjx < size && tjy >= 0 && tjy < size) {
                        // Claudin proteins pulse along the seal
                        var tjPulse = Math.sin(tTJ * 2 * Math.PI + tj.phase + tjs * 0.5);
                        tjPx[tjx + ',' + tjy] = tjPulse > 0 ? '#ddccaa' : '#ccbb99';
                    }
                }
            }

            // Adherens junction pixels: E-cadherin adhesion belt between cells
            var ajPx = {};
            var tAJ = (Date.now() % 7000) / 7000;
            for (var aji = 0; aji < adherensJunctions.length; aji++) {
                var aj = adherensJunctions[aji];
                // Cadherin dimers extend from each cell's membrane into the intercellular space
                var ajAxR = dA.maxR + 0.5;
                var ajAx = cellA.cx + Math.cos(aj.angleA) * ajAxR;
                var ajAy = cellA.cy + Math.sin(aj.angleA) * ajAxR;
                var ajBxR = dB.maxR + 0.5;
                var ajBx = cellB.cx + Math.cos(aj.angleB) * ajBxR;
                var ajBy = cellB.cy + Math.sin(aj.angleB) * ajBxR;
                // Draw cadherin bridge between the two cells
                var ajMx = (ajAx + ajBx) / 2;
                var ajMy = (ajAy + ajBy) / 2;
                // Three points: near A, midpoint, near B
                var ajPts = [
                    { x: Math.round(ajAx), y: Math.round(ajAy) },
                    { x: Math.round(ajMx), y: Math.round(ajMy) },
                    { x: Math.round(ajBx), y: Math.round(ajBy) },
                ];
                // Calcium-dependent adhesion pulse
                var ajPulse = Math.sin(tAJ * 2 * Math.PI + aj.phase);
                for (var ajp = 0; ajp < ajPts.length; ajp++) {
                    var pt = ajPts[ajp];
                    if (pt.x >= 0 && pt.x < size && pt.y >= 0 && pt.y < size) {
                        ajPx[pt.x + ',' + pt.y] = ajPulse > 0.2 ? '#ee8866' : '#cc7755';
                    }
                }
            }

            // Signal molecule positions
            var signalPx = {};
            var tSig = Date.now();
            for (var si = 0; si < signals.length; si++) {
                var sig = signals[si];
                var fromC = sig.fromCell === 'A' ? cellA : cellB;
                var toC = sig.toCell === 'A' ? cellA : cellB;
                // Progress along the path from source to target
                var progress = ((tSig * sig.speed) + sig.phase) % 1.0;
                // Interpolate position between cell edges
                var sx = fromC.cx + (toC.cx - fromC.cx) * progress;
                var sy = fromC.cy + (toC.cy - fromC.cy) * progress;
                var spx = Math.round(sx);
                var spy = Math.round(sy);
                // Only visible while in the extracellular space (between cells)
                var dFromA = Math.sqrt((spx - cellA.cx) * (spx - cellA.cx) + (spy - cellA.cy) * (spy - cellA.cy));
                var dFromB = Math.sqrt((spx - cellB.cx) * (spx - cellB.cx) + (spy - cellB.cy) * (spy - cellB.cy));
                if (dFromA > dA.maxR + 0.5 && dFromB > dB.maxR + 0.5) {
                    if (spx >= 0 && spx < size && spy >= 0 && spy < size) {
                        signalPx[spx + ',' + spy] = sig.color;
                    }
                }
            }

            // Render all pixels
            for (var y = 0; y < size; y++) {
                for (var x = 0; x < size; x++) {
                    var key = x + ',' + y;
                    var color = null;

                    // Check both cells
                    var cells = [
                        { cell: cellA, d: dA },
                        { cell: cellB, d: dB },
                    ];

                    var inAnyCell = false;
                    for (var ci = 0; ci < cells.length; ci++) {
                        var cc = cells[ci].cell;
                        var dd = cells[ci].d;
                        var dx = x - cc.cx;
                        var dy = y - cc.cy;
                        // Anaphase elongation: use elliptical distance along spindle axis
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var elong = dd.elongation || 0;
                        var constrict = dd.cytoConstriction || 0;
                        var effDist = dist;
                        if (elong > 0 && cc.centrosomes && cc.centrosomes.length >= 2) {
                            var eAxisX = cc.centrosomes[1].x - cc.centrosomes[0].x;
                            var eAxisY = cc.centrosomes[1].y - cc.centrosomes[0].y;
                            var eAxisLen = Math.sqrt(eAxisX * eAxisX + eAxisY * eAxisY);
                            if (eAxisLen > 0) {
                                var enx = eAxisX / eAxisLen;
                                var eny = eAxisY / eAxisLen;
                                var projAlong = dx * enx + dy * eny;
                                var projPerp = dx * (-eny) + dy * enx;
                                // Shrink along-axis component to make cell appear elongated
                                var baseEffDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp);
                                // Cytokinesis constriction: narrow the cell at the equator (projAlong ≈ 0)
                                if (constrict > 0) {
                                    var equatorProximity = 1.0 - Math.min(1.0, Math.abs(projAlong) / (eAxisLen * 0.4));
                                    equatorProximity = equatorProximity * equatorProximity; // sharpen the waist
                                    // At equator, effective perpendicular distance is amplified (cell narrows)
                                    effDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp * (1 + constrict * equatorProximity * 2));
                                } else {
                                    effDist = baseEffDist;
                                }
                            }
                        }

                        if (effDist <= dd.maxR) {
                            inAnyCell = true;
                            // Layer priority via array lookup
                            var layers = ['furrowPixels','centPixels','secVesPixels','vesPixels','atpPixels',
                                'lysoPixels','endoPixels','peroxPixels','cyclinPixels','cycAPixels',
                                'cdc25Pixels','cycBPixels','plk1Pixels','auroraAPixels','cycDPixels',
                                'phosphPixels','mitoPixels','nucPixels','porePixels','envPixels',
                                'sacPixels','cohesinPixels','topoPixels','checkPixels','chrPixels',
                                'condensinPixels','recPixels'];
                            for (var li = 0; li < layers.length && !color; li++) {
                                if (dd[layers[li]] && dd[layers[li]][key]) color = dd[layers[li]][key];
                            }
                            if (!color && cc.golgiPixels[key]) {
                                color = cc.golgiPixels[key];
                            } else if (!color && effDist > dd.maxR - 1.2) {
                                var shell = dd.maxR - effDist;
                                var mi = Math.floor(shell * cc.membraneColors.length / 1.2);
                                if (mi >= cc.membraneColors.length) mi = cc.membraneColors.length - 1;
                                color = cc.membraneColors[mi];
                            }
                            if (!color) {
                                var innerLayers = ['actinPixels','mtPixels','ifPixels','riboPixels','serPixels'];
                                for (var li2 = 0; li2 < innerLayers.length && !color; li2++) {
                                    if (dd[innerLayers[li2]] && dd[innerLayers[li2]][key]) color = dd[innerLayers[li2]][key];
                                }
                            }
                            if (!color && cc.erPixels[key]) {
                                color = cc.erColor;
                            }
                            if (!color) {
                                var ndx2 = x - cc.cx, ndy2 = y - cc.cy;
                                color = Math.sqrt(ndx2*ndx2+ndy2*ndy2) <= dd.nucR+0.3 ? '#7a3500' : cc.cytoColor;
                            }
                            break;
                        }
                    }

                    if (!inAnyCell) {
                        // Extracellular space
                        var drawn = false;
                        // Check cilia for both cells
                        for (var ci = 0; ci < cells.length && !drawn; ci++) {
                            if (cells[ci].d.cilPixels[key]) {
                                color = cells[ci].d.cilPixels[key];
                                drawn = true;
                            }
                        }
                        // Check filopodia for both cells
                        for (var ci2 = 0; ci2 < cells.length && !drawn; ci2++) {
                            if (cells[ci2].d.filoPixels && cells[ci2].d.filoPixels[key]) {
                                color = cells[ci2].d.filoPixels[key];
                                drawn = true;
                            }
                        }
                        // Growth factor particles arcing outside cells
                        for (var ci3 = 0; ci3 < cells.length && !drawn; ci3++) {
                            if (cells[ci3].d.gfPixels && cells[ci3].d.gfPixels[key]) {
                                color = cells[ci3].d.gfPixels[key];
                                drawn = true;
                            }
                        }
                        if (!drawn && gapPx[key]) {
                            color = gapPx[key];
                            drawn = true;
                        }
                        if (!drawn && desmoPx[key]) {
                            color = desmoPx[key];
                            drawn = true;
                        }
                        if (!drawn && tjPx[key]) {
                            color = tjPx[key];
                            drawn = true;
                        }
                        if (!drawn && ajPx[key]) {
                            color = ajPx[key];
                            drawn = true;
                        }
                        if (!drawn && signalPx[key]) {
                            color = signalPx[key];
                            drawn = true;
                        }
                        if (!drawn && ecmPx[key]) {
                            color = ecmPx[key];
                            drawn = true;
                        }
                        if (!drawn && scarVisible && x === abscissionScar.x && y === abscissionScar.y) {
                            color = scarColor;
                            drawn = true;
                        }
                        // Midbody remnants (Flemming bodies) — released after abscission
                        if (!drawn) {
                            var tMBR = (Date.now() % 18000) / 18000;
                            for (var mri = 0; mri < midbodyRemnants.length && !drawn; mri++) {
                                var mbr = midbodyRemnants[mri];
                                // Remnants drift slowly outward from division site
                                var mbrDrift = Math.sin(tMBR * 2 * Math.PI + mri * 3.14) * 1.5;
                                var mbrX = Math.round(mbr.x + mbrDrift * (mri === 0 ? 0.5 : -0.5));
                                var mbrY = Math.round(mbr.y + mbrDrift * (mri === 0 ? -0.5 : 0.5));
                                if (x === mbrX && y === mbrY) {
                                    var mbrPulse = Math.sin(tMBR * 2 * Math.PI * 2 + mri);
                                    // Fresh Flemming bodies pulse brighter with residual ESCRT-III
                                    if (mbr.fresh) {
                                        var freshPulse = Math.sin(tMBR * 2 * Math.PI * 3.5 + mri * 1.7);
                                        color = freshPulse > 0.3 ? '#bbddee' : (freshPulse > -0.3 ? mbr.glowColor : mbr.color);
                                    } else {
                                        color = mbrPulse > 0 ? mbr.glowColor : mbr.color;
                                    }
                                    drawn = true;
                                }
                            }
                        }
                        // Granddaughter cells: cell bodies forming around nuclei
                        if (!drawn) {
                            var tReact = (Date.now() % 12000) / 12000;
                            var tNucReasm = (Date.now() % 9000) / 9000;
                            var tGDOrbit = (Date.now() % 11000) / 11000 * 2 * Math.PI;
                            for (var gni = 0; gni < granddaughterNuclei.length && !drawn; gni++) {
                                var gn = granddaughterNuclei[gni];
                                var gnDx = x - gn.x;
                                var gnDy = y - gn.y;
                                var gnDist = Math.sqrt(gnDx * gnDx + gnDy * gnDy);
                                // Cell body membrane: thin shell forming around each granddaughter
                                var bodyR = gn.bodyRadius;
                                var bodyBreath = Math.sin(tNucReasm * 2 * Math.PI * 0.7 + gni * 1.1) * 0.15;
                                var effBodyR = bodyR + bodyBreath;
                                if (gnDist <= effBodyR) {
                                    // Membrane shell
                                    if (gnDist > effBodyR - 0.7) {
                                        color = gn.membraneColor;
                                        drawn = true;
                                    }
                                    // Inherited mitochondrion orbiting in thin cytoplasm
                                    if (!drawn) {
                                        var mitoA = gn.mitoAngle + gn.mitoSpeed * tGDOrbit;
                                        var mitoR = effBodyR * 0.65;
                                        var mitoX = Math.round(gn.x + Math.cos(mitoA) * mitoR);
                                        var mitoY = Math.round(gn.y + Math.sin(mitoA) * mitoR);
                                        if (x === mitoX && y === mitoY) {
                                            color = '#44aa66';
                                            drawn = true;
                                        }
                                    }
                                }
                                // Nuclear envelope: small ring around each granddaughter nucleus
                                var gnEnvR = 1.3 + gn.nucleolusSize * 0.5;
                                var envWidth = 0.6;
                                if (!drawn && Math.abs(gnDist - gnEnvR) < envWidth) {
                                    var envPulse = Math.sin(tNucReasm * 2 * Math.PI * 2 + gni * 1.4 + Math.atan2(gnDy, gnDx) * 3);
                                    color = envPulse > 0 ? '#eebb55' : '#ddaa44';
                                    drawn = true;
                                }
                                // Nucleolus: dense rDNA transcription center at nucleus core
                                if (!drawn && gnDist < gn.nucleolusSize + 0.3) {
                                    var nuclPulse = Math.sin(tNucReasm * 2 * Math.PI * 1.8 + gni * 2.3);
                                    color = nuclPulse > 0.2 ? '#ff9933' : '#dd7722';
                                    drawn = true;
                                }
                                // Nuclear speckles: SC35 splicing factor domains
                                if (!drawn) {
                                    for (var spi = 0; spi < gn.speckles.length && !drawn; spi++) {
                                        var sp = gn.speckles[spi];
                                        var spX = Math.round(gn.x + Math.cos(sp.angle) * sp.dist);
                                        var spY = Math.round(gn.y + Math.sin(sp.angle) * sp.dist);
                                        if (x === spX && y === spY) {
                                            var spPulse = Math.sin(tNucReasm * 2 * Math.PI * 1.4 + gni * 2.1 + spi * 3.0);
                                            color = spPulse > 0 ? '#99eebb' : sp.color;
                                            drawn = true;
                                        }
                                    }
                                }
                                // Cajal body: small nuclear body for snRNP maturation
                                if (!drawn) {
                                    var cbR = 0.8;
                                    var cbX = gn.x + Math.round(Math.cos(gn.cajalAngle) * cbR);
                                    var cbY = gn.y + Math.round(Math.sin(gn.cajalAngle) * cbR);
                                    if (x === cbX && y === cbY) {
                                        var cbPulse = Math.sin(tNucReasm * 2 * Math.PI * 2.5 + gni * 1.9);
                                        color = cbPulse > 0 ? '#cc88ff' : '#aa66dd';
                                        drawn = true;
                                    }
                                }
                                // Rough ER stubs: short cisternae radiating from nuclear envelope
                                if (!drawn && gn.erStubs) {
                                    var tER = (Date.now() % 7000) / 7000;
                                    for (var eri = 0; eri < gn.erStubs.length && !drawn; eri++) {
                                        var erStub = gn.erStubs[eri];
                                        var erStartR = gnEnvR + 0.3;
                                        var erEndR = erStartR + erStub.length;
                                        // Check if pixel lies on the ER segment
                                        for (var erl = 0; erl <= Math.ceil(erStub.length * 2); erl++) {
                                            var erR = erStartR + erl * 0.5;
                                            if (erR > erEndR) break;
                                            var erPx = Math.round(gn.x + Math.cos(erStub.angle) * erR);
                                            var erPy = Math.round(gn.y + Math.sin(erStub.angle) * erR);
                                            if (x === erPx && y === erPy) {
                                                var erPulse = Math.sin(tER * 2 * Math.PI + eri * 2.5 + erl * 0.8);
                                                color = erPulse > 0 ? '#996644' : '#884422';
                                                drawn = true;
                                                break;
                                            }
                                        }
                                    }
                                }
                                // Golgi ministack: 2-pixel cisterna near ER exit site
                                if (!drawn) {
                                    var golgX = Math.round(gn.x + Math.cos(gn.golgiAngle) * gn.golgiDist);
                                    var golgY = Math.round(gn.y + Math.sin(gn.golgiAngle) * gn.golgiDist);
                                    if (x === golgX && y === golgY) {
                                        var tGolg = (Date.now() % 8000) / 8000;
                                        var golgPulse = Math.sin(tGolg * 2 * Math.PI * 1.5 + gni * 2.0);
                                        color = golgPulse > 0 ? '#ddaa55' : '#cc9944';
                                        drawn = true;
                                    }
                                    // Second cisterna pixel offset perpendicular
                                    var golg2X = Math.round(gn.x + Math.cos(gn.golgiAngle + 0.5) * (gn.golgiDist + 0.4));
                                    var golg2Y = Math.round(gn.y + Math.sin(gn.golgiAngle + 0.5) * (gn.golgiDist + 0.4));
                                    if (!drawn && x === golg2X && y === golg2Y) {
                                        color = '#ccaa55';
                                        drawn = true;
                                    }
                                }
                                // Free ribosomes (polyribosomes): small dots pulsing with translation
                                if (!drawn && gn.freeRibosomes) {
                                    var tRiboFree = (Date.now() % 5000) / 5000;
                                    for (var fri = 0; fri < gn.freeRibosomes.length && !drawn; fri++) {
                                        var fr = gn.freeRibosomes[fri];
                                        var frX = Math.round(gn.x + Math.cos(fr.angle) * fr.dist);
                                        var frY = Math.round(gn.y + Math.sin(fr.angle) * fr.dist);
                                        if (x === frX && y === frY) {
                                            var frPulse = Math.sin(tRiboFree * 2 * Math.PI * 1.8 + fr.phase);
                                            // Brightens during active translation, dims between rounds
                                            color = frPulse > 0.2 ? '#776644' : '#553322';
                                            drawn = true;
                                        }
                                    }
                                }
                                // Peroxisome: orbits slowly in cytoplasm, catalase flicker
                                if (!drawn) {
                                    var tPeroxGD = (Date.now() % 11000) / 11000 * 2 * Math.PI;
                                    var pxAngle = gn.peroxAngle + gn.peroxSpeed * tPeroxGD;
                                    var pxX = Math.round(gn.x + Math.cos(pxAngle) * gn.peroxDist);
                                    var pxY = Math.round(gn.y + Math.sin(pxAngle) * gn.peroxDist);
                                    if (x === pxX && y === pxY) {
                                        var pxPulse = Math.sin(tPeroxGD * 1.5 + gni * 2.0);
                                        color = pxPulse > 0 ? '#77bb88' : '#55aa77';
                                        drawn = true;
                                    }
                                }
                                // Lysosome: acidic vesicle orbiting in cytoplasm, purple glow
                                if (!drawn) {
                                    var tLysoGD = (Date.now() % 13000) / 13000 * 2 * Math.PI;
                                    var lyAngle = gn.lysoAngle + gn.lysoSpeed * tLysoGD;
                                    var lyX = Math.round(gn.x + Math.cos(lyAngle) * gn.lysoDist);
                                    var lyY = Math.round(gn.y + Math.sin(lyAngle) * gn.lysoDist);
                                    if (x === lyX && y === lyY) {
                                        var lyPulse = Math.sin(tLysoGD * 1.3 + gni * 1.8);
                                        color = lyPulse > 0 ? '#9966bb' : '#8855aa';
                                        drawn = true;
                                    }
                                }
                                // Centrosome: single centriole pair near nucleus, bright yellow dot
                                // Establishes MTOC — 2 short microtubule rays radiate outward
                                if (!drawn) {
                                    var centX = Math.round(gn.x + Math.cos(gn.centrosomeAngle) * gn.centrosomeDist);
                                    var centY = Math.round(gn.y + Math.sin(gn.centrosomeAngle) * gn.centrosomeDist);
                                    if (x === centX && y === centY) {
                                        var tCentGD = (Date.now() % 9000) / 9000;
                                        var centPulse = Math.sin(tCentGD * 2 * Math.PI * 1.5 + gni * 2.2);
                                        color = centPulse > 0 ? '#eedd55' : '#ddcc44';
                                        drawn = true;
                                    }
                                    // Two short microtubule rays from centrosome
                                    if (!drawn) {
                                        for (var mtri = 0; mtri < 2 && !drawn; mtri++) {
                                            var mtrAngle = gn.centrosomeAngle + (mtri === 0 ? 0.8 : -0.8);
                                            var mtrX = Math.round(centX + Math.cos(mtrAngle) * 1.0);
                                            var mtrY = Math.round(centY + Math.sin(mtrAngle) * 1.0);
                                            if (x === mtrX && y === mtrY) {
                                                var mtrDist = Math.sqrt((mtrX - gn.x) * (mtrX - gn.x) + (mtrY - gn.y) * (mtrY - gn.y));
                                                if (mtrDist < effBodyR - 0.3) {
                                                    color = '#556677';
                                                    drawn = true;
                                                }
                                            }
                                        }
                                    }
                                }
                                // Cytoplasm fill within body
                                if (!drawn && gnDist <= effBodyR) {
                                    color = gn.cytoColor;
                                    drawn = true;
                                }
                                // Transcription aura: mRNA radiating outward from cell body
                                if (!drawn) {
                                    var auraR = effBodyR + 0.5 + gn.reactivation * 1.5;
                                    var auraPulse = Math.sin(tReact * 2 * Math.PI * 1.5 + gni * 1.57);
                                    var auraWidth = 0.7;
                                    if (Math.abs(gnDist - auraR) < auraWidth && auraPulse > 0) {
                                        color = auraPulse > 0.5 ? '#ffdd88' : '#eebb66';
                                        drawn = true;
                                    }
                                }
                            }
                        }
                        // Calcium waves: IP3-mediated Ca2+ pulses ripple between granddaughter nuclei
                        if (!drawn) {
                            var tCa = (Date.now() % 14000) / 14000;
                            for (var cwi = 0; cwi < calciumWaves.length && !drawn; cwi++) {
                                var cw = calciumWaves[cwi];
                                var caProgress = (tCa + cw.phase) % 1.0;
                                // Ca2+ wavefront position along the path
                                var caX = cw.from.x + (cw.to.x - cw.from.x) * caProgress;
                                var caY = cw.from.y + (cw.to.y - cw.from.y) * caProgress;
                                var caDx = x - caX, caDy = y - caY;
                                var caDist = Math.sqrt(caDx * caDx + caDy * caDy);
                                if (caDist < 0.8) {
                                    var caPulse = Math.sin(tCa * 2 * Math.PI * 3 + cwi * 1.5);
                                    color = caPulse > 0 ? cw.color : cw.dimColor;
                                    drawn = true;
                                }
                            }
                        }
                        if (!drawn && kumSongPx[key]) {
                            color = kumSongPx[key];
                            drawn = true;
                        }
                        if (!drawn && nutrientPx[key]) {
                            color = nutrientPx[key];
                            drawn = true;
                        }
                        if (!drawn) {
                            color = mediumColor;
                        }
                    }

                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
