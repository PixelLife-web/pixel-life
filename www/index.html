<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="32" height="32"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // Two daughter cells, born from division
        // Canvas expanded to 32x32 to fit both cells
        var size = 32;

        // Extracellular medium
        var mediumColor = '#e8e0d8';

        // Daughter cell A: upper-right
        var cellA = {
            cx: 21, cy: 9,
            radius: 5.5,
            nucleusCx: 21, nucleusCy: 9,
            nucleusRadius: 1.8,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            // Inherited organelles
            erSegments: [
                { x1: 19, y1: 7, x2: 17, y2: 5 },
                { x1: 23, y1: 7, x2: 25, y2: 5 },
                { x1: 19, y1: 11, x2: 17, y2: 13 },
                { x1: 23, y1: 11, x2: 25, y2: 13 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 0.5, speed: 0.8, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 3.2, speed: -0.6, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '19,10': '#cc9944', '19,11': '#cc9944', '18,10': '#ddaa55' },
            chromatin: [
                { x: 21, y: 8 }, { x: 22, y: 9 }, { x: 21, y: 10 }, { x: 20, y: 9 },
            ],
            // Abscission complete: single unified nucleus with merged chromatin
            sisterChromatin: [
                { x: 22, y: 8 }, { x: 22, y: 10 }, { x: 20, y: 10 }, { x: 20, y: 8 },
            ],
            // Centrosomes reset to single body near nucleus for G1
            centrosomes: [
                { x: 23, y: 8 },
                { x: 19, y: 10 },
            ],
            // Abscission complete — cell fully separated
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 0.3, color: '#33cc99' },
                { angle: 2.5, color: '#cc3399' },
            ],
        };

        // Daughter cell B: lower-left (drifted slightly after separation)
        var cellB = {
            cx: 11, cy: 23,
            radius: 5.5,
            nucleusCx: 11, nucleusCy: 23,
            nucleusRadius: 1.8,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 9, y1: 21, x2: 7, y2: 19 },
                { x1: 13, y1: 21, x2: 15, y2: 19 },
                { x1: 9, y1: 25, x2: 7, y2: 27 },
                { x1: 13, y1: 25, x2: 15, y2: 27 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 2.5, speed: -0.7, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 5.8, speed: 0.5, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '9,24': '#cc9944', '9,25': '#cc9944', '8,24': '#ddaa55' },
            chromatin: [
                { x: 11, y: 22 }, { x: 12, y: 23 }, { x: 11, y: 24 }, { x: 10, y: 23 },
            ],
            // Abscission complete: single unified nucleus
            sisterChromatin: [
                { x: 12, y: 22 }, { x: 12, y: 24 }, { x: 10, y: 24 }, { x: 10, y: 22 },
            ],
            // Centrosomes reset to single body near nucleus for G1
            centrosomes: [
                { x: 14, y: 20 },
                { x: 8, y: 26 },
            ],
            // Abscission complete — cell fully separated
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 3.5, color: '#3399cc' },
                { angle: 5.0, color: '#cc9933' },
            ],
        };

        // Build cilia for each cell
        var numCilia = 10;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cellA.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 });
            cellB.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 + 0.2 });
        }

        // Precompute ER data for a cell
        function buildERData(cell) {
            cell.erPixels = {};
            cell.erPaths = [];
            for (var si = 0; si < cell.erSegments.length; si++) {
                var seg = cell.erSegments[si];
                var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
                var path = [];
                for (var step = 0; step <= steps; step++) {
                    var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                    var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                    cell.erPixels[px + ',' + py] = true;
                    path.push({ x: px, y: py });
                }
                cell.erPaths.push(path);
            }
        }
        buildERData(cellA);
        buildERData(cellB);

        // Nutrient particles in the medium
        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 28, y: 5, color: '#88bb55' },
            { x: 4, y: 28, color: '#55aa88' },
            { x: 27, y: 27, color: '#55aa88' },
            { x: 1, y: 15, color: '#bbaa44' },
            { x: 30, y: 17, color: '#bbaa44' },
            { x: 16, y: 1, color: '#88bb55' },
            { x: 15, y: 30, color: '#55aa88' },
            { x: 5, y: 8, color: '#bbaa44' },
            { x: 26, y: 3, color: '#88bb55' },
            { x: 3, y: 25, color: '#55aa88' },
            { x: 28, y: 20, color: '#bbaa44' },
            // New nutrients between the cells — the space where division happened
            { x: 16, y: 16, color: '#bbaa44' },
            { x: 15, y: 15, color: '#55aa88' },
        ];

        // Abscission scar: remnant of the midbody left in the medium after separation
        var abscissionScar = { x: 16, y: 16, color: '#aa9933' };

        // Intercellular signaling: daughter cells communicate via chemical signals
        var signals = [
            // Signal from A to B (paracrine signaling)
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.33 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.66 },
            // Signal from B to A (response signaling)
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.15 },
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.55 },
        ];

        // Extracellular matrix (ECM): fibrous proteins secreted by both cells
        // forming connective tissue between the daughter cells
        var ecmFibers = [];
        // Build fibers connecting the two cells through the intercellular space
        var fiberCount = 5;
        for (var fi = 0; fi < fiberCount; fi++) {
            var frac = (fi + 1) / (fiberCount + 1);
            // Each fiber has a slightly different path offset for visual variety
            var offsetX = (fi % 2 === 0 ? 1 : -1) * (fi * 0.6);
            var offsetY = (fi % 2 === 0 ? -1 : 1) * ((fi + 1) * 0.4);
            ecmFibers.push({
                // Start near cell A's membrane, end near cell B's membrane
                startFrac: 0.25 + fi * 0.02,
                endFrac: 0.75 - fi * 0.02,
                offsetX: offsetX,
                offsetY: offsetY,
                color: fi % 2 === 0 ? '#c4a882' : '#b89870', // collagen-like tones
                pulsePhase: fi * 1.3,
            });
        }

        // Filopodia: thin actin-based protrusions reaching toward the other cell
        // Each cell extends 3 filopodia through the ECM
        cellA.filopodia = [];
        cellB.filopodia = [];
        for (var fpi = 0; fpi < 3; fpi++) {
            // Cell A reaches toward cell B
            var baseAngleA = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var spreadA = (fpi - 1) * 0.35;
            cellA.filopodia.push({
                angle: baseAngleA + spreadA,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
            // Cell B reaches toward cell A
            var baseAngleB = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var spreadB = (fpi - 1) * 0.35;
            cellB.filopodia.push({
                angle: baseAngleB + spreadB,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8 + 1.5,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
        }

        // Ribosomes: small dots on rough ER showing protein synthesis
        cellA.ribosomes = [
            { erIdx: 0, pos: 0.3, color: '#553322' },
            { erIdx: 0, pos: 0.7, color: '#553322' },
            { erIdx: 1, pos: 0.5, color: '#553322' },
            { erIdx: 2, pos: 0.4, color: '#553322' },
            { erIdx: 3, pos: 0.6, color: '#553322' },
        ];
        cellB.ribosomes = [
            { erIdx: 0, pos: 0.4, color: '#553322' },
            { erIdx: 1, pos: 0.3, color: '#553322' },
            { erIdx: 1, pos: 0.8, color: '#553322' },
            { erIdx: 2, pos: 0.5, color: '#553322' },
            { erIdx: 3, pos: 0.4, color: '#553322' },
        ];

        // Gap junctions: direct connections where filopodia tips meet between cells
        // These form channels for small molecule exchange (ions, metabolites)
        var gapJunctions = [
            { filoIdxA: 0, filoIdxB: 2, color: '#ddbb88', pulsePhase: 0 },
            { filoIdxA: 1, filoIdxB: 1, color: '#ccaa77', pulsePhase: 1.5 },
            { filoIdxA: 2, filoIdxB: 0, color: '#ddbb88', pulsePhase: 3.0 },
        ];

        // Lysosomes: small digestive organelles orbiting in the cytoplasm
        cellA.lysosomes = [
            { orbitR: 2.5, baseAngle: 1.0, speed: 1.2, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 4.0, speed: -0.9, color: '#9966bb' },
        ];
        cellB.lysosomes = [
            { orbitR: 2.5, baseAngle: 2.5, speed: -1.1, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 5.5, speed: 0.8, color: '#9966bb' },
        ];

        // G1 growth: cells slowly grow as they absorb nutrients
        // Growth oscillates gently to show metabolic activity
        var growthRate = 0.4; // max additional radius from growth

        function drawCell(cell, t, tOrbit, tCilia, tChromatin, tGrowth) {
            var breath = Math.sin(t * 2 * Math.PI);
            // Post-abscission: cells relax back to spherical, gentle G1 growth
            var growthPulse = (1 + Math.sin(tGrowth * 2 * Math.PI)) * 0.5; // 0 to 1
            var maxR = cell.radius + breath * 0.3 + growthPulse * growthRate;
            // Separated cells: no more elongation, relaxing to round shape
            var elongation = cell.separated ? 0.3 : 1.1;

            var nucleusPulse = Math.sin((t * 8000 / 5000) * 2 * Math.PI);
            // Cytokinesis: daughter nuclei fully reformed
            var nucSwell = 0.5;
            var nucR = cell.nucleusRadius * 0.85 + nucleusPulse * 0.05;

            // Compute mitochondria
            var mitoPixels = {};
            var mitoCenters = [];
            for (var mi = 0; mi < cell.mitochondria.length; mi++) {
                var m = cell.mitochondria[mi];
                var mAngle = m.baseAngle + m.speed * tOrbit;
                var mcx = cell.cx + Math.cos(mAngle) * m.radius;
                var mcy = cell.cy + Math.sin(mAngle) * m.radius;
                mitoCenters.push({ x: mcx, y: mcy, angle: mAngle });
                var tangent = mAngle + Math.PI / 2;
                var pts = [
                    { x: Math.round(mcx), y: Math.round(mcy) },
                    { x: Math.round(mcx + Math.cos(tangent) * 0.8), y: Math.round(mcy + Math.sin(tangent) * 0.8) },
                    { x: Math.round(mcx - Math.cos(tangent) * 0.8), y: Math.round(mcy - Math.sin(tangent) * 0.8) },
                ];
                mitoPixels[pts[0].x + ',' + pts[0].y] = m.cristaeColor;
                mitoPixels[pts[1].x + ',' + pts[1].y] = m.bodyColor;
                mitoPixels[pts[2].x + ',' + pts[2].y] = m.bodyColor;
            }

            // Post-abscission: single unified nucleus at cell center
            var envPixels = {};
            var nucPixels = {};
            var envPulse = Math.sin(t * 2 * Math.PI * 1.3) * 0.08;
            var envR = nucR * 1.0 + envPulse;
            if (cell.separated) {
                // Single nucleus at cell center
                var unifiedNucR = nucR + 0.6;
                for (var ea = 0; ea < 24; ea++) {
                    var eAngle = ea * 2 * Math.PI / 24;
                    var ex = Math.round(cell.cx + Math.cos(eAngle) * unifiedNucR);
                    var ey = Math.round(cell.cy + Math.sin(eAngle) * unifiedNucR);
                    if (ex >= 0 && ex < size && ey >= 0 && ey < size) {
                        envPixels[ex + ',' + ey] = cell.nucleusEdge;
                    }
                }
                // Single nucleolus at center
                nucPixels[cell.cx + ',' + cell.cy] = cell.nucleolusColor;
                nucPixels[(cell.cx + 1) + ',' + cell.cy] = cell.nucleusColor;
                nucPixels[(cell.cx - 1) + ',' + cell.cy] = cell.nucleusColor;
            } else if (cell.centrosomes && cell.centrosomes.length >= 2) {
                var pole0 = cell.centrosomes[0];
                var pole1 = cell.centrosomes[1];
                var reformR = envR + nucSwell;
                for (var ea = 0; ea < 20; ea++) {
                    var eAngle = ea * 2 * Math.PI / 20;
                    var ex0 = Math.round(pole0.x + Math.cos(eAngle) * reformR * 0.7);
                    var ey0 = Math.round(pole0.y + Math.sin(eAngle) * reformR * 0.7);
                    var ex1 = Math.round(pole1.x + Math.cos(eAngle) * reformR * 0.7);
                    var ey1 = Math.round(pole1.y + Math.sin(eAngle) * reformR * 0.7);
                    if (ex0 >= 0 && ex0 < size && ey0 >= 0 && ey0 < size) {
                        envPixels[ex0 + ',' + ey0] = cell.nucleusEdge;
                    }
                    if (ex1 >= 0 && ex1 < size && ey1 >= 0 && ey1 < size) {
                        envPixels[ex1 + ',' + ey1] = cell.nucleusEdge;
                    }
                }
                nucPixels[pole0.x + ',' + pole0.y] = cell.nucleolusColor;
                nucPixels[pole1.x + ',' + pole1.y] = cell.nucleolusColor;
                nucPixels[(pole0.x + 1) + ',' + pole0.y] = cell.nucleusColor;
                nucPixels[(pole1.x - 1) + ',' + pole1.y] = cell.nucleusColor;
            }

            // Post-abscission: diffuse chromatin orbits gently inside unified nucleus
            var chrPixels = {};
            if (cell.separated) {
                // All chromatin orbits the cell center as diffuse interphase chromatin
                var allChromatin = cell.chromatin.concat(cell.sisterChromatin || []);
                for (var chi = 0; chi < allChromatin.length; chi++) {
                    var diffuseR = 0.6 + Math.sin(tChromatin * 0.3 + chi * 1.2) * 0.3;
                    var diffAngle = chi * 2 * Math.PI / allChromatin.length + tChromatin * 0.05;
                    var driftX = Math.round(cell.cx + Math.cos(diffAngle) * diffuseR);
                    var driftY = Math.round(cell.cy + Math.sin(diffAngle) * diffuseR);
                    chrPixels[driftX + ',' + driftY] = '#c08050';
                }
            } else if (cell.centrosomes && cell.centrosomes.length >= 2) {
                var pole0 = cell.centrosomes[0];
                var pole1 = cell.centrosomes[1];
                for (var chi = 0; chi < cell.chromatin.length; chi++) {
                    var diffuseR = 0.4 + Math.sin(tChromatin * 0.5 + chi * 1.6) * 0.2;
                    var diffAngle = chi * 2 * Math.PI / cell.chromatin.length + tChromatin * 0.08;
                    var driftX = Math.round(pole0.x + Math.cos(diffAngle) * diffuseR);
                    var driftY = Math.round(pole0.y + Math.sin(diffAngle) * diffuseR);
                    chrPixels[driftX + ',' + driftY] = '#c08050';
                }
                if (cell.sisterChromatin) {
                    for (var rci = 0; rci < cell.sisterChromatin.length; rci++) {
                        var diffR2 = 0.4 + Math.sin(tChromatin * 0.5 + rci * 1.6 + 1.0) * 0.2;
                        var diffAngle2 = rci * 2 * Math.PI / cell.sisterChromatin.length + tChromatin * 0.08 + 0.5;
                        var sDriftX = Math.round(pole1.x + Math.cos(diffAngle2) * diffR2);
                        var sDriftY = Math.round(pole1.y + Math.sin(diffAngle2) * diffR2);
                        chrPixels[sDriftX + ',' + sDriftY] = '#c08050';
                    }
                }
            }

            // Post-abscission: centrosome quiescent near nucleus, no furrow
            var centPixels = {};
            var furrowPixels = {};
            if (cell.centrosomes) {
                if (cell.separated) {
                    // Single centrosome body near the nucleus (first centrosome only)
                    var cs = cell.centrosomes[0];
                    centPixels[cs.x + ',' + cs.y] = '#ddcc44';
                } else {
                    var tCent = (t * 8000 / 3000) % 1.0;
                    for (var csi = 0; csi < cell.centrosomes.length; csi++) {
                        var cs = cell.centrosomes[csi];
                        centPixels[cs.x + ',' + cs.y] = '#ddcc44';
                    }
                    if (cell.centrosomes.length >= 2) {
                        var c0 = cell.centrosomes[0];
                        var c1 = cell.centrosomes[1];
                        var midX = (c0.x + c1.x) / 2;
                        var midY = (c0.y + c1.y) / 2;
                        var fAxisX = c1.x - c0.x;
                        var fAxisY = c1.y - c0.y;
                        var fAxisLen = Math.sqrt(fAxisX * fAxisX + fAxisY * fAxisY);
                        if (fAxisLen > 0) {
                            var fPerpX = -fAxisY / fAxisLen;
                            var fPerpY = fAxisX / fAxisLen;
                            var furrowLen = cell.furrowProgress ? cell.furrowProgress * maxR : 0;
                            for (var fi = -3; fi <= 3; fi++) {
                                var fx = Math.round(midX + fPerpX * fi * furrowLen);
                                var fy = Math.round(midY + fPerpY * fi * furrowLen);
                                if (fx >= 0 && fx < size && fy >= 0 && fy < size) {
                                    var fIntensity = 1.0 - Math.abs(fi) / 3.0;
                                    furrowPixels[fx + ',' + fy] = fIntensity > 0.5 ? '#774422' : '#995533';
                                }
                            }
                        }
                    }
                }
            }

            // Cilia
            var cilPixels = {};
            for (var ci = 0; ci < cell.cilia.length; ci++) {
                var c = cell.cilia[ci];
                var waveOff = Math.sin(tCilia + c.phase) * 0.3;
                var ba = c.angle + waveOff;
                for (var cl = 1; cl <= c.length; cl++) {
                    var cr = maxR + cl;
                    var cx = Math.round(cell.cx + Math.cos(ba) * cr);
                    var cy = Math.round(cell.cy + Math.sin(ba) * cr);
                    if (cx >= 0 && cx < size && cy >= 0 && cy < size) {
                        cilPixels[cx + ',' + cy] = cl === 1 ? '#997755' : '#aa9977';
                    }
                }
            }

            // Receptor pixels on membrane — glow when activated by nearby signals
            var recPixels = {};
            for (var ri = 0; ri < cell.receptors.length; ri++) {
                var rec = cell.receptors[ri];
                var recR = maxR - 0.5;
                var rx = Math.round(cell.cx + Math.cos(rec.angle) * recR);
                var ry = Math.round(cell.cy + Math.sin(rec.angle) * recR);
                // Activated receptors pulse brighter (signal transduction)
                var activePulse = Math.sin(tGrowth * 2 * Math.PI + ri * 1.5);
                if (activePulse > 0.3) {
                    recPixels[rx + ',' + ry] = '#ffffff'; // receptor fires white when active
                    // Cascade pixel: signal travels one pixel inward toward cytoplasm
                    var cascX = Math.round(cell.cx + Math.cos(rec.angle) * (recR - 1.5));
                    var cascY = Math.round(cell.cy + Math.sin(rec.angle) * (recR - 1.5));
                    recPixels[cascX + ',' + cascY] = rec.color;
                } else {
                    recPixels[rx + ',' + ry] = rec.color;
                }
            }

            // ATP energy pulses radiating from mitochondria
            var atpPixels = {};
            var tATP = (t * 8000 / 5000) % 1.0;
            for (var mi = 0; mi < cell.mitochondria.length; mi++) {
                var m = cell.mitochondria[mi];
                var mAngle = m.baseAngle + m.speed * tOrbit;
                var mcx = cell.cx + Math.cos(mAngle) * m.radius;
                var mcy = cell.cy + Math.sin(mAngle) * m.radius;
                // Two ATP particles radiate outward from each mitochondrion
                for (var ai = 0; ai < 2; ai++) {
                    var atpPhase = (tATP + mi * 0.35 + ai * 0.5) % 1.0;
                    var atpAngle = mAngle + Math.PI + (ai - 0.5) * 1.2; // radiate inward toward cell center
                    var atpDist = atpPhase * 3.0;
                    var ax = Math.round(mcx + Math.cos(atpAngle) * atpDist);
                    var ay = Math.round(mcy + Math.sin(atpAngle) * atpDist);
                    // Only draw within cell bounds
                    var adx = ax - cell.cx;
                    var ady = ay - cell.cy;
                    if (Math.sqrt(adx * adx + ady * ady) < maxR - 1.0) {
                        atpPixels[ax + ',' + ay] = atpPhase < 0.5 ? '#ffff44' : '#dddd22';
                    }
                }
            }

            // Vesicles along ER
            var tVes = (t * 8000 / 6000) % 1.0;
            var vesPixels = {};
            for (var vi = 0; vi < cell.erPaths.length; vi++) {
                var path = cell.erPaths[vi];
                var progress = (tVes + vi * 0.25) % 1.0;
                var pos = progress < 0.5 ? progress * 2 : (1.0 - progress) * 2;
                var idx = Math.round(pos * (path.length - 1));
                var vc = vi % 2 === 0 ? '#ffdd66' : '#66ddff';
                vesPixels[path[idx].x + ',' + path[idx].y] = vc;
            }

            // Lysosomes orbiting in cytoplasm
            var lysoPixels = {};
            if (cell.lysosomes) {
                for (var li = 0; li < cell.lysosomes.length; li++) {
                    var lyso = cell.lysosomes[li];
                    var lysoAngle = lyso.baseAngle + lyso.speed * tOrbit;
                    var lx = Math.round(cell.cx + Math.cos(lysoAngle) * lyso.orbitR);
                    var ly = Math.round(cell.cy + Math.sin(lysoAngle) * lyso.orbitR);
                    lysoPixels[lx + ',' + ly] = lyso.color;
                }
            }

            // Ribosomes on rough ER: small dots that pulse with protein synthesis
            var riboPixels = {};
            if (cell.ribosomes && cell.erPaths) {
                var tRibo = (t * 8000 / 3000) % 1.0;
                for (var rbi = 0; rbi < cell.ribosomes.length; rbi++) {
                    var ribo = cell.ribosomes[rbi];
                    if (ribo.erIdx < cell.erPaths.length) {
                        var ePath = cell.erPaths[ribo.erIdx];
                        var rIdx = Math.round(ribo.pos * (ePath.length - 1));
                        if (rIdx >= 0 && rIdx < ePath.length) {
                            var rp = ePath[rIdx];
                            // Offset ribosome one pixel perpendicular to ER
                            var rpNext = rIdx < ePath.length - 1 ? ePath[rIdx + 1] : ePath[rIdx - 1];
                            var rdx = rpNext.x - rp.x;
                            var rdy = rpNext.y - rp.y;
                            // Perpendicular offset
                            var offX = rp.x + (rbi % 2 === 0 ? -rdy : rdy);
                            var offY = rp.y + (rbi % 2 === 0 ? rdx : -rdx);
                            offX = Math.round(offX);
                            offY = Math.round(offY);
                            // Pulse: ribosome brightens when synthesizing
                            var riboPulse = Math.sin(tRibo * 2 * Math.PI + rbi * 1.1);
                            var riboColor = riboPulse > 0.2 ? '#776644' : ribo.color;
                            if (offX >= 0 && offX < size && offY >= 0 && offY < size) {
                                riboPixels[offX + ',' + offY] = riboColor;
                            }
                        }
                    }
                }
            }

            // Filopodia: extending/retracting protrusions from the membrane
            var filoPixels = {};
            if (cell.filopodia) {
                var tFilo = (t * 8000 / 10000) % 1.0;
                for (var fpi = 0; fpi < cell.filopodia.length; fpi++) {
                    var fp = cell.filopodia[fpi];
                    // Extend and retract cyclically
                    var extendFrac = (Math.sin(tFilo * 2 * Math.PI + fp.phase) + 1) * 0.5; // 0 to 1
                    var curLength = fp.maxLength * (0.3 + extendFrac * 0.7);
                    for (var fl = 0; fl <= Math.ceil(curLength); fl++) {
                        var fr = maxR + fl * 0.9;
                        var fx = Math.round(cell.cx + Math.cos(fp.angle) * fr);
                        var fy = Math.round(cell.cy + Math.sin(fp.angle) * fr);
                        if (fx >= 0 && fx < size && fy >= 0 && fy < size) {
                            filoPixels[fx + ',' + fy] = fl >= Math.ceil(curLength) - 1 ? fp.tipColor : fp.stalkColor;
                        }
                    }
                }
            }

            return {
                maxR: maxR, nucR: nucR, elongation: elongation,
                mitoPixels: mitoPixels, envPixels: envPixels,
                nucPixels: nucPixels, chrPixels: chrPixels,
                cilPixels: cilPixels, recPixels: recPixels,
                vesPixels: vesPixels, atpPixels: atpPixels,
                centPixels: centPixels, furrowPixels: furrowPixels,
                lysoPixels: lysoPixels, filoPixels: filoPixels,
                riboPixels: riboPixels
            };
        }

        function draw() {
            ctx.clearRect(0, 0, size, size);

            var t = (Date.now() % 8000) / 8000;
            var tOrbit = (Date.now() % 12000) / 12000 * 2 * Math.PI;
            var tCilia = (Date.now() % 4000) / 4000 * 2 * Math.PI;
            var tChromatin = (Date.now() % 10000) / 10000 * 2 * Math.PI;
            var tNutrient = (Date.now() % 20000) / 20000 * 2 * Math.PI;
            var tGrowth = (Date.now() % 16000) / 16000; // slow growth cycle

            var dA = drawCell(cellA, t, tOrbit, tCilia, tChromatin, tGrowth);
            var dB = drawCell(cellB, t, tOrbit, tCilia, tChromatin, tGrowth + 0.5);

            // Nutrient positions — nutrients drift but are attracted toward nearby cells
            var nutrientPx = {};
            for (var ni = 0; ni < nutrients.length; ni++) {
                var n = nutrients[ni];
                var ndx = Math.sin(tNutrient + ni * 1.7) * 1;
                var ndy = Math.cos(tNutrient + ni * 2.3) * 1;
                // Chemotaxis: nutrients drift toward nearest cell
                var dToA = Math.sqrt((n.x - cellA.cx) * (n.x - cellA.cx) + (n.y - cellA.cy) * (n.y - cellA.cy));
                var dToB = Math.sqrt((n.x - cellB.cx) * (n.x - cellB.cx) + (n.y - cellB.cy) * (n.y - cellB.cy));
                var nearCell = dToA < dToB ? cellA : cellB;
                var dNear = Math.min(dToA, dToB);
                if (dNear < 12 && dNear > 2) {
                    var pullStr = 0.5 * (1 - dNear / 12);
                    ndx += (nearCell.cx - n.x) / dNear * pullStr;
                    ndy += (nearCell.cy - n.y) / dNear * pullStr;
                }
                var nx = Math.round(n.x + ndx);
                var ny = Math.round(n.y + ndy);
                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    nutrientPx[nx + ',' + ny] = n.color;
                }
            }

            // Abscission scar slowly fading in the medium
            var tScar = (Date.now() % 20000) / 20000;
            var scarVisible = tScar < 0.3; // fading remnant, visible 30% of the time
            var scarColor = abscissionScar.color;

            // ECM fiber positions — collagen-like strands between the two cells
            var ecmPx = {};
            var tECM = (Date.now() % 15000) / 15000; // slow assembly pulse
            for (var fi = 0; fi < ecmFibers.length; fi++) {
                var fiber = ecmFibers[fi];
                // Path from cell A toward cell B
                var ax = cellA.cx + (cellB.cx - cellA.cx) * fiber.startFrac;
                var ay = cellA.cy + (cellB.cy - cellA.cy) * fiber.startFrac;
                var bx = cellA.cx + (cellB.cx - cellA.cx) * fiber.endFrac;
                var by = cellA.cy + (cellB.cy - cellA.cy) * fiber.endFrac;
                // Midpoint with offset to create wavy fibers
                var mx = (ax + bx) / 2 + fiber.offsetX;
                var my = (ay + by) / 2 + fiber.offsetY;
                // Draw as two segments: start->mid, mid->end
                var segments = [
                    { x1: ax, y1: ay, x2: mx, y2: my },
                    { x1: mx, y1: my, x2: bx, y2: by },
                ];
                // Assembly pulse: fibers gently brighten and dim
                var pulse = Math.sin(tECM * 2 * Math.PI + fiber.pulsePhase);
                var visible = pulse > -0.3; // visible most of the time
                if (visible) {
                    for (var si2 = 0; si2 < segments.length; si2++) {
                        var seg = segments[si2];
                        var steps = Math.max(Math.abs(Math.round(seg.x2) - Math.round(seg.x1)), Math.abs(Math.round(seg.y2) - Math.round(seg.y1)));
                        if (steps === 0) steps = 1;
                        for (var step = 0; step <= steps; step++) {
                            var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                            var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                            if (px >= 0 && px < size && py >= 0 && py < size) {
                                ecmPx[px + ',' + py] = fiber.color;
                            }
                        }
                    }
                }
            }

            // Gap junction pixels: where filopodia tips from both cells meet
            var gapPx = {};
            var tGap = (Date.now() % 6000) / 6000;
            for (var gi = 0; gi < gapJunctions.length; gi++) {
                var gj = gapJunctions[gi];
                // Find the midpoint between the two cells along the filopodia angles
                var fpA = cellA.filopodia[gj.filoIdxA];
                var fpB = cellB.filopodia[gj.filoIdxB];
                // Junction forms at the midpoint between cell surfaces along their filopodia
                var jxA = cellA.cx + Math.cos(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jyA = cellA.cy + Math.sin(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jxB = cellB.cx + Math.cos(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jyB = cellB.cy + Math.sin(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jmx = Math.round((jxA + jxB) / 2);
                var jmy = Math.round((jyA + jyB) / 2);
                // Pulse: small molecules flowing through the junction
                var gapPulse = Math.sin(tGap * 2 * Math.PI + gj.pulsePhase);
                if (jmx >= 0 && jmx < size && jmy >= 0 && jmy < size) {
                    gapPx[jmx + ',' + jmy] = gapPulse > 0 ? '#eedd99' : gj.color;
                }
                // Ion flowing through: one pixel offset toward whichever cell the pulse favors
                var ionDir = gapPulse > 0 ? 1 : -1;
                var ionX = Math.round(jmx + ionDir * (jxB - jxA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                var ionY = Math.round(jmy + ionDir * (jyB - jyA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                if (ionX >= 0 && ionX < size && ionY >= 0 && ionY < size) {
                    gapPx[ionX + ',' + ionY] = gapPulse > 0 ? '#ffee55' : '#bbaa66';
                }
            }

            // Signal molecule positions
            var signalPx = {};
            var tSig = Date.now();
            for (var si = 0; si < signals.length; si++) {
                var sig = signals[si];
                var fromC = sig.fromCell === 'A' ? cellA : cellB;
                var toC = sig.toCell === 'A' ? cellA : cellB;
                // Progress along the path from source to target
                var progress = ((tSig * sig.speed) + sig.phase) % 1.0;
                // Interpolate position between cell edges
                var sx = fromC.cx + (toC.cx - fromC.cx) * progress;
                var sy = fromC.cy + (toC.cy - fromC.cy) * progress;
                var spx = Math.round(sx);
                var spy = Math.round(sy);
                // Only visible while in the extracellular space (between cells)
                var dFromA = Math.sqrt((spx - cellA.cx) * (spx - cellA.cx) + (spy - cellA.cy) * (spy - cellA.cy));
                var dFromB = Math.sqrt((spx - cellB.cx) * (spx - cellB.cx) + (spy - cellB.cy) * (spy - cellB.cy));
                if (dFromA > dA.maxR + 0.5 && dFromB > dB.maxR + 0.5) {
                    if (spx >= 0 && spx < size && spy >= 0 && spy < size) {
                        signalPx[spx + ',' + spy] = sig.color;
                    }
                }
            }

            // Render all pixels
            for (var y = 0; y < size; y++) {
                for (var x = 0; x < size; x++) {
                    var key = x + ',' + y;
                    var color = null;

                    // Check both cells
                    var cells = [
                        { cell: cellA, d: dA },
                        { cell: cellB, d: dB },
                    ];

                    var inAnyCell = false;
                    for (var ci = 0; ci < cells.length; ci++) {
                        var cc = cells[ci].cell;
                        var dd = cells[ci].d;
                        var dx = x - cc.cx;
                        var dy = y - cc.cy;
                        // Anaphase elongation: use elliptical distance along spindle axis
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var elong = dd.elongation || 0;
                        var effDist = dist;
                        if (elong > 0 && cc.centrosomes && cc.centrosomes.length >= 2) {
                            var eAxisX = cc.centrosomes[1].x - cc.centrosomes[0].x;
                            var eAxisY = cc.centrosomes[1].y - cc.centrosomes[0].y;
                            var eAxisLen = Math.sqrt(eAxisX * eAxisX + eAxisY * eAxisY);
                            if (eAxisLen > 0) {
                                var enx = eAxisX / eAxisLen;
                                var eny = eAxisY / eAxisLen;
                                var projAlong = dx * enx + dy * eny;
                                var projPerp = dx * (-eny) + dy * enx;
                                // Shrink along-axis component to make cell appear elongated
                                effDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp);
                            }
                        }

                        if (effDist <= dd.maxR) {
                            inAnyCell = true;
                            // Layer priority: furrow > centrosomes > vesicles > atp > envPixels > mito > nucleus features > receptors > golgi > ER > membrane > cytoplasm
                            if (dd.furrowPixels && dd.furrowPixels[key]) {
                                color = dd.furrowPixels[key];
                            } else if (dd.centPixels[key]) {
                                color = dd.centPixels[key];
                            } else if (dd.vesPixels[key]) {
                                color = dd.vesPixels[key];
                            } else if (dd.atpPixels[key]) {
                                color = dd.atpPixels[key];
                            } else if (dd.lysoPixels && dd.lysoPixels[key]) {
                                color = dd.lysoPixels[key];
                            } else if (dd.mitoPixels[key]) {
                                color = dd.mitoPixels[key];
                            } else if (dd.nucPixels[key]) {
                                color = dd.nucPixels[key];
                            } else if (dd.envPixels[key]) {
                                color = dd.envPixels[key];
                            } else if (dd.chrPixels[key]) {
                                color = dd.chrPixels[key];
                            } else if (dd.recPixels[key]) {
                                color = dd.recPixels[key];
                            } else if (cc.golgiPixels[key]) {
                                color = cc.golgiPixels[key];
                            } else if (effDist > dd.maxR - 1.2) {
                                var shell = dd.maxR - effDist;
                                var mi = Math.floor(shell * cc.membraneColors.length / 1.2);
                                if (mi >= cc.membraneColors.length) mi = cc.membraneColors.length - 1;
                                color = cc.membraneColors[mi];
                            } else if (dd.riboPixels && dd.riboPixels[key]) {
                                color = dd.riboPixels[key];
                            } else if (cc.erPixels[key]) {
                                color = cc.erColor;
                            } else {
                                // Check if inside nucleus region
                                var ndx2 = x - cc.cx;
                                var ndy2 = y - cc.cy;
                                var ndist = Math.sqrt(ndx2 * ndx2 + ndy2 * ndy2);
                                if (ndist <= dd.nucR + 0.3) {
                                    // Interphase nucleus interior
                                    color = '#7a3500';
                                } else {
                                    color = cc.cytoColor;
                                }
                            }
                            break;
                        }
                    }

                    if (!inAnyCell) {
                        // Extracellular space
                        var drawn = false;
                        // Check cilia for both cells
                        for (var ci = 0; ci < cells.length && !drawn; ci++) {
                            if (cells[ci].d.cilPixels[key]) {
                                color = cells[ci].d.cilPixels[key];
                                drawn = true;
                            }
                        }
                        // Check filopodia for both cells
                        for (var ci2 = 0; ci2 < cells.length && !drawn; ci2++) {
                            if (cells[ci2].d.filoPixels && cells[ci2].d.filoPixels[key]) {
                                color = cells[ci2].d.filoPixels[key];
                                drawn = true;
                            }
                        }
                        if (!drawn && gapPx[key]) {
                            color = gapPx[key];
                            drawn = true;
                        }
                        if (!drawn && signalPx[key]) {
                            color = signalPx[key];
                            drawn = true;
                        }
                        if (!drawn && ecmPx[key]) {
                            color = ecmPx[key];
                            drawn = true;
                        }
                        if (!drawn && scarVisible && x === abscissionScar.x && y === abscissionScar.y) {
                            color = scarColor;
                            drawn = true;
                        }
                        if (!drawn && nutrientPx[key]) {
                            color = nutrientPx[key];
                            drawn = true;
                        }
                        if (!drawn) {
                            color = mediumColor;
                        }
                    }

                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
