                    var spindleAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    var perpAngle = spindleAngle + Math.PI / 2;
                    var mbPulse = Math.sin(tSAC * 2 * Math.PI * 0.8);
                    if (cell.prophase.abscission) {
                        // ABSCISSION COMPLETE: bridge severed, only retraction bulbs remain at cut sites
                        // Each daughter's membrane seals — small bright dots where the cut happened
                        for (var rbI = -1; rbI <= 1; rbI += 2) {
                            var rbDist = 1.2; // retraction bulbs pulled back toward their respective daughters
                            var rbX = Math.round(sacMidX + Math.cos(spindleAngle) * rbI * rbDist);
                            var rbY = Math.round(sacMidY + Math.sin(spindleAngle) * rbI * rbDist);
                            if (rbX >= 0 && rbX < size && rbY >= 0 && rbY < size) {
                                // Membrane sealing glow at cut site
                                var sealPulse = Math.sin(tSAC * 2 * Math.PI * 1.5 + rbI * 2);
                                sacPixels[rbX + ',' + rbY] = sealPulse > 0 ? '#ddbb77' : '#ccaa66';
                            }
                        }
                    } else {
                        // Pre-abscission midbody with ESCRT-III spiral filaments
                        var mbCX = Math.round(sacMidX);
                        var mbCY = Math.round(sacMidY);
                        if (mbCX >= 0 && mbCX < size && mbCY >= 0 && mbCY < size) {
                            sacPixels[mbCX + ',' + mbCY] = mbPulse > 0 ? '#bbeeff' : '#aaddee';
                        }
                        for (var mbI = -1; mbI <= 1; mbI += 2) {
                            var mbArmX = Math.round(sacMidX + Math.cos(spindleAngle) * mbI * 0.7);
                            var mbArmY = Math.round(sacMidY + Math.sin(spindleAngle) * mbI * 0.7);
                            if (mbArmX >= 0 && mbArmX < size && mbArmY >= 0 && mbArmY < size) {
                                var escrtPulse = Math.sin(tSAC * 2 * Math.PI * 2.5 + mbI * 1.5);
                                sacPixels[mbArmX + ',' + mbArmY] = escrtPulse > 0.3 ? '#99ddee' : '#77aabb';
                            }
                        }
                        // ESCRT-III spiral: CEP55 recruits ALIX/TSG101, then CHMP4B polymerizes
                        // Helical filaments spiral inward to constrict the intercellular bridge
                        if (cell.prophase.escrtRecruiting) {
                            for (var esI = 0; esI < 5; esI++) {
                                var esAngle = tSAC * 2 * Math.PI * 1.2 + esI * 2 * Math.PI / 5;
                                var esR = 1.2 - esI * 0.15; // spiral inward
                                var esX = Math.round(sacMidX + Math.cos(esAngle) * esR * Math.cos(spindleAngle) - Math.sin(esAngle) * esR * Math.sin(spindleAngle) * 0.5);
                                var esY = Math.round(sacMidY + Math.cos(esAngle) * esR * Math.sin(spindleAngle) + Math.sin(esAngle) * esR * Math.cos(spindleAngle) * 0.5);
                                if (esX >= 0 && esX < size && esY >= 0 && esY < size) {
                                    var esPulse = Math.sin(tSAC * 2 * Math.PI * 3 + esI * 1.2);
                                    sacPixels[esX + ',' + esY] = esPulse > 0 ? '#cc88ff' : '#aa66dd';
                                }
                            }
                        }
                    }
                    // Cleavage furrow: fully closed after abscission, constricting before
                    var furrowDepth = cell.prophase.furrowInitiation || 0.2;
                    var furrowSpan = cell.prophase.abscission ? 2 : (furrowDepth > 0.3 ? 3 : 2);
                    for (var fI = -furrowSpan; fI <= furrowSpan; fI++) {
                        var fX = Math.round(sacMidX + Math.cos(perpAngle) * fI * 0.6);
                        var fY = Math.round(sacMidY + Math.sin(perpAngle) * fI * 0.6);
                        if (fX >= 0 && fX < size && fY >= 0 && fY < size) {
                            var fPulse = Math.sin(tSAC * 2 * Math.PI * 1.5 + fI * 0.6);
                            if (cell.prophase.abscission) {
                                // Post-abscission: furrow resolved into sealed membranes
                                if (Math.abs(fI) <= 1) {
                                    sacPixels[fX + ',' + fY] = fPulse > 0 ? '#663311' : '#552200';
                                }
                            } else {
                                var fColor = Math.abs(fI) <= 1
                                    ? (fPulse > 0 ? '#552200' : '#441100')
                                    : (fPulse > 0 ? '#774422' : '#663311');
                                sacPixels[fX + ',' + fY] = fColor;
                            }
                        }
                    }
                }
            }

            // Filopodia: extending/retracting protrusions from the membrane
            var filoPixels = {};
            if (cell.filopodia) {
                var tFilo = (t * 8000 / 10000) % 1.0;
                for (var fpi = 0; fpi < cell.filopodia.length; fpi++) {
                    var fp = cell.filopodia[fpi];
                    // Extend and retract cyclically
                    var extendFrac = (Math.sin(tFilo * 2 * Math.PI + fp.phase) + 1) * 0.5; // 0 to 1
                    var curLength = fp.maxLength * (0.3 + extendFrac * 0.7);
                    for (var fl = 0; fl <= Math.ceil(curLength); fl++) {
                        var fr = maxR + fl * 0.9;
                        var fx = Math.round(cell.cx + Math.cos(fp.angle) * fr);
                        var fy = Math.round(cell.cy + Math.sin(fp.angle) * fr);
                        if (fx >= 0 && fx < size && fy >= 0 && fy < size) {
                            filoPixels[fx + ',' + fy] = fl >= Math.ceil(curLength) - 1 ? fp.tipColor : fp.stalkColor;
                        }
                    }
                }
            }

            return {
                maxR: maxR, nucR: nucR, elongation: elongation, cytoConstriction: cytoConstriction,
                mitoPixels: mitoPixels, envPixels: envPixels,
                nucPixels: nucPixels, chrPixels: chrPixels, condensinPixels: condensinPixels,
                cilPixels: cilPixels, recPixels: recPixels,
                vesPixels: vesPixels, atpPixels: atpPixels,
                centPixels: centPixels, furrowPixels: furrowPixels,
                lysoPixels: lysoPixels, filoPixels: filoPixels,
                riboPixels: riboPixels, peroxPixels: peroxPixels,
                serPixels: serPixels, actinPixels: actinPixels,
                mtPixels: mtPixels, ifPixels: ifPixels,
                porePixels: porePixels, secVesPixels: secVesPixels,
                endoPixels: endoPixels, cyclinPixels: cyclinPixels,
                checkPixels: checkPixels,
                sacPixels: sacPixels,
                cycAPixels: cycAPixels,
                cdc25Pixels: cdc25Pixels,
                cycDPixels: cycDPixels,
                phosphPixels: phosphPixels,
                gfPixels: gfPixels,
                cohesinPixels: cohesinPixels,
                topoPixels: topoPixels,
                cycBPixels: cycBPixels,
                plk1Pixels: plk1Pixels,
                auroraAPixels: auroraAPixels
            };
        }

        // Precompute all granddaughter + extracellular feature pixels into a map
        function buildGDPixels(now) {
            var px = {};
            var tR = (now % 12000) / 12000, tN = (now % 9000) / 9000;
            var tO = (now % 11000) / 11000 * 2 * Math.PI;
            var tER = (now % 7000) / 7000, tGo = (now % 8000) / 8000;
            var tRF = (now % 5000) / 5000, tEn = (now % 9000) / 9000;
            var tMV = (now % 14000) / 14000 * 2 * Math.PI;
            var tAu = (now % 15000) / 15000 * 2 * Math.PI;
            var tPr = (now % 11000) / 11000 * 2 * Math.PI;
            var tLi = (now % 17000) / 17000 * 2 * Math.PI;
            var tCe = (now % 9000) / 9000, tCi = (now % 6000) / 6000 * 2 * Math.PI;
            var tLy = (now % 13000) / 13000 * 2 * Math.PI;
            var tPx = (now % 11000) / 11000 * 2 * Math.PI;
            function set(x, y, c) { if (inB(x, y) && !px[x+','+y]) px[x+','+y] = c; }
            function setR(x, y, c, cx, cy, mr) {
                if (inB(x,y) && !px[x+','+y]) {
                    var d = Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy));
                    if (d < mr - 0.3) px[x+','+y] = c;
                }
            }
            for (var i = 0; i < granddaughterNuclei.length; i++) {
                var g = granddaughterNuclei[i];
                var bb = Math.sin(tN * 2 * Math.PI * 0.7 + i * 1.1) * 0.15;
                var bR = g.bodyRadius + bb;
                var eR = 1.3 + g.nucleolusSize * 0.5;
                // Transcription aura (outermost)
                var auraR = bR + 0.5 + g.reactivation * 1.5;
                var aP = Math.sin(tR * 2 * Math.PI * 1.5 + i * 1.57);
                if (aP > 0) {
                    for (var aa = 0; aa < 16; aa++) {
                        var aAng = aa * Math.PI / 8;
                        var ax = Math.round(g.x + Math.cos(aAng) * auraR);
                        var ay = Math.round(g.y + Math.sin(aAng) * auraR);
                        set(ax, ay, aP > 0.5 ? '#ffdd88' : '#eebb66');
                    }
                }
                // Primary cilium
                var cilSway = Math.sin(tCi + g.ciliumPhase) * 0.12;
                var cilBA = g.ciliumAngle + cilSway;
                var cbx = g.x + Math.cos(g.centrosomeAngle) * g.centrosomeDist;
                var cby = g.y + Math.sin(g.centrosomeAngle) * g.centrosomeDist;
                for (var cl = 0; cl <= Math.ceil(g.ciliumLength * 2); cl++) {
                    var cR = cl * 0.5; if (cR > g.ciliumLength) break;
                    var cx = Math.round(cbx + Math.cos(cilBA) * cR);
                    var cy = Math.round(cby + Math.sin(cilBA) * cR);
                    var isTip = cR > g.ciliumLength - 0.6;
                    var cP = Math.sin(tCi * 1.5 + i * 2.0 + cR * 1.2);
                    set(cx, cy, isTip ? (cP > 0 ? '#eedd88' : '#ddcc66') : (cP > 0.3 ? '#bbaa77' : '#aa9966'));
                }
                // Cell body: membrane + cytoplasm fill + internal organelles
                for (var by2 = Math.floor(g.y - bR - 1); by2 <= Math.ceil(g.y + bR + 1); by2++) {
                    for (var bx2 = Math.floor(g.x - bR - 1); bx2 <= Math.ceil(g.x + bR + 1); bx2++) {
                        if (!inB(bx2, by2)) continue;
                        var dx = bx2 - g.x, dy = by2 - g.y;
                        var d = Math.sqrt(dx*dx + dy*dy);
                        if (d <= bR) {
                            var k = bx2 + ',' + by2;
                            if (px[k]) continue;
                            if (d > bR - 0.7) { px[k] = g.membraneColor; continue; }
                            // Nuclear envelope
                            if (Math.abs(d - eR) < 0.6) {
                                var ep = Math.sin(tN * 2 * Math.PI * 2 + i * 1.4 + Math.atan2(dy, dx) * 3);
                                px[k] = ep > 0 ? '#eebb55' : '#ddaa44'; continue;
                            }
                            // Nucleolus
                            if (d < g.nucleolusSize + 0.3) {
                                var np = Math.sin(tN * 2 * Math.PI * 1.8 + i * 2.3);
                                px[k] = np > 0.2 ? '#ff9933' : '#dd7722'; continue;
                            }
                            // Cytoplasm fill (will be overwritten by organelles below)
                            px[k] = g.cytoColor;
                        }
                    }
                }
                // Single-pixel organelles: compute position and set directly
                // Mitochondrion
                var mA = g.mitoAngle + g.mitoSpeed * tO, mR = bR * 0.65;
                setR(Math.round(g.x+Math.cos(mA)*mR), Math.round(g.y+Math.sin(mA)*mR), '#44aa66', g.x, g.y, bR);
                // Peroxisome
                var pA = g.peroxAngle + g.peroxSpeed * tPx;
                var pp = Math.sin(tPx * 1.5 + i * 2.0);
                setR(Math.round(g.x+Math.cos(pA)*g.peroxDist), Math.round(g.y+Math.sin(pA)*g.peroxDist), pp>0?'#77bb88':'#55aa77', g.x, g.y, bR);
                // Lysosome
                var lA = g.lysoAngle + g.lysoSpeed * tLy;
                var lp = Math.sin(tLy * 1.3 + i * 1.8);
                setR(Math.round(g.x+Math.cos(lA)*g.lysoDist), Math.round(g.y+Math.sin(lA)*g.lysoDist), lp>0?'#9966bb':'#8855aa', g.x, g.y, bR);
                // MVB
                var mvA = g.mvbAngle + g.mvbSpeed * tMV;
                var mp = Math.sin(tMV * 1.5 + i * 2.3);
                setR(Math.round(g.x+Math.cos(mvA)*g.mvbDist), Math.round(g.y+Math.sin(mvA)*g.mvbDist), mp>0?'#9955bb':'#7744aa', g.x, g.y, bR);
                // Centrosome + MT rays
                var ceX = Math.round(g.x+Math.cos(g.centrosomeAngle)*g.centrosomeDist);
                var ceY = Math.round(g.y+Math.sin(g.centrosomeAngle)*g.centrosomeDist);
                var cp = Math.sin(tCe * 2 * Math.PI * 1.5 + i * 2.2);
                set(ceX, ceY, cp > 0 ? '#eedd55' : '#ddcc44');
                for (var mt = 0; mt < 2; mt++) {
                    var mtA = g.centrosomeAngle + (mt === 0 ? 0.8 : -0.8);
                    setR(Math.round(ceX+Math.cos(mtA)), Math.round(ceY+Math.sin(mtA)), '#556677', g.x, g.y, bR);
                }
                // Golgi ministack
                var goP = Math.sin(tGo * 2 * Math.PI * 1.5 + i * 2.0);
                set(Math.round(g.x+Math.cos(g.golgiAngle)*g.golgiDist), Math.round(g.y+Math.sin(g.golgiAngle)*g.golgiDist), goP>0?'#ddaa55':'#cc9944');
                set(Math.round(g.x+Math.cos(g.golgiAngle+0.5)*(g.golgiDist+0.4)), Math.round(g.y+Math.sin(g.golgiAngle+0.5)*(g.golgiDist+0.4)), '#ccaa55');
                // Nuclear speckles
                for (var si = 0; si < g.speckles.length; si++) {
                    var sp = g.speckles[si], spP = Math.sin(tN * 2 * Math.PI * 1.4 + i * 2.1 + si * 3.0);
                    set(Math.round(g.x+Math.cos(sp.angle)*sp.dist), Math.round(g.y+Math.sin(sp.angle)*sp.dist), spP>0?'#99eebb':sp.color);
                }
                // Cajal body
                var cbP = Math.sin(tN * 2 * Math.PI * 2.5 + i * 1.9);
                set(g.x+Math.round(Math.cos(g.cajalAngle)*0.8), g.y+Math.round(Math.sin(g.cajalAngle)*0.8), cbP>0?'#cc88ff':'#aa66dd');
                // ER stubs
                for (var ei = 0; ei < g.erStubs.length; ei++) {
                    var es = g.erStubs[ei], esR0 = eR + 0.3;
                    for (var el = 0; el <= Math.ceil(es.length * 2); el++) {
                        var er = esR0 + el * 0.5; if (er > esR0 + es.length) break;
                        var ep = Math.sin(tER * 2 * Math.PI + ei * 2.5 + el * 0.8);
                        set(Math.round(g.x+Math.cos(es.angle)*er), Math.round(g.y+Math.sin(es.angle)*er), ep>0?'#996644':'#884422');
                    }
                }
                // Free ribosomes
                for (var fi = 0; fi < g.freeRibosomes.length; fi++) {
                    var fr = g.freeRibosomes[fi], fp = Math.sin(tRF * 2 * Math.PI * 1.8 + fr.phase);
                    set(Math.round(g.x+Math.cos(fr.angle)*fr.dist), Math.round(g.y+Math.sin(fr.angle)*fr.dist), fp>0.2?'#776644':'#553322');
                }
                // Endosomes
                for (var edi = 0; edi < g.endosomes.length; edi++) {
                    var en = g.endosomes[edi];
                    var eP = (tEn * en.speed + en.phase) % 1.0;
                    var eOR = bR - 0.3, eIR = g.lysoDist * 0.8;
                    var edR = eOR - eP * (eOR - eIR);
                    var edA = en.memAngle + eP * 0.3;
                    var edC = eP < 0.2 ? '#7733aa' : en.color;
                    set(Math.round(g.x+Math.cos(edA)*edR), Math.round(g.y+Math.sin(edA)*edR), edC);
                    if (eP < 0.12) set(Math.round(g.x+Math.cos(en.memAngle)*bR), Math.round(g.y+Math.sin(en.memAngle)*bR), '#cc88ee');
                }
                // Array orbiters: autophagosomes, proteasomes, lipid droplets
                var orbArrays = [
                    [g.autophagosomes, tAu, 1.4, function(o,p,fi2) {
                        var lyCA = g.lysoAngle + g.lysoSpeed * tLy;
                        var lx = g.x+Math.cos(lyCA)*g.lysoDist, ly = g.y+Math.sin(lyCA)*g.lysoDist;
                        var ox = g.x+Math.cos(o.angle+o.speed*tAu)*o.dist, oy = g.y+Math.sin(o.angle+o.speed*tAu)*o.dist;
                        return Math.sqrt((ox-lx)*(ox-lx)+(oy-ly)*(oy-ly)) < 1.5 ? '#ddbb44' : (p>0?o.matureColor:o.color);
                    }],
                    [g.proteasomes, tPr, 1.8, function(o,p) { return p>0.3?o.activeColor:o.color; }],
                    [g.lipidDroplets, tLi, 1.6, function(o,p) { return p>0.2?o.coreColor:o.shellColor; }],
                ];
                for (var oi = 0; oi < orbArrays.length; oi++) {
                    var arr = orbArrays[oi][0], tV = orbArrays[oi][1], pM = orbArrays[oi][2], cFn = orbArrays[oi][3];
                    if (!arr) continue;
                    for (var oj = 0; oj < arr.length; oj++) {
                        var o = arr[oj], oA = o.angle + o.speed * tV;
                        var ox = Math.round(g.x+Math.cos(oA)*o.dist), oy = Math.round(g.y+Math.sin(oA)*o.dist);
                        var oP = Math.sin(tV * pM + i * 2.1 + oj * 3.0);
                        setR(ox, oy, cFn(o, oP, oj), g.x, g.y, bR);
                    }
                }
                // Exosomes: drift outward from cell body
                var tExo = (now % 16000) / 16000;
                if (g.exosomes) {
                    for (var exi = 0; exi < g.exosomes.length; exi++) {
                        var exo = g.exosomes[exi];
                        var exP = (tExo * exo.speed + exo.phase) % 1.0;
                        var exDR = g.bodyRadius + 0.5 + exP * 3.5;
                        var exA = exo.releaseAngle + exP * (exo.driftAngle - exo.releaseAngle) * 0.3;
                        var exPulse = Math.sin(tExo * 2 * Math.PI * 4 + exi * 2.1 + i * 1.7);
                        set(Math.round(g.x+Math.cos(exA)*exDR), Math.round(g.y+Math.sin(exA)*exDR), exPulse>0?'#ddaaee':exo.color);
                    }
                }
                // Apical microvilli: actin-cored projections on the free surface
                // Sway gently with a slow sinusoidal oscillation
                var tMV2 = (now % 8000) / 8000 * 2 * Math.PI;
                if (g.microvilli) {
                    for (var mvi2 = 0; mvi2 < g.microvilli.length; mvi2++) {
                        var mv = g.microvilli[mvi2];
                        var mvSway = Math.sin(tMV2 + mv.phase) * 0.08;
                        var mvBaseA = mv.angle + mvSway;
                        var mvBaseX = g.x + Math.cos(mvBaseA) * bR;
                        var mvBaseY = g.y + Math.sin(mvBaseA) * bR;
                        for (var ml = 0; ml <= Math.ceil(mv.length * 2); ml++) {
                            var mr = ml * 0.5; if (mr > mv.length) break;
                            var mx = Math.round(mvBaseX + Math.cos(mvBaseA) * mr);
                            var my = Math.round(mvBaseY + Math.sin(mvBaseA) * mr);
                            var isTip2 = mr > mv.length - 0.5;
                            var mPulse = Math.sin(tMV2 * 1.3 + i * 1.7 + mvi2 * 2.0 + mr * 1.5);
                            set(mx, my, isTip2 ? (mPulse > 0 ? '#ddbb88' : '#ccaa77') : (mPulse > 0.3 ? '#bb9966' : '#aa8855'));
                        }
                    }
                }
                // Glycocalyx: fuzzy sugar coat extending beyond microvilli tips
                // Oligosaccharide chains sway with a slower, more fluid motion than microvilli
                var tGC = (now % 11000) / 11000 * 2 * Math.PI;
                if (g.glycocalyx) {
                    for (var gci2 = 0; gci2 < g.glycocalyx.length; gci2++) {
                        var gc = g.glycocalyx[gci2];
                        var gcSway = Math.sin(tGC * 0.8 + gc.phase) * 0.15;
                        var gcBaseA = gc.angle + gcSway;
                        // Glycocalyx starts beyond microvilli tips
                        var gcStartR = bR + 1.8 + g.nucleolusSize * 0.6;
                        var gcBaseX = g.x + Math.cos(gcBaseA) * gcStartR;
                        var gcBaseY = g.y + Math.sin(gcBaseA) * gcStartR;
                        for (var gl = 0; gl <= Math.ceil(gc.length * 2); gl++) {
                            var gr = gl * 0.5; if (gr > gc.length) break;
                            var gx = Math.round(gcBaseX + Math.cos(gcBaseA) * gr);
                            var gy = Math.round(gcBaseY + Math.sin(gcBaseA) * gr);
                            var isGcTip = gr > gc.length - 0.5;
                            var gcPulse = Math.sin(tGC * 1.2 + i * 1.3 + gci2 * 1.7 + gr * 1.0);
                            set(gx, gy, isGcTip ? (gcPulse > 0 ? gc.tipColor : gc.color) : (gcPulse > 0.2 ? gc.color : '#bbbb77'));
                        }
                    }
                }
            }
            // Tunneling nanotubes
            var tTNT = (now % 10000) / 10000;
            for (var ti = 0; ti < tunnelingNanotubes.length; ti++) {
                var tnt = tunnelingNanotubes[ti];
                var gF = granddaughterNuclei[tnt.from], gT = granddaughterNuclei[tnt.to];
                var tdx = gT.x - gF.x, tdy = gT.y - gF.y;
                var tLen = Math.sqrt(tdx*tdx + tdy*tdy), tSt = Math.ceil(tLen);
                var cargo = ((tTNT + tnt.phase) % 1.0);
                cargo = cargo < 0.5 ? cargo * 2 : (1.0 - cargo) * 2;
                for (var ts = 0; ts <= tSt; ts++) {
                    var tf = ts / tSt;
                    var tx = Math.round(gF.x + tdx * tf), ty = Math.round(gF.y + tdy * tf);
                    var dF = Math.sqrt((tx-gF.x)*(tx-gF.x)+(ty-gF.y)*(ty-gF.y));
                    var dT = Math.sqrt((tx-gT.x)*(tx-gT.x)+(ty-gT.y)*(ty-gT.y));
                    if (dF >= gF.bodyRadius && dT >= gT.bodyRadius) {
                        set(tx, ty, Math.abs(tf - cargo) < 0.12 ? tnt.cargoColor : tnt.tubeColor);
                    }
                }
            }
            // Granddaughter tight junctions: claudin/occludin seal between adjacent cells
            var tGDTJ = (now % 9000) / 9000;
            for (var gtji = 0; gtji < gdTightJunctions.length; gtji++) {
                var gtj = gdTightJunctions[gtji];
                var gjF = granddaughterNuclei[gtj.from], gjT = granddaughterNuclei[gtj.to];
                var gtdx = gjT.x - gjF.x, gtdy = gjT.y - gjF.y;
                var gtLen = Math.sqrt(gtdx*gtdx + gtdy*gtdy);
                if (gtLen < 0.1) continue;
                // Draw seal strand in the narrow gap between cell body edges
                var gtSteps = Math.ceil(gtLen);
                for (var gts = 0; gts <= gtSteps; gts++) {
                    var gtf = gts / gtSteps;
                    var gtx = Math.round(gjF.x + gtdx * gtf);
                    var gty = Math.round(gjF.y + gtdy * gtf);
                    var gdF = Math.sqrt((gtx-gjF.x)*(gtx-gjF.x)+(gty-gjF.y)*(gty-gjF.y));
                    var gdT = Math.sqrt((gtx-gjT.x)*(gtx-gjT.x)+(gty-gjT.y)*(gty-gjT.y));
                    // Only draw in the seal zone between cell bodies
                    if (gdF >= gjF.bodyRadius - 0.3 && gdT >= gjT.bodyRadius - 0.3) {
                        var gtPulse = Math.sin(tGDTJ * 2 * Math.PI * 1.5 + gtj.phase + gts * 0.7);
                        set(gtx, gty, gtPulse > 0 ? gtj.color : gtj.dimColor);
                    }
                }
            }
            // Calcium waves
            var tCa = (now % 14000) / 14000;
            for (var ci = 0; ci < calciumWaves.length; ci++) {
                var cw = calciumWaves[ci], caP = (tCa + cw.phase) % 1.0;
                var cx2 = Math.round(cw.from.x + (cw.to.x - cw.from.x) * caP);
                var cy2 = Math.round(cw.from.y + (cw.to.y - cw.from.y) * caP);
                var cPulse = Math.sin(tCa * 2 * Math.PI * 3 + ci * 1.5);
                set(cx2, cy2, cPulse > 0 ? cw.color : cw.dimColor);
            }
            // Basal lamina with interpolation
            var tBL = (now % 12000) / 12000;
            for (var bi = 0; bi < basalLamina.length; bi++) {
                var bA = basalLamina[bi];
                var bP = Math.sin(tBL * 2 * Math.PI * 1.5 + bA.phase);
                set(bA.x, bA.y, bP > 0.2 ? '#c4a070' : '#b09060');
                if (bi < basalLamina.length - 1) {
                    var bB = basalLamina[bi + 1];
                    var bdx = bB.x - bA.x, bdy = bB.y - bA.y;
                    var bSt = Math.max(Math.abs(bdx), Math.abs(bdy));
                    for (var bs = 1; bs < bSt; bs++) {
                        var bSh = Math.sin(tBL * 2 * Math.PI * 2 + bA.phase + bs * 0.6);
                        set(Math.round(bA.x+bdx*bs/bSt), Math.round(bA.y+bdy*bs/bSt), bSh>0.3?'#d4b080':'#b89868');
                    }
                }
            }
            // Hemidesmosomes: integrin α6β4 anchors connecting nearest granddaughter to basal lamina
            // Thin filament bridges from cell membrane to ECM — completes tissue-substrate adhesion
            var tHD = (now % 10000) / 10000;
            for (var hi = 0; hi < granddaughterNuclei.length; hi++) {
                var hg = granddaughterNuclei[hi];
                // Find nearest basal lamina point
                var minD = 999, nearBL = null;
                for (var hbi = 0; hbi < basalLamina.length; hbi++) {
                    var hd = Math.sqrt((hg.x-basalLamina[hbi].x)*(hg.x-basalLamina[hbi].x)+(hg.y-basalLamina[hbi].y)*(hg.y-basalLamina[hbi].y));
                    if (hd < minD) { minD = hd; nearBL = basalLamina[hbi]; }
                }
                if (nearBL && minD < 12) {
                    // Draw integrin filament from cell body edge toward lamina
                    var hAngle = Math.atan2(nearBL.y - hg.y, nearBL.x - hg.x);
                    var hStartR = hg.bodyRadius + 0.3;
                    var hLen = Math.min(minD - hg.bodyRadius - 1, 3);
                    if (hLen > 0) {
                        for (var hl = 0; hl <= Math.ceil(hLen); hl++) {
                            var hr = hStartR + hl;
                            var hx = Math.round(hg.x + Math.cos(hAngle) * hr);
                            var hy = Math.round(hg.y + Math.sin(hAngle) * hr);
                            var hP = Math.sin(tHD * 2 * Math.PI * 1.8 + hi * 1.5 + hl * 0.9);
                            set(hx, hy, hP > 0.2 ? '#c4a882' : '#a89070');
                        }
                        // Integrin plaque: bright dot at cell membrane attachment site
                        var ipx = Math.round(hg.x + Math.cos(hAngle) * hStartR);
                        var ipy = Math.round(hg.y + Math.sin(hAngle) * hStartR);
                        var ipP = Math.sin(tHD * 2 * Math.PI * 2.5 + hi * 2.0);
                        set(ipx, ipy, ipP > 0 ? '#eebb66' : '#ccaa55');
                    }
                }
            }
            return px;
        }

        function draw() {
            ctx.clearRect(0, 0, size, size);

            var t = (Date.now() % 8000) / 8000;
            var tOrbit = (Date.now() % 12000) / 12000 * 2 * Math.PI;
            var tCilia = (Date.now() % 4000) / 4000 * 2 * Math.PI;
            var tChromatin = (Date.now() % 10000) / 10000 * 2 * Math.PI;
            var tNutrient = (Date.now() % 20000) / 20000 * 2 * Math.PI;
            var tGrowth = (Date.now() % 16000) / 16000; // slow growth cycle

            var dA = drawCell(cellA, t, tOrbit, tCilia, tChromatin, tGrowth);
            var dB = drawCell(cellB, t, tOrbit, tCilia, tChromatin, tGrowth + 0.5);

            // Precomputed granddaughter + extracellular feature pixels
            var gdPx = buildGDPixels(Date.now());

            // Nutrient positions — nutrients drift but are attracted toward nearby cells
            var nutrientPx = {};
            for (var ni = 0; ni < nutrients.length; ni++) {
                var n = nutrients[ni];
                var ndx = Math.sin(tNutrient + ni * 1.7) * 1;
                var ndy = Math.cos(tNutrient + ni * 2.3) * 1;
                // Chemotaxis: nutrients drift toward nearest cell
                var dToA = Math.sqrt((n.x - cellA.cx) * (n.x - cellA.cx) + (n.y - cellA.cy) * (n.y - cellA.cy));
                var dToB = Math.sqrt((n.x - cellB.cx) * (n.x - cellB.cx) + (n.y - cellB.cy) * (n.y - cellB.cy));
                var nearCell = dToA < dToB ? cellA : cellB;
                var dNear = Math.min(dToA, dToB);
                if (dNear < 12 && dNear > 2) {
                    var pullStr = 0.5 * (1 - dNear / 12);
                    ndx += (nearCell.cx - n.x) / dNear * pullStr;
                    ndy += (nearCell.cy - n.y) / dNear * pullStr;
                }
                var nx = Math.round(n.x + ndx);
                var ny = Math.round(n.y + ndy);
                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    nutrientPx[nx + ',' + ny] = n.color;
                }
            }

            // Kum-song (금성 — golden star): luminous beacon orbiting between cells
            var kumSongPx = {};
            var tKS = (Date.now() % 25000) / 25000;
            var ksAngle = tKS * 2 * Math.PI * kumSong.speed * 25; // slow orbit
            var ksCoreX = Math.round(kumSong.cx + Math.cos(ksAngle) * kumSong.orbitR);
            var ksCoreY = Math.round(kumSong.cy + Math.sin(ksAngle) * kumSong.orbitR);
            if (ksCoreX >= 0 && ksCoreX < size && ksCoreY >= 0 && ksCoreY < size) {
                // Bright golden core
                kumSongPx[ksCoreX + ',' + ksCoreY] = kumSong.coreColor;
                // Four-point halo: cardinal directions shimmer
                var ksHaloPulse = Math.sin(tKS * 2 * Math.PI * 8);
                var ksHaloColor = ksHaloPulse > 0 ? kumSong.haloColor : kumSong.dimColor;
                var ksCardinals = [[1,0],[-1,0],[0,1],[0,-1]];
                for (var kci = 0; kci < 4; kci++) {
                    var khx = ksCoreX + ksCardinals[kci][0];
                    var khy = ksCoreY + ksCardinals[kci][1];
                    if (khx >= 0 && khx < size && khy >= 0 && khy < size) {
                        // Only draw halo pixels that are outside both cells
                        var khDistA = Math.sqrt((khx - cellA.cx) * (khx - cellA.cx) + (khy - cellA.cy) * (khy - cellA.cy));
                        var khDistB = Math.sqrt((khx - cellB.cx) * (khx - cellB.cx) + (khy - cellB.cy) * (khy - cellB.cy));
                        if (khDistA > dA.maxR + 1 && khDistB > dB.maxR + 1) {
                            kumSongPx[khx + ',' + khy] = ksHaloColor;
                        }
                    }
                }
            }

            // Abscission scar slowly fading in the medium
            var tScar = (Date.now() % 20000) / 20000;
            var scarVisible = tScar < 0.3; // fading remnant, visible 30% of the time
            var scarColor = abscissionScar.color;

            // ECM fiber positions — collagen-like strands between the two cells
            var ecmPx = {};
            var tECM = (Date.now() % 15000) / 15000; // slow assembly pulse
            for (var fi = 0; fi < ecmFibers.length; fi++) {
                var fiber = ecmFibers[fi];
                // Path from cell A toward cell B
                var ax = cellA.cx + (cellB.cx - cellA.cx) * fiber.startFrac;
                var ay = cellA.cy + (cellB.cy - cellA.cy) * fiber.startFrac;
                var bx = cellA.cx + (cellB.cx - cellA.cx) * fiber.endFrac;
                var by = cellA.cy + (cellB.cy - cellA.cy) * fiber.endFrac;
                // Midpoint with offset to create wavy fibers
                var mx = (ax + bx) / 2 + fiber.offsetX;
                var my = (ay + by) / 2 + fiber.offsetY;
                // Draw as two segments: start->mid, mid->end
                var segments = [
                    { x1: ax, y1: ay, x2: mx, y2: my },
                    { x1: mx, y1: my, x2: bx, y2: by },
                ];
                // Assembly pulse: fibers gently brighten and dim
                var pulse = Math.sin(tECM * 2 * Math.PI + fiber.pulsePhase);
                var visible = pulse > -0.3; // visible most of the time
                if (visible) {
                    for (var si2 = 0; si2 < segments.length; si2++) {
                        var seg = segments[si2];
                        var steps = Math.max(Math.abs(Math.round(seg.x2) - Math.round(seg.x1)), Math.abs(Math.round(seg.y2) - Math.round(seg.y1)));
                        if (steps === 0) steps = 1;
                        for (var step = 0; step <= steps; step++) {
                            var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                            var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                            if (px >= 0 && px < size && py >= 0 && py < size) {
                                ecmPx[px + ',' + py] = fiber.color;
                            }
                        }
                    }
                }
            }

            // Gap junction pixels: where filopodia tips from both cells meet
            var gapPx = {};
            var tGap = (Date.now() % 6000) / 6000;
            for (var gi = 0; gi < gapJunctions.length; gi++) {
                var gj = gapJunctions[gi];
                // Find the midpoint between the two cells along the filopodia angles
                var fpA = cellA.filopodia[gj.filoIdxA];
                var fpB = cellB.filopodia[gj.filoIdxB];
                // Junction forms at the midpoint between cell surfaces along their filopodia
                var jxA = cellA.cx + Math.cos(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jyA = cellA.cy + Math.sin(fpA.angle) * (dA.maxR + fpA.maxLength * 0.8);
                var jxB = cellB.cx + Math.cos(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jyB = cellB.cy + Math.sin(fpB.angle) * (dB.maxR + fpB.maxLength * 0.8);
                var jmx = Math.round((jxA + jxB) / 2);
                var jmy = Math.round((jyA + jyB) / 2);
                // Pulse: small molecules flowing through the junction
                var gapPulse = Math.sin(tGap * 2 * Math.PI + gj.pulsePhase);
                if (jmx >= 0 && jmx < size && jmy >= 0 && jmy < size) {
                    gapPx[jmx + ',' + jmy] = gapPulse > 0 ? '#eedd99' : gj.color;
                }
                // Ion flowing through: one pixel offset toward whichever cell the pulse favors
                var ionDir = gapPulse > 0 ? 1 : -1;
                var ionX = Math.round(jmx + ionDir * (jxB - jxA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                var ionY = Math.round(jmy + ionDir * (jyB - jyA) / (Math.abs(jxB - jxA) + Math.abs(jyB - jyA) + 0.1));
                if (ionX >= 0 && ionX < size && ionY >= 0 && ionY < size) {
                    gapPx[ionX + ',' + ionY] = gapPulse > 0 ? '#ffee55' : '#bbaa66';
                }
            }

            // Desmosome pixels: mechanical anchoring spots on cell membranes
            var desmoPx = {};
            for (var di = 0; di < desmosomes.length; di++) {
                var desmo = desmosomes[di];
                // Plaque on cell A membrane
                var daxR = dA.maxR - 0.3;
                var dax = Math.round(cellA.cx + Math.cos(desmo.angleA) * daxR);
                var day = Math.round(cellA.cy + Math.sin(desmo.angleA) * daxR);
                // Plaque on cell B membrane
                var dbxR = dB.maxR - 0.3;
                var dbx = Math.round(cellB.cx + Math.cos(desmo.angleB) * dbxR);
                var dby = Math.round(cellB.cy + Math.sin(desmo.angleB) * dbxR);
                if (dax >= 0 && dax < size && day >= 0 && day < size) {
                    desmoPx[dax + ',' + day] = desmo.color;
                }
                if (dbx >= 0 && dbx < size && dby >= 0 && dby < size) {
                    desmoPx[dbx + ',' + dby] = desmo.color;
                }
                // Intermediate filament anchor: one pixel inward from each plaque
                var iaX = Math.round(cellA.cx + Math.cos(desmo.angleA) * (daxR - 1.2));
                var iaY = Math.round(cellA.cy + Math.sin(desmo.angleA) * (daxR - 1.2));
                var ibX = Math.round(cellB.cx + Math.cos(desmo.angleB) * (dbxR - 1.2));
                var ibY = Math.round(cellB.cy + Math.sin(desmo.angleB) * (dbxR - 1.2));
                if (iaX >= 0 && iaX < size && iaY >= 0 && iaY < size) {
                    desmoPx[iaX + ',' + iaY] = desmo.anchorColor;
                }
                if (ibX >= 0 && ibX < size && ibY >= 0 && ibY < size) {
                    desmoPx[ibX + ',' + ibY] = desmo.anchorColor;
                }
            }

            // Tight junction pixels: continuous seal band between cells
            var tjPx = {};
            var tTJ = (Date.now() % 8000) / 8000;
            for (var tji = 0; tji < tightJunctions.length; tji++) {
                var tj = tightJunctions[tji];
                // Points on each cell's membrane facing the other
                var tjAx = cellA.cx + Math.cos(tj.angleA) * dA.maxR;
                var tjAy = cellA.cy + Math.sin(tj.angleA) * dA.maxR;
                var tjBx = cellB.cx + Math.cos(tj.angleB) * dB.maxR;
                var tjBy = cellB.cy + Math.sin(tj.angleB) * dB.maxR;
                // Draw a short strand connecting the two membrane points
                var tjSteps = Math.max(Math.abs(Math.round(tjBx) - Math.round(tjAx)), Math.abs(Math.round(tjBy) - Math.round(tjAy)));
                if (tjSteps === 0) tjSteps = 1;
                // Only draw the middle portion (the seal zone between membranes)
                for (var tjs = Math.floor(tjSteps * 0.3); tjs <= Math.ceil(tjSteps * 0.7); tjs++) {
                    var tjx = Math.round(tjAx + (tjBx - tjAx) * tjs / tjSteps);
                    var tjy = Math.round(tjAy + (tjBy - tjAy) * tjs / tjSteps);
                    if (tjx >= 0 && tjx < size && tjy >= 0 && tjy < size) {
                        // Claudin proteins pulse along the seal
                        var tjPulse = Math.sin(tTJ * 2 * Math.PI + tj.phase + tjs * 0.5);
                        tjPx[tjx + ',' + tjy] = tjPulse > 0 ? '#ddccaa' : '#ccbb99';
                    }
                }
            }

            // Adherens junction pixels: E-cadherin adhesion belt between cells
            var ajPx = {};
            var tAJ = (Date.now() % 7000) / 7000;
            for (var aji = 0; aji < adherensJunctions.length; aji++) {
                var aj = adherensJunctions[aji];
                // Cadherin dimers extend from each cell's membrane into the intercellular space
                var ajAxR = dA.maxR + 0.5;
                var ajAx = cellA.cx + Math.cos(aj.angleA) * ajAxR;
                var ajAy = cellA.cy + Math.sin(aj.angleA) * ajAxR;
                var ajBxR = dB.maxR + 0.5;
                var ajBx = cellB.cx + Math.cos(aj.angleB) * ajBxR;
                var ajBy = cellB.cy + Math.sin(aj.angleB) * ajBxR;
                // Draw cadherin bridge between the two cells
                var ajMx = (ajAx + ajBx) / 2;
                var ajMy = (ajAy + ajBy) / 2;
                // Three points: near A, midpoint, near B
                var ajPts = [
                    { x: Math.round(ajAx), y: Math.round(ajAy) },
                    { x: Math.round(ajMx), y: Math.round(ajMy) },
                    { x: Math.round(ajBx), y: Math.round(ajBy) },
                ];
                // Calcium-dependent adhesion pulse
                var ajPulse = Math.sin(tAJ * 2 * Math.PI + aj.phase);
                for (var ajp = 0; ajp < ajPts.length; ajp++) {
                    var pt = ajPts[ajp];
                    if (pt.x >= 0 && pt.x < size && pt.y >= 0 && pt.y < size) {
                        ajPx[pt.x + ',' + pt.y] = ajPulse > 0.2 ? '#ee8866' : '#cc7755';
                    }
                }
            }

            // Signal molecule positions
            var signalPx = {};
            var tSig = Date.now();
            for (var si = 0; si < signals.length; si++) {
                var sig = signals[si];
                var fromC = sig.fromCell === 'A' ? cellA : cellB;
                var toC = sig.toCell === 'A' ? cellA : cellB;
                // Progress along the path from source to target
                var progress = ((tSig * sig.speed) + sig.phase) % 1.0;
                // Interpolate position between cell edges
                var sx = fromC.cx + (toC.cx - fromC.cx) * progress;
                var sy = fromC.cy + (toC.cy - fromC.cy) * progress;
                var spx = Math.round(sx);
                var spy = Math.round(sy);
                // Only visible while in the extracellular space (between cells)
                var dFromA = Math.sqrt((spx - cellA.cx) * (spx - cellA.cx) + (spy - cellA.cy) * (spy - cellA.cy));
                var dFromB = Math.sqrt((spx - cellB.cx) * (spx - cellB.cx) + (spy - cellB.cy) * (spy - cellB.cy));
                if (dFromA > dA.maxR + 0.5 && dFromB > dB.maxR + 0.5) {
                    if (spx >= 0 && spx < size && spy >= 0 && spy < size) {
                        signalPx[spx + ',' + spy] = sig.color;
                    }
                }
            }

            // Render all pixels
            for (var y = 0; y < size; y++) {
                for (var x = 0; x < size; x++) {
                    var key = x + ',' + y;
                    var color = null;

                    // Check both cells
                    var cells = [
                        { cell: cellA, d: dA },
                        { cell: cellB, d: dB },
                    ];

                    var inAnyCell = false;
                    for (var ci = 0; ci < cells.length; ci++) {
                        var cc = cells[ci].cell;
                        var dd = cells[ci].d;
                        var dx = x - cc.cx;
                        var dy = y - cc.cy;
                        // Anaphase elongation: use elliptical distance along spindle axis
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var elong = dd.elongation || 0;
                        var constrict = dd.cytoConstriction || 0;
                        var effDist = dist;
                        if (elong > 0 && cc.centrosomes && cc.centrosomes.length >= 2) {
                            var eAxisX = cc.centrosomes[1].x - cc.centrosomes[0].x;
                            var eAxisY = cc.centrosomes[1].y - cc.centrosomes[0].y;
                            var eAxisLen = Math.sqrt(eAxisX * eAxisX + eAxisY * eAxisY);
                            if (eAxisLen > 0) {
                                var enx = eAxisX / eAxisLen;
                                var eny = eAxisY / eAxisLen;
                                var projAlong = dx * enx + dy * eny;
                                var projPerp = dx * (-eny) + dy * enx;
                                // Shrink along-axis component to make cell appear elongated
                                var baseEffDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp);
                                // Cytokinesis constriction: narrow the cell at the equator (projAlong ≈ 0)
                                if (constrict > 0) {
                                    var equatorProximity = 1.0 - Math.min(1.0, Math.abs(projAlong) / (eAxisLen * 0.4));
                                    equatorProximity = equatorProximity * equatorProximity; // sharpen the waist
                                    // At equator, effective perpendicular distance is amplified (cell narrows)
                                    effDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp * (1 + constrict * equatorProximity * 2));
                                } else {
                                    effDist = baseEffDist;
                                }
                            }
                        }

                        if (effDist <= dd.maxR) {
                            inAnyCell = true;
                            // Layer priority via array lookup
                            var layers = ['furrowPixels','centPixels','secVesPixels','vesPixels','atpPixels',
                                'lysoPixels','endoPixels','peroxPixels','cyclinPixels','cycAPixels',
                                'cdc25Pixels','cycBPixels','plk1Pixels','auroraAPixels','cycDPixels',
                                'phosphPixels','mitoPixels','nucPixels','porePixels','envPixels',
                                'sacPixels','cohesinPixels','topoPixels','checkPixels','chrPixels',
                                'condensinPixels','recPixels'];
                            for (var li = 0; li < layers.length && !color; li++) {
                                if (dd[layers[li]] && dd[layers[li]][key]) color = dd[layers[li]][key];
                            }
                            if (!color && cc.golgiPixels[key]) {
                                color = cc.golgiPixels[key];
                            } else if (!color && effDist > dd.maxR - 1.2) {
                                var shell = dd.maxR - effDist;
                                var mi = Math.floor(shell * cc.membraneColors.length / 1.2);
                                if (mi >= cc.membraneColors.length) mi = cc.membraneColors.length - 1;
                                color = cc.membraneColors[mi];
                            }
                            if (!color) {
                                var innerLayers = ['actinPixels','mtPixels','ifPixels','riboPixels','serPixels'];
                                for (var li2 = 0; li2 < innerLayers.length && !color; li2++) {
                                    if (dd[innerLayers[li2]] && dd[innerLayers[li2]][key]) color = dd[innerLayers[li2]][key];
                                }
                            }
                            if (!color && cc.erPixels[key]) {
                                color = cc.erColor;
                            }
                            if (!color) {
                                var ndx2 = x - cc.cx, ndy2 = y - cc.cy;
                                color = Math.sqrt(ndx2*ndx2+ndy2*ndy2) <= dd.nucR+0.3 ? '#7a3500' : cc.cytoColor;
                            }
                            break;
                        }
                    }

                    if (!inAnyCell) {
                        // Extracellular space
                        var drawn = false;
                        // Check cilia for both cells
                        for (var ci = 0; ci < cells.length && !drawn; ci++) {
                            if (cells[ci].d.cilPixels[key]) {
                                color = cells[ci].d.cilPixels[key];
                                drawn = true;
                            }
                        }
                        // Check filopodia for both cells
                        for (var ci2 = 0; ci2 < cells.length && !drawn; ci2++) {
                            if (cells[ci2].d.filoPixels && cells[ci2].d.filoPixels[key]) {
                                color = cells[ci2].d.filoPixels[key];
                                drawn = true;
                            }
                        }
                        // Growth factor particles arcing outside cells
                        for (var ci3 = 0; ci3 < cells.length && !drawn; ci3++) {
                            if (cells[ci3].d.gfPixels && cells[ci3].d.gfPixels[key]) {
                                color = cells[ci3].d.gfPixels[key];
                                drawn = true;
                            }
                        }
                        if (!drawn && gapPx[key]) {
                            color = gapPx[key];
                            drawn = true;
                        }
                        if (!drawn && desmoPx[key]) {
                            color = desmoPx[key];
                            drawn = true;
                        }
                        if (!drawn && tjPx[key]) {
                            color = tjPx[key];
                            drawn = true;
                        }
                        if (!drawn && ajPx[key]) {
                            color = ajPx[key];
                            drawn = true;
                        }
                        if (!drawn && signalPx[key]) {
                            color = signalPx[key];
                            drawn = true;
                        }
                        if (!drawn && ecmPx[key]) {
                            color = ecmPx[key];
                            drawn = true;
                        }
                        if (!drawn && scarVisible && x === abscissionScar.x && y === abscissionScar.y) {
                            color = scarColor;
                            drawn = true;
                        }
                        // Midbody remnants (Flemming bodies) — released after abscission
                        if (!drawn) {
                            var tMBR = (Date.now() % 18000) / 18000;
                            for (var mri = 0; mri < midbodyRemnants.length && !drawn; mri++) {
                                var mbr = midbodyRemnants[mri];
                                // Remnants drift slowly outward from division site
                                var mbrDrift = Math.sin(tMBR * 2 * Math.PI + mri * 3.14) * 1.5;
                                var mbrX = Math.round(mbr.x + mbrDrift * (mri === 0 ? 0.5 : -0.5));
                                var mbrY = Math.round(mbr.y + mbrDrift * (mri === 0 ? -0.5 : 0.5));
                                if (x === mbrX && y === mbrY) {
                                    var mbrPulse = Math.sin(tMBR * 2 * Math.PI * 2 + mri);
                                    // Fresh Flemming bodies pulse brighter with residual ESCRT-III
                                    if (mbr.fresh) {
                                        var freshPulse = Math.sin(tMBR * 2 * Math.PI * 3.5 + mri * 1.7);
                                        color = freshPulse > 0.3 ? '#bbddee' : (freshPulse > -0.3 ? mbr.glowColor : mbr.color);
                                    } else {
                                        color = mbrPulse > 0 ? mbr.glowColor : mbr.color;
                                    }
                                    drawn = true;
                                }
                            }
                        }
                        // Granddaughter cells + TNTs + calcium + exosomes + basal lamina + hemidesmosomes (precomputed)
                        if (!drawn && gdPx[key]) {
                            color = gdPx[key];
                            drawn = true;
                        }
                        if (!drawn && kumSongPx[key]) {
                            color = kumSongPx[key];
                            drawn = true;
                        }
                        if (!drawn && nutrientPx[key]) {
                            color = nutrientPx[key];
                            drawn = true;
                        }
                        if (!drawn) {
                            color = mediumColor;
                        }
                    }

                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
