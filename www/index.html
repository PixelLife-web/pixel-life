<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="9" height="9"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // The diamond expands and differentiates — concentric rings emerge
        var size = 9;
        var center = 4;
        var radius = 3;
        var shades = ['#000000', '#333333', '#777777', '#bbbbbb'];

        for (var y = 0; y < size; y++) {
            for (var x = 0; x < size; x++) {
                var dist = Math.abs(x - center) + Math.abs(y - center);
                if (dist <= radius) {
                    ctx.fillStyle = shades[dist];
                    ctx.fillRect(x, y, 1, 1);
                }
            }
        }
    </script>
</body>
</html>
