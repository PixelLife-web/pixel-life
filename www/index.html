<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="32" height="32"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // Two daughter cells, born from division
        // Canvas expanded to 32x32 to fit both cells
        var size = 32;

        // Extracellular medium
        var mediumColor = '#e8e0d8';

        // Daughter cell A: upper-right
        var cellA = {
            cx: 21, cy: 9,
            radius: 5.5,
            nucleusCx: 21, nucleusCy: 9,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            // Inherited organelles
            erSegments: [
                { x1: 19, y1: 7, x2: 17, y2: 5 },
                { x1: 23, y1: 7, x2: 25, y2: 5 },
                { x1: 19, y1: 11, x2: 17, y2: 13 },
                { x1: 23, y1: 11, x2: 25, y2: 13 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 0.5, speed: 0.8, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 3.2, speed: -0.6, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '19,10': '#cc9944', '19,11': '#cc9944', '18,10': '#ddaa55' },
            chromatin: [
                { x: 21, y: 8 }, { x: 22, y: 9 }, { x: 21, y: 10 }, { x: 20, y: 9 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 22, y: 8 }, { x: 22, y: 10 }, { x: 20, y: 10 }, { x: 20, y: 8 },
            ],
            // Centrosomes: single unduplicated centrosome at G1 (will duplicate in S phase)
            centrosomes: [
                { x: 23, y: 8 },
                { x: 23, y: 9 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 0.3, color: '#33cc99' },
                { angle: 2.5, color: '#cc3399' },
            ],
        };

        // Daughter cell B: lower-left (drifted slightly after separation)
        var cellB = {
            cx: 11, cy: 23,
            radius: 5.5,
            nucleusCx: 11, nucleusCy: 23,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 9, y1: 21, x2: 7, y2: 19 },
                { x1: 13, y1: 21, x2: 15, y2: 19 },
                { x1: 9, y1: 25, x2: 7, y2: 27 },
                { x1: 13, y1: 25, x2: 15, y2: 27 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 2.5, speed: -0.7, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 5.8, speed: 0.5, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '9,24': '#cc9944', '9,25': '#cc9944', '8,24': '#ddaa55' },
            chromatin: [
                { x: 11, y: 22 }, { x: 12, y: 23 }, { x: 11, y: 24 }, { x: 10, y: 23 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 12, y: 22 }, { x: 12, y: 24 }, { x: 10, y: 24 }, { x: 10, y: 22 },
            ],
            // Centrosomes: single unduplicated centrosome at G1
            centrosomes: [
                { x: 13, y: 22 },
                { x: 13, y: 23 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 3.5, color: '#3399cc' },
                { angle: 5.0, color: '#cc9933' },
            ],
        };

        // Build cilia for each cell
        var numCilia = 10;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cellA.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 });
            cellB.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 + 0.2 });
        }

        // --- HELPERS ---
        function inB(x, y) { return x >= 0 && x < size && y >= 0 && y < size; }
        // Generic orbiter renderer: particles orbiting cell center
        function renderOrbiters(cell, items, tOrbit, t, period, opts) {
            var px = {};
            if (!items || !cell.separated) return px;
            var tp = (t * 8000 / period) % 1.0;
            var pr = opts.pulseRate || 1, ps = opts.phaseSpread || 1.4, th = opts.threshold || 0.2;
            var minR = opts.minR || 0, mxR = opts.maxR || 999;
            for (var i = 0; i < items.length; i++) {
                var it = items[i];
                var a = it.baseAngle + it.speed * tOrbit;
                var r = it.orbitR;
                if (opts.nuclear !== undefined && it.nuclear !== undefined) {
                    // nuclear vs cytoplasmic routing
                    r = it.orbitR;
                }
                var x = Math.round(cell.cx + Math.cos(a) * r);
                var y = Math.round(cell.cy + Math.sin(a) * r);
                var dx = x - cell.cx, dy = y - cell.cy, d = Math.sqrt(dx*dx+dy*dy);
                var p = Math.sin(tp * 2 * Math.PI * pr + i * ps);
                var inRange = (it.nuclear !== undefined) ?
                    (it.nuclear ? d <= (opts.nucR || 2) + 0.5 : d < mxR && d > (opts.nucR || 2) + 0.8) :
                    (d >= minR && d <= mxR);
                if (inRange && inB(x, y)) {
                    var hi = (it.nuclear && opts.nucHi) ? (p > (opts.nucTh||0.1) ? opts.nucHi : (opts.nucLo||it.color)) : null;
                    px[x+','+y] = hi || (p > th ? (opts.hiColor || it.color) : it.color);
                }
                if (opts.spark && p > 0.6 && inB(x,y)) {
                    var sa = a + 0.8, sr = r + 0.6;
                    var sx = Math.round(cell.cx + Math.cos(sa) * sr);
                    var sy = Math.round(cell.cy + Math.sin(sa) * sr);
                    var sd = Math.sqrt((sx-cell.cx)*(sx-cell.cx)+(sy-cell.cy)*(sy-cell.cy));
                    if (sd < mxR && inB(sx, sy)) px[sx+','+sy] = opts.sparkColor || opts.hiColor;
                }
                // Ripple trail for phosphatases
                if (opts.ripple && p > 0.5) {
                    var ra = a + 0.4, rr = r - 0.5;
                    var rx = Math.round(cell.cx + Math.cos(ra) * rr);
                    var ry = Math.round(cell.cy + Math.sin(ra) * rr);
                    if (Math.sqrt((rx-cell.cx)*(rx-cell.cx)+(ry-cell.cy)*(ry-cell.cy)) < mxR && inB(rx,ry)) {
                        px[rx+','+ry] = opts.rippleColor || opts.hiColor;
                    }
                }
            }
            return px;
        }

        // Precompute ER data for a cell
        function buildERData(cell) {
            cell.erPixels = {};
            cell.erPaths = [];
            for (var si = 0; si < cell.erSegments.length; si++) {
                var seg = cell.erSegments[si];
                var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
                var path = [];
                for (var step = 0; step <= steps; step++) {
                    var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                    var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                    cell.erPixels[px + ',' + py] = true;
                    path.push({ x: px, y: py });
                }
                cell.erPaths.push(path);
            }
        }
        buildERData(cellA);
        buildERData(cellB);

        // Nutrient particles in the medium
        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 28, y: 5, color: '#88bb55' },
            { x: 4, y: 28, color: '#55aa88' },
            { x: 27, y: 27, color: '#55aa88' },
            { x: 1, y: 15, color: '#bbaa44' },
            { x: 30, y: 17, color: '#bbaa44' },
            { x: 16, y: 1, color: '#88bb55' },
            { x: 15, y: 30, color: '#55aa88' },
            { x: 5, y: 8, color: '#bbaa44' },
            { x: 26, y: 3, color: '#88bb55' },
            { x: 3, y: 25, color: '#55aa88' },
            { x: 28, y: 20, color: '#bbaa44' },
            // New nutrients between the cells — the space where division happened
            { x: 16, y: 16, color: '#bbaa44' },
            { x: 15, y: 15, color: '#55aa88' },
        ];

        // Abscission scar: fading remnant — phagocytes clearing debris
        var abscissionScar = { x: 16, y: 16, color: '#887733' };

        // Midbody remnants (Flemming bodies): nearly degraded by autophagy
        // Dimmer, breaking down into recyclable components
        // Includes old remnants from first division + fresh remnants from second division
        var midbodyRemnants = [
            { x: 23, y: 5, color: '#556677', glowColor: '#667788' },
            { x: 8, y: 27, color: '#556677', glowColor: '#667788' },
            // Fresh Flemming bodies from cell A's division (midpoint of pole1 & pole2)
            { x: 21, y: 9, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
            // Fresh Flemming body from cell B's division
            { x: 11, y: 23, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
        ];

        // Post-mitotic nuclear reassembly: granddaughter nuclei rebuild nuclear architecture
        // Nuclear envelopes sealed, nucleoli reassemble from rDNA, Cajal bodies form
        var granddaughterNuclei = [
            { x: 18, y: 6, parent: 'A', reactivation: 0.3, nucleolusSize: 0.4, cajalAngle: 0.8 },
            { x: 24, y: 12, parent: 'A', reactivation: 0.25, nucleolusSize: 0.35, cajalAngle: 2.5 },
            { x: 8, y: 20, parent: 'B', reactivation: 0.35, nucleolusSize: 0.45, cajalAngle: 4.2 },
            { x: 14, y: 26, parent: 'B', reactivation: 0.2, nucleolusSize: 0.3, cajalAngle: 5.8 },
        ];

        // Granddaughter cell bodies: thin cytoplasmic shells forming around each nucleus
        // Post-division cells establish their own membranes and minimal cytoplasm
        for (var gbi = 0; gbi < granddaughterNuclei.length; gbi++) {
            var gn = granddaughterNuclei[gbi];
            gn.bodyRadius = 2.2 + gn.nucleolusSize * 0.8; // small cell body forming
            gn.membraneColor = '#555555';
            gn.cytoColor = '#6b2a00';
            // Nuclear speckles: SC35/SRSF2 splicing factor storage domains
            // Irregular interchromatin granule clusters — hallmark of mature interphase nuclei
            gn.speckles = [
                { angle: gn.cajalAngle + 2.1, dist: 0.6, color: '#88ddaa' },
                { angle: gn.cajalAngle + 4.3, dist: 0.5, color: '#77cc99' },
            ];
            // Small mitochondrion inherited during division
            gn.mitoAngle = gbi * 1.57 + 0.4;
            gn.mitoSpeed = (gbi % 2 === 0 ? 0.6 : -0.5);
            // Rough ER stubs: first cisternae budding from nuclear envelope
            // Each granddaughter grows 2 short ER segments radiating outward
            gn.erStubs = [
                { angle: gn.cajalAngle + 1.0, length: 1.5 },
                { angle: gn.cajalAngle + 3.5, length: 1.2 },
            ];
            // Golgi ministacks: small trans-Golgi cisternae assembling near ER exit sites
            gn.golgiAngle = gn.cajalAngle + 2.3;
            gn.golgiDist = gn.bodyRadius * 0.55;
            // Free ribosomes (polyribosomes): clusters in cytoplasm for cap-dependent translation
            // 3 polyribosome clusters per granddaughter, positioned between ER and membrane
            gn.freeRibosomes = [
                { angle: gn.cajalAngle + 0.5, dist: gn.bodyRadius * 0.45, phase: gbi * 0.7 },
                { angle: gn.cajalAngle + 2.0, dist: gn.bodyRadius * 0.55, phase: gbi * 0.7 + 1.2 },
                { angle: gn.cajalAngle + 4.5, dist: gn.bodyRadius * 0.40, phase: gbi * 0.7 + 2.4 },
            ];
            // Peroxisome: single small organelle budding from ER, catalase/oxidase activity
            gn.peroxAngle = gn.cajalAngle + 3.0;
            gn.peroxDist = gn.bodyRadius * 0.50;
            gn.peroxSpeed = (gbi % 2 === 0 ? 0.4 : -0.35);
            // Lysosome: acidic digestive organelle, degrades endocytosed material
            gn.lysoAngle = gn.cajalAngle + 4.8;
            gn.lysoDist = gn.bodyRadius * 0.48;
            gn.lysoSpeed = (gbi % 2 === 0 ? -0.3 : 0.35);
            // Centrosome: single centriole pair establishing MTOC for cytoskeletal organization
            gn.centrosomeAngle = gn.cajalAngle + 5.5;
            gn.centrosomeDist = 1.0 + gn.nucleolusSize * 0.3;
            // Primary cilium: single non-motile sensory antenna extending from mother centriole
            // Grows during G1 — detects extracellular signals (Hedgehog, Wnt, PDGF)
            // Axoneme extends 2-3 pixels outward from centrosome through membrane into ECM
            gn.ciliumAngle = gn.centrosomeAngle + 0.15; // nearly aligned with centrosome
            gn.ciliumLength = 2.5 + gn.nucleolusSize * 0.5; // grows with cell maturity
            gn.ciliumPhase = gbi * 1.3; // slight sway phase offset per cell
            // Early endosomes: clathrin-coated pits internalize ECM nutrients
            // Small vesicles pinch from membrane and traffic inward toward lysosomes
            // Each granddaughter has 2 endocytic vesicles at different cycle phases
            gn.endosomes = [
                { memAngle: gn.cajalAngle + 1.5, speed: 0.32, phase: gbi * 0.6, color: '#aa55cc' },
                { memAngle: gn.cajalAngle + 4.0, speed: 0.28, phase: gbi * 0.6 + 0.5, color: '#9944bb' },
            ];
            // Multivesicular body (MVB): late endosome compartment containing intraluminal vesicles
            // MVBs orbit between endosomes and membrane; when they fuse with PM, exosomes are released
            gn.mvbAngle = gn.lysoAngle + 1.2;
            gn.mvbDist = gn.bodyRadius * 0.42;
            gn.mvbSpeed = (gbi % 2 === 0 ? 0.25 : -0.22);
            // Exosome release: 2 exosomes per granddaughter, ejected from MVB fusion with membrane
            // Tiny vesicles (~0.1µm) carrying proteins/RNA, drift toward neighboring cells
            gn.exosomes = [
                { releaseAngle: gn.mvbAngle + 0.5, driftAngle: gbi * 1.57 + 0.3, speed: 0.18, phase: gbi * 0.4, color: '#cc88dd' },
                { releaseAngle: gn.mvbAngle + 2.8, driftAngle: gbi * 1.57 + 2.5, speed: 0.15, phase: gbi * 0.4 + 0.5, color: '#bb77cc' },
            ];
            // Autophagosome: double-membrane vesicle engulfing cytoplasmic material for lysosomal degradation
            // Phagophore nucleates from ER-mitochondria contact site, seals, then fuses with lysosome
            // Each granddaughter has 2 autophagosomes at different maturation stages
            gn.autophagosomes = [
                { angle: gn.lysoAngle + 2.0, dist: gn.bodyRadius * 0.50, speed: (gbi % 2 === 0 ? 0.20 : -0.18), phase: gbi * 0.5, color: '#668844', matureColor: '#887744' },
                { angle: gn.lysoAngle + 4.5, dist: gn.bodyRadius * 0.38, speed: (gbi % 2 === 0 ? -0.16 : 0.22), phase: gbi * 0.5 + 0.5, color: '#557733', matureColor: '#776633' },
            ];
            // Proteasome: 26S barrel-shaped complex for ubiquitin-dependent protein degradation
            // Complements autophagy — short-lived regulatory proteins (cyclins, p53, IκB) are tagged
            // with polyubiquitin chains and fed into the proteasome's catalytic core
            gn.proteasomes = [
                { angle: gn.cajalAngle + 1.8, dist: gn.bodyRadius * 0.52, speed: (gbi % 2 === 0 ? 0.30 : -0.27), phase: gbi * 0.6, color: '#6688aa', activeColor: '#88bbdd' },
                { angle: gn.cajalAngle + 4.2, dist: gn.bodyRadius * 0.44, speed: (gbi % 2 === 0 ? -0.25 : 0.32), phase: gbi * 0.6 + 0.5, color: '#557799', activeColor: '#77aacc' },
            ];
            // Lipid droplets: neutral lipid storage organelles budding from smooth ER
            // Monolayer phospholipid shell surrounding triacylglycerol/cholesterol ester core
            // Pulse with hormone-sensitive lipase activity — energy reserves for the growing cell
            gn.lipidDroplets = [
                { angle: gn.cajalAngle + 0.8, dist: gn.bodyRadius * 0.58, speed: (gbi % 2 === 0 ? 0.15 : -0.13), phase: gbi * 0.3, coreColor: '#ddcc44', shellColor: '#bbaa33' },
                { angle: gn.cajalAngle + 3.6, dist: gn.bodyRadius * 0.46, speed: (gbi % 2 === 0 ? -0.12 : 0.17), phase: gbi * 0.3 + 0.5, coreColor: '#ccbb33', shellColor: '#aaaa22' },
            ];
            // Apical microvilli: actin-cored finger-like projections on the free surface
            // Opposite the basal lamina — increases absorptive surface area
            // Each granddaughter sprouts 3-4 microvilli pointing away from basal lamina center
            // Basal lamina center is roughly at (16, 22) — apical direction points away from it
            var blCenter = { x: 16, y: 22 };
            var apicalAngle = Math.atan2(gn.y - blCenter.y, gn.x - blCenter.x);
            gn.microvilli = [];
            var mvCount = 3 + (gbi % 2); // 3 or 4 microvilli per cell
            for (var mvi = 0; mvi < mvCount; mvi++) {
                var mvSpread = (mvi - (mvCount - 1) / 2) * 0.35;
                gn.microvilli.push({
                    angle: apicalAngle + mvSpread,
                    length: 1.5 + gn.nucleolusSize * 0.8,
                    phase: gbi * 0.9 + mvi * 1.1,
                });
            }
            // Glycocalyx: carbohydrate-rich coat on the apical surface
            // Oligosaccharide chains (N-linked and O-linked glycans) extend from membrane glycoproteins
            // Forms a fuzzy protective layer beyond microvilli tips — mucin-type sugars sway gently
            gn.glycocalyx = [];
            var gcCount = 5 + (gbi % 2); // 5-6 sugar chains per cell
            for (var gci = 0; gci < gcCount; gci++) {
                var gcSpread = (gci - (gcCount - 1) / 2) * 0.28;
                gn.glycocalyx.push({
                    angle: apicalAngle + gcSpread,
                    length: 1.0 + gn.nucleolusSize * 0.6,
                    phase: gbi * 1.2 + gci * 0.9,
                    color: gci % 3 === 0 ? '#eedd99' : (gci % 3 === 1 ? '#ddcc88' : '#ccddaa'),
                    tipColor: gci % 2 === 0 ? '#ffeeaa' : '#eeffbb',
                });
            }
        }

        // Zonula occludens (tight junctions) between adjacent granddaughter cells
        // Claudin/occludin strands seal the paracellular space — completing the epithelial barrier
        // Each junction connects neighboring GD cells at their closest membrane points
        var gdTightJunctions = [
            { from: 0, to: 1, phase: 0, color: '#ddccaa', dimColor: '#bbaa88' },     // GD0 ↔ GD1 (sisters from A)
            { from: 2, to: 3, phase: 1.2, color: '#ddccaa', dimColor: '#bbaa88' },   // GD2 ↔ GD3 (sisters from B)
            { from: 1, to: 2, phase: 2.4, color: '#ccbbaa', dimColor: '#aa9977' },   // GD1 ↔ GD2 (cross-lineage seal)
            { from: 0, to: 2, phase: 3.6, color: '#ccbbaa', dimColor: '#aa9977' },   // GD0 ↔ GD2 (diagonal seal)
        ];

        // Tunneling nanotubes (TNTs): thin membrane bridges between adjacent granddaughter cells
        // Allow direct cytoplasmic exchange of organelles, ions, and signaling molecules
        // Each TNT connects two neighboring granddaughters — the tissue's private communication network
        var tunnelingNanotubes = [
            { from: 0, to: 1, phase: 0, cargoColor: '#ffaa55', tubeColor: '#998877' },   // GD0 ↔ GD1 (sisters from A)
            { from: 2, to: 3, phase: 0.33, cargoColor: '#55aaff', tubeColor: '#998877' }, // GD2 ↔ GD3 (sisters from B)
            { from: 1, to: 2, phase: 0.66, cargoColor: '#aa55ff', tubeColor: '#887766' }, // GD1 ↔ GD2 (cross-lineage bridge)
        ];

        // Calcium waves: tissue-level signaling between granddaughter nuclei
        // IP3-mediated Ca2+ release propagates sequentially through the four-cell cluster
        var calciumWaves = [];
        for (var cwi = 0; cwi < granddaughterNuclei.length; cwi++) {
            var nextIdx = (cwi + 1) % granddaughterNuclei.length;
            calciumWaves.push({
                from: granddaughterNuclei[cwi],
                to: granddaughterNuclei[nextIdx],
                phase: cwi * 0.25, // staggered propagation
                color: '#ffee77', dimColor: '#ddcc55',
            });
        }

        // Basal lamina: basement membrane forming beneath/around the tissue
        // Collagen IV scaffold with laminin-332 crosslinks — establishes apical-basal polarity
        // The arc wraps around the outer edge of the four-cell cluster
        var basalLamina = [
            { x: 28, y: 8, phase: 0 },
            { x: 29, y: 12, phase: 0.4 },
            { x: 28, y: 16, phase: 0.8 },
            { x: 26, y: 20, phase: 1.2 },
            { x: 23, y: 24, phase: 1.6 },
            { x: 19, y: 27, phase: 2.0 },
            { x: 14, y: 29, phase: 2.4 },
            { x: 9, y: 28, phase: 2.8 },
            { x: 5, y: 25, phase: 3.2 },
            { x: 3, y: 21, phase: 3.6 },
        ];

        // Kum-song (금성 — golden star): a luminous beacon in the extracellular medium
        // A radiant golden particle that traces a slow orbit between the two daughter cells
        // like Venus crossing the sky — the brightest point in the tissue's firmament
        var kumSong = {
            cx: 16, cy: 16, // center of orbit (midpoint between cells)
            orbitR: 6.5,
            speed: 0.15,
            coreColor: '#ffd700',
            haloColor: '#ffec80',
            dimColor: '#cc9900',
        };

        // Growth factors: autocrine/paracrine signaling
        cellA.growthFactors = [
            { secretAngle: 0.8, targetAngle: 2.5, speed: 0.3, phase: 0, color: '#55ff99' },
            { secretAngle: 4.2, targetAngle: 0.3, speed: 0.25, phase: 0.5, color: '#55ff99' },
        ];
        cellB.growthFactors = [
            { secretAngle: 3.8, targetAngle: 5.0, speed: 0.28, phase: 0.2, color: '#55ff99' },
            { secretAngle: 1.2, targetAngle: 3.5, speed: 0.32, phase: 0.7, color: '#55ff99' },
        ];

        // Intercellular signaling: daughter cells communicate via chemical signals
        var signals = [
            // Signal from A to B (paracrine signaling)
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.33 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.66 },
            // Signal from B to A (response signaling)
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.15 },
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.55 },
        ];

        // ECM fibers: connective tissue between cells
        var ecmFibers = [];
        // Build fibers connecting the two cells through the intercellular space
        var fiberCount = 5;
        for (var fi = 0; fi < fiberCount; fi++) {
            var frac = (fi + 1) / (fiberCount + 1);
            // Each fiber has a slightly different path offset for visual variety
            var offsetX = (fi % 2 === 0 ? 1 : -1) * (fi * 0.6);
            var offsetY = (fi % 2 === 0 ? -1 : 1) * ((fi + 1) * 0.4);
            ecmFibers.push({
                // Start near cell A's membrane, end near cell B's membrane
                startFrac: 0.25 + fi * 0.02,
                endFrac: 0.75 - fi * 0.02,
                offsetX: offsetX,
                offsetY: offsetY,
                color: fi % 2 === 0 ? '#c4a882' : '#b89870', // collagen-like tones
                pulsePhase: fi * 1.3,
            });

                    if (poreX >= 0 && poreX < size && poreY >= 0 && poreY < size) {

                        var porePulse = Math.sin(tPore * 2 * Math.PI + np.mRNAphase * 6);
                        var poreColor = npcDisasm > 0.2
                            ? (porePulse > 0 ? '#ddaa44' : '#cc9933')
                            : (porePulse > 0 ? '#ffcc66' : '#ddaa44');
                        porePixels[poreX + ',' + poreY] = poreColor;
                    }
                    // mRNA export slows as NPCs disassemble
                    if (npcDisasm < 0.5) {
                        var mRNAprogress = (tPore + np.mRNAphase) % 1.0;
                        var mRNAdist = unifiedNucR2 + mRNAprogress * 2.5;
                        if (mRNAdist < maxR - 1.5) {
                            var mX = Math.round(cell.cx + Math.cos(np.angle) * mRNAdist);
                            var mY = Math.round(cell.cy + Math.sin(np.angle) * mRNAdist);
                            if (mX >= 0 && mX < size && mY >= 0 && mY < size) {
                                porePixels[mX + ',' + mY] = mRNAprogress < 0.5 ? '#ff8855' : '#ee7744';
                            }
                        }
                    }
                }
            }

            // Secretory vesicles: bud from Golgi, travel to membrane, fuse (exocytosis)
            var secVesPixels = {};
            if (cell.secretoryVesicles && cell.separated) {
                var tSecVes = (t * 8000 / 7000) % 1.0;
                for (var svi = 0; svi < cell.secretoryVesicles.length; svi++) {
                    var sv = cell.secretoryVesicles[svi];
                    // Progress: 0=at Golgi, 1=at membrane (then fuses and resets)
                    var svProgress = (tSecVes * sv.speed + sv.phase) % 1.0;
                    // Interpolate from Golgi region outward to membrane
                    var golgiR = 2.0; // near Golgi (inner cytoplasm)
                    var memR = maxR - 0.8; // near plasma membrane
                    var svR = golgiR + svProgress * (memR - golgiR);
                    // Angle interpolates from bud angle to target membrane angle
                    var svAngle = sv.budAngle + svProgress * (sv.memAngle - sv.budAngle);
                    var svX = Math.round(cell.cx + Math.cos(svAngle) * svR);
                    var svY = Math.round(cell.cy + Math.sin(svAngle) * svR);
                    if (svX >= 0 && svX < size && svY >= 0 && svY < size) {
                        // Vesicle brightens as it approaches membrane (about to fuse)
                        secVesPixels[svX + ',' + svY] = svProgress > 0.8 ? '#ffcc55' : sv.color;
                    }
                    // Exocytosis flash: when vesicle reaches membrane, brief bright pixel on membrane
                    if (svProgress > 0.9) {
                        var exoX = Math.round(cell.cx + Math.cos(sv.memAngle) * maxR);
                        var exoY = Math.round(cell.cy + Math.sin(sv.memAngle) * maxR);
                        if (exoX >= 0 && exoX < size && exoY >= 0 && exoY < size) {
                            secVesPixels[exoX + ',' + exoY] = '#ffee88';
                        }
                    }
                }
            }

            // Endocytic vesicles: pinch from membrane, travel inward toward lysosomes
            var endoPixels = {};
            if (cell.endocyticVesicles && cell.separated) {
                var tEndo = (t * 8000 / 8000) % 1.0;
                for (var evi = 0; evi < cell.endocyticVesicles.length; evi++) {
                    var ev = cell.endocyticVesicles[evi];
                    // Progress: 0=at membrane (coated pit), 1=near lysosome (early endosome)
                    var evProgress = (tEndo * ev.speed + ev.phase) % 1.0;
                    // Interpolate from membrane inward toward cell interior
                    var memR2 = maxR - 0.5; // starts at membrane
                    var lysoR = 2.2; // ends near lysosome orbit radius
                    var evR = memR2 - evProgress * (memR2 - lysoR);
                    // Angle curves from membrane receptor toward interior
                    var evAngle = ev.memAngle + evProgress * (ev.targetAngle - ev.memAngle) * 0.3;
                    var evX = Math.round(cell.cx + Math.cos(evAngle) * evR);
                    var evY = Math.round(cell.cy + Math.sin(evAngle) * evR);
                    if (evX >= 0 && evX < size && evY >= 0 && evY < size) {
                        // Coated pit at membrane is darker, brightens as it matures into endosome
                        endoPixels[evX + ',' + evY] = evProgress < 0.2 ? '#7733aa' : ev.color;
                    }
                    // Clathrin coat flash at membrane when pit forms
                    if (evProgress < 0.15) {
                        var pitX = Math.round(cell.cx + Math.cos(ev.memAngle) * maxR);
                        var pitY = Math.round(cell.cy + Math.sin(ev.memAngle) * maxR);
                        if (pitX >= 0 && pitX < size && pitY >= 0 && pitY < size) {
                            endoPixels[pitX + ',' + pitY] = '#bb77dd';
                        }
                    }
                }
            }

            // Microtubules: radiate from centrosome outward, with motor protein cargo
            var mtPixels = {};
            if (cell.microtubules && cell.centrosomes && cell.separated) {
                var mtOrigin = cell.centrosomes[0]; // MTOC = centrosome
                var tMT = (t * 8000 / 5000) % 1.0;
                for (var mti = 0; mti < cell.microtubules.length; mti++) {
                    var mt = cell.microtubules[mti];
                    // Draw track from centrosome outward
                    for (var ml = 1; ml <= Math.ceil(mt.length); ml++) {
                        var mx3 = Math.round(mtOrigin.x + Math.cos(mt.angle) * ml);
                        var my3 = Math.round(mtOrigin.y + Math.sin(mt.angle) * ml);
                        // Stay within cell
                        var mdx = mx3 - cell.cx;
                        var mdy = my3 - cell.cy;
                        if (Math.sqrt(mdx * mdx + mdy * mdy) < maxR - 1.2) {
                            if (mx3 >= 0 && mx3 < size && my3 >= 0 && my3 < size) {
                                mtPixels[mx3 + ',' + my3] = '#445566';
                            }
                        }
                    }
                    // Motor protein (kinesin) cargo: dot moving along the track
                    var cargoPos = (tMT + mt.cargoPhase) % 1.0;
                    // Cargo shuttles back and forth
                    var cargoFrac = cargoPos < 0.5 ? cargoPos * 2 : (1.0 - cargoPos) * 2;
                    var cargoDist = 1 + cargoFrac * (mt.length - 1);
                    var cargoX = Math.round(mtOrigin.x + Math.cos(mt.angle) * cargoDist);
                    var cargoY = Math.round(mtOrigin.y + Math.sin(mt.angle) * cargoDist);
                    var cdx = cargoX - cell.cx;
                    var cdy = cargoY - cell.cy;
                    if (Math.sqrt(cdx * cdx + cdy * cdy) < maxR - 1.2) {
                        if (cargoX >= 0 && cargoX < size && cargoY >= 0 && cargoY < size) {
                            mtPixels[cargoX + ',' + cargoY] = cargoPos < 0.5 ? '#77ddff' : '#ffaa77';
                        }
                    }
                }
            }

            // Cyclin-CDK particles (consolidated)
            var cyclinPixels = renderOrbiters(cell, cell.cyclins, tOrbit, t, 5500, {minR:nucR+1,maxR:maxR-1,hiColor:'#55eebb'});

            // Phospho-Rb: inactivated, drifts slowly inside nucleus (dim green)
            var checkPixels = {};
            if (cell.checkpointKinases && cell.separated) {
                var tCheck = (t * 8000 / 4500) % 1.0;
                var unifiedNucR3 = nucR + 0.9;
                for (var cki = 0; cki < cell.checkpointKinases.length; cki++) {
                    var ck = cell.checkpointKinases[cki];
                    // Phospho-Rb drifts slowly — no longer actively scanning
                    var ckAngle = tCheck * 2 * Math.PI * ck.scanSpeed + ck.phase * 6;
                    var ckR = unifiedNucR3 * 0.4 + Math.sin(tCheck * 2 * Math.PI + cki * 2) * 0.2;
                    var ckX = Math.round(cell.cx + Math.cos(ckAngle) * ckR);
                    var ckY = Math.round(cell.cy + Math.sin(ckAngle) * ckR);
                    if (ckX >= 0 && ckX < size && ckY >= 0 && ckY < size) {
                        // Phosphorylated Rb: dim greenish (inactivated)
                        var samplePulse = Math.sin(tCheck * 2 * Math.PI * 1.5 + cki * 1.5);
                        checkPixels[ckX + ',' + ckY] = samplePulse > 0.3 ? '#669966' : ck.color;
                    }
                }
                // Restriction point crossed: bright green pulse on nuclear envelope
                // Cell is now growth-factor-independent, irreversibly committed to S phase
                var alignPulse = Math.sin(tCheck * 2 * Math.PI * 0.5);
                if (alignPulse > 0.4) {
                    for (var cpe = 0; cpe < 6; cpe++) {
                        var cpAngle = cpe * Math.PI / 3 + tCheck * 0.5;
                        var cpx = Math.round(cell.cx + Math.cos(cpAngle) * unifiedNucR3);
                        var cpy = Math.round(cell.cy + Math.sin(cpAngle) * unifiedNucR3);
                        if (cpx >= 0 && cpx < size && cpy >= 0 && cpy < size) {
                            checkPixels[cpx + ',' + cpy] = alignPulse > 0.7 ? '#aaffaa' : '#88ee88';
                        }
                    }
                }
            }

            // E2F: degraded (consolidated)

            // Replication forks + histones: S phase complete (consolidated)

            // Cohesin rings (consolidated — empty, fully cleaved)
            var cohesinPixels = renderOrbiters(cell, cell.cohesins, tOrbit, t, 7500, {maxR:nucR+0.3,threshold:0.3,hiColor:'#aaccee',phaseSpread:2.1});

            // Topoisomerase II (consolidated)
            var topoPixels = renderOrbiters(cell, cell.topoII, tOrbit, t, 5500, {maxR:nucR+0.3,threshold:0.4,hiColor:'#ff8866',pulseRate:2,phaseSpread:1.8,spark:true,sparkColor:'#ffaa88'});

            // Cyclin A-CDK2 (consolidated)
            var cycAPixels = renderOrbiters(cell, cell.cyclinA, tOrbit, t, 5200, {minR:nucR+1,maxR:maxR-1,threshold:0.3,hiColor:'#ee88bb'});

            // Cyclin B-CDK1 (consolidated)
            var cycBPixels = renderOrbiters(cell, cell.cyclinB, tOrbit, t, 5800, {nuclear:true,nucR:nucR,maxR:maxR-0.8,minR:nucR+1.2,hiColor:'#55eebb',nucHi:'#77ffdd',nucTh:0.1,phaseSpread:1.9});

            // PLK1 (consolidated)
            var plk1Pixels = renderOrbiters(cell, cell.plk1, tOrbit, t, 5300, {minR:nucR+0.5,maxR:maxR-1,threshold:0.3,hiColor:'#ff8866',pulseRate:2,phaseSpread:1.7,spark:true,sparkColor:'#ffaa77'});

            // Aurora A kinase: flashes at centrosome positions, driving PCM maturation
            var auroraAPixels = {};
            if (cell.auroraA && cell.prophase && cell.separated) {
                var tAurA = (t * 8000 / 4000) % 1.0;
                var cs = cell.centrosomes[0];
                var tCentMig2 = (t * 8000 / 9000) % 1.0;
                var migFrac2 = 0.6 + Math.sin(tCentMig2 * 2 * Math.PI * 0.2) * 0.08;
                var poles2 = [
                    { x: cs.x + (cell.prophase.pole1Target.x - cs.x) * migFrac2, y: cs.y + (cell.prophase.pole1Target.y - cs.y) * migFrac2 },
                    { x: cs.x + (cell.prophase.pole2Target.x - cs.x) * migFrac2, y: cs.y + (cell.prophase.pole2Target.y - cs.y) * migFrac2 },
                ];
                for (var aai = 0; aai < cell.auroraA.length; aai++) {
                    var aa = cell.auroraA[aai];
                    var poleIdx = aa.targetPole - 1;
                    var aurPulse = Math.sin(tAurA * 2 * Math.PI * 3 + aa.phase * 6);
                    // Flash near the centrosome pole — phosphorylation activity
                    var aaAngle = tAurA * 2 * Math.PI * aa.speed + aa.phase * 4;
                    var aaR = 1.2 + aurPulse * 0.3;
                    var aax = Math.round(poles2[poleIdx].x + Math.cos(aaAngle) * aaR);
                    var aay = Math.round(poles2[poleIdx].y + Math.sin(aaAngle) * aaR);
                    if (aax >= 0 && aax < size && aay >= 0 && aay < size) {
                        auroraAPixels[aax + ',' + aay] = aurPulse > 0.2 ? '#bbffff' : aa.color;
                    }
                }
            }

            // Cyclin D-CDK4/6 (consolidated)
            var cycDPixels = renderOrbiters(cell, cell.cyclinD, tOrbit, t, 6200, {nuclear:true,nucR:nucR,maxR:maxR-1,minR:nucR+0.8,threshold:0.3,hiColor:'#eebb55',nucHi:'#ffcc55',nucLo:'#eebb44',nucTh:0.1,phaseSpread:1.6,spark:true,sparkColor:'#ffdd88'});

            // Cyclin E: degraded (consolidated)

            // Cdc25 phosphatase (consolidated)
            var cdc25Pixels = renderOrbiters(cell, cell.cdc25, tOrbit, t, 4800, {minR:nucR+0.5,maxR:maxR-1,threshold:0.3,hiColor:'#77ffcc',pulseRate:2,phaseSpread:1.6});

            // Growth factors: secreted from membrane, arc outward then curve back to receptors
            var gfPixels = {};
            if (cell.growthFactors && cell.separated) {
                var tGF = (t * 8000 / 9000) % 1.0;
                for (var gfi = 0; gfi < cell.growthFactors.length; gfi++) {
                    var gf = cell.growthFactors[gfi];
                    var gfProgress = (tGF * gf.speed + gf.phase) % 1.0;
                    // Arc outward from secretion site then curve back to receptor
                    var gfOutR = maxR + gfProgress * 2.5 * (1 - gfProgress); // parabolic arc
                    var gfAngle = gf.secretAngle + gfProgress * (gf.targetAngle - gf.secretAngle);
                    var gfX = Math.round(cell.cx + Math.cos(gfAngle) * (maxR + gfOutR * 0.8));
                    var gfY = Math.round(cell.cy + Math.sin(gfAngle) * (maxR + gfOutR * 0.8));
                    if (gfX >= 0 && gfX < size && gfY >= 0 && gfY < size) {
                        var gfPulse = Math.sin(tGF * 2 * Math.PI + gfi * 2.0);
                        gfPixels[gfX + ',' + gfY] = gfPulse > 0 ? '#88ffbb' : gf.color;
                    }
                }
            }

            // PP1/PP2A phosphatases (consolidated)
            var phosphPixels = renderOrbiters(cell, cell.phosphatases, tOrbit, t, 4500, {maxR:maxR-1,hiColor:'#66ffdd',pulseRate:2.5,phaseSpread:1.9,ripple:true,rippleColor:'#55eebb'});

            // Telophase: central spindle / midbody forms at equator, cleavage furrow ingresses
            // Anaphase remnant: separase flashes fade
            var sacPixels = {};
            if (cell.prophase && cell.prophase.anaphase && cell.separated) {
                var tSAC = (t * 8000 / 5000) % 1.0;
                var p1 = cell.prophase.pole1Target;
                var p2 = cell.prophase.pole2Target;
                var sacMidX = (p1.x + p2.x) / 2;
                var sacMidY = (p1.y + p2.y) / 2;
                if (cell.prophase.telophase) {
