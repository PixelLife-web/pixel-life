<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="32" height="32"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // Two daughter cells, born from division
        // Canvas expanded to 32x32 to fit both cells
        var size = 32;

        // Extracellular medium
        var mediumColor = '#e8e0d8';

        // Daughter cell A: upper-right
        var cellA = {
            cx: 21, cy: 9,
            radius: 5.5,
            nucleusCx: 21, nucleusCy: 9,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            // Inherited organelles
            erSegments: [
                { x1: 19, y1: 7, x2: 17, y2: 5 },
                { x1: 23, y1: 7, x2: 25, y2: 5 },
                { x1: 19, y1: 11, x2: 17, y2: 13 },
                { x1: 23, y1: 11, x2: 25, y2: 13 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 0.5, speed: 0.8, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 3.2, speed: -0.6, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '19,10': '#cc9944', '19,11': '#cc9944', '18,10': '#ddaa55' },
            chromatin: [
                { x: 21, y: 8 }, { x: 22, y: 9 }, { x: 21, y: 10 }, { x: 20, y: 9 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 22, y: 8 }, { x: 22, y: 10 }, { x: 20, y: 10 }, { x: 20, y: 8 },
            ],
            // Centrosomes: single unduplicated centrosome at G1 (will duplicate in S phase)
            centrosomes: [
                { x: 23, y: 8 },
                { x: 23, y: 9 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 0.3, color: '#33cc99' },
                { angle: 2.5, color: '#cc3399' },
            ],
        };

        // Daughter cell B: lower-left (drifted slightly after separation)
        var cellB = {
            cx: 11, cy: 23,
            radius: 5.5,
            nucleusCx: 11, nucleusCy: 23,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 9, y1: 21, x2: 7, y2: 19 },
                { x1: 13, y1: 21, x2: 15, y2: 19 },
                { x1: 9, y1: 25, x2: 7, y2: 27 },
                { x1: 13, y1: 25, x2: 15, y2: 27 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 2.5, speed: -0.7, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 5.8, speed: 0.5, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '9,24': '#cc9944', '9,25': '#cc9944', '8,24': '#ddaa55' },
            chromatin: [
                { x: 11, y: 22 }, { x: 12, y: 23 }, { x: 11, y: 24 }, { x: 10, y: 23 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 12, y: 22 }, { x: 12, y: 24 }, { x: 10, y: 24 }, { x: 10, y: 22 },
            ],
            // Centrosomes: single unduplicated centrosome at G1
            centrosomes: [
                { x: 13, y: 22 },
                { x: 13, y: 23 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 3.5, color: '#3399cc' },
                { angle: 5.0, color: '#cc9933' },
            ],
        };

        // Build cilia for each cell
        var numCilia = 10;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cellA.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 });
            cellB.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 + 0.2 });
        }

        // Precompute ER data for a cell
        function buildERData(cell) {
            cell.erPixels = {};
            cell.erPaths = [];
            for (var si = 0; si < cell.erSegments.length; si++) {
                var seg = cell.erSegments[si];
                var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
                var path = [];
                for (var step = 0; step <= steps; step++) {
                    var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                    var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                    cell.erPixels[px + ',' + py] = true;
                    path.push({ x: px, y: py });
                }
                cell.erPaths.push(path);
            }
        }
        buildERData(cellA);
        buildERData(cellB);

        // Nutrient particles in the medium
        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 28, y: 5, color: '#88bb55' },
            { x: 4, y: 28, color: '#55aa88' },
            { x: 27, y: 27, color: '#55aa88' },
            { x: 1, y: 15, color: '#bbaa44' },
            { x: 30, y: 17, color: '#bbaa44' },
            { x: 16, y: 1, color: '#88bb55' },
            { x: 15, y: 30, color: '#55aa88' },
            { x: 5, y: 8, color: '#bbaa44' },
            { x: 26, y: 3, color: '#88bb55' },
            { x: 3, y: 25, color: '#55aa88' },
            { x: 28, y: 20, color: '#bbaa44' },
            // New nutrients between the cells — the space where division happened
            { x: 16, y: 16, color: '#bbaa44' },
            { x: 15, y: 15, color: '#55aa88' },
        ];

        // Abscission scar: fading remnant — phagocytes clearing debris
        var abscissionScar = { x: 16, y: 16, color: '#887733' };

        // Midbody remnants (Flemming bodies): nearly degraded by autophagy
        // Dimmer, breaking down into recyclable components
        var midbodyRemnants = [
            { x: 23, y: 5, color: '#556677', glowColor: '#667788' },
            { x: 8, y: 27, color: '#556677', glowColor: '#667788' },
        ];

        // Growth factors: autocrine/paracrine signaling
        cellA.growthFactors = [
            { secretAngle: 0.8, targetAngle: 2.5, speed: 0.3, phase: 0, color: '#55ff99' },
            { secretAngle: 4.2, targetAngle: 0.3, speed: 0.25, phase: 0.5, color: '#55ff99' },
        ];
        cellB.growthFactors = [
            { secretAngle: 3.8, targetAngle: 5.0, speed: 0.28, phase: 0.2, color: '#55ff99' },
            { secretAngle: 1.2, targetAngle: 3.5, speed: 0.32, phase: 0.7, color: '#55ff99' },
        ];

        // Intercellular signaling: daughter cells communicate via chemical signals
        var signals = [
            // Signal from A to B (paracrine signaling)
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.33 },
            { fromCell: 'A', toCell: 'B', color: '#ff66aa', speed: 0.0004, phase: 0.66 },
            // Signal from B to A (response signaling)
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.15 },
            { fromCell: 'B', toCell: 'A', color: '#66aaff', speed: 0.0003, phase: 0.55 },
        ];

        // ECM fibers: connective tissue between cells
        var ecmFibers = [];
        // Build fibers connecting the two cells through the intercellular space
        var fiberCount = 5;
        for (var fi = 0; fi < fiberCount; fi++) {
            var frac = (fi + 1) / (fiberCount + 1);
            // Each fiber has a slightly different path offset for visual variety
            var offsetX = (fi % 2 === 0 ? 1 : -1) * (fi * 0.6);
            var offsetY = (fi % 2 === 0 ? -1 : 1) * ((fi + 1) * 0.4);
            ecmFibers.push({
                // Start near cell A's membrane, end near cell B's membrane
                startFrac: 0.25 + fi * 0.02,
                endFrac: 0.75 - fi * 0.02,
                offsetX: offsetX,
                offsetY: offsetY,
                color: fi % 2 === 0 ? '#c4a882' : '#b89870', // collagen-like tones
                pulsePhase: fi * 1.3,
            });
        }

        // Filopodia: actin protrusions reaching toward other cell
        cellA.filopodia = [];
        cellB.filopodia = [];
        for (var fpi = 0; fpi < 3; fpi++) {
            // Cell A reaches toward cell B
            var baseAngleA = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var spreadA = (fpi - 1) * 0.35;
            cellA.filopodia.push({
                angle: baseAngleA + spreadA,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
            // Cell B reaches toward cell A
            var baseAngleB = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var spreadB = (fpi - 1) * 0.35;
            cellB.filopodia.push({
                angle: baseAngleB + spreadB,
                maxLength: 4 + fpi * 0.5,
                phase: fpi * 0.8 + 1.5,
                tipColor: '#aa7755',
                stalkColor: '#997766',
            });
        }

        // Ribosomes on rough ER
        cellA.ribosomes = [
            { erIdx: 0, pos: 0.3, color: '#553322' },
            { erIdx: 0, pos: 0.7, color: '#553322' },
            { erIdx: 1, pos: 0.5, color: '#553322' },
            { erIdx: 2, pos: 0.4, color: '#553322' },
            { erIdx: 3, pos: 0.6, color: '#553322' },
        ];
        cellB.ribosomes = [
            { erIdx: 0, pos: 0.4, color: '#553322' },
            { erIdx: 1, pos: 0.3, color: '#553322' },
            { erIdx: 1, pos: 0.8, color: '#553322' },
            { erIdx: 2, pos: 0.5, color: '#553322' },
            { erIdx: 3, pos: 0.4, color: '#553322' },
        ];

        // Gap junctions: small molecule exchange channels
        var gapJunctions = [
            { filoIdxA: 0, filoIdxB: 2, color: '#ddbb88', pulsePhase: 0 },
            { filoIdxA: 1, filoIdxB: 1, color: '#ccaa77', pulsePhase: 1.5 },
            { filoIdxA: 2, filoIdxB: 0, color: '#ddbb88', pulsePhase: 3.0 },
        ];

        // Peroxisomes
        cellA.peroxisomes = [
            { orbitR: 3.8, baseAngle: 0.3, speed: 0.6, color: '#66aa88' },
            { orbitR: 2.0, baseAngle: 3.5, speed: -0.5, color: '#55bb77' },
        ];
        cellB.peroxisomes = [
            { orbitR: 3.8, baseAngle: 1.8, speed: -0.6, color: '#66aa88' },
            { orbitR: 2.0, baseAngle: 5.0, speed: 0.5, color: '#55bb77' },
        ];

        // Desmosomes: mechanical anchoring junctions
        var desmosomes = [
            { angleA: 2.0, angleB: 5.2, color: '#bb8844', anchorColor: '#998866' },
            { angleA: 2.8, angleB: 5.9, color: '#bb8844', anchorColor: '#998866' },
        ];

        // Tight junctions: seal between cells
        var tightJunctions = [];
        var tjCount = 6;
        for (var tji = 0; tji < tjCount; tji++) {
            // Span a band of angles between the two cells (facing each other)
            var baseA = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var baseB = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var spread = (tji - (tjCount - 1) / 2) * 0.18;
            tightJunctions.push({
                angleA: baseA + spread,
                angleB: baseB + spread,
                phase: tji * 0.9,
            });
        }

        // Adherens junctions: E-cadherin adhesion belt connecting the two cells
        // The fourth and final major junction type, linking to actin cytoskeleton
        var adherensJunctions = [];
        var ajCount = 4;
        for (var aji = 0; aji < ajCount; aji++) {
            var baseA2 = Math.atan2(cellB.cy - cellA.cy, cellB.cx - cellA.cx);
            var baseB2 = Math.atan2(cellA.cy - cellB.cy, cellA.cx - cellB.cx);
            var ajSpread = (aji - (ajCount - 1) / 2) * 0.25;
            adherensJunctions.push({
                angleA: baseA2 + ajSpread,
                angleB: baseB2 + ajSpread,
                phase: aji * 1.2,
            });
        }

        // Actin stress fibers: cytoskeletal cables inside each cell
        // Connect from adherens junction sites inward toward the nucleus
        cellA.actinFibers = [];
        cellB.actinFibers = [];
        for (var afi = 0; afi < ajCount; afi++) {
            var ajA = adherensJunctions[afi];
            cellA.actinFibers.push({ junctionAngle: ajA.angleA, length: 3.5, phase: afi * 0.7 });
            cellB.actinFibers.push({ junctionAngle: ajA.angleB, length: 3.5, phase: afi * 0.7 + 1.0 });
        }

        // Smooth ER: lipid synthesis tubules, distinct from rough ER (no ribosomes)
        cellA.smoothER = [
            { cx: 24, cy: 11, rx: 1.5, ry: 0.8, angle: 0.4 },
            { cx: 18, cy: 7, rx: 1.2, ry: 0.6, angle: 2.1 },
        ];
        cellB.smoothER = [
            { cx: 14, cy: 25, rx: 1.5, ry: 0.8, angle: 0.7 },
            { cx: 8, cy: 21, rx: 1.2, ry: 0.6, angle: 2.5 },
        ];

        // Lysosomes: small digestive organelles orbiting in the cytoplasm
        cellA.lysosomes = [
            { orbitR: 2.5, baseAngle: 1.0, speed: 1.2, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 4.0, speed: -0.9, color: '#9966bb' },
        ];
        cellB.lysosomes = [
            { orbitR: 2.5, baseAngle: 2.5, speed: -1.1, color: '#8855aa' },
            { orbitR: 3.2, baseAngle: 5.5, speed: 0.8, color: '#9966bb' },
        ];

        // Microtubules: radiate from centrosome (MTOC) outward through cytoplasm
        // Each cell has 6 microtubule tracks; motor proteins carry cargo along them
        cellA.microtubules = [];
        cellB.microtubules = [];
        for (var mti = 0; mti < 6; mti++) {
            var mtAngle = mti * 2 * Math.PI / 6;
            cellA.microtubules.push({ angle: mtAngle, length: 4.0, cargoPhase: mti * 0.5 });
            cellB.microtubules.push({ angle: mtAngle + 0.3, length: 4.0, cargoPhase: mti * 0.5 + 0.25 });
        }

        // Intermediate filaments: third cytoskeletal element, cage around nucleus
        // anchoring to desmosome sites — completes actin + microtubule + IF triad
        cellA.intermediateFilaments = [];
        cellB.intermediateFilaments = [];
        // Each IF runs from near the nucleus outward toward a desmosome anchor point
        for (var ifi = 0; ifi < desmosomes.length; ifi++) {
            var desmo = desmosomes[ifi];
            cellA.intermediateFilaments.push({ targetAngle: desmo.angleA, length: 3.8, phase: ifi * 1.1 });
            cellB.intermediateFilaments.push({ targetAngle: desmo.angleB, length: 3.8, phase: ifi * 1.1 + 0.5 });
        }
        // Additional IF strands forming the perinuclear cage (not anchored to desmosomes)
        for (var ifi2 = 0; ifi2 < 4; ifi2++) {
            var cageAngle = ifi2 * Math.PI / 2 + 0.4; // 4 cage strands at ~90 degree intervals
            cellA.intermediateFilaments.push({ targetAngle: cageAngle, length: 2.5, phase: ifi2 * 0.8 + 2.0 });
            cellB.intermediateFilaments.push({ targetAngle: cageAngle + 0.2, length: 2.5, phase: ifi2 * 0.8 + 2.5 });
        }

        // Nuclear pores: channels on the nuclear envelope for mRNA export
        // mRNA particles travel from nucleus outward toward ribosomes on rough ER
        cellA.nuclearPores = [
            { angle: 0.5, mRNAphase: 0 },
            { angle: 1.8, mRNAphase: 0.33 },
            { angle: 3.3, mRNAphase: 0.66 },
            { angle: 4.7, mRNAphase: 0.5 },
            { angle: 5.8, mRNAphase: 0.17 },
        ];
        cellB.nuclearPores = [
            { angle: 0.8, mRNAphase: 0.15 },
            { angle: 2.1, mRNAphase: 0.48 },
            { angle: 3.6, mRNAphase: 0.82 },
            { angle: 5.0, mRNAphase: 0.31 },
            { angle: 5.5, mRNAphase: 0.64 },
        ];

        // Secretory vesicles: bud from Golgi, travel to membrane, fuse (exocytosis)
        // Completes the central dogma: DNA → mRNA → ribosome → protein → Golgi → secretion
        cellA.secretoryVesicles = [
            { budAngle: 2.6, memAngle: 0.8, speed: 0.4, phase: 0, color: '#ddaa33' },
            { budAngle: 2.9, memAngle: 4.5, speed: 0.35, phase: 0.33, color: '#ccbb44' },
            { budAngle: 2.3, memAngle: 5.8, speed: 0.45, phase: 0.66, color: '#ddaa33' },
        ];
        cellB.secretoryVesicles = [
            { budAngle: 2.8, memAngle: 1.2, speed: 0.38, phase: 0.15, color: '#ddaa33' },
            { budAngle: 2.5, memAngle: 3.8, speed: 0.42, phase: 0.5, color: '#ccbb44' },
            { budAngle: 3.1, memAngle: 5.2, speed: 0.36, phase: 0.82, color: '#ddaa33' },
        ];

        // Endocytic vesicles: receptor-mediated endocytosis, membrane pinches inward
        // Vesicles travel from membrane toward lysosomes (completing endo/exo trafficking cycle)
        cellA.endocyticVesicles = [
            { memAngle: 0.3, targetAngle: 1.0, speed: 0.38, phase: 0, color: '#aa55cc' },
            { memAngle: 2.5, targetAngle: 4.0, speed: 0.42, phase: 0.5, color: '#9944bb' },
        ];
        cellB.endocyticVesicles = [
            { memAngle: 3.5, targetAngle: 2.5, speed: 0.4, phase: 0.25, color: '#aa55cc' },
            { memAngle: 5.0, targetAngle: 5.5, speed: 0.36, phase: 0.75, color: '#9944bb' },
        ];

        // Genome identity encoded as nucleotide colors
        var genomeStr = 'PETARRAKOVI';
        var baseColors = {
            'P': '#ff4466', 'E': '#44ff88', 'T': '#4488ff', 'A': '#ffaa22',
            'R': '#dd44ff', 'K': '#44dddd', 'O': '#ff8844', 'V': '#88ff44',
            'I': '#ff44aa'
        };
        var genomeSequence = [];
        for (var gi = 0; gi < genomeStr.length; gi++) {
            genomeSequence.push({
                letter: genomeStr[gi],
                color: baseColors[genomeStr[gi]] || '#ffffff'
            });
        }

        // Cyclin-CDK complexes
        cellA.cyclins = [
            { orbitR: 3.0, baseAngle: 1.2, speed: 0.6, color: '#44bbaa' },
        ];
        cellB.cyclins = [
            { orbitR: 3.0, baseAngle: 4.0, speed: -0.55, color: '#44bbaa' },
        ];

        // PP1/PP2A phosphatases
        cellA.phosphatases = [
            { orbitR: 1.6, baseAngle: 0.9, speed: 0.7, color: '#44ddbb' },
            { orbitR: 2.4, baseAngle: 3.1, speed: -0.6, color: '#33ccaa' },
            { orbitR: 1.9, baseAngle: 5.4, speed: 0.55, color: '#44ddbb' },
        ];
        cellB.phosphatases = [
            { orbitR: 1.6, baseAngle: 2.3, speed: -0.65, color: '#44ddbb' },
            { orbitR: 2.4, baseAngle: 4.8, speed: 0.58, color: '#33ccaa' },
            { orbitR: 1.9, baseAngle: 0.6, speed: -0.52, color: '#44ddbb' },
        ];

        // Phospho-Rb (inactivated)
        cellA.checkpointKinases = [
            { scanSpeed: 0.015, phase: 0, color: '#223322' },
        ];
        cellB.checkpointKinases = [
            { scanSpeed: -0.015, phase: 0.15, color: '#223322' },
        ];

        // Cdc25 phosphatase: activates CDK1
        cellA.cdc25 = [
            { orbitR: 2.4, baseAngle: 0.6, speed: 0.5, color: '#338877' },
            { orbitR: 3.2, baseAngle: 3.8, speed: -0.38, color: '#44aa88' },
        ];
        cellB.cdc25 = [
            { orbitR: 2.4, baseAngle: 2.2, speed: -0.5, color: '#338877' },
            { orbitR: 3.2, baseAngle: 5.5, speed: 0.4, color: '#44aa88' },
        ];

        // Cyclin A-CDK2: APC/C-Cdc20 degrades cyclin A at anaphase onset — mostly gone
        cellA.cyclinA = [
            { orbitR: 2.8, baseAngle: 4.0, speed: -0.4, color: '#996677' },
            { orbitR: 1.2, baseAngle: 0.3, speed: 0.65, color: '#aa7788' },
        ];
        cellB.cyclinA = [
            { orbitR: 2.8, baseAngle: 1.0, speed: 0.42, color: '#996677' },
            { orbitR: 1.2, baseAngle: 3.2, speed: -0.6, color: '#aa7788' },
        ];

        // Cyclin D-CDK4/6: amber particles, some nuclear
        cellA.cyclinD = [
            { orbitR: 2.6, baseAngle: 0.9, speed: 0.45, color: '#ddaa33', nuclear: false },
            { orbitR: 3.2, baseAngle: 3.4, speed: -0.38, color: '#ccaa44', nuclear: false },
            { orbitR: 1.0, baseAngle: 1.8, speed: 0.7, color: '#eebb44', nuclear: true },
        ];
        cellB.cyclinD = [
            { orbitR: 2.6, baseAngle: 3.8, speed: -0.42, color: '#ddaa33', nuclear: false },
            { orbitR: 3.2, baseAngle: 0.5, speed: 0.4, color: '#ccaa44', nuclear: false },
            { orbitR: 1.0, baseAngle: 4.5, speed: -0.65, color: '#eebb44', nuclear: true },
        ];

        // LATE ANAPHASE: sisters near poles, midzone assembles, anaphase B elongates spindle
        cellA.prophase = {
            condensation: 0.8, laminPhospho: 0.8, npcDisassembly: 0.9,
            envelopeVesicles: true, asterCount: 14, spindleForming: true,
            prometaphase: true, metaphase: true, anaphase: true, lateAnaphase: true,
            congressProgress: 1.0, auroraBActive: false, sacSatisfaction: 1.0,
            pole1Target: { x: 18, y: 6 }, pole2Target: { x: 24, y: 12 },
        };
        cellB.prophase = {
            condensation: 0.8, laminPhospho: 0.8, npcDisassembly: 0.9,
            envelopeVesicles: true, asterCount: 14, spindleForming: true,
            prometaphase: true, metaphase: true, anaphase: true, lateAnaphase: true,
            congressProgress: 1.0, auroraBActive: false, sacSatisfaction: 1.0,
            pole1Target: { x: 8, y: 20 }, pole2Target: { x: 14, y: 26 },
        };

        // Cohesin rings: fully cleaved by separase — fragments dispersed
        cellA.cohesins = [];
        cellB.cohesins = [];

        // Topoisomerase II: resolves catenanes
        cellA.topoII = [
            { baseAngle: 1.5, orbitR: 1.0, speed: 0.3, color: '#dd6644' },
            { baseAngle: 4.0, orbitR: 0.7, speed: -0.2, color: '#cc5533' },
        ];
        cellB.topoII = [
            { baseAngle: 4.2, orbitR: 1.0, speed: -0.28, color: '#dd6644' },
            { baseAngle: 1.0, orbitR: 0.7, speed: 0.22, color: '#cc5533' },
        ];

        // Cyclin B-CDK1: APC/C-Cdc20 degrading cyclin B — CDK1 activity declining
        cellA.cyclinB = [
            { orbitR: 3.5, baseAngle: 0.4, speed: 0.5, color: '#33bb88', nuclear: false },
            { orbitR: 2.2, baseAngle: 1.8, speed: 0.55, color: '#44cc99', nuclear: false },
            { orbitR: 0.7, baseAngle: 2.5, speed: -0.6, color: '#55ddaa', nuclear: true },
        ];
        cellB.cyclinB = [
            { orbitR: 3.5, baseAngle: 2.8, speed: -0.48, color: '#33bb88', nuclear: false },
            { orbitR: 2.2, baseAngle: 4.5, speed: -0.52, color: '#44cc99', nuclear: false },
            { orbitR: 0.7, baseAngle: 5.6, speed: 0.58, color: '#55ddaa', nuclear: true },
        ];

        // PLK1: master G2/M regulator
        cellA.plk1 = [
            { orbitR: 2.2, baseAngle: 1.5, speed: 0.55, color: '#ee6644' },
            { orbitR: 3.0, baseAngle: 4.8, speed: -0.48, color: '#dd5533' },
        ];
        cellB.plk1 = [
            { orbitR: 2.2, baseAngle: 4.2, speed: -0.52, color: '#ee6644' },
            { orbitR: 3.0, baseAngle: 1.5, speed: 0.46, color: '#dd5533' },
        ];

        // Aurora A kinase: centrosome maturation
        cellA.auroraA = [
            { targetPole: 1, speed: 0.8, phase: 0, color: '#88ddff' },
            { targetPole: 2, speed: 0.75, phase: 0.5, color: '#99eeff' },
        ];
        cellB.auroraA = [
            { targetPole: 1, speed: -0.78, phase: 0.3, color: '#88ddff' },
            { targetPole: 2, speed: -0.72, phase: 0.8, color: '#99eeff' },
        ];

        // Wee1: fully degraded (consolidated)

        // ANAPHASE: APC/C active, cohesin cleaved, sisters separating toward poles
        var growthRate = 1.0;

        function drawCell(cell, t, tOrbit, tCilia, tChromatin, tGrowth) {
            var breath = Math.sin(t * 2 * Math.PI);
            // Post-abscission: cells relax back to spherical, gentle G1 growth
            var growthPulse = (1 + Math.sin(tGrowth * 2 * Math.PI)) * 0.5; // 0 to 1
            var maxR = cell.radius + breath * 0.3 + growthPulse * growthRate;
            // Telophase cells elongate along spindle axis as furrow constricts
            var elongation = cell.separated ? (cell.prophase && cell.prophase.telophase ? 0.8 : 0.3) : 1.1;
            // Cytokinesis constriction: cell pinches at equator perpendicular to spindle
            var cytoConstriction = 0;
            if (cell.separated && cell.prophase && cell.prophase.telophase) {
                cytoConstriction = cell.prophase.abscission ? 0.85 : (cell.prophase.midbodyForming ? 0.70 : 0.55); // midbody: deep constriction, bridge narrowing
            }

            var nucleusPulse = Math.sin((t * 8000 / 5000) * 2 * Math.PI);
            // G2: nucleus fully swollen with 4n DNA, maximum pre-mitotic size
            var nucSwell = 0.6;
            var nucR = cell.nucleusRadius * 0.9 + nucleusPulse * 0.05;

            // Compute mitochondria
            var mitoPixels = {};
            var mitoCenters = [];
            for (var mi = 0; mi < cell.mitochondria.length; mi++) {
                var m = cell.mitochondria[mi];
                var mAngle = m.baseAngle + m.speed * tOrbit;
                var mcx = cell.cx + Math.cos(mAngle) * m.radius;
                var mcy = cell.cy + Math.sin(mAngle) * m.radius;
                mitoCenters.push({ x: mcx, y: mcy, angle: mAngle });
                var tangent = mAngle + Math.PI / 2;
                var pts = [
                    { x: Math.round(mcx), y: Math.round(mcy) },
                    { x: Math.round(mcx + Math.cos(tangent) * 0.8), y: Math.round(mcy + Math.sin(tangent) * 0.8) },
                    { x: Math.round(mcx - Math.cos(tangent) * 0.8), y: Math.round(mcy - Math.sin(tangent) * 0.8) },
                ];
                mitoPixels[pts[0].x + ',' + pts[0].y] = m.cristaeColor;
                mitoPixels[pts[1].x + ',' + pts[1].y] = m.bodyColor;
                mitoPixels[pts[2].x + ',' + pts[2].y] = m.bodyColor;
            }

            // Post-abscission: single unified nucleus at cell center
            var envPixels = {};
            var nucPixels = {};
            var envPulse = Math.sin(t * 2 * Math.PI * 1.3) * 0.08;
            var envR = nucR * 1.0 + envPulse;
            if (cell.separated && cell.prophase && cell.prophase.telophase) {
                // TELOPHASE: nuclear envelopes reform around each pole's chromatid cluster
                var teleNucR = 1.2;
                var poles = [cell.prophase.pole1Target, cell.prophase.pole2Target];
                for (var pi2 = 0; pi2 < poles.length; pi2++) {
                    var pole = poles[pi2];
                    for (var ea = 0; ea < 16; ea++) {
                        var eAngle = ea * 2 * Math.PI / 16;
                        // Envelope reassembly
                        var reformPulse = Math.sin(t * 2 * Math.PI * 2 + ea * 0.7 + pi2 * 3);
                        // Abscission: envelope fully sealed, no gaps remain
                        if (!cell.prophase.abscission && ea % 8 === 0 && reformPulse > 0.6) continue;
                        var ex = Math.round(pole.x + Math.cos(eAngle) * teleNucR);
                        var ey = Math.round(pole.y + Math.sin(eAngle) * teleNucR);
                        if (ex >= 0 && ex < size && ey >= 0 && ey < size) {
                            envPixels[ex + ',' + ey] = reformPulse > 0 ? '#eebb55' : cell.nucleusEdge;
                        }
                    }
                    // Nucleolus reforms at each pole
                    if (pole.x >= 0 && pole.x < size && pole.y >= 0 && pole.y < size) {
                        nucPixels[pole.x + ',' + pole.y] = cell.nucleolusColor;
                    }
                }
            } else if (cell.separated) {
                // Nucleus — in prophase, envelope starts to become discontinuous
                var unifiedNucR = nucR + 0.9;
                var isProphase = cell.prophase ? true : false;
                var isPrometa = cell.prophase && cell.prophase.prometaphase;
                for (var ea = 0; ea < 24; ea++) {
                    var eAngle = ea * 2 * Math.PI / 24;
                    if (isPrometa) {
                        if (ea % 8 !== 0) continue;
                        var flickerT = Math.sin(t * 2 * Math.PI * 4 + ea * 1.2);
                        if (flickerT > -0.4) continue;
                    } else if (isProphase && cell.prophase.laminPhospho > 0) {
                        // Lamin phosphorylation: envelope flickers more as CDK1 weakens lamina
                        var flickerT = Math.sin(t * 2 * Math.PI * 3 + ea * 0.8);
                        var laminThresh = -0.3 + cell.prophase.laminPhospho * 0.8;
                        // At critical phosphorylation (>0.6), most envelope positions are gaps
                        var gapPositions = cell.prophase.laminPhospho > 0.6
                            ? (ea % 2 === 0 || ea % 3 === 0 || ea % 5 === 1)
                            : cell.prophase.laminPhospho > 0.35
                            ? (ea % 3 === 0 || ea % 5 === 1 || ea % 7 === 3)
                            : (ea % 4 === 0 || ea % 6 === 2);
                        if (gapPositions && flickerT > laminThresh) continue;
                    } else if (isProphase) {
                        var flickerT = Math.sin(t * 2 * Math.PI * 3 + ea * 0.8);
                        if ((ea % 4 === 0 || ea % 6 === 2) && flickerT > -0.1) continue;
                    }
                    var ex = Math.round(cell.cx + Math.cos(eAngle) * unifiedNucR);
                    var ey = Math.round(cell.cy + Math.sin(eAngle) * unifiedNucR);
                    if (ex >= 0 && ex < size && ey >= 0 && ey < size) {
                        // Lamin phosphorylation dims envelope — lamina dissolving into soluble dimers
                        var envColor = isProphase
                            ? (cell.prophase.laminPhospho > 0.6 ? '#997711' : (cell.prophase.laminPhospho > 0.35 ? '#bb8822' : (cell.prophase.laminPhospho > 0.1 ? '#cc9933' : '#ddaa33')))
                            : cell.nucleusEdge;
                        envPixels[ex + ',' + ey] = envColor;
                    }
                }
                nucPixels[cell.cx + ',' + cell.cy] = cell.nucleolusColor;
                nucPixels[(cell.cx + 1) + ',' + cell.cy] = cell.nucleusColor;
                nucPixels[(cell.cx - 1) + ',' + cell.cy] = cell.nucleusColor;
                // Envelope vesicles: membrane fragments drifting outward as NE breaks apart
                if (cell.prophase && cell.prophase.envelopeVesicles) {
                    var tVes2 = (t * 8000 / 6000) % 1.0;
                    for (var evi = 0; evi < 6; evi++) {
                        var evAngle = evi * 2 * Math.PI / 6 + tVes2 * 0.5;
                        // Vesicles drift outward from nucleus edge
                        var evDrift = unifiedNucR + 0.5 + ((tVes2 + evi * 0.17) % 1.0) * 2.0;
                        var evx = Math.round(cell.cx + Math.cos(evAngle) * evDrift);
                        var evy = Math.round(cell.cy + Math.sin(evAngle) * evDrift);
                        var evDist = Math.sqrt((evx - cell.cx) * (evx - cell.cx) + (evy - cell.cy) * (evy - cell.cy));
                        if (evDist < maxR - 0.5 && evx >= 0 && evx < size && evy >= 0 && evy < size) {
                            var evPulse = Math.sin(tVes2 * 2 * Math.PI + evi * 1.3);
                            envPixels[evx + ',' + evy] = evPulse > 0 ? '#aa8833' : '#887722';
                        }
                    }
                }
            } else if (cell.centrosomes && cell.centrosomes.length >= 2) {
                var pole0 = cell.centrosomes[0];
                var pole1 = cell.centrosomes[1];
                var reformR = envR + nucSwell;
                for (var ea = 0; ea < 20; ea++) {
                    var eAngle = ea * 2 * Math.PI / 20;
                    var ex0 = Math.round(pole0.x + Math.cos(eAngle) * reformR * 0.7);
                    var ey0 = Math.round(pole0.y + Math.sin(eAngle) * reformR * 0.7);
                    var ex1 = Math.round(pole1.x + Math.cos(eAngle) * reformR * 0.7);
                    var ey1 = Math.round(pole1.y + Math.sin(eAngle) * reformR * 0.7);
                    if (ex0 >= 0 && ex0 < size && ey0 >= 0 && ey0 < size) {
                        envPixels[ex0 + ',' + ey0] = cell.nucleusEdge;
                    }
                    if (ex1 >= 0 && ex1 < size && ey1 >= 0 && ey1 < size) {
                        envPixels[ex1 + ',' + ey1] = cell.nucleusEdge;
                    }
                }
                nucPixels[pole0.x + ',' + pole0.y] = cell.nucleolusColor;
                nucPixels[pole1.x + ',' + pole1.y] = cell.nucleolusColor;
                nucPixels[(pole0.x + 1) + ',' + pole0.y] = cell.nucleusColor;
                nucPixels[(pole1.x - 1) + ',' + pole1.y] = cell.nucleusColor;
            }

            // PROPHASE: chromatin condenses into distinct chromosomes
            var chrPixels = {};
            if (cell.separated) {
                var allChromatin = cell.chromatin.concat(cell.sisterChromatin || []);
                var cond = cell.prophase ? cell.prophase.condensation : 0;
                var isPrometa = cell.prophase && cell.prophase.prometaphase;
                var isMeta = cell.prophase && cell.prophase.metaphase;
                var isAnaphase = cell.prophase && cell.prophase.anaphase;
                var isTelophase = cell.prophase && cell.prophase.telophase;
                // Metaphase plate: midpoint between the two poles
                var plateX = cell.cx;
                var plateY = cell.cy;
                if (isPrometa && cell.prophase.pole1Target && cell.prophase.pole2Target) {
                    plateX = (cell.prophase.pole1Target.x + cell.prophase.pole2Target.x) / 2;
                    plateY = (cell.prophase.pole1Target.y + cell.prophase.pole2Target.y) / 2;
                }
                for (var chi = 0; chi < allChromatin.length; chi++) {
                    var diffuseR, diffAngle, driftX, driftY;
                    if (isTelophase) {
                        // TELOPHASE: chromatids arrived at poles, clustered tightly, decondensing
                        var halfLen = Math.floor(allChromatin.length / 2);
                        var goesToPole1 = chi < halfLen;
                        var targetPole = goesToPole1 ? cell.prophase.pole1Target : cell.prophase.pole2Target;
                        var localIdx = goesToPole1 ? chi : (chi - halfLen);
                        // Tight cluster at pole — slight diffuse wobble as they decondense
                        var deconAngle = localIdx * 2 * Math.PI / halfLen + tChromatin * 0.03;
                        var deconR = 0.5 + Math.sin(tChromatin * 0.05 + chi * 0.8) * 0.3;
                        driftX = Math.round(targetPole.x + Math.cos(deconAngle) * deconR);
                        driftY = Math.round(targetPole.y + Math.sin(deconAngle) * deconR);
                    } else if (isAnaphase) {
                        // LATE ANAPHASE: sister chromatids nearly at poles
                        var halfLen = Math.floor(allChromatin.length / 2);
                        var goesToPole1 = chi < halfLen;
                        var targetPole = goesToPole1 ? cell.prophase.pole1Target : cell.prophase.pole2Target;
                        // Late anaphase: sisters 85% to poles, slight oscillation as they decelerate
                        var anaBase = cell.prophase.lateAnaphase ? 0.85 : 0.5;
                        var anaProgress = anaBase + Math.sin(tChromatin * 0.06 + chi * 0.3) * 0.08;
                        var spindleAngle = Math.atan2(
                            cell.prophase.pole2Target.y - cell.prophase.pole1Target.y,
                            cell.prophase.pole2Target.x - cell.prophase.pole1Target.x
                        );
                        var perpAngle = spindleAngle + Math.PI / 2;
                        var localIdx = goesToPole1 ? chi : (chi - halfLen);
                        var localSpread = (localIdx - halfLen / 2) * 0.4;
                        // Interpolate from plate to pole
                        driftX = Math.round(plateX + (targetPole.x - plateX) * anaProgress + Math.cos(perpAngle) * localSpread * (1 - anaProgress * 0.5));
                        driftY = Math.round(plateY + (targetPole.y - plateY) * anaProgress + Math.sin(perpAngle) * localSpread * (1 - anaProgress * 0.5));
                    } else if (isMeta) {
                        // METAPHASE: chromosomes locked at metaphase plate in a neat line
                        var spindleAngle = Math.atan2(
                            cell.prophase.pole2Target.y - cell.prophase.pole1Target.y,
                            cell.prophase.pole2Target.x - cell.prophase.pole1Target.x
                        );
                        var perpAngle = spindleAngle + Math.PI / 2;
                        var plateSpread = (chi - allChromatin.length / 2) * 0.35;
                        driftX = Math.round(plateX + Math.cos(perpAngle) * plateSpread);
                        driftY = Math.round(plateY + Math.sin(perpAngle) * plateSpread);
                    } else if (isPrometa) {
                        // Prometaphase: chromosomes congress toward metaphase plate
                        // congressProgress controls how tightly aligned they are
                        var baseFrac = cell.prophase.congressProgress || 0.5;
                        var congressFrac = baseFrac + Math.sin(tChromatin * 0.08 + chi * 0.9) * (0.15 * (1.0 - baseFrac));
                        var spindleAngle = Math.atan2(
                            cell.prophase.pole2Target.y - cell.prophase.pole1Target.y,
                            cell.prophase.pole2Target.x - cell.prophase.pole1Target.x
                        );
                        var perpAngle = spindleAngle + Math.PI / 2;
                        var plateSpread = (chi - allChromatin.length / 2) * 0.35;
                        var fromCenterX = cell.cx + Math.cos(diffAngle = chi * 2 * Math.PI / allChromatin.length) * 0.3;
                        var fromCenterY = cell.cy + Math.sin(chi * 2 * Math.PI / allChromatin.length) * 0.3;
                        var targetX = plateX + Math.cos(perpAngle) * plateSpread;
                        var targetY = plateY + Math.sin(perpAngle) * plateSpread;
                        // Jitter decreases as congress progresses — chromosomes settle into alignment
                        var jitterAmp = 0.4 * (1.0 - baseFrac);
                        var jitter = Math.sin(tChromatin * 0.2 + chi * 2.1) * jitterAmp;
                        driftX = Math.round(fromCenterX + (targetX - fromCenterX) * congressFrac + jitter);
                        driftY = Math.round(fromCenterY + (targetY - fromCenterY) * congressFrac + jitter);
                    } else {
                        // Condensing: radius shrinks as condensation increases
                        diffuseR = (1.0 - cond) * 0.6 + cond * 0.2 + Math.sin(tChromatin * 0.3 + chi * 1.2) * (0.15 * (1.0 - cond));
                        diffAngle = chi * 2 * Math.PI / allChromatin.length + tChromatin * 0.02 * (1.0 - cond);
                        driftX = Math.round(cell.cx + Math.cos(diffAngle) * diffuseR);
                        driftY = Math.round(cell.cy + Math.sin(diffAngle) * diffuseR);
                    }
                    // Condensed chromosomes are brighter, thicker — condensin complexes glow
                    var condPulse = Math.sin(tChromatin * 0.15 + chi * 0.7);
                    var chrColor = cond > 0.5 ? (condPulse > 0 ? '#e0a070' : '#d09060') : (condPulse > 0.3 ? '#d09060' : '#c08050');
                    // Telophase: chromatids decondensing — softer, diffusing color
                    if (isTelophase) {
                        var deconGlow = Math.sin(tChromatin * 0.08 + chi * 0.5);
                        chrColor = deconGlow > 0 ? '#d8b888' : '#c8a878';
                    } else if (isAnaphase) {
                        var halfLen2 = Math.floor(allChromatin.length / 2);
                        var anaGlow = Math.sin(tChromatin * 0.1 + chi * 0.6);
                        // Chromatids heading to pole1 vs pole2 get subtly different hues
                        chrColor = chi < halfLen2
                            ? (anaGlow > 0 ? '#f8d898' : '#e8c888')
                            : (anaGlow > 0 ? '#f0c890' : '#e0b880');
                    } else if (isMeta) {
                        var tensionGlow = Math.sin(tChromatin * 0.08 + chi * 0.5);
                        chrColor = tensionGlow > 0 ? '#f4c488' : '#e8b878';
                    } else if (isPrometa) {
                        var kineGlow = Math.sin(tChromatin * 0.12 + chi * 1.3);
                        // Near-metaphase: chromosomes brighter as bipolar tension increases
                        var sacGlow = cell.prophase.sacSatisfaction || 0;
                        chrColor = sacGlow > 0.5
                            ? (kineGlow > 0.2 ? '#f4c488' : '#e8b478')  // tension-bright, approaching metaphase
                            : (kineGlow > 0.2 ? '#f0b878' : '#e0a868');
                    }
                    if (driftX >= 0 && driftX < size && driftY >= 0 && driftY < size) {
                        chrPixels[driftX + ',' + driftY] = chrColor;
                    }
                    // Paired sister chromatid (adjacent pixel) — NOT in anaphase (sisters separated)
                    if ((cond > 0.5 || isPrometa || isMeta) && !isAnaphase) {
                        var sAngle = (isPrometa || isMeta)
                            ? Math.atan2(cell.prophase.pole2Target.y - cell.prophase.pole1Target.y,
                                         cell.prophase.pole2Target.x - cell.prophase.pole1Target.x)
                            : (chi * 2 * Math.PI / allChromatin.length + tChromatin * 0.02);
                        var sx = Math.round(driftX + Math.cos(sAngle) * 0.6);
                        var sy = Math.round(driftY + Math.sin(sAngle) * 0.6);
                        if (sx >= 0 && sx < size && sy >= 0 && sy < size) {
                            // Metaphase: sisters under tension pulse with securin glow
                            var sisterColor = isMeta
                                ? (condPulse > 0 ? '#e8b478' : '#d8a468')
                                : (condPulse > 0 ? '#d8a068' : '#c89058');
                            chrPixels[sx + ',' + sy] = sisterColor;
                        }
                    }
                }
            } else if (cell.centrosomes && cell.centrosomes.length >= 2) {
                var pole0 = cell.centrosomes[0];
                var pole1 = cell.centrosomes[1];
                for (var chi = 0; chi < cell.chromatin.length; chi++) {
                    var diffuseR = 0.4 + Math.sin(tChromatin * 0.5 + chi * 1.6) * 0.2;
                    var diffAngle = chi * 2 * Math.PI / cell.chromatin.length + tChromatin * 0.08;
                    var driftX = Math.round(pole0.x + Math.cos(diffAngle) * diffuseR);
                    var driftY = Math.round(pole0.y + Math.sin(diffAngle) * diffuseR);
                    chrPixels[driftX + ',' + driftY] = '#c08050';
                }
                if (cell.sisterChromatin) {
                    for (var rci = 0; rci < cell.sisterChromatin.length; rci++) {
                        var diffR2 = 0.4 + Math.sin(tChromatin * 0.5 + rci * 1.6 + 1.0) * 0.2;
                        var diffAngle2 = rci * 2 * Math.PI / cell.sisterChromatin.length + tChromatin * 0.08 + 0.5;
                        var sDriftX = Math.round(pole1.x + Math.cos(diffAngle2) * diffR2);
                        var sDriftY = Math.round(pole1.y + Math.sin(diffAngle2) * diffR2);
                        chrPixels[sDriftX + ',' + sDriftY] = '#c08050';
                    }
                }
            }

            // Condensins: CDK1-phosphorylated condensin I/II loading onto chromosomes
            // They compact chromatin into visible chromosome fibers
            var condensinPixels = {};
            if (cell.prophase && cell.separated) {
                for (var coi = 0; coi < allChromatin.length; coi++) {
                    var chr = allChromatin[coi];
                    // Condensin glows near each chromatin pixel
                    var conAngle = tChromatin * 0.1 + coi * 1.5;
                    var conR = 0.6;
                    var conX = Math.round(chr.x + Math.cos(conAngle) * conR);
                    var conY = Math.round(chr.y + Math.sin(conAngle) * conR);
                    if (conX >= 0 && conX < size && conY >= 0 && conY < size) {
                        var conPulse = Math.sin(tChromatin * 0.08 + coi * 2.1);
                        condensinPixels[conX + ',' + conY] = conPulse > 0 ? '#aaddff' : '#88bbdd';
                    }
                }
            }

            // S phase: centrosome duplication — single centrosome splits into two
            // They remain close but visibly separate, preparing for next mitosis
            var centPixels = {};
            var furrowPixels = {};
            if (cell.centrosomes) {
                if (cell.separated && cell.prophase) {
                    // PROPHASE: centrosomes migrate to opposite poles of the nucleus
                    var cs = cell.centrosomes[0];
                    var tCentMig = (t * 8000 / 9000) % 1.0;
                    // Interpolate centrosome positions toward their pole targets
                    // Prometaphase: poles have reached their targets
                    var migFrac = cell.prophase.prometaphase ? 0.95 : 0.6 + Math.sin(tCentMig * 2 * Math.PI * 0.2) * 0.08;
                    var p1x = cs.x + (cell.prophase.pole1Target.x - cs.x) * migFrac;
                    var p1y = cs.y + (cell.prophase.pole1Target.y - cs.y) * migFrac;
                    var p2x = cs.x + (cell.prophase.pole2Target.x - cs.x) * migFrac;
                    var p2y = cs.y + (cell.prophase.pole2Target.y - cs.y) * migFrac;
                    var c1x = Math.round(p1x);
                    var c1y = Math.round(p1y);
                    var c2x = Math.round(p2x);
                    var c2y = Math.round(p2y);
                    // Two bright centrosomes at migrating positions
                    if (c1x >= 0 && c1x < size && c1y >= 0 && c1y < size) {
                        centPixels[c1x + ',' + c1y] = '#eedd55';
                    }
                    if (c2x >= 0 && c2x < size && c2y >= 0 && c2y < size) {
                        centPixels[c2x + ',' + c2y] = '#eedd55';
                    }
                    // PCM halos around each migrating centrosome
                    for (var pcmi = 0; pcmi < 4; pcmi++) {
                        var pcmA = pcmi * Math.PI / 2 + tCentMig * 2 * Math.PI * 0.15;
                        var hx1 = Math.round(p1x + Math.cos(pcmA) * 0.9);
                        var hy1 = Math.round(p1y + Math.sin(pcmA) * 0.9);
                        var hx2 = Math.round(p2x + Math.cos(pcmA + 0.5) * 0.9);
                        var hy2 = Math.round(p2y + Math.sin(pcmA + 0.5) * 0.9);
                        if (hx1 >= 0 && hx1 < size && hy1 >= 0 && hy1 < size) {
                            centPixels[hx1 + ',' + hy1] = '#aa993d';
                        }
                        if (hx2 >= 0 && hx2 < size && hy2 >= 0 && hy2 < size) {
                            centPixels[hx2 + ',' + hy2] = '#aa993d';
                        }
                    }
                    // ASTER MICROTUBULES: radial fibers from each centrosome
                    var asterCount = cell.prophase.asterCount || 6;
                    var asterLen = asterCount >= 12 ? 4 : (asterCount >= 10 ? 3 : 2); // asters lengthen as gamma-TuRC saturates
                    for (var ai = 0; ai < asterCount; ai++) {
                        var astAngle = ai * 2 * Math.PI / asterCount + tCentMig * 0.3;
