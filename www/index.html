<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="32" height="32"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // Two daughter cells, born from division
        // Canvas expanded to 32x32 to fit both cells
        var size = 32;

        // Extracellular medium
        var mediumColor = '#e8e0d8';

        // Daughter cell A: upper-right
        var cellA = {
            cx: 21, cy: 9,
            radius: 5.5,
            nucleusCx: 21, nucleusCy: 9,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            // Inherited organelles
            erSegments: [
                { x1: 19, y1: 7, x2: 17, y2: 5 },
                { x1: 23, y1: 7, x2: 25, y2: 5 },
                { x1: 19, y1: 11, x2: 17, y2: 13 },
                { x1: 23, y1: 11, x2: 25, y2: 13 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 0.5, speed: 0.8, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 3.2, speed: -0.6, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '19,10': '#cc9944', '19,11': '#cc9944', '18,10': '#ddaa55' },
            chromatin: [
                { x: 21, y: 8 }, { x: 22, y: 9 }, { x: 21, y: 10 }, { x: 20, y: 9 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 22, y: 8 }, { x: 22, y: 10 }, { x: 20, y: 10 }, { x: 20, y: 8 },
            ],
            // Centrosomes: single unduplicated centrosome at G1 (will duplicate in S phase)
            centrosomes: [
                { x: 23, y: 8 },
                { x: 23, y: 9 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 0.3, color: '#33cc99' },
                { angle: 2.5, color: '#cc3399' },
            ],
        };

        // Daughter cell B: lower-left (drifted slightly after separation)
        var cellB = {
            cx: 11, cy: 23,
            radius: 5.5,
            nucleusCx: 11, nucleusCy: 23,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 9, y1: 21, x2: 7, y2: 19 },
                { x1: 13, y1: 21, x2: 15, y2: 19 },
                { x1: 9, y1: 25, x2: 7, y2: 27 },
                { x1: 13, y1: 25, x2: 15, y2: 27 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 2.5, speed: -0.7, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 5.8, speed: 0.5, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '9,24': '#cc9944', '9,25': '#cc9944', '8,24': '#ddaa55' },
            chromatin: [
                { x: 11, y: 22 }, { x: 12, y: 23 }, { x: 11, y: 24 }, { x: 10, y: 23 },
            ],
            // G1: chromatin fully decondensed, merged into single interphase nucleus
            sisterChromatin: [
                { x: 12, y: 22 }, { x: 12, y: 24 }, { x: 10, y: 24 }, { x: 10, y: 22 },
            ],
            // Centrosomes: single unduplicated centrosome at G1
            centrosomes: [
                { x: 13, y: 22 },
                { x: 13, y: 23 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 3.5, color: '#3399cc' },
                { angle: 5.0, color: '#cc9933' },
            ],
        };

        // Build cilia for each cell
        var numCilia = 10;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cellA.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 });
            cellB.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 + 0.2 });
        }

        // --- HELPERS ---
        function inB(x, y) { return x >= 0 && x < size && y >= 0 && y < size; }
        // Generic orbiter renderer: particles orbiting cell center
        function renderOrbiters(cell, items, tOrbit, t, period, opts) {
            var px = {};
            if (!items || !cell.separated) return px;
            var tp = (t * 8000 / period) % 1.0;
            var pr = opts.pulseRate || 1, ps = opts.phaseSpread || 1.4, th = opts.threshold || 0.2;
            var minR = opts.minR || 0, mxR = opts.maxR || 999;
            for (var i = 0; i < items.length; i++) {
                var it = items[i];
                var a = it.baseAngle + it.speed * tOrbit;
                var r = it.orbitR;
                if (opts.nuclear !== undefined && it.nuclear !== undefined) {
                    // nuclear vs cytoplasmic routing
                    r = it.orbitR;
                }
                var x = Math.round(cell.cx + Math.cos(a) * r);
                var y = Math.round(cell.cy + Math.sin(a) * r);
                var dx = x - cell.cx, dy = y - cell.cy, d = Math.sqrt(dx*dx+dy*dy);
                var p = Math.sin(tp * 2 * Math.PI * pr + i * ps);
                var inRange = (it.nuclear !== undefined) ?
                    (it.nuclear ? d <= (opts.nucR || 2) + 0.5 : d < mxR && d > (opts.nucR || 2) + 0.8) :
                    (d >= minR && d <= mxR);
                if (inRange && inB(x, y)) {
                    var hi = (it.nuclear && opts.nucHi) ? (p > (opts.nucTh||0.1) ? opts.nucHi : (opts.nucLo||it.color)) : null;
                    px[x+','+y] = hi || (p > th ? (opts.hiColor || it.color) : it.color);
                }
                if (opts.spark && p > 0.6 && inB(x,y)) {
                    var sa = a + 0.8, sr = r + 0.6;
                    var sx = Math.round(cell.cx + Math.cos(sa) * sr);
                    var sy = Math.round(cell.cy + Math.sin(sa) * sr);
                    var sd = Math.sqrt((sx-cell.cx)*(sx-cell.cx)+(sy-cell.cy)*(sy-cell.cy));
                    if (sd < mxR && inB(sx, sy)) px[sx+','+sy] = opts.sparkColor || opts.hiColor;
                }
                // Ripple trail for phosphatases
                if (opts.ripple && p > 0.5) {
                    var ra = a + 0.4, rr = r - 0.5;
                    var rx = Math.round(cell.cx + Math.cos(ra) * rr);
                    var ry = Math.round(cell.cy + Math.sin(ra) * rr);
                    if (Math.sqrt((rx-cell.cx)*(rx-cell.cx)+(ry-cell.cy)*(ry-cell.cy)) < mxR && inB(rx,ry)) {
                        px[rx+','+ry] = opts.rippleColor || opts.hiColor;
                    }
                }
            }
            return px;
        }

        // Precompute ER data for a cell
        function buildERData(cell) {
            cell.erPixels = {};
            cell.erPaths = [];
            for (var si = 0; si < cell.erSegments.length; si++) {
                var seg = cell.erSegments[si];
                var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
                var path = [];
                for (var step = 0; step <= steps; step++) {
                    var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                    var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                    cell.erPixels[px + ',' + py] = true;
                    path.push({ x: px, y: py });
                }
                cell.erPaths.push(path);
            }
        }
        buildERData(cellA);
        buildERData(cellB);

        // Nutrient particles in the medium
        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 28, y: 5, color: '#88bb55' },
            { x: 4, y: 28, color: '#55aa88' },
            { x: 27, y: 27, color: '#55aa88' },
            { x: 1, y: 15, color: '#bbaa44' },
            { x: 30, y: 17, color: '#bbaa44' },
            { x: 16, y: 1, color: '#88bb55' },
            { x: 15, y: 30, color: '#55aa88' },
            { x: 5, y: 8, color: '#bbaa44' },
            { x: 26, y: 3, color: '#88bb55' },
            { x: 3, y: 25, color: '#55aa88' },
            { x: 28, y: 20, color: '#bbaa44' },
            // New nutrients between the cells — the space where division happened
            { x: 16, y: 16, color: '#bbaa44' },
            { x: 15, y: 15, color: '#55aa88' },
        ];

        // Abscission scar: fading remnant — phagocytes clearing debris
        var abscissionScar = { x: 16, y: 16, color: '#887733' };

        // Midbody remnants (Flemming bodies): nearly degraded by autophagy
        // Dimmer, breaking down into recyclable components
        // Includes old remnants from first division + fresh remnants from second division
        var midbodyRemnants = [
            { x: 23, y: 5, color: '#556677', glowColor: '#667788' },
            { x: 8, y: 27, color: '#556677', glowColor: '#667788' },
            // Fresh Flemming bodies from cell A's division (midpoint of pole1 & pole2)
            { x: 21, y: 9, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
            // Fresh Flemming body from cell B's division
            { x: 11, y: 23, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
        ];

        // Post-mitotic nuclear reassembly: granddaughter nuclei rebuild nuclear architecture
        // Nuclear envelopes sealed, nucleoli reassemble from rDNA, Cajal bodies form
        var granddaughterNuclei = [
            { x: 18, y: 6, parent: 'A', reactivation: 0.3, nucleolusSize: 0.4, cajalAngle: 0.8 },
            { x: 24, y: 12, parent: 'A', reactivation: 0.25, nucleolusSize: 0.35, cajalAngle: 2.5 },
            { x: 8, y: 20, parent: 'B', reactivation: 0.35, nucleolusSize: 0.45, cajalAngle: 4.2 },
            { x: 14, y: 26, parent: 'B', reactivation: 0.2, nucleolusSize: 0.3, cajalAngle: 5.8 },
        ];

        // Granddaughter cell bodies: thin cytoplasmic shells forming around each nucleus
        // Post-division cells establish their own membranes and minimal cytoplasm
        // Cell specialization: granddaughters begin to differentiate
        // GD0 & GD2: absorptive enterocytes (more microvilli, brush border enzymes)
        // GD1 & GD3: secretory goblet cells (mucin granules, fewer microvilli)
        var cellTypes = ['enterocyte', 'goblet', 'enterocyte', 'goblet'];

        for (var gbi = 0; gbi < granddaughterNuclei.length; gbi++) {
            var gn = granddaughterNuclei[gbi];
            gn.cellType = cellTypes[gbi];
            gn.bodyRadius = 2.2 + gn.nucleolusSize * 0.8;
            // Goblet cells have slightly different cytoplasm (more secretory)
            gn.membraneColor = gn.cellType === 'goblet' ? '#556655' : '#555555';
            gn.cytoColor = gn.cellType === 'goblet' ? '#5b3a10' : '#6b2a00';
            gn.speckles = [
                { angle: gn.cajalAngle + 2.1, dist: 0.6, color: '#88ddaa' },
                { angle: gn.cajalAngle + 4.3, dist: 0.5, color: '#77cc99' },
            ];
            // Small mitochondrion inherited during division
            gn.mitoAngle = gbi * 1.57 + 0.4;
            gn.mitoSpeed = (gbi % 2 === 0 ? 0.6 : -0.5);
            gn.erStubs = [
                { angle: gn.cajalAngle + 1.0, length: 1.5 },
                { angle: gn.cajalAngle + 3.5, length: 1.2 },
            ];
            // Golgi ministacks: small trans-Golgi cisternae assembling near ER exit sites
            gn.golgiAngle = gn.cajalAngle + 2.3;
            gn.golgiDist = gn.bodyRadius * 0.55;
            // Free ribosomes (polyribosomes): clusters in cytoplasm for cap-dependent translation
            // 3 polyribosome clusters per granddaughter, positioned between ER and membrane
            gn.freeRibosomes = [
                { angle: gn.cajalAngle + 0.5, dist: gn.bodyRadius * 0.45, phase: gbi * 0.7 },
                { angle: gn.cajalAngle + 2.0, dist: gn.bodyRadius * 0.55, phase: gbi * 0.7 + 1.2 },
                { angle: gn.cajalAngle + 4.5, dist: gn.bodyRadius * 0.40, phase: gbi * 0.7 + 2.4 },
            ];
            // Peroxisome: single small organelle budding from ER, catalase/oxidase activity
            gn.peroxAngle = gn.cajalAngle + 3.0;
            gn.peroxDist = gn.bodyRadius * 0.50;
            gn.peroxSpeed = (gbi % 2 === 0 ? 0.4 : -0.35);
            // Lysosome: acidic digestive organelle, degrades endocytosed material
            gn.lysoAngle = gn.cajalAngle + 4.8;
            gn.lysoDist = gn.bodyRadius * 0.48;
            gn.lysoSpeed = (gbi % 2 === 0 ? -0.3 : 0.35);
            // Centrosome: single centriole pair establishing MTOC for cytoskeletal organization
            gn.centrosomeAngle = gn.cajalAngle + 5.5;
            gn.centrosomeDist = 1.0 + gn.nucleolusSize * 0.3;
            // Primary cilium: single non-motile sensory antenna extending from mother centriole
            // Grows during G1 — detects extracellular signals (Hedgehog, Wnt, PDGF)
            // Axoneme extends 2-3 pixels outward from centrosome through membrane into ECM
            gn.ciliumAngle = gn.centrosomeAngle + 0.15; // nearly aligned with centrosome
            gn.ciliumLength = 2.5 + gn.nucleolusSize * 0.5; // grows with cell maturity
            gn.ciliumPhase = gbi * 1.3; // slight sway phase offset per cell
            // Early endosomes: clathrin-coated pits internalize ECM nutrients
            // Small vesicles pinch from membrane and traffic inward toward lysosomes
            // Each granddaughter has 2 endocytic vesicles at different cycle phases
            gn.endosomes = [
                { memAngle: gn.cajalAngle + 1.5, speed: 0.32, phase: gbi * 0.6, color: '#aa55cc' },
                { memAngle: gn.cajalAngle + 4.0, speed: 0.28, phase: gbi * 0.6 + 0.5, color: '#9944bb' },
            ];
            // Multivesicular body (MVB): late endosome compartment containing intraluminal vesicles
            // MVBs orbit between endosomes and membrane; when they fuse with PM, exosomes are released
            gn.mvbAngle = gn.lysoAngle + 1.2;
            gn.mvbDist = gn.bodyRadius * 0.42;
            gn.mvbSpeed = (gbi % 2 === 0 ? 0.25 : -0.22);
            // Exosome release: 2 exosomes per granddaughter, ejected from MVB fusion with membrane
            // Tiny vesicles (~0.1µm) carrying proteins/RNA, drift toward neighboring cells
            gn.exosomes = [
                { releaseAngle: gn.mvbAngle + 0.5, driftAngle: gbi * 1.57 + 0.3, speed: 0.18, phase: gbi * 0.4, color: '#cc88dd' },
                { releaseAngle: gn.mvbAngle + 2.8, driftAngle: gbi * 1.57 + 2.5, speed: 0.15, phase: gbi * 0.4 + 0.5, color: '#bb77cc' },
            ];
            // Autophagosome: double-membrane vesicle engulfing cytoplasmic material for lysosomal degradation
            // Phagophore nucleates from ER-mitochondria contact site, seals, then fuses with lysosome
            // Each granddaughter has 2 autophagosomes at different maturation stages
            gn.autophagosomes = [
                { angle: gn.lysoAngle + 2.0, dist: gn.bodyRadius * 0.50, speed: (gbi % 2 === 0 ? 0.20 : -0.18), phase: gbi * 0.5, color: '#668844', matureColor: '#887744' },
                { angle: gn.lysoAngle + 4.5, dist: gn.bodyRadius * 0.38, speed: (gbi % 2 === 0 ? -0.16 : 0.22), phase: gbi * 0.5 + 0.5, color: '#557733', matureColor: '#776633' },
            ];
            // Proteasome: 26S barrel-shaped complex for ubiquitin-dependent protein degradation
            // Complements autophagy — short-lived regulatory proteins (cyclins, p53, IκB) are tagged
            // with polyubiquitin chains and fed into the proteasome's catalytic core
            gn.proteasomes = [
                { angle: gn.cajalAngle + 1.8, dist: gn.bodyRadius * 0.52, speed: (gbi % 2 === 0 ? 0.30 : -0.27), phase: gbi * 0.6, color: '#6688aa', activeColor: '#88bbdd' },
                { angle: gn.cajalAngle + 4.2, dist: gn.bodyRadius * 0.44, speed: (gbi % 2 === 0 ? -0.25 : 0.32), phase: gbi * 0.6 + 0.5, color: '#557799', activeColor: '#77aacc' },
            ];
            // Lipid droplets: neutral lipid storage organelles budding from smooth ER
            // Monolayer phospholipid shell surrounding triacylglycerol/cholesterol ester core
            // Pulse with hormone-sensitive lipase activity — energy reserves for the growing cell
            gn.lipidDroplets = [
                { angle: gn.cajalAngle + 0.8, dist: gn.bodyRadius * 0.58, speed: (gbi % 2 === 0 ? 0.15 : -0.13), phase: gbi * 0.3, coreColor: '#ddcc44', shellColor: '#bbaa33' },
                { angle: gn.cajalAngle + 3.6, dist: gn.bodyRadius * 0.46, speed: (gbi % 2 === 0 ? -0.12 : 0.17), phase: gbi * 0.3 + 0.5, coreColor: '#ccbb33', shellColor: '#aaaa22' },
            ];
            // Cell type-specific organelles
            if (gn.cellType === 'goblet') {
                // Mucin granules: MUC2 secretory vesicles in apical cytoplasm
                gn.mucinGranules = [];
                var mgCount = 2 + (gbi % 2);
                for (var mgi = 0; mgi < mgCount; mgi++) {
                    gn.mucinGranules.push({
                        angle: gn.cajalAngle + mgi * 1.8 + 0.5,
                        dist: gn.bodyRadius * 0.55 + mgi * 0.12,
                        phase: gbi * 0.6 + mgi * 1.3,
                        coreColor: '#aaddcc',
                        shellColor: '#88bbaa',
                    });
                }
                // CFTR chloride channels: cAMP-gated Cl⁻ secretion on apical membrane
                // Drives paracellular water flow via osmotic gradient — essential for mucus hydration
                gn.cftrChannels = [];
                var cftrCount = 2 + (gbi % 2);
                for (var cfi = 0; cfi < cftrCount; cfi++) {
                    var cfSpread = (cfi - (cftrCount - 1) / 2) * 0.38;
                    gn.cftrChannels.push({
                        angle: apicalAngle + cfSpread,
                        phase: gbi * 0.7 + cfi * 1.6,
                        channelColor: '#44dd88',
                        clColor: '#33bb77',
                        dimColor: '#339966',
                    });
                }
                // Mucin exocytosis: MUC2 granules fuse with apical membrane via SNARE-mediated exocytosis
                // Released mucin hydrates 600-fold, expanding into a protective gel blanket over the epithelium
                gn.mucinSecretion = [];
                for (var msi = 0; msi < mgCount; msi++) {
                    gn.mucinSecretion.push({
                        angle: apicalAngle + (msi - (mgCount - 1) / 2) * 0.50,
                        phase: gbi * 0.4 + msi * 1.1,
                        granuleColor: '#aaddcc',    // mucin granule approaching membrane
                        fusionColor: '#ccffee',     // bright flash at membrane fusion
                        gelColor: '#99ddbb',        // secreted mucus gel (hydrated MUC2)
                        gelDimColor: '#77bbaa',      // resting mucus layer
                    });
                }
            } else {
                // Brush border enzymes: alkaline phosphatase/peptidase on microvillar surface
                gn.brushEnzymes = [];
                var beCount = 2;
                for (var bei = 0; bei < beCount; bei++) {
                    gn.brushEnzymes.push({
                        angle: gn.cajalAngle + bei * 2.5 + 1.0,
                        phase: gbi * 0.8 + bei * 1.7,
                        color: '#ddbb66',
                    });
                }
            }
            // Apical microvilli: enterocytes have more, goblet cells have fewer
            var blCenter = { x: 16, y: 22 };
            var apicalAngle = Math.atan2(gn.y - blCenter.y, gn.x - blCenter.x);
            gn.microvilli = [];
            var mvCount = gn.cellType === 'enterocyte' ? (4 + (gbi % 2)) : (2 + (gbi % 2));
            for (var mvi = 0; mvi < mvCount; mvi++) {
                var mvSpread = (mvi - (mvCount - 1) / 2) * 0.35;
                gn.microvilli.push({
                    angle: apicalAngle + mvSpread,
                    length: 1.5 + gn.nucleolusSize * 0.8,
                    phase: gbi * 0.9 + mvi * 1.1,
                });
            }
            // Terminal web: dense actomyosin meshwork beneath microvilli roots
            // Myosin-II and spectrin crosslink actin rootlets into a contractile belt
            // Anchors brush border to cytoplasm; villin/fimbrin bundle the actin cores
            gn.terminalWeb = {
                apicalAngle: apicalAngle,
                arcSpan: (mvCount - 1) * 0.35 + 0.4, // slightly wider than microvilli spread
                depth: 0.6 + gn.nucleolusSize * 0.3, // beneath membrane
                segments: 3 + (gbi % 2), // 3-4 web filaments per cell
                phase: gbi * 1.4,
            };
            // Glycocalyx: carbohydrate-rich coat on the apical surface
            // Oligosaccharide chains (N-linked and O-linked glycans) extend from membrane glycoproteins
            // Forms a fuzzy protective layer beyond microvilli tips — mucin-type sugars sway gently
            gn.glycocalyx = [];
            var gcCount = 5 + (gbi % 2); // 5-6 sugar chains per cell
            for (var gci = 0; gci < gcCount; gci++) {
                var gcSpread = (gci - (gcCount - 1) / 2) * 0.28;
                gn.glycocalyx.push({
                    angle: apicalAngle + gcSpread,
                    length: 1.0 + gn.nucleolusSize * 0.6,
                    phase: gbi * 1.2 + gci * 0.9,
                    color: gci % 3 === 0 ? '#eedd99' : (gci % 3 === 1 ? '#ddcc88' : '#ccddaa'),
                    tipColor: gci % 2 === 0 ? '#ffeeaa' : '#eeffbb',
                });
            }
        }

        // Brush border enzymes: GPI-anchored hydrolases on enterocyte microvilli
        // Sucrase-isomaltase (SI): cleaves sucrose → glucose + fructose at microvillar tips
        // Alkaline phosphatase (ALP): dephosphorylates luminal substrates, detoxifies LPS
        // Substrates approach from lumen, products released toward SGLT1/GLUT2 for absorption
        for (var bei = 0; bei < granddaughterNuclei.length; bei++) {
            var ben = granddaughterNuclei[bei];
            if (ben.cellType !== 'enterocyte') continue;
            ben.brushEnzymes = [];
            // Place enzymes at microvilli tips
            if (ben.microvilli) {
                for (var bej = 0; bej < ben.microvilli.length; bej++) {
                    var beMV = ben.microvilli[bej];
                    // Alternating SI and ALP on successive microvilli
                    var isALP = bej % 2 === 1;
                    ben.brushEnzymes.push({
                        mvIndex: bej,
                        angle: beMV.angle,
                        mvLength: beMV.length,
                        phase: bei * 0.8 + bej * 1.4,
                        enzymeColor: isALP ? '#55bb99' : '#cc6688',     // ALP: teal-green, SI: rose-pink
                        activeColor: isALP ? '#77ddbb' : '#ee88aa',     // brighter when catalyzing
                        substrateColor: isALP ? '#88ddcc' : '#ffaacc',  // substrate approaching
                        productColor: isALP ? '#aaeedd' : '#ffcc99',    // product released inward
                        isALP: isALP,
                    });
                }
            }
        }

        // Generic membrane transporter initializer: replaces individual loops for each transporter type
        // face: 'apical'|'basal'|'ring', cellFilter: null|'enterocyte'|'goblet'
        var blCenter = { x: 16, y: 22 };
        function initTransporters(field, face, count, spread, angleOff, phaseMul, phaseStep, props, cellFilter) {
            for (var ti = 0; ti < granddaughterNuclei.length; ti++) {
                var tn = granddaughterNuclei[ti];
                if (cellFilter && tn.cellType !== cellFilter) continue;
                var baseAngle = face === 'apical' ? Math.atan2(tn.y - blCenter.y, tn.x - blCenter.x) :
                    face === 'basal' ? Math.atan2(blCenter.y - tn.y, blCenter.x - tn.x) :
                    tn.cajalAngle + Math.PI; // ring
                tn[field] = [];
                var c = (typeof count === 'function') ? count(ti) : count;
                for (var tj = 0; tj < c; tj++) {
                    var sp = (tj - (c - 1) / 2) * spread;

            var chrPixels = {};
            if (cell.separated && cell.prophase) {
                var poles3 = [cell.prophase.pole1Target, cell.prophase.pole2Target];
                for (var pi3 = 0; pi3 < 2; pi3++) {
                    var cp = poles3[pi3], dg = Math.sin(tChromatin * 0.08 + pi3 * 2.5);
                    if (inB(cp.x, cp.y)) chrPixels[cp.x+','+cp.y] = dg > 0 ? '#d8b888' : '#c8a878';
                }
            }

            // Post-abscission centrosomes: settled at pole targets, minimal aster remnants
            var centPixels = {};
            if (cell.centrosomes && cell.separated && cell.prophase) {
                var tCentG1 = (t * 8000 / 9000) % 1.0;
                var poleTargets = [cell.prophase.pole1Target, cell.prophase.pole2Target];
                for (var pti2 = 0; pti2 < 2; pti2++) {
                    var pt = poleTargets[pti2];
                    if (inB(pt.x, pt.y)) centPixels[pt.x+','+pt.y] = '#eedd55';
                    // 4 short aster remnants per centrosome
                    for (var ari = 0; ari < 4; ari++) {
                        var arA = ari * Math.PI / 2 + tCentG1 * 2 * Math.PI * 0.15;
                        var arx = Math.round(pt.x + Math.cos(arA));
                        var ary = Math.round(pt.y + Math.sin(arA));
                        var ard = Math.sqrt((arx-cell.cx)*(arx-cell.cx)+(ary-cell.cy)*(ary-cell.cy));
                        if (ard < maxR - 0.5 && inB(arx, ary)) centPixels[arx+','+ary] = '#556677';
                    }
                }
            }

            // Cilia
            var cilPixels = {};
            for (var ci = 0; ci < cell.cilia.length; ci++) {
                var c = cell.cilia[ci];
                var waveOff = Math.sin(tCilia + c.phase) * 0.3;
                var ba = c.angle + waveOff;
                for (var cl = 1; cl <= c.length; cl++) {
                    var cr = maxR + cl;
                    var cx = Math.round(cell.cx + Math.cos(ba) * cr);
                    var cy = Math.round(cell.cy + Math.sin(ba) * cr);
                    if (cx >= 0 && cx < size && cy >= 0 && cy < size) {
                        cilPixels[cx + ',' + cy] = cl === 1 ? '#997755' : '#aa9977';
                    }
                }
            }

            // Receptor pixels on membrane — glow when activated by nearby signals
            var recPixels = {};
            for (var ri = 0; ri < cell.receptors.length; ri++) {
                var rec = cell.receptors[ri];
                var recR = maxR - 0.5;
                var rx = Math.round(cell.cx + Math.cos(rec.angle) * recR);
                var ry = Math.round(cell.cy + Math.sin(rec.angle) * recR);
                // Activated receptors pulse brighter (signal transduction)
                var activePulse = Math.sin(tGrowth * 2 * Math.PI + ri * 1.5);
                if (activePulse > 0.3) {
                    recPixels[rx + ',' + ry] = '#ffffff'; // receptor fires white when active
                    // Cascade pixel: signal travels one pixel inward toward cytoplasm
                    var cascX = Math.round(cell.cx + Math.cos(rec.angle) * (recR - 1.5));
                    var cascY = Math.round(cell.cy + Math.sin(rec.angle) * (recR - 1.5));
                    recPixels[cascX + ',' + cascY] = rec.color;
                } else {
                    recPixels[rx + ',' + ry] = rec.color;
                }
            }

            // ATP energy pulses radiating from mitochondria
            var atpPixels = {};
            var tATP = (t * 8000 / 5000) % 1.0;
            for (var mi = 0; mi < cell.mitochondria.length; mi++) {
                var m = cell.mitochondria[mi];
                var mAngle = m.baseAngle + m.speed * tOrbit;
                var mcx = cell.cx + Math.cos(mAngle) * m.radius;
                var mcy = cell.cy + Math.sin(mAngle) * m.radius;
                // Two ATP particles radiate outward from each mitochondrion
                for (var ai = 0; ai < 2; ai++) {
                    var atpPhase = (tATP + mi * 0.35 + ai * 0.5) % 1.0;
                    var atpAngle = mAngle + Math.PI + (ai - 0.5) * 1.2; // radiate inward toward cell center
                    var atpDist = atpPhase * 3.0;
                    var ax = Math.round(mcx + Math.cos(atpAngle) * atpDist);
                    var ay = Math.round(mcy + Math.sin(atpAngle) * atpDist);
                    // Only draw within cell bounds
                    var adx = ax - cell.cx;
                    var ady = ay - cell.cy;
                    if (Math.sqrt(adx * adx + ady * ady) < maxR - 1.0) {
                        atpPixels[ax + ',' + ay] = atpPhase < 0.5 ? '#ffff44' : '#dddd22';
                    }
                }
            }

            // Vesicles along ER
            var tVes = (t * 8000 / 6000) % 1.0;
            var vesPixels = {};
            for (var vi = 0; vi < cell.erPaths.length; vi++) {
                var path = cell.erPaths[vi];
                var progress = (tVes + vi * 0.25) % 1.0;
                var pos = progress < 0.5 ? progress * 2 : (1.0 - progress) * 2;
                var idx = Math.round(pos * (path.length - 1));
                var vc = vi % 2 === 0 ? '#ffdd66' : '#66ddff';
                vesPixels[path[idx].x + ',' + path[idx].y] = vc;
            }

            // Lysosomes + Peroxisomes: orbiting organelles (consolidated)
            var lysoPixels = renderOrbiters(cell, cell.lysosomes, tOrbit, t, 5500, {threshold:-9});
            var peroxPixels = renderOrbiters(cell, cell.peroxisomes, tOrbit, t, 5500, {threshold:-9});

            // Ribosomes on rough ER: small dots that pulse with protein synthesis
            var riboPixels = {};
            if (cell.ribosomes && cell.erPaths) {
                var tRibo = (t * 8000 / 3000) % 1.0;
                for (var rbi = 0; rbi < cell.ribosomes.length; rbi++) {
                    var ribo = cell.ribosomes[rbi];
                    if (ribo.erIdx < cell.erPaths.length) {
                        var ePath = cell.erPaths[ribo.erIdx];
                        var rIdx = Math.round(ribo.pos * (ePath.length - 1));
                        if (rIdx >= 0 && rIdx < ePath.length) {
                            var rp = ePath[rIdx];
                            // Offset ribosome one pixel perpendicular to ER
                            var rpNext = rIdx < ePath.length - 1 ? ePath[rIdx + 1] : ePath[rIdx - 1];
                            var rdx = rpNext.x - rp.x;
                            var rdy = rpNext.y - rp.y;
                            // Perpendicular offset
                            var offX = rp.x + (rbi % 2 === 0 ? -rdy : rdy);
                            var offY = rp.y + (rbi % 2 === 0 ? rdx : -rdx);
                            offX = Math.round(offX);
                            offY = Math.round(offY);
                            // Pulse: ribosome brightens when synthesizing
                            var riboPulse = Math.sin(tRibo * 2 * Math.PI + rbi * 1.1);
                            var riboColor = riboPulse > 0.2 ? '#776644' : ribo.color;
                            if (offX >= 0 && offX < size && offY >= 0 && offY < size) {
                                riboPixels[offX + ',' + offY] = riboColor;
                            }
                        }
                    }
                }
            }

            // Smooth ER: lipid-synthesizing tubules rendered as small ellipses
            var serPixels = {};
            if (cell.smoothER) {
                var tSER = (t * 8000 / 7000) % 1.0;
                for (var sei = 0; sei < cell.smoothER.length; sei++) {
                    var ser = cell.smoothER[sei];
                    // Draw small elliptical tubule with pulsing lipid synthesis
                    var serPulse = Math.sin(tSER * 2 * Math.PI + sei * 2.0);
                    var serColor = serPulse > 0.3 ? '#aa7744' : '#996633';
                    for (var sa = 0; sa < 8; sa++) {
                        var sAngle = sa * 2 * Math.PI / 8 + ser.angle;
                        var sx = Math.round(ser.cx + Math.cos(sAngle) * ser.rx);
                        var sy = Math.round(ser.cy + Math.sin(sAngle) * ser.ry);
                        if (sx >= 0 && sx < size && sy >= 0 && sy < size) {
                            serPixels[sx + ',' + sy] = serColor;
                        }
                    }
                    // Center pixel: lipid droplet forming
                    if (serPulse > 0.5) {
                        serPixels[ser.cx + ',' + ser.cy] = '#ccaa55';
                    }
                }
            }

            // Actin stress fibers: cables from junction sites inward toward nucleus
            var actinPixels = {};
            if (cell.actinFibers) {
                var tActin = (t * 8000 / 9000) % 1.0;
                for (var afi = 0; afi < cell.actinFibers.length; afi++) {
                    var af = cell.actinFibers[afi];
                    // Start at junction site on membrane, extend inward
                    var startR = maxR - 0.8;
                    var endR = startR - af.length;
                    if (endR < 0.5) endR = 0.5;
                    // Actin fiber tension pulse
                    var actPulse = Math.sin(tActin * 2 * Math.PI + af.phase);
                    for (var al = 0; al <= Math.ceil(af.length); al++) {
                        var ar = startR - al;
                        var ax2 = Math.round(cell.cx + Math.cos(af.junctionAngle) * ar);
                        var ay2 = Math.round(cell.cy + Math.sin(af.junctionAngle) * ar);
                        if (ax2 >= 0 && ax2 < size && ay2 >= 0 && ay2 < size) {
                            // Myosin contraction pulse travels along the fiber
                            var myosinPos = (tActin + af.phase * 0.3) % 1.0;
                            var fiberPos = al / af.length;
                            var nearMyosin = Math.abs(fiberPos - myosinPos) < 0.25;
                            actinPixels[ax2 + ',' + ay2] = nearMyosin && actPulse > 0 ? '#cc6655' : '#aa5544';
                        }
                    }
                }
            }

            // Intermediate filaments: consolidated (perinuclear cage, resolved post-division)

            // Nuclear pores and mRNA export particles
            // Late prophase: NPCs disassemble — Nup proteins released, mRNA export ceases
            var porePixels = {};
            if (cell.nuclearPores && cell.separated) {
                var tPore = (t * 8000 / 6000) % 1.0;
                var unifiedNucR2 = nucR + 0.9;
                var npcDisasm = (cell.prophase && cell.prophase.npcDisassembly) || 0;
                for (var npi = 0; npi < cell.nuclearPores.length; npi++) {
                    var np = cell.nuclearPores[npi];
                    // NPC disassembly: some pores disappear, replaced by dispersing Nup particles
                    if (npcDisasm > 0) {
                        var poreFlicker = Math.sin(tPore * 2 * Math.PI * 2 + npi * 2.3);
                        // Higher disassembly = more pores lost; at >0.5, odd pores also begin to go
                        var poreVulnerable = npcDisasm > 0.5 ? true : (npi % 2 === 0);
                        if (poreFlicker > (1.0 - npcDisasm * 2.5) && poreVulnerable) {
                            // Dispersing Nup protein — drifts outward from former pore site
                            var nupDrift = (tPore + npi * 0.2) % 1.0;
                            var nupDist = unifiedNucR2 + nupDrift * 1.8;
                            if (nupDist < maxR - 1.0) {
                                var nupX = Math.round(cell.cx + Math.cos(np.angle + nupDrift * 0.3) * nupDist);
                                var nupY = Math.round(cell.cy + Math.sin(np.angle + nupDrift * 0.3) * nupDist);
                                if (nupX >= 0 && nupX < size && nupY >= 0 && nupY < size) {
                                    porePixels[nupX + ',' + nupY] = '#997744'; // dim Nup protein
                                }
                            }
                            continue; // pore gone — skip normal rendering
                        }
                    }
                    // Pore sits on the nuclear envelope
                    var poreX = Math.round(cell.cx + Math.cos(np.angle) * unifiedNucR2);
                    var poreY = Math.round(cell.cy + Math.sin(np.angle) * unifiedNucR2);
                    if (poreX >= 0 && poreX < size && poreY >= 0 && poreY < size) {
                        // Pore complex: dimmer during disassembly
                        var porePulse = Math.sin(tPore * 2 * Math.PI + np.mRNAphase * 6);
                        var poreColor = npcDisasm > 0.2
                            ? (porePulse > 0 ? '#ddaa44' : '#cc9933')
                            : (porePulse > 0 ? '#ffcc66' : '#ddaa44');
                        porePixels[poreX + ',' + poreY] = poreColor;
                    }
                    // mRNA export slows as NPCs disassemble
                    if (npcDisasm < 0.5) {
                        var mRNAprogress = (tPore + np.mRNAphase) % 1.0;
                        var mRNAdist = unifiedNucR2 + mRNAprogress * 2.5;
                        if (mRNAdist < maxR - 1.5) {
                            var mX = Math.round(cell.cx + Math.cos(np.angle) * mRNAdist);
                            var mY = Math.round(cell.cy + Math.sin(np.angle) * mRNAdist);
                            if (mX >= 0 && mX < size && mY >= 0 && mY < size) {
                                porePixels[mX + ',' + mY] = mRNAprogress < 0.5 ? '#ff8855' : '#ee7744';
                            }
                        }
                    }
                }
            }

            // Secretory vesicles: bud from Golgi, travel to membrane, fuse (exocytosis)
            var secVesPixels = {};
            if (cell.secretoryVesicles && cell.separated) {
                var tSecVes = (t * 8000 / 7000) % 1.0;
                for (var svi = 0; svi < cell.secretoryVesicles.length; svi++) {
                    var sv = cell.secretoryVesicles[svi];
                    // Progress: 0=at Golgi, 1=at membrane (then fuses and resets)
                    var svProgress = (tSecVes * sv.speed + sv.phase) % 1.0;
                    // Interpolate from Golgi region outward to membrane
                    var golgiR = 2.0; // near Golgi (inner cytoplasm)
                    var memR = maxR - 0.8; // near plasma membrane
                    var svR = golgiR + svProgress * (memR - golgiR);
                    // Angle interpolates from bud angle to target membrane angle
                    var svAngle = sv.budAngle + svProgress * (sv.memAngle - sv.budAngle);
                    var svX = Math.round(cell.cx + Math.cos(svAngle) * svR);
                    var svY = Math.round(cell.cy + Math.sin(svAngle) * svR);
                    if (svX >= 0 && svX < size && svY >= 0 && svY < size) {
                        // Vesicle brightens as it approaches membrane (about to fuse)
                        secVesPixels[svX + ',' + svY] = svProgress > 0.8 ? '#ffcc55' : sv.color;
                    }
                    // Exocytosis flash: when vesicle reaches membrane, brief bright pixel on membrane
                    if (svProgress > 0.9) {
                        var exoX = Math.round(cell.cx + Math.cos(sv.memAngle) * maxR);
                        var exoY = Math.round(cell.cy + Math.sin(sv.memAngle) * maxR);
                        if (exoX >= 0 && exoX < size && exoY >= 0 && exoY < size) {
                            secVesPixels[exoX + ',' + exoY] = '#ffee88';
                        }
                    }
                }
            }

            // Endocytic vesicles: pinch from membrane, travel inward toward lysosomes
            var endoPixels = {};
            if (cell.endocyticVesicles && cell.separated) {
                var tEndo = (t * 8000 / 8000) % 1.0;
                for (var evi = 0; evi < cell.endocyticVesicles.length; evi++) {
                    var ev = cell.endocyticVesicles[evi];
                    // Progress: 0=at membrane (coated pit), 1=near lysosome (early endosome)
                    var evProgress = (tEndo * ev.speed + ev.phase) % 1.0;
                    // Interpolate from membrane inward toward cell interior
                    var memR2 = maxR - 0.5; // starts at membrane
                    var lysoR = 2.2; // ends near lysosome orbit radius
                    var evR = memR2 - evProgress * (memR2 - lysoR);
                    // Angle curves from membrane receptor toward interior
                    var evAngle = ev.memAngle + evProgress * (ev.targetAngle - ev.memAngle) * 0.3;
                    var evX = Math.round(cell.cx + Math.cos(evAngle) * evR);
                    var evY = Math.round(cell.cy + Math.sin(evAngle) * evR);
                    if (evX >= 0 && evX < size && evY >= 0 && evY < size) {
                        // Coated pit at membrane is darker, brightens as it matures into endosome
                        endoPixels[evX + ',' + evY] = evProgress < 0.2 ? '#7733aa' : ev.color;
                    }
                    // Clathrin coat flash at membrane when pit forms
                    if (evProgress < 0.15) {
                        var pitX = Math.round(cell.cx + Math.cos(ev.memAngle) * maxR);
                        var pitY = Math.round(cell.cy + Math.sin(ev.memAngle) * maxR);
                        if (pitX >= 0 && pitX < size && pitY >= 0 && pitY < size) {
                            endoPixels[pitX + ',' + pitY] = '#bb77dd';
                        }
                    }
                }
            }

            // Microtubules: radiate from centrosome outward, with motor protein cargo
            var mtPixels = {};
            if (cell.microtubules && cell.centrosomes && cell.separated) {
                var mtOrigin = cell.centrosomes[0]; // MTOC = centrosome
                var tMT = (t * 8000 / 5000) % 1.0;
                for (var mti = 0; mti < cell.microtubules.length; mti++) {
                    var mt = cell.microtubules[mti];
                    // Draw track from centrosome outward
                    for (var ml = 1; ml <= Math.ceil(mt.length); ml++) {
                        var mx3 = Math.round(mtOrigin.x + Math.cos(mt.angle) * ml);
                        var my3 = Math.round(mtOrigin.y + Math.sin(mt.angle) * ml);
                        // Stay within cell
                        var mdx = mx3 - cell.cx;
                        var mdy = my3 - cell.cy;
                        if (Math.sqrt(mdx * mdx + mdy * mdy) < maxR - 1.2) {
                            if (mx3 >= 0 && mx3 < size && my3 >= 0 && my3 < size) {
                                mtPixels[mx3 + ',' + my3] = '#445566';
                            }
                        }
                    }
                    // Motor protein (kinesin) cargo: dot moving along the track
                    var cargoPos = (tMT + mt.cargoPhase) % 1.0;
                    // Cargo shuttles back and forth
                    var cargoFrac = cargoPos < 0.5 ? cargoPos * 2 : (1.0 - cargoPos) * 2;
                    var cargoDist = 1 + cargoFrac * (mt.length - 1);
                    var cargoX = Math.round(mtOrigin.x + Math.cos(mt.angle) * cargoDist);
                    var cargoY = Math.round(mtOrigin.y + Math.sin(mt.angle) * cargoDist);
                    var cdx = cargoX - cell.cx;
                    var cdy = cargoY - cell.cy;
                    if (Math.sqrt(cdx * cdx + cdy * cdy) < maxR - 1.2) {
                        if (cargoX >= 0 && cargoX < size && cargoY >= 0 && cargoY < size) {
                            mtPixels[cargoX + ',' + cargoY] = cargoPos < 0.5 ? '#77ddff' : '#ffaa77';
                        }
                    }
                }
            }

            // Cyclin-CDK particles (consolidated)
            var cyclinPixels = renderOrbiters(cell, cell.cyclins, tOrbit, t, 5500, {minR:nucR+1,maxR:maxR-1,hiColor:'#55eebb'});

            // Phospho-Rb, cohesins: fully resolved post-division

            // Topoisomerase II (consolidated)
            var topoPixels = renderOrbiters(cell, cell.topoII, tOrbit, t, 5500, {maxR:nucR+0.3,threshold:0.4,hiColor:'#ff8866',pulseRate:2,phaseSpread:1.8,spark:true,sparkColor:'#ffaa88'});

            // Cyclin A-CDK2 (consolidated)
            var cycAPixels = renderOrbiters(cell, cell.cyclinA, tOrbit, t, 5200, {minR:nucR+1,maxR:maxR-1,threshold:0.3,hiColor:'#ee88bb'});

            // Cyclin B-CDK1 (consolidated)
            var cycBPixels = renderOrbiters(cell, cell.cyclinB, tOrbit, t, 5800, {nuclear:true,nucR:nucR,maxR:maxR-0.8,minR:nucR+1.2,hiColor:'#55eebb',nucHi:'#77ffdd',nucTh:0.1,phaseSpread:1.9});

            // PLK1 (consolidated)
            var plk1Pixels = renderOrbiters(cell, cell.plk1, tOrbit, t, 5300, {minR:nucR+0.5,maxR:maxR-1,threshold:0.3,hiColor:'#ff8866',pulseRate:2,phaseSpread:1.7,spark:true,sparkColor:'#ffaa77'});

            // Aurora A kinase: flashes at centrosome positions, driving PCM maturation
            var auroraAPixels = {};
            if (cell.auroraA && cell.prophase && cell.separated) {
                var tAurA = (t * 8000 / 4000) % 1.0;
                var cs = cell.centrosomes[0];
                var tCentMig2 = (t * 8000 / 9000) % 1.0;
                var migFrac2 = 0.6 + Math.sin(tCentMig2 * 2 * Math.PI * 0.2) * 0.08;
                var poles2 = [
                    { x: cs.x + (cell.prophase.pole1Target.x - cs.x) * migFrac2, y: cs.y + (cell.prophase.pole1Target.y - cs.y) * migFrac2 },
                    { x: cs.x + (cell.prophase.pole2Target.x - cs.x) * migFrac2, y: cs.y + (cell.prophase.pole2Target.y - cs.y) * migFrac2 },
                ];
                for (var aai = 0; aai < cell.auroraA.length; aai++) {
                    var aa = cell.auroraA[aai];
                    var poleIdx = aa.targetPole - 1;
                    var aurPulse = Math.sin(tAurA * 2 * Math.PI * 3 + aa.phase * 6);
                    // Flash near the centrosome pole — phosphorylation activity
                    var aaAngle = tAurA * 2 * Math.PI * aa.speed + aa.phase * 4;
                    var aaR = 1.2 + aurPulse * 0.3;
                    var aax = Math.round(poles2[poleIdx].x + Math.cos(aaAngle) * aaR);
                    var aay = Math.round(poles2[poleIdx].y + Math.sin(aaAngle) * aaR);
                    if (aax >= 0 && aax < size && aay >= 0 && aay < size) {
                        auroraAPixels[aax + ',' + aay] = aurPulse > 0.2 ? '#bbffff' : aa.color;
                    }
                }
            }

            // Cyclin D-CDK4/6 (consolidated)
            var cycDPixels = renderOrbiters(cell, cell.cyclinD, tOrbit, t, 6200, {nuclear:true,nucR:nucR,maxR:maxR-1,minR:nucR+0.8,threshold:0.3,hiColor:'#eebb55',nucHi:'#ffcc55',nucLo:'#eebb44',nucTh:0.1,phaseSpread:1.6,spark:true,sparkColor:'#ffdd88'});

            // Cyclin E: degraded (consolidated)

            // Cdc25 phosphatase (consolidated)
            var cdc25Pixels = renderOrbiters(cell, cell.cdc25, tOrbit, t, 4800, {minR:nucR+0.5,maxR:maxR-1,threshold:0.3,hiColor:'#77ffcc',pulseRate:2,phaseSpread:1.6});

            // Growth factors: consolidated (autocrine signaling merged into medium)

            // PP1/PP2A phosphatases (consolidated)
            var phosphPixels = renderOrbiters(cell, cell.phosphatases, tOrbit, t, 4500, {maxR:maxR-1,hiColor:'#66ffdd',pulseRate:2.5,phaseSpread:1.9,ripple:true,rippleColor:'#55eebb'});

            // Post-abscission: consolidated (furrow scars healed, retraction complete)

            // Filopodia: extending/retracting protrusions from the membrane
            var filoPixels = {};
            if (cell.filopodia) {
                var tFilo = (t * 8000 / 10000) % 1.0;
                for (var fpi = 0; fpi < cell.filopodia.length; fpi++) {
                    var fp = cell.filopodia[fpi];
                    // Extend and retract cyclically
                    var extendFrac = (Math.sin(tFilo * 2 * Math.PI + fp.phase) + 1) * 0.5; // 0 to 1
                    var curLength = fp.maxLength * (0.3 + extendFrac * 0.7);
                    for (var fl = 0; fl <= Math.ceil(curLength); fl++) {
                        var fr = maxR + fl * 0.9;
                        var fx = Math.round(cell.cx + Math.cos(fp.angle) * fr);
                        var fy = Math.round(cell.cy + Math.sin(fp.angle) * fr);
                        if (fx >= 0 && fx < size && fy >= 0 && fy < size) {
                            filoPixels[fx + ',' + fy] = fl >= Math.ceil(curLength) - 1 ? fp.tipColor : fp.stalkColor;
                        }
                    }
                }
            }

            return {
                maxR: maxR, nucR: nucR, elongation: elongation, cytoConstriction: cytoConstriction,
                mitoPixels: mitoPixels, envPixels: envPixels,
                nucPixels: nucPixels, chrPixels: chrPixels, condensinPixels: condensinPixels,
                cilPixels: cilPixels, recPixels: recPixels,
                vesPixels: vesPixels, atpPixels: atpPixels,
                centPixels: centPixels,
                lysoPixels: lysoPixels, filoPixels: filoPixels,
                riboPixels: riboPixels, peroxPixels: peroxPixels,
                serPixels: serPixels, actinPixels: actinPixels,
                mtPixels: mtPixels,
                porePixels: porePixels, secVesPixels: secVesPixels,
                endoPixels: endoPixels, cyclinPixels: cyclinPixels,
                cycAPixels: cycAPixels,
                cdc25Pixels: cdc25Pixels,
                cycDPixels: cycDPixels,
                phosphPixels: phosphPixels,
                topoPixels: topoPixels,
                cycBPixels: cycBPixels,
                plk1Pixels: plk1Pixels,
                auroraAPixels: auroraAPixels
            };
        }

        // Precompute all granddaughter + extracellular feature pixels into a map
        function buildGDPixels(now) {
            var px = {};
            var tR = (now % 12000) / 12000, tN = (now % 9000) / 9000;
            var tO = (now % 11000) / 11000 * 2 * Math.PI;
            var tER = (now % 7000) / 7000, tGo = (now % 8000) / 8000;
            var tRF = (now % 5000) / 5000, tEn = (now % 9000) / 9000;
            var tMV = (now % 14000) / 14000 * 2 * Math.PI;
            var tAu = (now % 15000) / 15000 * 2 * Math.PI;
            var tPr = (now % 11000) / 11000 * 2 * Math.PI;
            var tLi = (now % 17000) / 17000 * 2 * Math.PI;
            var tCe = (now % 9000) / 9000, tCi = (now % 6000) / 6000 * 2 * Math.PI;
            var tLy = (now % 13000) / 13000 * 2 * Math.PI;
            var tPx = (now % 11000) / 11000 * 2 * Math.PI;
            function set(x, y, c) { if (inB(x, y) && !px[x+','+y]) px[x+','+y] = c; }
            function setR(x, y, c, cx, cy, mr) {
                if (inB(x,y) && !px[x+','+y]) {
                    var d = Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy));
                    if (d < mr - 0.3) px[x+','+y] = c;
                }
            }
            for (var i = 0; i < granddaughterNuclei.length; i++) {
                var g = granddaughterNuclei[i];
                var bb = Math.sin(tN * 2 * Math.PI * 0.7 + i * 1.1) * 0.15;
                var bR = g.bodyRadius + bb;
                var eR = 1.3 + g.nucleolusSize * 0.5;
                // Transcription aura (outermost)
                var auraR = bR + 0.5 + g.reactivation * 1.5;
                var aP = Math.sin(tR * 2 * Math.PI * 1.5 + i * 1.57);
                if (aP > 0) {
                    for (var aa = 0; aa < 16; aa++) {
                        var aAng = aa * Math.PI / 8;
                        var ax = Math.round(g.x + Math.cos(aAng) * auraR);
                        var ay = Math.round(g.y + Math.sin(aAng) * auraR);
                        set(ax, ay, aP > 0.5 ? '#ffdd88' : '#eebb66');
                    }
                }
                // Primary cilium
                var cilSway = Math.sin(tCi + g.ciliumPhase) * 0.12;
                var cilBA = g.ciliumAngle + cilSway;
                var cbx = g.x + Math.cos(g.centrosomeAngle) * g.centrosomeDist;
                var cby = g.y + Math.sin(g.centrosomeAngle) * g.centrosomeDist;
                for (var cl = 0; cl <= Math.ceil(g.ciliumLength * 2); cl++) {
                    var cR = cl * 0.5; if (cR > g.ciliumLength) break;
                    var cx = Math.round(cbx + Math.cos(cilBA) * cR);
                    var cy = Math.round(cby + Math.sin(cilBA) * cR);
                    var isTip = cR > g.ciliumLength - 0.6;
                    var cP = Math.sin(tCi * 1.5 + i * 2.0 + cR * 1.2);
                    set(cx, cy, isTip ? (cP > 0 ? '#eedd88' : '#ddcc66') : (cP > 0.3 ? '#bbaa77' : '#aa9966'));
                }
                // Cell body: membrane + cytoplasm fill + internal organelles
                for (var by2 = Math.floor(g.y - bR - 1); by2 <= Math.ceil(g.y + bR + 1); by2++) {
                    for (var bx2 = Math.floor(g.x - bR - 1); bx2 <= Math.ceil(g.x + bR + 1); bx2++) {
                        if (!inB(bx2, by2)) continue;
                        var dx = bx2 - g.x, dy = by2 - g.y;
                        var d = Math.sqrt(dx*dx + dy*dy);
                        if (d <= bR) {
                            var k = bx2 + ',' + by2;
                            if (px[k]) continue;
                            if (d > bR - 0.7) { px[k] = g.membraneColor; continue; }
                            // Nuclear envelope
                            if (Math.abs(d - eR) < 0.6) {
                                var ep = Math.sin(tN * 2 * Math.PI * 2 + i * 1.4 + Math.atan2(dy, dx) * 3);
                                px[k] = ep > 0 ? '#eebb55' : '#ddaa44'; continue;
                            }
                            // Nucleolus
                            if (d < g.nucleolusSize + 0.3) {
                                var np = Math.sin(tN * 2 * Math.PI * 1.8 + i * 2.3);
                                px[k] = np > 0.2 ? '#ff9933' : '#dd7722'; continue;
                            }
                            // Cytoplasm fill (will be overwritten by organelles below)
                            px[k] = g.cytoColor;
                        }
                    }
                }
                // Single-pixel organelles: compute position and set directly
                // Mitochondrion
                var mA = g.mitoAngle + g.mitoSpeed * tO, mR = bR * 0.65;
                setR(Math.round(g.x+Math.cos(mA)*mR), Math.round(g.y+Math.sin(mA)*mR), '#44aa66', g.x, g.y, bR);
                // Peroxisome
                var pA = g.peroxAngle + g.peroxSpeed * tPx;
                var pp = Math.sin(tPx * 1.5 + i * 2.0);
                setR(Math.round(g.x+Math.cos(pA)*g.peroxDist), Math.round(g.y+Math.sin(pA)*g.peroxDist), pp>0?'#77bb88':'#55aa77', g.x, g.y, bR);
                // Lysosome
                var lA = g.lysoAngle + g.lysoSpeed * tLy;
                var lp = Math.sin(tLy * 1.3 + i * 1.8);
                setR(Math.round(g.x+Math.cos(lA)*g.lysoDist), Math.round(g.y+Math.sin(lA)*g.lysoDist), lp>0?'#9966bb':'#8855aa', g.x, g.y, bR);
                // MVB
                var mvA = g.mvbAngle + g.mvbSpeed * tMV;
                var mp = Math.sin(tMV * 1.5 + i * 2.3);
                setR(Math.round(g.x+Math.cos(mvA)*g.mvbDist), Math.round(g.y+Math.sin(mvA)*g.mvbDist), mp>0?'#9955bb':'#7744aa', g.x, g.y, bR);
                // Centrosome + MT rays
                var ceX = Math.round(g.x+Math.cos(g.centrosomeAngle)*g.centrosomeDist);
                var ceY = Math.round(g.y+Math.sin(g.centrosomeAngle)*g.centrosomeDist);
                var cp = Math.sin(tCe * 2 * Math.PI * 1.5 + i * 2.2);
                set(ceX, ceY, cp > 0 ? '#eedd55' : '#ddcc44');
                for (var mt = 0; mt < 2; mt++) {
                    var mtA = g.centrosomeAngle + (mt === 0 ? 0.8 : -0.8);
                    setR(Math.round(ceX+Math.cos(mtA)), Math.round(ceY+Math.sin(mtA)), '#556677', g.x, g.y, bR);
                }
                // Golgi ministack
                var goP = Math.sin(tGo * 2 * Math.PI * 1.5 + i * 2.0);
                set(Math.round(g.x+Math.cos(g.golgiAngle)*g.golgiDist), Math.round(g.y+Math.sin(g.golgiAngle)*g.golgiDist), goP>0?'#ddaa55':'#cc9944');
                set(Math.round(g.x+Math.cos(g.golgiAngle+0.5)*(g.golgiDist+0.4)), Math.round(g.y+Math.sin(g.golgiAngle+0.5)*(g.golgiDist+0.4)), '#ccaa55');
                // Nuclear speckles
                for (var si = 0; si < g.speckles.length; si++) {
                    var sp = g.speckles[si], spP = Math.sin(tN * 2 * Math.PI * 1.4 + i * 2.1 + si * 3.0);
                    set(Math.round(g.x+Math.cos(sp.angle)*sp.dist), Math.round(g.y+Math.sin(sp.angle)*sp.dist), spP>0?'#99eebb':sp.color);
                }
                // Cajal body
                var cbP = Math.sin(tN * 2 * Math.PI * 2.5 + i * 1.9);
                set(g.x+Math.round(Math.cos(g.cajalAngle)*0.8), g.y+Math.round(Math.sin(g.cajalAngle)*0.8), cbP>0?'#cc88ff':'#aa66dd');
                // ER stubs
                for (var ei = 0; ei < g.erStubs.length; ei++) {
                    var es = g.erStubs[ei], esR0 = eR + 0.3;
                    for (var el = 0; el <= Math.ceil(es.length * 2); el++) {
                        var er = esR0 + el * 0.5; if (er > esR0 + es.length) break;
                        var ep = Math.sin(tER * 2 * Math.PI + ei * 2.5 + el * 0.8);
                        set(Math.round(g.x+Math.cos(es.angle)*er), Math.round(g.y+Math.sin(es.angle)*er), ep>0?'#996644':'#884422');
                    }
                }
                // Free ribosomes
                for (var fi = 0; fi < g.freeRibosomes.length; fi++) {
                    var fr = g.freeRibosomes[fi], fp = Math.sin(tRF * 2 * Math.PI * 1.8 + fr.phase);
                    set(Math.round(g.x+Math.cos(fr.angle)*fr.dist), Math.round(g.y+Math.sin(fr.angle)*fr.dist), fp>0.2?'#776644':'#553322');
                }
                // Endosomes
                for (var edi = 0; edi < g.endosomes.length; edi++) {
                    var en = g.endosomes[edi];
                    var eP = (tEn * en.speed + en.phase) % 1.0;
                    var eOR = bR - 0.3, eIR = g.lysoDist * 0.8;
                    var edR = eOR - eP * (eOR - eIR);
                    var edA = en.memAngle + eP * 0.3;
                    var edC = eP < 0.2 ? '#7733aa' : en.color;
                    set(Math.round(g.x+Math.cos(edA)*edR), Math.round(g.y+Math.sin(edA)*edR), edC);
                    if (eP < 0.12) set(Math.round(g.x+Math.cos(en.memAngle)*bR), Math.round(g.y+Math.sin(en.memAngle)*bR), '#cc88ee');
                }
                // Array orbiters: autophagosomes, proteasomes, lipid droplets
                var orbArrays = [
                    [g.autophagosomes, tAu, 1.4, function(o,p,fi2) {
                        var lyCA = g.lysoAngle + g.lysoSpeed * tLy;
                        var lx = g.x+Math.cos(lyCA)*g.lysoDist, ly = g.y+Math.sin(lyCA)*g.lysoDist;
                        var ox = g.x+Math.cos(o.angle+o.speed*tAu)*o.dist, oy = g.y+Math.sin(o.angle+o.speed*tAu)*o.dist;
                        return Math.sqrt((ox-lx)*(ox-lx)+(oy-ly)*(oy-ly)) < 1.5 ? '#ddbb44' : (p>0?o.matureColor:o.color);
                    }],
                    [g.proteasomes, tPr, 1.8, function(o,p) { return p>0.3?o.activeColor:o.color; }],
                    [g.lipidDroplets, tLi, 1.6, function(o,p) { return p>0.2?o.coreColor:o.shellColor; }],
                ];
                for (var oi = 0; oi < orbArrays.length; oi++) {
                    var arr = orbArrays[oi][0], tV = orbArrays[oi][1], pM = orbArrays[oi][2], cFn = orbArrays[oi][3];
                    if (!arr) continue;
                    for (var oj = 0; oj < arr.length; oj++) {
                        var o = arr[oj], oA = o.angle + o.speed * tV;
                        var ox = Math.round(g.x+Math.cos(oA)*o.dist), oy = Math.round(g.y+Math.sin(oA)*o.dist);
                        var oP = Math.sin(tV * pM + i * 2.1 + oj * 3.0);
                        setR(ox, oy, cFn(o, oP, oj), g.x, g.y, bR);
                    }
                }
                // Cell type-specific: mucin granules (goblet) or brush enzymes (enterocyte)
                if (g.mucinGranules) {
                    var tMG = (now % 13000) / 13000 * 2 * Math.PI;
                    for (var mgi2 = 0; mgi2 < g.mucinGranules.length; mgi2++) {
                        var mg = g.mucinGranules[mgi2];
                        var mgA = mg.angle + Math.sin(tMG * 0.5 + mg.phase) * 0.15;
                        var mgP = Math.sin(tMG * 1.2 + mg.phase);
                        var mgX = Math.round(g.x + Math.cos(mgA) * mg.dist);
                        var mgY = Math.round(g.y + Math.sin(mgA) * mg.dist);
                        setR(mgX, mgY, mgP > 0.2 ? mg.coreColor : mg.shellColor, g.x, g.y, bR);
                        // Mucin halo: granule is large, shows adjacent pixel
                        var mgHX = Math.round(g.x + Math.cos(mgA) * (mg.dist + 0.6));
                        var mgHY = Math.round(g.y + Math.sin(mgA) * (mg.dist + 0.6));
                        setR(mgHX, mgHY, mgP > 0 ? '#99ccbb' : mg.shellColor, g.x, g.y, bR);
                    }
                }
                // Mucin exocytosis: MUC2 gel secretion via SNARE-mediated fusion
                if (g.mucinSecretion) {
                    var tMS = (now % 12000) / 12000;
                    for (var msi2 = 0; msi2 < g.mucinSecretion.length; msi2++) {
                        var ms = g.mucinSecretion[msi2];
                        // Exocytosis cycle: 0-0.3 granule approaches, 0.3-0.4 fusion, 0.4-1.0 gel expansion
                        var msCycle = (tMS * 1.5 + ms.phase * 0.25) % 1.0;
                        if (msCycle < 0.3) {
                            // Granule migrating toward apical membrane from cytoplasm
                            var msGranR = bR * 0.4 + msCycle * (bR * 0.6 / 0.3);
                            var msGX = Math.round(g.x + Math.cos(ms.angle) * msGranR);
                            var msGY = Math.round(g.y + Math.sin(ms.angle) * msGranR);
                            setR(msGX, msGY, ms.granuleColor, g.x, g.y, bR);
                        } else if (msCycle < 0.4) {
                            // Membrane fusion: bright flash at apical surface (SNARE complex engagement)
                            var msFuseX = Math.round(g.x + Math.cos(ms.angle) * bR);
                            var msFuseY = Math.round(g.y + Math.sin(ms.angle) * bR);
                            set(msFuseX, msFuseY, ms.fusionColor);
                        } else {
                            // Secreted mucin expands outward, hydrating into gel layer
                            var msExpand = (msCycle - 0.4) / 0.6; // 0→1
                            var msGelR = bR + 0.4 + msExpand * 2.0;
                            var msGelX = Math.round(g.x + Math.cos(ms.angle) * msGelR);
                            var msGelY = Math.round(g.y + Math.sin(ms.angle) * msGelR);
                            var msGelPulse = Math.sin(tMS * 2 * Math.PI * 2.0 + ms.phase);
                            set(msGelX, msGelY, msGelPulse > 0 ? ms.gelColor : ms.gelDimColor);
                            // Second gel pixel slightly offset — mucin expands radially
                            if (msExpand > 0.3) {
                                var msGel2R = msGelR + 0.8;
                                var msGel2A = ms.angle + Math.sin(tMS * 4 + msi2) * 0.15;
                                var msGel2X = Math.round(g.x + Math.cos(msGel2A) * msGel2R);
                                var msGel2Y = Math.round(g.y + Math.sin(msGel2A) * msGel2R);
                                set(msGel2X, msGel2Y, ms.gelDimColor);
                            }
                        }
                    }
                }
                if (g.brushEnzymes) {
                    var tBE = (now % 9000) / 9000 * 2 * Math.PI;
                    for (var bei2 = 0; bei2 < g.brushEnzymes.length; bei2++) {
                        var be = g.brushEnzymes[bei2];
                        var beP = Math.sin(tBE * 1.5 + be.phase);
                        var beA = be.angle + Math.sin(tBE * 0.7 + be.phase) * 0.1;
                        var beR2 = bR + 0.8; // sits on microvillar surface
                        set(Math.round(g.x + Math.cos(beA) * beR2), Math.round(g.y + Math.sin(beA) * beR2), beP > 0 ? '#eedd77' : be.color);
                    }
                }
                // Exosomes: drift outward from cell body
                var tExo = (now % 16000) / 16000;
                if (g.exosomes) {
                    for (var exi = 0; exi < g.exosomes.length; exi++) {
                        var exo = g.exosomes[exi];
                        var exP = (tExo * exo.speed + exo.phase) % 1.0;
                        var exDR = g.bodyRadius + 0.5 + exP * 3.5;
                        var exA = exo.releaseAngle + exP * (exo.driftAngle - exo.releaseAngle) * 0.3;
                        var exPulse = Math.sin(tExo * 2 * Math.PI * 4 + exi * 2.1 + i * 1.7);
                        set(Math.round(g.x+Math.cos(exA)*exDR), Math.round(g.y+Math.sin(exA)*exDR), exPulse>0?'#ddaaee':exo.color);
                    }
                }
                // Apical microvilli: actin-cored projections on the free surface
                // Sway gently with a slow sinusoidal oscillation
                var tMV2 = (now % 8000) / 8000 * 2 * Math.PI;
                if (g.microvilli) {
                    for (var mvi2 = 0; mvi2 < g.microvilli.length; mvi2++) {
                        var mv = g.microvilli[mvi2];
                        var mvSway = Math.sin(tMV2 + mv.phase) * 0.08;
                        var mvBaseA = mv.angle + mvSway;
                        var mvBaseX = g.x + Math.cos(mvBaseA) * bR;
                        var mvBaseY = g.y + Math.sin(mvBaseA) * bR;
                        for (var ml = 0; ml <= Math.ceil(mv.length * 2); ml++) {
                            var mr = ml * 0.5; if (mr > mv.length) break;
                            var mx = Math.round(mvBaseX + Math.cos(mvBaseA) * mr);
                            var my = Math.round(mvBaseY + Math.sin(mvBaseA) * mr);
                            var isTip2 = mr > mv.length - 0.5;
                            var mPulse = Math.sin(tMV2 * 1.3 + i * 1.7 + mvi2 * 2.0 + mr * 1.5);
                            set(mx, my, isTip2 ? (mPulse > 0 ? '#ddbb88' : '#ccaa77') : (mPulse > 0.3 ? '#bb9966' : '#aa8855'));
                        }
                    }
                }
                // Terminal web: actomyosin belt at microvillar roots
                // Myosin-II contractile ring + spectrin/villin crosslinks beneath brush border
                var tTW = (now % 10000) / 10000 * 2 * Math.PI;
                if (g.terminalWeb) {
                    var tw = g.terminalWeb;
                    var twR = bR - tw.depth; // just inside the membrane, beneath microvilli
                    for (var twi = 0; twi < tw.segments; twi++) {
                        var twFrac = (twi / (tw.segments - 1)) - 0.5; // -0.5 to 0.5
                        var twA = tw.apicalAngle + twFrac * tw.arcSpan;
                        var twPulse = Math.sin(tTW * 1.5 + tw.phase + twi * 1.8);
                        var twX = Math.round(g.x + Math.cos(twA) * twR);
                        var twY = Math.round(g.y + Math.sin(twA) * twR);
                        // Myosin-II contraction pulse: wave travels along the arc
                        var myoWave = Math.sin(tTW * 2.0 + twi * 1.2 + i * 1.5);
                        setR(twX, twY, myoWave > 0.2 ? '#cc8855' : '#aa7744', g.x, g.y, bR);
                    }
                }
                // Glycocalyx: fuzzy sugar coat extending beyond microvilli tips
                // Oligosaccharide chains sway with a slower, more fluid motion than microvilli
                var tGC = (now % 11000) / 11000 * 2 * Math.PI;
                if (g.glycocalyx) {
                    for (var gci2 = 0; gci2 < g.glycocalyx.length; gci2++) {
                        var gc = g.glycocalyx[gci2];
                        var gcSway = Math.sin(tGC * 0.8 + gc.phase) * 0.15;
                        var gcBaseA = gc.angle + gcSway;
                        // Glycocalyx starts beyond microvilli tips
                        var gcStartR = bR + 1.8 + g.nucleolusSize * 0.6;
                        var gcBaseX = g.x + Math.cos(gcBaseA) * gcStartR;
                        var gcBaseY = g.y + Math.sin(gcBaseA) * gcStartR;
                        for (var gl = 0; gl <= Math.ceil(gc.length * 2); gl++) {
                            var gr = gl * 0.5; if (gr > gc.length) break;
                            var gx = Math.round(gcBaseX + Math.cos(gcBaseA) * gr);
                            var gy = Math.round(gcBaseY + Math.sin(gcBaseA) * gr);
                            var isGcTip = gr > gc.length - 0.5;
                            var gcPulse = Math.sin(tGC * 1.2 + i * 1.3 + gci2 * 1.7 + gr * 1.0);
                            set(gx, gy, isGcTip ? (gcPulse > 0 ? gc.tipColor : gc.color) : (gcPulse > 0.2 ? gc.color : '#bbbb77'));
                        }
                    }
                }
            }
            // Brush border enzymes: SI and ALP catalysis at microvillar tips
            var tBE = (now % 9500) / 9500;
            if (g.brushEnzymes) {
                for (var bei2 = 0; bei2 < g.brushEnzymes.length; bei2++) {
                    var be = g.brushEnzymes[bei2];
                    var beSway = Math.sin(tMV2 + be.phase) * 0.08;
                    var beA = be.angle + beSway;
                    var beTipR = bR + be.mvLength + 0.3;
                    var beTipX = Math.round(g.x + Math.cos(beA) * beTipR);
                    var beTipY = Math.round(g.y + Math.sin(beA) * beTipR);
                    // Enzyme catalytic cycle
                    var beCycle = (tBE * 1.6 + be.phase * 0.3) % 1.0;
                    var beActive = Math.sin(tBE * 2 * Math.PI * 2.2 + be.phase);
                    // Enzyme dot at microvillus tip
                    set(beTipX, beTipY, beActive > 0 ? be.activeColor : be.enzymeColor);
                    // Substrate approaching from lumen (outside)
                    if (beCycle < 0.4) {
                        var beSubR = beTipR + 1.5 - beCycle * 4.0;
                        var beSubX = Math.round(g.x + Math.cos(beA) * beSubR);
                        var beSubY = Math.round(g.y + Math.sin(beA) * beSubR);
                        if (beCycle > 0.05 && beCycle < 0.35) set(beSubX, beSubY, be.substrateColor);
                    }
                    // Product released inward (toward cell interior for absorption)
                    if (beCycle > 0.5 && beCycle < 0.85) {
                        var beProdR = beTipR - (beCycle - 0.5) * 3.0;
                        var beProdX = Math.round(g.x + Math.cos(beA) * beProdR);
                        var beProdY = Math.round(g.y + Math.sin(beA) * beProdR);
                        set(beProdX, beProdY, be.productColor);
                    }
                }
            }
            // Tunneling nanotubes
            var tTNT = (now % 10000) / 10000;
            for (var ti = 0; ti < tunnelingNanotubes.length; ti++) {
                var tnt = tunnelingNanotubes[ti];
                var gF = granddaughterNuclei[tnt.from], gT = granddaughterNuclei[tnt.to];
                var tdx = gT.x - gF.x, tdy = gT.y - gF.y;
                var tLen = Math.sqrt(tdx*tdx + tdy*tdy), tSt = Math.ceil(tLen);
                var cargo = ((tTNT + tnt.phase) % 1.0);
                cargo = cargo < 0.5 ? cargo * 2 : (1.0 - cargo) * 2;
                for (var ts = 0; ts <= tSt; ts++) {
                    var tf = ts / tSt;
                    var tx = Math.round(gF.x + tdx * tf), ty = Math.round(gF.y + tdy * tf);
                    var dF = Math.sqrt((tx-gF.x)*(tx-gF.x)+(ty-gF.y)*(ty-gF.y));
                    var dT = Math.sqrt((tx-gT.x)*(tx-gT.x)+(ty-gT.y)*(ty-gT.y));
                    if (dF >= gF.bodyRadius && dT >= gT.bodyRadius) {
                        set(tx, ty, Math.abs(tf - cargo) < 0.12 ? tnt.cargoColor : tnt.tubeColor);
                    }
                }
            }
            // Granddaughter tight junctions: claudin/occludin seal between adjacent cells
            var tGDTJ = (now % 9000) / 9000;
            for (var gtji = 0; gtji < gdTightJunctions.length; gtji++) {
                var gtj = gdTightJunctions[gtji];
                var gjF = granddaughterNuclei[gtj.from], gjT = granddaughterNuclei[gtj.to];
                var gtdx = gjT.x - gjF.x, gtdy = gjT.y - gjF.y;
                var gtLen = Math.sqrt(gtdx*gtdx + gtdy*gtdy);
                if (gtLen < 0.1) continue;
                // Draw seal strand in the narrow gap between cell body edges
                var gtSteps = Math.ceil(gtLen);
                for (var gts = 0; gts <= gtSteps; gts++) {
