<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="11" height="11"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // The diamond softens; corners fill, edges blur toward a circle
        var size = 11;
        var center = 5;

        // Layered palette: warm core fading outward
        var colors = ['#6b2a00', '#4a1a00', '#331100', '#444444', '#777777', '#aaaaaa', '#cccccc'];

        for (var y = 0; y < size; y++) {
            for (var x = 0; x < size; x++) {
                var dx = Math.abs(x - center);
                var dy = Math.abs(y - center);
                var manhattan = dx + dy;
                var euclidean = Math.sqrt(dx * dx + dy * dy);
                // Blend manhattan and euclidean: the diamond rounds its edges
                var dist = Math.floor(manhattan * 0.4 + euclidean * 0.6 + 0.5);
                if (dist <= 5) {
                    ctx.fillStyle = colors[dist];
                    ctx.fillRect(x, y, 1, 1);
                }
            }
        }
    </script>
</body>
</html>
