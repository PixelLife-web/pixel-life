<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="25" height="25"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        // The cell floats in a living medium. Nutrients drift past.
        var size = 25;
        var center = 12;

        // Outer membrane colors (dark to light, edge inward)
        var membraneColors = ['#777777', '#555555', '#331100', '#4a1a00'];
        // Cytoplasm
        var cytoColor = '#6b2a00';
        var erColor = '#884422'; // endoplasmic reticulum - lighter channels
        // Nucleus colors (bright core with nucleolus)
        var nucleusColors = ['#ffbb44', '#d4740e', '#ff9933'];
        // Organelle definitions: each orbits the nucleus at a fixed radius and speed
        var organelles = [
            { radius: 3.8, baseAngle: 0,          speed: 1, color: '#44aa66' },  // mitochondrion
            { radius: 4.2, baseAngle: Math.PI*0.7, speed: -0.7, color: '#44aa66' },  // mitochondrion
            { radius: 3.4, baseAngle: Math.PI*1.4, speed: 0.5, color: '#8866cc' },  // ribosome cluster
            { radius: 4.5, baseAngle: Math.PI*1.1, speed: 0.3, color: '#cc8844' },  // lysosome
        ];

        // Endoplasmic reticulum: fixed network of channels radiating from nucleus
        // Defined as line segments from near-nucleus to mid-cytoplasm
        var erSegments = [
            { x1: 10, y1: 10, x2: 8, y2: 8 },
            { x1: 14, y1: 10, x2: 16, y2: 8 },
            { x1: 10, y1: 14, x2: 8, y2: 16 },
            { x1: 14, y1: 14, x2: 16, y2: 16 },
            { x1: 12, y1: 9, x2: 12, y2: 7 },
            { x1: 12, y1: 15, x2: 12, y2: 17 },
            { x1: 9, y1: 12, x2: 7, y2: 12 },
            { x1: 15, y1: 12, x2: 17, y2: 12 },
        ];

        // Cilia: hair-like projections at fixed angles around the membrane
        // Each cilium has an angle (position on membrane), length, and wave phase
        var cilia = [];
        var numCilia = 14;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cilia.push({ angle: angle, length: 3, phase: ci * 0.3 });
        }

        // Extracellular medium color
        var mediumColor = '#e8e0d8';
        // Nutrient particles floating in the environment (fixed positions, deterministic)
        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 22, y: 5, color: '#88bb55' },
            { x: 4, y: 20, color: '#55aa88' },
            { x: 21, y: 21, color: '#55aa88' },
            { x: 1, y: 12, color: '#bbaa44' },
            { x: 23, y: 14, color: '#bbaa44' },
            { x: 12, y: 1, color: '#88bb55' },
            { x: 11, y: 23, color: '#55aa88' },
            { x: 5, y: 6, color: '#bbaa44' },
            { x: 19, y: 4, color: '#88bb55' },
            { x: 3, y: 16, color: '#55aa88' },
            { x: 20, y: 18, color: '#bbaa44' },
        ];

        // Golgi apparatus: stacked crescents near the nucleus
        var golgiPixels = {
            '10,13': '#cc9944', '10,14': '#cc9944', '10,15': '#cc9944',
            '9,13': '#ddaa55', '9,14': '#ddaa55', '9,15': '#ddaa55',
            '8,14': '#eebb66',
        };

        // Chromatin: dark speckles inside the nucleus that condense/decondense
        // Fixed angular positions relative to nucleus center
        var chromatinSpots = [
            { angle: 0.4, rFrac: 0.6 },
            { angle: 1.5, rFrac: 0.45 },
            { angle: 2.8, rFrac: 0.7 },
            { angle: 3.9, rFrac: 0.5 },
            { angle: 5.2, rFrac: 0.65 },
        ];
        var chromatinColor = '#aa5500';
        var chromatinCondensed = '#883300';

        // Ribosomes: small dots along the ER channels (rough ER)
        var ribosomePositions = [];
        for (var ri = 0; ri < erSegments.length; ri++) {
            var seg = erSegments[ri];
            // Place a ribosome near the midpoint of each segment, offset by 1px
            var mx = Math.round((seg.x1 + seg.x2) / 2);
            var my = Math.round((seg.y1 + seg.y2) / 2);
            // Offset perpendicular to the segment direction
            var ddx = seg.y2 - seg.y1;
            var ddy = -(seg.x2 - seg.x1);
            var dlen = Math.sqrt(ddx * ddx + ddy * ddy);
            if (dlen > 0) {
                var offx = Math.round(ddx / dlen);
                var offy = Math.round(ddy / dlen);
                ribosomePositions.push({ x: mx + offx, y: my + offy });
            }
        }

        // Precompute ER pixel set and ordered paths for vesicle transport
        var erPixels = {};
        var erPaths = []; // each path is an array of {x,y} points
        for (var si = 0; si < erSegments.length; si++) {
            var seg = erSegments[si];
            var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
            var path = [];
            for (var step = 0; step <= steps; step++) {
                var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                erPixels[px + ',' + py] = true;
                path.push({ x: px, y: py });
            }
            erPaths.push(path);
        }

        // Vesicles: each rides along an ER path, staggered by phase
        var vesicles = [
            { pathIdx: 0, speed: 1, color: '#ffdd66', phase: 0.0 },
            { pathIdx: 2, speed: 1, color: '#ffdd66', phase: 0.33 },
            { pathIdx: 4, speed: 1, color: '#66ddff', phase: 0.5 },
            { pathIdx: 6, speed: 1, color: '#66ddff', phase: 0.16 },
            { pathIdx: 1, speed: 1, color: '#ffdd66', phase: 0.66 },
            { pathIdx: 5, speed: 1, color: '#66ddff', phase: 0.83 },
        ];

        function draw() {
            ctx.clearRect(0, 0, size, size);

            // Breathing: slow sine wave synced to wall clock (8-second cycle)
            var t = (Date.now() % 8000) / 8000;
            var breath = Math.sin(t * 2 * Math.PI);
            var maxRadius = 6.5 + breath * 0.4;

            // Nucleus pulse: faster counter-rhythm (5-second cycle)
            var t2 = (Date.now() % 5000) / 5000;
            var nucleusPulse = Math.sin(t2 * 2 * Math.PI);
            var nucleusRadius = 1.8 + nucleusPulse * 0.3;

            // Compute organelle pixel positions (wall-clock driven, 12-second orbit period)
            var tOrbit = (Date.now() % 12000) / 12000 * 2 * Math.PI;
            var organellePixels = [];
            for (var oi = 0; oi < organelles.length; oi++) {
                var o = organelles[oi];
                var angle = o.baseAngle + o.speed * tOrbit;
                var ox = Math.round(center + Math.cos(angle) * o.radius);
                var oy = Math.round(center + Math.sin(angle) * o.radius);
                organellePixels.push({ x: ox, y: oy, color: o.color });
            }

            // Compute vesicle positions along ER paths (6-second transit cycle)
            var tVesicle = (Date.now() % 6000) / 6000;
            var vesiclePixels = [];
            for (var vi = 0; vi < vesicles.length; vi++) {
                var v = vesicles[vi];
                var path = erPaths[v.pathIdx];
                var progress = (tVesicle + v.phase) % 1.0;
                // Bounce: go out and come back
                var pos = progress < 0.5 ? progress * 2 : (1.0 - progress) * 2;
                var idx = Math.round(pos * (path.length - 1));
                vesiclePixels.push({ x: path[idx].x, y: path[idx].y, color: v.color });
            }

            // Compute cilia pixel positions (wave with 4-second cycle)
            var tCilia = (Date.now() % 4000) / 4000 * 2 * Math.PI;
            var ciliaPixels = {};
            for (var ci = 0; ci < cilia.length; ci++) {
                var c = cilia[ci];
                var waveOffset = Math.sin(tCilia + c.phase) * 0.3;
                var baseAngle = c.angle + waveOffset;
                for (var cl = 1; cl <= c.length; cl++) {
                    var cr = maxRadius + cl;
                    var cx = Math.round(center + Math.cos(baseAngle) * cr);
                    var cy = Math.round(center + Math.sin(baseAngle) * cr);
                    if (cx >= 0 && cx < size && cy >= 0 && cy < size) {
                        // Fade cilia color with distance
                        var ciliaAlpha = cl === 1 ? '#997755' : '#aa9977';
                        ciliaPixels[cx + ',' + cy] = ciliaAlpha;
                    }
                }
            }

            // Compute chromatin visibility (15-second condensation cycle)
            var tChromatin = (Date.now() % 15000) / 15000 * 2 * Math.PI;
            var chromatinPixels = {};
            for (var chi = 0; chi < chromatinSpots.length; chi++) {
                var cs = chromatinSpots[chi];
                // Chromatin condenses and relaxes; when condensed, more visible
                var condensation = Math.sin(tChromatin + chi * 1.2);
                var cr = cs.rFrac * nucleusRadius;
                var cx = Math.round(center + Math.cos(cs.angle) * cr);
                var cy = Math.round(center + Math.sin(cs.angle) * cr);
                if (cx >= 0 && cx < size && cy >= 0 && cy < size) {
                    chromatinPixels[cx + ',' + cy] = condensation > 0 ? chromatinCondensed : chromatinColor;
                }
            }

            // Compute ribosome visibility (ribosomes pulse gently, 7-second cycle)
            var tRibo = (Date.now() % 7000) / 7000 * 2 * Math.PI;
            var ribosomePixels = {};
            for (var ri = 0; ri < ribosomePositions.length; ri++) {
                var rp = ribosomePositions[ri];
                var riboPulse = Math.sin(tRibo + ri * 0.9);
                ribosomePixels[rp.x + ',' + rp.y] = riboPulse > 0 ? '#6655aa' : '#7766bb';
            }

            // Compute nutrient drift (slow 20-second cycle, small oscillation)
            var tNutrient = (Date.now() % 20000) / 20000 * 2 * Math.PI;
            var nutrientPixels = {};
            for (var ni = 0; ni < nutrients.length; ni++) {
                var n = nutrients[ni];
                var ndx = Math.round(Math.sin(tNutrient + ni * 1.7) * 1);
                var ndy = Math.round(Math.cos(tNutrient + ni * 2.3) * 1);
                var nx = n.x + ndx;
                var ny = n.y + ndy;
                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    nutrientPixels[nx + ',' + ny] = n.color;
                }
            }

            for (var y = 0; y < size; y++) {
                for (var x = 0; x < size; x++) {
                    var dx = x - center;
                    var dy = y - center;
                    var dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist <= maxRadius) {
                        var color;

                        // Check if this pixel is a vesicle (drawn on top)
                        var isSpecial = false;
                        for (var vi = 0; vi < vesiclePixels.length; vi++) {
                            if (vesiclePixels[vi].x === x && vesiclePixels[vi].y === y) {
                                color = vesiclePixels[vi].color;
                                isSpecial = true;
                                break;
                            }
                        }

                        // Check if this pixel is an organelle
                        if (!isSpecial) {
                            for (var oi = 0; oi < organellePixels.length; oi++) {
                                if (organellePixels[oi].x === x && organellePixels[oi].y === y) {
                                    color = organellePixels[oi].color;
                                    isSpecial = true;
                                    break;
                                }
                            }
                        }

                        // Check Golgi apparatus
                        if (!isSpecial && golgiPixels[x + ',' + y]) {
                            color = golgiPixels[x + ',' + y];
                            isSpecial = true;
                        }

                        if (!isSpecial) {
                            if (dist <= nucleusRadius) {
                                // Check for chromatin inside the nucleus
                                if (chromatinPixels[x + ',' + y]) {
                                    color = chromatinPixels[x + ',' + y];
                                } else {
                                    var nci = Math.floor(dist * nucleusColors.length / (nucleusRadius + 0.3));
                                    if (nci >= nucleusColors.length) nci = nucleusColors.length - 1;
                                    color = nucleusColors[nci];
                                }
                            } else if (dist > maxRadius - 1.5) {
                                var shell = maxRadius - dist;
                                var mi = Math.floor(shell * membraneColors.length / 1.5);
                                if (mi >= membraneColors.length) mi = membraneColors.length - 1;
                                color = membraneColors[mi];
                            } else if (ribosomePixels[x + ',' + y]) {
                                color = ribosomePixels[x + ',' + y];
                            } else if (erPixels[x + ',' + y]) {
                                color = erColor;
                            } else {
                                color = cytoColor;
                            }
                        }
                        ctx.fillStyle = color;
                        ctx.fillRect(x, y, 1, 1);
                    } else {
                        // Extracellular space
                        var ciliaKey = x + ',' + y;
                        if (ciliaPixels[ciliaKey]) {
                            ctx.fillStyle = ciliaPixels[ciliaKey];
                        } else if (nutrientPixels[x + ',' + y]) {
                            ctx.fillStyle = nutrientPixels[x + ',' + y];
                        } else {
                            ctx.fillStyle = mediumColor;
                        }
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
