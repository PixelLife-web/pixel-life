<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="c" width="32" height="32"></canvas>
    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        var s = Math.min(window.innerWidth, window.innerHeight);
        canvas.style.width = s + 'px';
        canvas.style.height = s + 'px';

        var size = 32;

        var mediumColor = '#e8e0d8';

        var cellA = {
            cx: 21, cy: 9,
            radius: 5.5,
            nucleusCx: 21, nucleusCy: 9,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 19, y1: 7, x2: 17, y2: 5 },
                { x1: 23, y1: 7, x2: 25, y2: 5 },
                { x1: 19, y1: 11, x2: 17, y2: 13 },
                { x1: 23, y1: 11, x2: 25, y2: 13 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 0.5, speed: 0.8, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 3.2, speed: -0.6, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '19,10': '#cc9944', '19,11': '#cc9944', '18,10': '#ddaa55' },
            chromatin: [
                { x: 21, y: 8 }, { x: 22, y: 9 }, { x: 21, y: 10 }, { x: 20, y: 9 },
            ],
            sisterChromatin: [
                { x: 22, y: 8 }, { x: 22, y: 10 }, { x: 20, y: 10 }, { x: 20, y: 8 },
            ],
            centrosomes: [
                { x: 23, y: 8 },
                { x: 23, y: 9 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 0.3, color: '#33cc99' },
                { angle: 2.5, color: '#cc3399' },
            ],
        };

        var cellB = {
            cx: 11, cy: 23,
            radius: 5.5,
            nucleusCx: 11, nucleusCy: 23,
            nucleusRadius: 2.0,
            nucleusColor: '#d4740e',
            nucleusEdge: '#ffbb44',
            nucleolusColor: '#ff9933',
            cytoColor: '#6b2a00',
            membraneColors: ['#777777', '#555555', '#331100', '#4a1a00'],
            erSegments: [
                { x1: 9, y1: 21, x2: 7, y2: 19 },
                { x1: 13, y1: 21, x2: 15, y2: 19 },
                { x1: 9, y1: 25, x2: 7, y2: 27 },
                { x1: 13, y1: 25, x2: 15, y2: 27 },
            ],
            erColor: '#884422',
            mitochondria: [
                { radius: 3.0, baseAngle: 2.5, speed: -0.7, bodyColor: '#44aa66', cristaeColor: '#2d7a48' },
                { radius: 3.5, baseAngle: 5.8, speed: 0.5, bodyColor: '#3d9960', cristaeColor: '#287042' },
            ],
            golgiPixels: { '9,24': '#cc9944', '9,25': '#cc9944', '8,24': '#ddaa55' },
            chromatin: [
                { x: 11, y: 22 }, { x: 12, y: 23 }, { x: 11, y: 24 }, { x: 10, y: 23 },
            ],
            sisterChromatin: [
                { x: 12, y: 22 }, { x: 12, y: 24 }, { x: 10, y: 24 }, { x: 10, y: 22 },
            ],
            centrosomes: [
                { x: 13, y: 22 },
                { x: 13, y: 23 },
            ],
            furrowProgress: 0,
            separated: true,
            cilia: [],
            receptors: [
                { angle: 3.5, color: '#3399cc' },
                { angle: 5.0, color: '#cc9933' },
            ],
        };

        var numCilia = 10;
        for (var ci = 0; ci < numCilia; ci++) {
            var angle = ci * 2 * Math.PI / numCilia;
            cellA.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 });
            cellB.cilia.push({ angle: angle, length: 2, phase: ci * 0.4 + 0.2 });
        }

        function inB(x, y) { return x >= 0 && x < size && y >= 0 && y < size; }
        function renderOrbiters(cell, items, tOrbit, t, period, opts) {
            var px = {};
            if (!items || !cell.separated) return px;
            var tp = (t * 8000 / period) % 1.0;
            var pr = opts.pulseRate || 1, ps = opts.phaseSpread || 1.4, th = opts.threshold || 0.2;
            var minR = opts.minR || 0, mxR = opts.maxR || 999;
            for (var i = 0; i < items.length; i++) {
                var it = items[i];
                var a = it.baseAngle + it.speed * tOrbit;
                var r = it.orbitR;
                if (opts.nuclear !== undefined && it.nuclear !== undefined) {
                    r = it.orbitR;
                }
                var x = Math.round(cell.cx + Math.cos(a) * r);
                var y = Math.round(cell.cy + Math.sin(a) * r);
                var dx = x - cell.cx, dy = y - cell.cy, d = Math.sqrt(dx*dx+dy*dy);
                var p = Math.sin(tp * 2 * Math.PI * pr + i * ps);
                var inRange = (it.nuclear !== undefined) ?
                    (it.nuclear ? d <= (opts.nucR || 2) + 0.5 : d < mxR && d > (opts.nucR || 2) + 0.8) :
                    (d >= minR && d <= mxR);
                if (inRange && inB(x, y)) {
                    var hi = (it.nuclear && opts.nucHi) ? (p > (opts.nucTh||0.1) ? opts.nucHi : (opts.nucLo||it.color)) : null;
                    px[x+','+y] = hi || (p > th ? (opts.hiColor || it.color) : it.color);
                }
                if (opts.spark && p > 0.6 && inB(x,y)) {
                    var sa = a + 0.8, sr = r + 0.6;
                    var sx = Math.round(cell.cx + Math.cos(sa) * sr);
                    var sy = Math.round(cell.cy + Math.sin(sa) * sr);
                    var sd = Math.sqrt((sx-cell.cx)*(sx-cell.cx)+(sy-cell.cy)*(sy-cell.cy));
                    if (sd < mxR && inB(sx, sy)) px[sx+','+sy] = opts.sparkColor || opts.hiColor;
                }
                if (opts.ripple && p > 0.5) {
                    var ra = a + 0.4, rr = r - 0.5;
                    var rx = Math.round(cell.cx + Math.cos(ra) * rr);
                    var ry = Math.round(cell.cy + Math.sin(ra) * rr);
                    if (Math.sqrt((rx-cell.cx)*(rx-cell.cx)+(ry-cell.cy)*(ry-cell.cy)) < mxR && inB(rx,ry)) {
                        px[rx+','+ry] = opts.rippleColor || opts.hiColor;
                    }
                }
            }
            return px;
        }

        function buildERData(cell) {
            cell.erPixels = {};
            cell.erPaths = [];
            for (var si = 0; si < cell.erSegments.length; si++) {
                var seg = cell.erSegments[si];
                var steps = Math.max(Math.abs(seg.x2 - seg.x1), Math.abs(seg.y2 - seg.y1));
                var path = [];
                for (var step = 0; step <= steps; step++) {
                    var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                    var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                    cell.erPixels[px + ',' + py] = true;
                    path.push({ x: px, y: py });
                }
                cell.erPaths.push(path);
            }
        }
        buildERData(cellA);
        buildERData(cellB);

        var nutrients = [
            { x: 2, y: 3, color: '#88bb55' },
            { x: 28, y: 5, color: '#88bb55' },
            { x: 4, y: 28, color: '#55aa88' },
            { x: 27, y: 27, color: '#55aa88' },
            { x: 1, y: 15, color: '#bbaa44' },
            { x: 30, y: 17, color: '#bbaa44' },
            { x: 16, y: 1, color: '#88bb55' },
            { x: 15, y: 30, color: '#55aa88' },
            { x: 5, y: 8, color: '#bbaa44' },
            { x: 26, y: 3, color: '#88bb55' },
            { x: 3, y: 25, color: '#55aa88' },
            { x: 28, y: 20, color: '#bbaa44' },
            { x: 16, y: 16, color: '#bbaa44' },
            { x: 15, y: 15, color: '#55aa88' },
        ];

        var abscissionScar = { x: 16, y: 16, color: '#887733' };

        var midbodyRemnants = [
            { x: 23, y: 5, color: '#556677', glowColor: '#667788' },
            { x: 8, y: 27, color: '#556677', glowColor: '#667788' },
            { x: 21, y: 9, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
            { x: 11, y: 23, color: '#8899aa', glowColor: '#99bbcc', fresh: true },
        ];

        var granddaughterNuclei = [
            { x: 18, y: 6, parent: 'A', reactivation: 0.3, nucleolusSize: 0.4, cajalAngle: 0.8 },
            { x: 24, y: 12, parent: 'A', reactivation: 0.25, nucleolusSize: 0.35, cajalAngle: 2.5 },
            { x: 8, y: 20, parent: 'B', reactivation: 0.35, nucleolusSize: 0.45, cajalAngle: 4.2 },
            { x: 14, y: 26, parent: 'B', reactivation: 0.2, nucleolusSize: 0.3, cajalAngle: 5.8 },
        ];

        var cellTypes = ['enterocyte', 'goblet', 'enterocyte', 'goblet'];

        for (var gbi = 0; gbi < granddaughterNuclei.length; gbi++) {
            var gn = granddaughterNuclei[gbi];
            gn.cellType = cellTypes[gbi];
            gn.bodyRadius = 2.2 + gn.nucleolusSize * 0.8;
            gn.membraneColor = gn.cellType === 'goblet' ? '#556655' : '#555555';
            gn.cytoColor = gn.cellType === 'goblet' ? '#5b3a10' : '#6b2a00';
            gn.speckles = [
                { angle: gn.cajalAngle + 2.1, dist: 0.6, color: '#88ddaa' },
                { angle: gn.cajalAngle + 4.3, dist: 0.5, color: '#77cc99' },
            ];
            gn.mitoAngle = gbi * 1.57 + 0.4;
            gn.mitoSpeed = (gbi % 2 === 0 ? 0.6 : -0.5);
            gn.erStubs = [
                { angle: gn.cajalAngle + 1.0, length: 1.5 },
                { angle: gn.cajalAngle + 3.5, length: 1.2 },
            ];
            gn.golgiAngle = gn.cajalAngle + 2.3;
            gn.golgiDist = gn.bodyRadius * 0.55;
            gn.freeRibosomes = [{angle:gn.cajalAngle+0.5,dist:gn.bodyRadius*0.45,phase:gbi*0.7},{angle:gn.cajalAngle+2.0,dist:gn.bodyRadius*0.55,phase:gbi*0.7+1.2},{angle:gn.cajalAngle+4.5,dist:gn.bodyRadius*0.40,phase:gbi*0.7+2.4}];
            var ev = gbi % 2 === 0;
            gn.peroxAngle=gn.cajalAngle+3.0; gn.peroxDist=gn.bodyRadius*0.50; gn.peroxSpeed=ev?0.4:-0.35;
            gn.lysoAngle=gn.cajalAngle+4.8; gn.lysoDist=gn.bodyRadius*0.48; gn.lysoSpeed=ev?-0.3:0.35;
            gn.centrosomeAngle=gn.cajalAngle+5.5; gn.centrosomeDist=1.0+gn.nucleolusSize*0.3;
            gn.ciliumAngle=gn.centrosomeAngle+0.15; gn.ciliumLength=2.5+gn.nucleolusSize*0.5; gn.ciliumPhase=gbi*1.3;
            gn.endosomes=[{memAngle:gn.cajalAngle+1.5,speed:0.32,phase:gbi*0.6,color:'#aa55cc'},{memAngle:gn.cajalAngle+4.0,speed:0.28,phase:gbi*0.6+0.5,color:'#9944bb'}];
            gn.mvbAngle=gn.lysoAngle+1.2; gn.mvbDist=gn.bodyRadius*0.42;
            gn.mvbSpeed=ev?0.25:-0.22;
            gn.exosomes=[{releaseAngle:gn.mvbAngle+0.5,driftAngle:gbi*1.57+0.3,speed:0.18,phase:gbi*0.4,color:'#cc88dd'},{releaseAngle:gn.mvbAngle+2.8,driftAngle:gbi*1.57+2.5,speed:0.15,phase:gbi*0.4+0.5,color:'#bb77cc'}];
            gn.autophagosomes=[{angle:gn.lysoAngle+2.0,dist:gn.bodyRadius*0.50,speed:ev?0.20:-0.18,phase:gbi*0.5,color:'#668844',matureColor:'#887744'},{angle:gn.lysoAngle+4.5,dist:gn.bodyRadius*0.38,speed:ev?-0.16:0.22,phase:gbi*0.5+0.5,color:'#557733',matureColor:'#776633'}];
            gn.proteasomes=[{angle:gn.cajalAngle+1.8,dist:gn.bodyRadius*0.52,speed:ev?0.30:-0.27,phase:gbi*0.6,color:'#6688aa',activeColor:'#88bbdd'},{angle:gn.cajalAngle+4.2,dist:gn.bodyRadius*0.44,speed:ev?-0.25:0.32,phase:gbi*0.6+0.5,color:'#557799',activeColor:'#77aacc'}];
            gn.lipidDroplets=[{angle:gn.cajalAngle+0.8,dist:gn.bodyRadius*0.58,speed:ev?0.15:-0.13,phase:gbi*0.3,coreColor:'#ddcc44',shellColor:'#bbaa33'},{angle:gn.cajalAngle+3.6,dist:gn.bodyRadius*0.46,speed:ev?-0.12:0.17,phase:gbi*0.3+0.5,coreColor:'#ccbb33',shellColor:'#aaaa22'}];
            if (gn.cellType === 'goblet') {
                gn.mucinGranules = [];
                var mgCount = 2 + (gbi % 2);
                for (var mgi = 0; mgi < mgCount; mgi++) {
                    gn.mucinGranules.push({
                        angle: gn.cajalAngle + mgi * 1.8 + 0.5,
                        dist: gn.bodyRadius * 0.55 + mgi * 0.12,
                        phase: gbi * 0.6 + mgi * 1.3,
                        coreColor: '#aaddcc',
                        shellColor: '#88bbaa',
                    });
                }
                gn.cftrChannels = [];
                var cftrCount = 2 + (gbi % 2);
                for (var cfi = 0; cfi < cftrCount; cfi++) {
                    var cfSpread = (cfi - (cftrCount - 1) / 2) * 0.38;
                    gn.cftrChannels.push({
                        angle: apicalAngle + cfSpread,
                        phase: gbi * 0.7 + cfi * 1.6,
                        channelColor: '#44dd88',
                        clColor: '#33bb77',
                        dimColor: '#339966',
                    });
                }
                gn.mucinSecretion = [];
                for (var msi = 0; msi < mgCount; msi++) {
                    gn.mucinSecretion.push({
                        angle: apicalAngle + (msi - (mgCount - 1) / 2) * 0.50,
                        phase: gbi * 0.4 + msi * 1.1,
                        granuleColor: '#aaddcc',    // mucin granule approaching membrane
                        fusionColor: '#ccffee',     // bright flash at membrane fusion
                        gelColor: '#99ddbb',        // secreted mucus gel (hydrated MUC2)
                        gelDimColor: '#77bbaa',      // resting mucus layer
                    });
                }
            } else {
                gn.brushEnzymes = [];
                var beCount = 2;
                for (var bei = 0; bei < beCount; bei++) {
                    gn.brushEnzymes.push({
                        angle: gn.cajalAngle + bei * 2.5 + 1.0,
                        phase: gbi * 0.8 + bei * 1.7,
                        color: '#ddbb66',
                    });
                }
            }
            var blCenter = { x: 16, y: 22 };
            var apicalAngle = Math.atan2(gn.y - blCenter.y, gn.x - blCenter.x);
            gn.microvilli = [];
            var mvCount = gn.cellType === 'enterocyte' ? (4 + (gbi % 2)) : (2 + (gbi % 2));
            for (var mvi = 0; mvi < mvCount; mvi++) {
                var mvSpread = (mvi - (mvCount - 1) / 2) * 0.35;
                gn.microvilli.push({
                    angle: apicalAngle + mvSpread,
                    length: 1.5 + gn.nucleolusSize * 0.8,
                    phase: gbi * 0.9 + mvi * 1.1,
                });
            }
            gn.terminalWeb = {
                apicalAngle: apicalAngle,
                arcSpan: (mvCount - 1) * 0.35 + 0.4, // slightly wider than microvilli spread
                depth: 0.6 + gn.nucleolusSize * 0.3, // beneath membrane
                segments: 3 + (gbi % 2), // 3-4 web filaments per cell
                phase: gbi * 1.4,
            };
            gn.glycocalyx = [];
            var gcCount = 5 + (gbi % 2); // 5-6 sugar chains per cell
            for (var gci = 0; gci < gcCount; gci++) {
                var gcSpread = (gci - (gcCount - 1) / 2) * 0.28;
                gn.glycocalyx.push({
                    angle: apicalAngle + gcSpread,
                    length: 1.0 + gn.nucleolusSize * 0.6,
                    phase: gbi * 1.2 + gci * 0.9,
                    color: gci % 3 === 0 ? '#eedd99' : (gci % 3 === 1 ? '#ddcc88' : '#ccddaa'),
                    tipColor: gci % 2 === 0 ? '#ffeeaa' : '#eeffbb',
                });
            }
        }

        for (var bei = 0; bei < granddaughterNuclei.length; bei++) {
            var ben = granddaughterNuclei[bei];
            if (ben.cellType !== 'enterocyte') continue;
            ben.brushEnzymes = [];
            if (ben.microvilli) {
                for (var bej = 0; bej < ben.microvilli.length; bej++) {
                    var beMV = ben.microvilli[bej];
                    var isALP = bej % 2 === 1;
                    ben.brushEnzymes.push({
                        mvIndex: bej,
                        angle: beMV.angle,
                        mvLength: beMV.length,
                        phase: bei * 0.8 + bej * 1.4,
                        enzymeColor: isALP ? '#55bb99' : '#cc6688',     // ALP: teal-green, SI: rose-pink
                        activeColor: isALP ? '#77ddbb' : '#ee88aa',     // brighter when catalyzing
                        substrateColor: isALP ? '#88ddcc' : '#ffaacc',  // substrate approaching
                        productColor: isALP ? '#aaeedd' : '#ffcc99',    // product released inward
                        isALP: isALP,
                    });
                }
            }
        }

        var blCenter = { x: 16, y: 22 };
        function initTransporters(field, face, count, spread, angleOff, phaseMul, phaseStep, props, cellFilter) {
            for (var ti = 0; ti < granddaughterNuclei.length; ti++) {
                var tn = granddaughterNuclei[ti];
                if (cellFilter && tn.cellType !== cellFilter) continue;
                var baseAngle = face === 'apical' ? Math.atan2(tn.y - blCenter.y, tn.x - blCenter.x) :
                    face === 'basal' ? Math.atan2(blCenter.y - tn.y, blCenter.x - tn.x) :
                    tn.cajalAngle + Math.PI; // ring
                tn[field] = [];
                var c = (typeof count === 'function') ? count(ti) : count;
                for (var tj = 0; tj < c; tj++) {
                    var sp = (tj - (c - 1) / 2) * spread;
                    var item = { angle: baseAngle + sp + (angleOff||0), phase: ti * phaseMul + tj * phaseStep };
                    for (var pk in props) item[pk] = props[pk];
                    tn[field].push(item);
                }
            }
        }
        initTransporters('naKPumps','basal',function(i){return 2+(i%2)},0.45,0,0.8,1.5,
            {pumpColor:'#dd6644',naColor:'#ffaa33',kColor:'#7744dd',restColor:'#aa4433'});
        initTransporters('sglt1','apical',function(i){return 2+(i%2)},0.40,0,0.9,1.4,
            {transporterColor:'#ee8833',glucoseColor:'#ffcc00',naCoColor:'#ffaa33'},'enterocyte');
        initTransporters('glut2','basal',2,0.50,0,0.7,1.8,
            {channelColor:'#cc7722',glucoseColor:'#ffdd44'},'enterocyte');
        initTransporters('pepT1','apical',function(i){return 2+(i%2)},0.42,0.15,0.8,1.6,
            {transporterColor:'#cc55aa',peptideColor:'#ee88cc',hColor:'#ff6666',restColor:'#993377'},'enterocyte');
        initTransporters('cd36','apical',2,0.50,0.30,0.6,1.9,
            {receptorColor:'#dd9944',faColor:'#eebb55',restColor:'#aa7733'},'enterocyte');
        initTransporters('chylomicrons','basal',function(i){return 1+(i%2)},0.55,0,0.5,1.7,
            {coreColor:'#eedd66',coatColor:'#ccbb55',speed:0.20},'enterocyte');
        initTransporters('nhe3','apical',function(i){return 2+(i%2)},0.44,-0.20,0.7,1.5,
            {exchangerColor:'#dd5577',naInColor:'#ffbb44',hOutColor:'#ff5555',restColor:'#aa3355'},'enterocyte');
        initTransporters('dra','apical',2,0.46,0.22,0.6,1.8,
            {exchangerColor:'#55aa77',clInColor:'#55ddaa',hco3OutColor:'#88ccee',restColor:'#337755'},'enterocyte');
        for (var aqi = 0; aqi < granddaughterNuclei.length; aqi++) {
            var aqn = granddaughterNuclei[aqi];
            aqn.aquaporins = [];
            var aqCount = 3 + (aqi % 2);
            for (var aqj = 0; aqj < aqCount; aqj++) {
                aqn.aquaporins.push({
                    angle: aqn.cajalAngle + Math.PI + aqj * (2 * Math.PI / aqCount) + 0.5,
                    phase: aqi * 0.7 + aqj * 1.3,
                    channelColor: '#5599dd', waterColor: '#88ccff', dimColor: '#4477aa',
                });
            }
        }

        var gdTightJunctions = [
            { from: 0, to: 1, phase: 0, color: '#ddccaa', dimColor: '#bbaa88' },     // GD0 ↔ GD1 (sisters from A)
            { from: 2, to: 3, phase: 1.2, color: '#ddccaa', dimColor: '#bbaa88' },   // GD2 ↔ GD3 (sisters from B)
            { from: 1, to: 2, phase: 2.4, color: '#ccbbaa', dimColor: '#aa9977' },   // GD1 ↔ GD2 (cross-lineage seal)
            { from: 0, to: 2, phase: 3.6, color: '#ccbbaa', dimColor: '#aa9977' },   // GD0 ↔ GD2 (diagonal seal)
        ];

        var tunnelingNanotubes = [
            { from: 0, to: 1, phase: 0, cargoColor: '#ffaa55', tubeColor: '#998877' },   // GD0 ↔ GD1 (sisters from A)
            { from: 2, to: 3, phase: 0.33, cargoColor: '#55aaff', tubeColor: '#998877' }, // GD2 ↔ GD3 (sisters from B)
            { from: 1, to: 2, phase: 0.66, cargoColor: '#aa55ff', tubeColor: '#887766' }, // GD1 ↔ GD2 (cross-lineage bridge)
        ];

        var calciumWaves = [];
        for (var cwi = 0; cwi < granddaughterNuclei.length; cwi++) {
            var nextIdx = (cwi + 1) % granddaughterNuclei.length;
            calciumWaves.push({
                from: granddaughterNuclei[cwi],
                to: granddaughterNuclei[nextIdx],
                phase: cwi * 0.25, // staggered propagation
                color: '#ffee77', dimColor: '#ddcc55',
            });
        }

        var basalLamina = [
            { x: 28, y: 8, phase: 0 },
            { x: 29, y: 12, phase: 0.4 },
            { x: 28, y: 16, phase: 0.8 },
            { x: 26, y: 20, phase: 1.2 },
            { x: 23, y: 24, phase: 1.6 },
            { x: 19, y: 27, phase: 2.0 },
            { x: 14, y: 29, phase: 2.4 },
            { x: 9, y: 28, phase: 2.8 },
            { x: 5, y: 25, phase: 3.2 },
            { x: 3, y: 21, phase: 3.6 },
        ];

        var kumSong = {
            cx: 16, cy: 16, // center of orbit (midpoint between cells)
            orbitR: 6.5,
            speed: 0.15,
            coreColor: '#ffd700',
            haloColor: '#ffec80',
            dimColor: '#cc9900',
        };

        function buildGDPixels(now) {

                    var pullStr = 0.5 * (1 - dNear / 12);
                    ndx += (nearCell.cx - n.x) / dNear * pullStr;
                    ndy += (nearCell.cy - n.y) / dNear * pullStr;
                }
                var nx = Math.round(n.x + ndx);
                var ny = Math.round(n.y + ndy);
                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    nutrientPx[nx + ',' + ny] = n.color;
                }
            }

            var kumSongPx = {};
            var tKS = (Date.now() % 25000) / 25000;
            var ksAngle = tKS * 2 * Math.PI * kumSong.speed * 25; // slow orbit
            var ksCoreX = Math.round(kumSong.cx + Math.cos(ksAngle) * kumSong.orbitR);
            var ksCoreY = Math.round(kumSong.cy + Math.sin(ksAngle) * kumSong.orbitR);
            if (ksCoreX >= 0 && ksCoreX < size && ksCoreY >= 0 && ksCoreY < size) {
                kumSongPx[ksCoreX + ',' + ksCoreY] = kumSong.coreColor;
                var ksHaloPulse = Math.sin(tKS * 2 * Math.PI * 8);
                var ksHaloColor = ksHaloPulse > 0 ? kumSong.haloColor : kumSong.dimColor;
                var ksCardinals = [[1,0],[-1,0],[0,1],[0,-1]];
                for (var kci = 0; kci < 4; kci++) {
                    var khx = ksCoreX + ksCardinals[kci][0];
                    var khy = ksCoreY + ksCardinals[kci][1];
                    if (khx >= 0 && khx < size && khy >= 0 && khy < size) {
                        var khDistA = Math.sqrt((khx - cellA.cx) * (khx - cellA.cx) + (khy - cellA.cy) * (khy - cellA.cy));
                        var khDistB = Math.sqrt((khx - cellB.cx) * (khx - cellB.cx) + (khy - cellB.cy) * (khy - cellB.cy));
                        if (khDistA > dA.maxR + 1 && khDistB > dB.maxR + 1) {
                            kumSongPx[khx + ',' + khy] = ksHaloColor;
                        }
                    }
                }
            }

            var tScar = (Date.now() % 20000) / 20000;
            var scarVisible = tScar < 0.3; // fading remnant, visible 30% of the time
            var scarColor = abscissionScar.color;

            var ecmPx = {};
            var tECM = (Date.now() % 15000) / 15000; // slow assembly pulse
            for (var fi = 0; fi < ecmFibers.length; fi++) {
                var fiber = ecmFibers[fi];
                var ax = cellA.cx + (cellB.cx - cellA.cx) * fiber.startFrac;
                var ay = cellA.cy + (cellB.cy - cellA.cy) * fiber.startFrac;
                var bx = cellA.cx + (cellB.cx - cellA.cx) * fiber.endFrac;
                var by = cellA.cy + (cellB.cy - cellA.cy) * fiber.endFrac;
                var mx = (ax + bx) / 2 + fiber.offsetX;
                var my = (ay + by) / 2 + fiber.offsetY;
                var segments = [
                    { x1: ax, y1: ay, x2: mx, y2: my },
                    { x1: mx, y1: my, x2: bx, y2: by },
                ];
                var pulse = Math.sin(tECM * 2 * Math.PI + fiber.pulsePhase);
                var visible = pulse > -0.3; // visible most of the time
                if (visible) {
                    for (var si2 = 0; si2 < segments.length; si2++) {
                        var seg = segments[si2];
                        var steps = Math.max(Math.abs(Math.round(seg.x2) - Math.round(seg.x1)), Math.abs(Math.round(seg.y2) - Math.round(seg.y1)));
                        if (steps === 0) steps = 1;
                        for (var step = 0; step <= steps; step++) {
                            var px = Math.round(seg.x1 + (seg.x2 - seg.x1) * step / steps);
                            var py = Math.round(seg.y1 + (seg.y2 - seg.y1) * step / steps);
                            if (px >= 0 && px < size && py >= 0 && py < size) {
                                ecmPx[px + ',' + py] = fiber.color;
                            }
                        }
                    }
                }
            }

            var junctionPx = {};
            var tJn = (Date.now() % 7000) / 7000;
            for (var gi = 0; gi < gapJunctions.length; gi++) {
                var gj = gapJunctions[gi];
                var fpA = cellA.filopodia[gj.filoIdxA], fpB = cellB.filopodia[gj.filoIdxB];
                var jmx = Math.round((cellA.cx+Math.cos(fpA.angle)*(dA.maxR+fpA.maxLength*0.8)+cellB.cx+Math.cos(fpB.angle)*(dB.maxR+fpB.maxLength*0.8))/2);
                var jmy = Math.round((cellA.cy+Math.sin(fpA.angle)*(dA.maxR+fpA.maxLength*0.8)+cellB.cy+Math.sin(fpB.angle)*(dB.maxR+fpB.maxLength*0.8))/2);
                var gapP = Math.sin(tJn*2*Math.PI+gj.pulsePhase);
                if (inB(jmx,jmy)) junctionPx[jmx+','+jmy] = gapP>0?'#eedd99':gj.color;
            }
            for (var di = 0; di < desmosomes.length; di++) {
                var dm = desmosomes[di];
                var dpairs = [[cellA,dA,dm.angleA],[cellB,dB,dm.angleB]];
                for (var dpi = 0; dpi < 2; dpi++) {
                    var dpc=dpairs[dpi][0],dpd=dpairs[dpi][1],dpa=dpairs[dpi][2],dpr=dpd.maxR-0.3;
                    var dpx=Math.round(dpc.cx+Math.cos(dpa)*dpr),dpy=Math.round(dpc.cy+Math.sin(dpa)*dpr);
                    if(inB(dpx,dpy))junctionPx[dpx+','+dpy]=dm.color;
                    var diax=Math.round(dpc.cx+Math.cos(dpa)*(dpr-1.2)),diay=Math.round(dpc.cy+Math.sin(dpa)*(dpr-1.2));
                    if(inB(diax,diay))junctionPx[diax+','+diay]=dm.anchorColor;
                }
            }
            for (var tji = 0; tji < tightJunctions.length; tji++) {
                var tj=tightJunctions[tji];
                var tjAx=cellA.cx+Math.cos(tj.angleA)*dA.maxR,tjAy=cellA.cy+Math.sin(tj.angleA)*dA.maxR;
                var tjBx=cellB.cx+Math.cos(tj.angleB)*dB.maxR,tjBy=cellB.cy+Math.sin(tj.angleB)*dB.maxR;
                var tjSt=Math.max(Math.abs(Math.round(tjBx)-Math.round(tjAx)),Math.abs(Math.round(tjBy)-Math.round(tjAy)))||1;
                for(var tjs=Math.floor(tjSt*0.3);tjs<=Math.ceil(tjSt*0.7);tjs++){
                    var tjx=Math.round(tjAx+(tjBx-tjAx)*tjs/tjSt),tjy=Math.round(tjAy+(tjBy-tjAy)*tjs/tjSt);
                    if(inB(tjx,tjy)){var tjP=Math.sin(tJn*2*Math.PI+tj.phase+tjs*0.5);junctionPx[tjx+','+tjy]=tjP>0?'#ddccaa':'#ccbb99';}
                }
            }
            for (var aji = 0; aji < adherensJunctions.length; aji++) {
                var aj=adherensJunctions[aji];
                var ajAx2=cellA.cx+Math.cos(aj.angleA)*(dA.maxR+0.5),ajAy2=cellA.cy+Math.sin(aj.angleA)*(dA.maxR+0.5);
                var ajBx2=cellB.cx+Math.cos(aj.angleB)*(dB.maxR+0.5),ajBy2=cellB.cy+Math.sin(aj.angleB)*(dB.maxR+0.5);
                var ajP=Math.sin(tJn*2*Math.PI+aj.phase);
                var ajPts2=[[ajAx2,ajAy2],[(ajAx2+ajBx2)/2,(ajAy2+ajBy2)/2],[ajBx2,ajBy2]];
                for(var ajp=0;ajp<3;ajp++){var apx=Math.round(ajPts2[ajp][0]),apy=Math.round(ajPts2[ajp][1]);if(inB(apx,apy))junctionPx[apx+','+apy]=ajP>0.2?'#ee8866':'#cc7755';}
            }

            var signalPx = {};
            var tSig = Date.now();
            for (var si = 0; si < signals.length; si++) {
                var sig = signals[si];
                var fromC = sig.fromCell === 'A' ? cellA : cellB;
                var toC = sig.toCell === 'A' ? cellA : cellB;
                var progress = ((tSig * sig.speed) + sig.phase) % 1.0;
                var sx = fromC.cx + (toC.cx - fromC.cx) * progress;
                var sy = fromC.cy + (toC.cy - fromC.cy) * progress;
                var spx = Math.round(sx);
                var spy = Math.round(sy);
                var dFromA = Math.sqrt((spx - cellA.cx) * (spx - cellA.cx) + (spy - cellA.cy) * (spy - cellA.cy));
                var dFromB = Math.sqrt((spx - cellB.cx) * (spx - cellB.cx) + (spy - cellB.cy) * (spy - cellB.cy));
                if (dFromA > dA.maxR + 0.5 && dFromB > dB.maxR + 0.5) {
                    if (spx >= 0 && spx < size && spy >= 0 && spy < size) {
                        signalPx[spx + ',' + spy] = sig.color;
                    }
                }
            }

            for (var y = 0; y < size; y++) {
                for (var x = 0; x < size; x++) {
                    var key = x + ',' + y;
                    var color = null;

                    var cells = [
                        { cell: cellA, d: dA },
                        { cell: cellB, d: dB },
                    ];

                    var inAnyCell = false;
                    for (var ci = 0; ci < cells.length; ci++) {
                        var cc = cells[ci].cell;
                        var dd = cells[ci].d;
                        var dx = x - cc.cx;
                        var dy = y - cc.cy;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var elong = dd.elongation || 0;
                        var constrict = dd.cytoConstriction || 0;
                        var effDist = dist;
                        if (elong > 0 && cc.centrosomes && cc.centrosomes.length >= 2) {
                            var eAxisX = cc.centrosomes[1].x - cc.centrosomes[0].x;
                            var eAxisY = cc.centrosomes[1].y - cc.centrosomes[0].y;
                            var eAxisLen = Math.sqrt(eAxisX * eAxisX + eAxisY * eAxisY);
                            if (eAxisLen > 0) {
                                var enx = eAxisX / eAxisLen;
                                var eny = eAxisY / eAxisLen;
                                var projAlong = dx * enx + dy * eny;
                                var projPerp = dx * (-eny) + dy * enx;
                                var baseEffDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp);
                                if (constrict > 0) {
                                    var equatorProximity = 1.0 - Math.min(1.0, Math.abs(projAlong) / (eAxisLen * 0.4));
                                    equatorProximity = equatorProximity * equatorProximity; // sharpen the waist
                                    effDist = Math.sqrt((projAlong / (1 + elong)) * (projAlong / (1 + elong)) + projPerp * projPerp * (1 + constrict * equatorProximity * 2));
                                } else {
                                    effDist = baseEffDist;
                                }
                            }
                        }

                        if (effDist <= dd.maxR) {
                            inAnyCell = true;
                            var layers = ['centPixels','secVesPixels','vesPixels','atpPixels',
                                'lysoPixels','endoPixels','peroxPixels','cyclinPixels','cycAPixels',
                                'cdc25Pixels','cycBPixels','plk1Pixels','auroraAPixels','cycDPixels',
                                'phosphPixels','mitoPixels','nucPixels','porePixels','envPixels',
                                'topoPixels','chrPixels','recPixels'];
                            for (var li = 0; li < layers.length && !color; li++) {
                                if (dd[layers[li]] && dd[layers[li]][key]) color = dd[layers[li]][key];
                            }
                            if (!color && cc.golgiPixels[key]) {
                                color = cc.golgiPixels[key];
                            } else if (!color && effDist > dd.maxR - 1.2) {
                                var shell = dd.maxR - effDist;
                                var mi = Math.floor(shell * cc.membraneColors.length / 1.2);
                                if (mi >= cc.membraneColors.length) mi = cc.membraneColors.length - 1;
                                color = cc.membraneColors[mi];
                            }
                            if (!color) {
                                var innerLayers = ['actinPixels','mtPixels','riboPixels','serPixels'];
                                for (var li2 = 0; li2 < innerLayers.length && !color; li2++) {
                                    if (dd[innerLayers[li2]] && dd[innerLayers[li2]][key]) color = dd[innerLayers[li2]][key];
                                }
                            }
                            if (!color && cc.erPixels[key]) {
                                color = cc.erColor;
                            }
                            if (!color) {
                                var ndx2 = x - cc.cx, ndy2 = y - cc.cy;
                                color = Math.sqrt(ndx2*ndx2+ndy2*ndy2) <= dd.nucR+0.3 ? '#7a3500' : cc.cytoColor;
                            }
                            break;
                        }
                    }

                    if (!inAnyCell) {
                        var ecCellLayers = ['cilPixels','filoPixels'];
                        for (var ecli = 0; ecli < ecCellLayers.length && !color; ecli++) {
                            for (var ecci = 0; ecci < cells.length && !color; ecci++) {
                                var ecl = cells[ecci].d[ecCellLayers[ecli]];
                                if (ecl && ecl[key]) color = ecl[key];
                            }
                        }
                        var ecGlobal = [junctionPx, signalPx, ecmPx];
                        for (var egli = 0; egli < ecGlobal.length && !color; egli++) {
                            if (ecGlobal[egli][key]) color = ecGlobal[egli][key];
                        }
                        if (!color && scarVisible && x === abscissionScar.x && y === abscissionScar.y) color = scarColor;
                        if (!color) {
                            var tMBR = (Date.now() % 18000) / 18000;
                            for (var mri = 0; mri < midbodyRemnants.length && !color; mri++) {
                                var mbr = midbodyRemnants[mri];
                                var mbrDrift = Math.sin(tMBR * 2 * Math.PI + mri * 3.14) * 1.5;
                                var mbrX = Math.round(mbr.x + mbrDrift * (mri === 0 ? 0.5 : -0.5));
                                var mbrY = Math.round(mbr.y + mbrDrift * (mri === 0 ? -0.5 : 0.5));
                                if (x === mbrX && y === mbrY) {
                                    var mbrPulse = Math.sin(tMBR * 2 * Math.PI * 2 + mri);
                                    if (mbr.fresh) {
                                        var freshPulse = Math.sin(tMBR * 2 * Math.PI * 3.5 + mri * 1.7);
                                        color = freshPulse > 0.3 ? '#bbddee' : (freshPulse > -0.3 ? mbr.glowColor : mbr.color);
                                    } else {
                                        color = mbrPulse > 0 ? mbr.glowColor : mbr.color;
                                    }
                                }
                            }
                        }
                        var ecFinal = [gdPx, kumSongPx, nutrientPx];
                        for (var efli = 0; efli < ecFinal.length && !color; efli++) {
                            if (ecFinal[efli][key]) color = ecFinal[efli][key];
                        }
                        if (!color) color = mediumColor;
                    }

                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
